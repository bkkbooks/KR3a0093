body:
  text: 中庸衍義卷十三明夏良勝撰誠明之義治己之誠自知之明應物之誠知人之明無妄元亨利貞其匪正有眚不利有攸往程頥曰無妄者至誠也至誠者天之道也天之化育萬物生生不窮各正其性命乃無妄也人能盡無妄之道則所謂與天地合其德也無妄乃大亨之理君子行無妄之道則可以致大亨矣無妄天之道卦言人由無妄之道利在貞正失貞正則妄也雖無邪心茍不合正理則妄也乃邪心也習坎有孚維心亨行有尚程頥曰陽實在中為中有孚維心亨惟其心誠故能亨通至誠可以通金石蹈水火何險難之不可亨也行有尚謂以誠一而行則能出險有可嘉尚謂有功也不行則常在險中矣臣良勝曰無妄之誠居常之道也習坎之誠處變之道也抑詩曰視爾友君子輯柔爾顔不遐有愆相在爾室尚不愧于屋漏無曰不顯莫豫云覯神之格思不可度思矧可射思朱熹曰言視爾友於君子之時和柔爾之顔色其戒懼之意常若自省曰豈不至於有過乎蓋常人之情其修於顯者無不如此然視爾獨居於室之時亦當庶幾乎不愧于屋漏然後可爾無曰此非明顯之處而莫豫見也當知鬼神之妙無物不體其至於是有不可得而測者不顯亦臨猶懼有失况可厭射而不敬乎此言不但修之於外又當戒謹恐懼乎其所不覩不聞也子思子曰君子不動而敬不言而信又曰夫微之顯誠之不可掩如此夫此正心誠意之極功而武公及之則亦聖賢之徒矣臣良勝曰武公愼獨之功若此可謂誠意以正心矣至其針警於國曰自卿以下至於大夫師長士茍在朝者無謂我老耄而舍我必共恪於朝夕以交戒我在輿旅賁之歌位寧官師之典倚几訓誦之諫居處􅉏御之針臨事瞽史之道宴居工師之頌史不失書矇不失誦所謂交修之道無不至矣本末兼該內外交養至老不倦無非自治誠切所以稱睿聖武公不在斯乎孟僖子曰聖人有明德者若不當世其後必有達人武公之賢若此其康叔之遺教也夫大學所謂誠其意者毋自欺也如惡惡臭如好好色此之謂自慊故君子必慎其獨也朱熹曰言欲自修者知為善以去其惡則當實用其力而禁止其自欺使其惡惡則如惡惡臭好善則如好好色皆務決去而求必得之以自快足於已不可徒茍且以徇外而為人也然其實與不實蓋有他人所不及知而已獨知之者故必謹之於此以審其幾焉臣良勝曰天下之理實理而已聖賢之學實學而已故大學條目雖有人事而實際用功惟在誠意意既誠則是非善惡有如黑白誠則明也一決其幾則去惡為善而正心修身齊家治國平天下惟意所適而無不善矣故君子謂誠意為大學人鬼之關過此則人否則為鬼人鬼之名善惡之大辨也此孔子傳授心法曽子獨得其宗子思得之而有誠明之辨孟子得之而有天人之分其極只實理實學也老子生當孔子之時其説曰虛莊周宗之辨及孟子之時而萬世之下言實學者必宗孔孟以其學皆實理也實則有有則無弊老莊之虛則無虛則妄妄則弊之源也故神仙方藥則玄牝之門為天下根之弊也申韓刑名則將欲取之必固與之之弊也放達至於伶籍則禮為亂首之弊也玄談至於王何則事物粗迹之弊也臣每比而觀之一實一虛一有一無而善惡利害相懸若此是以大學誠意義理最難理會朱熹作大學中庸或問曰平生精力盡在此書而捐館之際尚改誠意章未定則其致力尤難於此可知也已孟子曰反身而誠樂莫大焉朱熹曰言反諸身而所備之理皆如惡惡臭好好色之實然則其行之不待勉強而無不實矣其為樂孰大於是臣良勝曰道而至於樂其道大備矣學而至於樂其學大成矣然而反之於身不過曰誠而已蓋天地之所以為天地者誠也人之所以為人者誠也人之所以參天地而為三者誠也吾身而誠無一毫私意雜於其間則獨行不愧於影獨寢不愧於衾晝無愧嚮明夜無愧處晦矣無愧怍則吾之一身與天地相似發微而不可見充周而不可窮其為樂也所謂不知手之舞之足之蹈之者矣書曰作德心逸日休作偽心勞日拙人君而求所以為逸樂盍於此焉求之彼以宴安盤遊聲色為樂者祗見其勞而拙爾周惇頥曰聖誠而已矣誠五常之本百行之源也朱熹曰聖人之所以聖不過全此實理而已所謂太極者也五常仁義禮智信吾之性也百行孝弟忠順之屬萬物之象也實理全則五常不虧而百行修矣禹為人敏給克勤其德不違其仁可親其言可信聲為律身為度臣良勝曰凡人敏給者多不好學故其勤者為難矣禹之敏而克勤故曰大禹聖人也猶惜寸陰所謂終日乾乾而夕惕若至誠而不息也是以其言可信而聲為律其德不違其仁可親而身為度誠為之本也成王與其弟叔虞削桐葉為圭戲曰吾以此封若史佚請擇日王曰與之戲爾佚曰天子無戲言言則史書之禮成之樂歌之遂封叔虞於堯之故墟曰唐侯柳宗元辨曰古之傳者有言成王以桐葉與小弱弟戲曰以封汝周公入賀王曰戲也周公曰天子不可戲乃封小弱弟於唐吾意不然王之弟當封邪周公宜以時言於王不待其戲而賀以成之也不當封邪周公乃成其不中之戲以地以人與小弱者為之主其得為聖乎且周公以王之言不可茍焉而已必從而成之耶設有不幸王以桐葉封婦寺亦將舉而從之乎凡王者之德在行之何若設未得其當雖十易之不為病要於其當不可使易也而况以其戲乎若戲而必行之是周公教王遂過也吾意周公輔成王宜以道從容優樂要歸之大中而已必不逢其失而為之詞又不當束縳之馳驟之使若牛馬然急則敗矣且家人父子尚不能以此自克况號為君臣者邪是直小丈夫鞅鞅者之為非周公所宜用故不可信或曰封唐叔史佚成之臣良勝曰宗元之辨必非周公所為然今史所載皆史佚之言也君子曰有桐葉之戲則隨事針規人臣諫君當於其微人君至誠自治至於言無敢戲則幾於大禹聲之為律者於君德大有補也宋太祖仁孝豁達質任自然不事矯飾宫中簾緣用青衣常服之浣濯至再劉安世嘗與馬永卿言仁廟恭儉安世曰仁廟恭儉出於天性故四十二年如一日也易所謂有始有卒者常記得先生司馬光言明皇即位之初焚錦繡珠玉於前殿為非永卿曰何以言之安世曰夫錦繡珠玉世之所有也己不好之則不用何至焚之焚之必於前殿是欲人知之此好名之弊也夫恭儉不出於天性而出於好名好名之心衰則其奢侈必甚必至之理也故當時識者見其焚珠玉知其必有末年之敝若仁廟則不然若非大臣問疾則無由見其黃絁被漆唾壺臣良勝曰宋太祖仁宗不近名者自治之誠也明皇則偽而已豈惟明皇晉武帝焚雉頭裘亦有末年奢侈之敝皆以不誠故也荀况曰天地為大矣不誠則不能化萬物聖人為知矣不誠則不能化萬物臣良勝曰誠者無妄之謂也易之無妄取象於天與雷之行天天下無不知者無不聞者是不容以偽也雷既動而天下之物勾萌甲拆則物物與之無妄是天以誠化萬物也聖人取象於此以茂對時育萬物則聖人之誠以化萬物也况之論誠亦本乎此而程伯淳謂荀子原不識誠蓋其以性為偽是不識性是以不識誠也以偽為性則必以誠為非性誠有不由於性者是皆非所謂誠也司馬光曰為國家者必先實而後文也安國家利百姓仁之實也保基緒傳子孫孝之實也辨貴賤立紀綱和上下親遠近樂之實也清姦邪禁暴亂刑之實也察言行試政事求賢之實也量材能課功狀審官之實也詢安益訪治亂納諫之實也選勇果習戰鬭治兵之實也實之不存雖文之盛美無益也臣良勝曰實之云者誠之謂也光之學本於誠而其入自不妄語始故其言於君者孚之以實也人臣以實而獻納於君人君以實而聽納於臣施之天下國家之政亦皆以實而不以虛則天下之治也何有雖然文之勝實也久矣在孔子時已不從先進蓋亦以文勝為病矣至光之時文之勝又必甚矣至於今日又必甚矣按光之言以考之則所謂實與文者當自辨矣聖祖視事東門時天熱坐久汗濕衣左右更衣以進皆經浣濯者宋思顔曰主公躬身節儉舊衣浣濯更進禹之惡衣服誠無以加矣真可示法子孫也臣恐主公今日如此而後或不然願始終如此聖祖喜曰思顔之言甚善賜之幣以張其直文皇坐右順門所服衷衣袖敝垢納而復出侍臣有贊聖德者上慨然嘆曰朕雖日十易新衣未嘗無但自念當惜福故每浣濯更進昔皇妣躬緝故衣皇考見而喜曰皇后勤儉如此正可為子孫法故朕嘗守先訓不敢忘右衍治已之誠兌九五孚于剝有厲程頥曰九五得尊位而處中正盡説道之美矣而聖人復設有厲之戒蓋堯舜之盛未嘗無戒也戒所當戒而已雖聖賢在上天下未嘗無小人然不敢肆其惡也聖人亦説其能勉而革面也彼小人者未嘗不知聖賢之可説也如四凶處堯朝隱惡而順命是也聖人非不知其終惡也取其畏罪而強仁耳五若誠心信小人之假善為實善而不知其包藏則危道也小人者備之不至則害於善聖人為戒之意深矣臣良勝曰説至善也而未免猶有小人之親誠至道也而不能泯於小人之詐此聖人所以善用其誠而不易於説也有孚豚魚吉利涉大川利貞程頥曰豚躁魚冥物之難感者也孚信能感於豚魚則無不至矣所以吉也忠信可以蹈水火况涉川乎守信之道在乎堅正故利於貞也朱熹曰至信可感豚魚涉險難而不可以失其貞故占者能致豚魚之應則吉而利涉大川又必利於貞也臣良勝曰小人雖有未格于誠而君子所以惇信者益至將至於豚魚可感而險可濟狡偽者無不獻其誠矣襄公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭會於蕭魚程頥曰會於蕭魚鄭又服而請會也不書鄭會謂其不可信也而晉悼公推至誠以待人信鄭不疑禮其囚而歸焉納斥堠禁侵掠遣叔肸告于諸侯而鄭自是不復叛晉者二十四年至哉誠之能感人也臣良勝曰五伯假之也假則詐之尤也在桓文而已然晉悼獨得至誠待之之譽此於春秋絶無而僅有者雖然誠亦難言也悼非真能推誠者也桓公之興當楚僭王猾夏之始故必有以服其心文公之時適楚報宋圍宋之際故必有以挫其氣悼公繼景厲之衰而不足以復桓文之盛但致勤於鄭故伐鄭則楚爭楚來而晉退此即巫臣所為通吳制楚之術使之敝於奔命爾鄭之久服於晉者子展完守老楚仗信待晉其䇿固有定也二境待盟畏楚故爾楚敝而服晉之心固矣况繼以子皮子彥子太叔之良大夫豈甘心於楚者哉鄭成之後受其兵車之獻金石之樂是亦桓文而已而專美至誠之譽亦不虞矣禮器曰君子之於禮也有所竭情盡慎致其敬而誠若有美而文而誠若陳澔曰謂以少者小者下者素者為貴是內心之敬無不實者以多者大者文者高者為貴美而有文是外心之實者緇衣曰好賢如緇衣惡惡如巷伯則爵不瀆而民作願刑不試而民咸服大雅曰儀刑文王萬國作孚吕大臨曰好賢必如緇衣之篤則人知上之誠好賢矣故曰爵不瀆而民作願惡惡必如巷伯之深則人知上之誠惡惡不必刑罰之施而民自畏服故曰刑不試而民咸服文王好惡得其正而一出乎誠心故為天下之所儀刑德之所以孚于下也齊桓公與魯莊公會于柯曹劌手劍從之管子曰君何求曹子曰願請汶陽之田管子顧桓公曰君許諾公曰諾曹子請盟桓公下與之盟已盟曹子摽劍而去要盟可犯而桓公不欺曹子可讐而桓公不怨桓公之信著乎天下自柯之盟始焉晉文公伐原與大夫期五日五日而原不降文公令去之吏曰原不過三日將降矣君不如待之公曰得原失信吾不為也原人聞之曰君有義若此不可不降也遂降溫人聞之亦請降魏文侯與羣臣飲酒樂而天雨命駕將適野左右曰今日飲酒樂天又雨君將安之文侯曰吾與虞人期獵雖樂豈可無一會期哉乃往秦孝公以衛鞅為左庶長卒定變法之令民為什伍而相收司連坐告姦者與斬敵首同賞匿姦者與降敵同罰有軍功者各以律受上爵為私鬭者各以輕重被刑大小僇力本業耕織致粟帛多者復其身事末利及怠而貧者舉以為收拏有功者顯榮無功者雖富無所芬華令既具未布恐民之不信己乃立三丈之木於國都布南門募民有能徙置北門者豫五十金民怪之莫敢徙復曰能徙者豫五十金有一人徙之輒豫五十金以明不欺卒下令司馬光曰夫信者人君之大寶也國保於民民保於信非信無以使民非民無以守國是故古之王者不欺四海霸者不欺四鄰善為國者不欺其民善為家者不欺其親不善者反之欺其鄰國欺其百姓甚者欺其兄弟欺其父子上不信下下不信上上下離心以至於敗所利不能藥其所傷所獲不能補其所亡豈不哀哉昔齊桓公不背曹沫之盟晉文公不貪伐原之利魏文侯不棄虞人之期秦孝公不廢徙木之信此四君者道非粹白而商君尤稱刻薄又處戰攻之世天下趨於詐力猶且不忘信以畜其民况為四海治平之政者哉吳養心曰秦之所以亡其原蓋出於此其後吕不韋為相自作令書布咸陽城門懸千金於其上延諸侯遊士賔客有能增減一字者豫千金莫有易者也以今觀之豈誠無一字可增減哉誠以秦之人為鞅積威之所劫雖欲議之而有所不敢自不韋制令之書無敢議遂至於趙高指鹿為馬相異如此而人臣猶不敢言則知秦人為鞅積威之所劫也甚矣韓信謝武涉曰臣事項王官不過郎中位不過執戟言不聽畫不用故倍楚而歸漢漢王授我上將軍印豫我數萬衆解衣衣我推食食我言聽計用故吾得以至於此夫人深親信我我倍之不祥光武事更始時諸賊銅馬鐡脛尤來大槍上江青犢富平獲索等各領部曲衆合數百萬人所在寇掠光武擊銅馬於鄡吳漢將突騎來會清陽士馬甚盛銅馬食盡夜遁追擊於館陶悉破降之封其渠帥為列侯諸將未能信賊降者亦不自安光武知其意敕令降者各歸營勒兵自乘輕騎按行部陳降者更相語曰蕭王推赤心置人腹中安得不投死乎由是皆服悉以降人分配諸將衆遂數十萬故關西號銅馬帝唐太宗時有上書請去佞臣者曰願陽怒以試之執理不屈者直臣也畏威順從者佞臣也上曰朕自為詐何以責臣下之直邪朕方以至誠治天下豈可為此哉宋太祖封劉鋹為恩赦侯鋹在國時多置鴆以毒臣下一日太祖幸講武池鋹先至賜以巵酒鋹疑有毒捧杯泣曰臣承祖父基業拒違朝廷勞王師致討罪固當誅陛下既待臣以不死願為大梁布衣觀太平之盛乞全旦夕之命以全陛下生成之恩太祖笑曰朕推心置人腹安有此事耶命取鋹酒自飲之而别酌以賜鋹臣良勝曰四君皆英雄豪傑主也雖其智數多任而馭豪傑安反側待臣下服降虜率能推誠以運其䇿此其所以帝業有成也昔人論武侯事業奇偉而開誠布公乃為事業之本彼輔佐之功爾矧帝王之業而非以推誠為之本乎但高祖之待信不終偽遊擒制太宗以絹遺吏幾誤之死非真能用誠者光武太祖其庶幾哉永樂元年錦衣衛奏福建送至海寇若干人法當棄市文皇曰朕嘗許以不殺今殺之不信則後來者之路塞矣俱宥之令戍邊永樂六年武臣有言黃福不宜復授重任者先時福以刑部尚書坐事謫辦事官未幾復其官命隨成國公理公務故武臣以為言文皇曰福才不逮爾耶對曰此建文舊臣且近有過文皇諭之曰君臣相與在於推誠不可畜疑唐太宗為君王圭魏徴初皆讐怨一體委任之不疑兩人終能盡心輔政知無不言尉遲敬德亦讐敵也既獲而臣之便得其死力皆太宗有至公之量故能如此今朕用人無間新舊惟賢才是任何嘗存一毫私意有過者必體情容之有才者必推誠任之上能推誠則人樂盡力若或畜疑則人茍圖免責誰肻盡心自今慎之勿復妄言又召廣西祿州判官陽宗至升大理寺右寺丞或言宗在建文時為北平按察司僉事嘗奏按察使陳瑛受潛邸賞賜者文皇曰帝王惟才是使豈當屑屑記憶舊嫌齊桓公用管仲唐太宗用王魏何嘗不得其力竟推用之臣良勝曰天下者天下之天下聖祖之天下也人才者天生之聖祖成之以致天下之治者也繄我文皇以天與聖祖之心為心於凡人才無新舊之間所以成天下之治也末世滋偽隆怨薄恩雖在屬籍疑問猜忌至網羅誅殺若為自安計尋亦傾覆如六朝者亦衆矣我文皇謂學士楊榮曰使練子寧在吾當用之嗚呼有是心斯有是言則凡所以任福宗者豈聲音笑貌之為哉是足以張聖人之度也亦足以表聖人之誠也右衍應物之誠離彖曰重明以麗乎正而化成天下程頥曰上下皆離重明也二五皆處中正麗乎正也君臣上下皆有明德而處中正可以化成天下成文明之俗也臣良勝曰天地之明懸象乎日月五行之明取象於火火虛而明故離之卦火其中虛也虛則明明有並于日月者日之過午而昃月之既望而弦皆非中正之明也人君嚮明而治以麗乎中正者也故暗弱則不及於明也作聰明則太過於明也惟君不自用而用臣之明臣必盡用而不蔽主之明庶幾於重明麗正而化成於天下也説命曰惟天聰明惟聖時憲惟臣欽若惟民從乂蔡沉曰天之聰明無所不聞無所不見無他公而已矣人君法天之聰明一出於公則臣敬順而民亦從治矣皇矣詩曰維此王季帝度其心貊其德音其德克明克明克類克長克君王此大邦克順克比比于文王其德靡悔既受帝祉施于孫子朱熹曰言上帝制王季之心使有尺寸能度義又清靜其德音使無非間之言是以王季之德能此六者至於文王而其德無有遺恨是以既受上帝之福而延及于子孫也臣良勝曰王季之德雖曰有六其實一明而已蓋其心有尺寸而審度於義理是非是以非間之言無自而入善惡之辨則克類矣舉善而教不能則克長矣教之不率而賞罰行焉則克君矣賞罰既明不僭不忒順比之治章矣故易於同人以天火為象而曰君子以類族辨物惟其能辨是以能同使是非相雜而無所别則非君長之道欲望順比之治難矣故曰知臨大君之宜吉君之道莫大於明也蒸民詩曰肅肅王命仲山甫將之邦國若否仲山甫明之既明且哲以保其身夙夜匪懈以事一人朱熹曰肅肅嚴也將奉行也若順也順否猶臧否也明謂明於理哲謂察於事保身蓋順理以守身非趨利避害而偷生以全軀之謂也臣良勝曰甚哉用明之難豈獨君哉在臣亦有難之者以山甫之德舉山甫之職又遇宣王之君至將命以明邦國之順否必明而且哲然後可以保其身其難也何如哉蓋利害之際人所難言也惟視人則明爾若持利害之柄以加人人將恕己之昏而反利害之明以歸我故曰察見淵魚者不祥也山甫克明邦國之順否者一惟匪懈以事天子是非利害蓋有所不計也曰保身云者有吾身以舉吾職以事吾君是謂不失其身非私其身也不然則隱默茍全而完軀保妻子之人將有以藉口矣相國蕭何以長安地狹上林中多空地棄願令民得入田毋收藁為禽獸食上大怒曰相國多受賈人財物為請吾苑乃下廷尉獄械繫之數日王衛尉侍言曰相國胡大罪陛下繫之暴也上曰受賈竪金請吾苑以自媚於民故繫治之王衛尉曰有便於民而請之真宰相事是日使使持節赦出何何入謝帝曰相國為民請苑吾不許我不過為桀紂主而相國為賢相吾故繫相國欲百姓聞吾過臣良勝曰自知之難自屈之尤難也君而名之桀紂惡莫加矣誰其任之故自比赧獻自方桓靈在衰弱已不堪受高祖創業之主知過而改至自屈於桀紂而不辭若其狎逼周昌曰我何如主曰桀紂之主也亦不怒焉此其宏度偉識真有不可及者無論他美只其肻以桀紂自居人加之而不怒斯其不為桀紂也審矣漢武帝謂大將軍衛青曰漢家庶事草創加以外裔凌中國朕不變更制度後世無法不出師征伐天下不安為此者不得不勞民若後世又如朕所為是襲亡秦之迹也臣良勝曰知其不善是可為善知其將亡是以不亡武帝材略自古寡倫其征伐四裔蓋振古所無之功而虛耗四海亦振古所無之禍所以立功者武帝自知之明也所以致禍者武帝自知之明也然而不亡者亦武帝自知之明也蓋天下壅蔽之患惟自知之為難責人明而恕己昏也自知既明則無不明矣司馬光於賜書閣讀書一日大喜謂其兄曰光昨夕讀輪臺詔方知漢武帝用兵之久而中國不亡蓋每遣將之出而成敗勝負輒以實聞無毫髮不知者故天下之柄皆歸人主而不為左右欺罔此所以行兵三十年而中國不亡夫以武帝惟自知而左右不敢欺是以不亡則南詔喪師數十萬襄陽之圍數年不解而卒以捷聞者夫安得不亡合而觀之勸戒著矣唐太宗時祕書少監虞世南上聖德論賜手詔稱卿論太高朕何敢擬上古但比近世差勝爾然卿適觀其始未知其終若朕能慎終如始則此論可傳如或不然恐徒使後世笑卿也臣良勝曰太宗英明深於自知也其詔世南曰適覩其始未知其終再逾年而魏徴已陳漸不克終者十事矣且太宗嘗語褚遂良曰人心惟有一心而輻輳攻之各求自售以寵取祿若世南此論殆近於諂諛而求售者耶至宋時石介緣此亦作慶厯聖德詩篇目雖同而用意則異陰刺姦邪激成險禍當時老成謀國如韓琦者固有憂矣二事雖為一律而世南近於諂介傷於直君子曰與其失之諂也寧直唐宣宗召翰林學士韋澳以論詩屏左右與之語曰近日外間謂內侍權勢何如對曰陛下威斷非前朝之比上閉目搖手曰全未全未尚畏之在司馬光曰宦者用權為國家患其來久矣蓋以出入宫禁人主自幼及長與之親狎非如三公六卿進見有時可嚴憚也其間復有性識儇利語言辨給善伺候顔言承迎志趣受命則無違忤之患使令則有稱愜之效自非上知之主燭知物情慮患深遠侍奉之外不任以事則近者日親遠者日疏甘言卑詞之請有時而從浸潤膚受之訴有時而聽於是黜陟刑賞之政潛移於近習而不自知如飲醇酒嗜其味而忘其醉也黜陟刑賞之柄移而國家不危亂者未之有也東漢之衰宦者最名驕橫然皆假人主之權依憑城社以濁亂天下未有能劫脅天子如制嬰兒廢置在手東西出其意使天子畏之若乘虎狼而挾虺蛇如唐世者也所以然者漢不握兵唐握兵故也太宗監前世之弊深抑宦官無得過四品明皇始墮舊章是崇是長晚節令高力士省決章奏乃至進退將相時與之議自太子王公皆畏事之宦官自此熾矣及中原板蕩肅宗收兵靈武李輔國以東宫舊𨽻參預軍謀寵過而驕不復能制遂至愛子慈父皆不能庇以憂悸終代宗踐阼仍遵覆轍程元振魚朝恩相繼用事竊弄刑賞壅蔽聰明視天子如委裘凌宰相如犬馬是以來瑱入朝遇讒賜死吐蕃深侵郊甸匿不以聞至狼狽幸陜李光弼危疑憤鬱以隕其生郭子儀擯廢家居不保丘壟僕固懷恩寃抑無訴遂棄勳庸更為叛亂德宗初立頗振綱紀宦官稍黜而返自興元猜忌諸將以李晟渾瑊為不可信悉奪其兵而以竇文瑒霍仙鳴為中尉使典宿衛自是太阿之柄落其掌握矣憲宗末年吐突承瓘欲廢嫡立庶以成陳宏志之變寶歷狎䁥羣小劉克明蘇明為逆其後降及文武宣懿僖昭六帝皆為宦官所立勢益驕橫王守澄仇士良田令孜楊復恭劉季述韓全誨為之魁傑自稱定䇿國老目天子為門生根深蒂固疾成膏肓不可救藥矣文宗深憤其然志欲除之以宋申錫之賢猶不能有所為反受其殃况李訓鄭注反覆小人欲以一朝譎詐之謀翦纍世膠固之黨遂至湔血禁庭積尸省户公卿大臣連頸就誅闔門屠戮天子陽瘖縱酒飲泣吞氣自比赧獻不亦悲乎以宣宗之嚴毅明察猶閉目搖手自謂畏之况僖懿之驕侈茍聲色毬獵足充其欲則政事一以付之呼之以父固無怪矣賊汙宫闕兩幸梁益皆令孜所為也昭宗不勝其恥力欲清滌而所任不得其人所行不由其道始則張濬覆軍於平陽增李克用跋扈之勢復恭亡命於山南啓宋文通不臣之心終則兵交闕庭矢及御衣漂泊莎城流寓華陰幽辱東內劫遷岐陽崔昌遐無如之何更召朱全忠以討之連兵圍城再罹寒暑御膳不足於糧糒王侯弊踣於飢寒然後全誨受誅乘輿東出翦滅其黨靡有孑遺而唐之廟社因以丘墟矣然則宦者之禍始於明皇盛於肅代成於德宗極於昭宗易曰履霜堅氷至為國家者防微杜漸可不慎其始哉此其為患章章尤著者也自餘傷賢害能召亂致禍賣官鬻獄沮敗師徒蠧害蒸民不可遍舉夫寺人之官自三王之世載於詩禮所以謹閨閫之禁通內外之言安可無也如巷伯之疾惡寺人披之事君鄭衆之辭賞吕疆之直諌曹日升之救患馬存亮之弭亂楊復光之討賊嚴遵美之避權張承業之竭忠其中豈無賢才乎顧人主不當與之謀議政事進退士大夫使有威福足以動人耳果或有罪小則刑之大則誅之無所寬赦如此雖使之專橫孰敢哉豈可不察臧否不擇是非欲草剃而禽獮之能無亂乎是以袁紹行之於前而董卓弱漢崔昌遐襲之於後而朱氏篡唐雖快一時之憤而國隨以亡是猶惡衣之垢而焚之惡木之蠧而伐之其為害不益多哉孔子曰人而不仁疾之已甚亂也斯之謂矣聖祖謂徐達等曰人之行事固欲盡善然一時志慮有未周及既行之思之有未盡善亟欲更之已無及矣與其追悔於既往曷若致謹於其初大抵更涉世故則知明久歷患難則慮周近日紀綱法度初若有緒其間有未盡善者諸公宜執正論亟為更張庶幾上下之間各得其便茍有不善豈徒豫之過亦爾等之責也文皇宴間顧問侍臣曰今一歲又終外間軍民安否何如對曰陛下臨御以來所施無非仁政今軍民皆安正太平無事之時上曰太平豈易言朕惟遵皇考成憲以為治如得雨暘時若年榖豐登兵革不興兆民安樂朝無姦邪然後可為太平無事臣良勝曰聖祖不肻自安於盡善而責望於臣文皇不肻自任於太平而歸美於親皆不自滿假即檢身不及望道未見之心也三代而下可並言矣右衍自知之明大有象曰火在天上大有君子以遏惡揚善順天休命朱熹曰火在天上所照者廣為大有之象所有既大無以治之則釁蘖萌於其間矣天命有善而無惡故遏惡揚善所以順天反之於身亦若是而已矣臣良勝曰火在天上明之象也遏惡揚善明之用也天子之有天下富有之大業也禮樂刑政於是焉正萬方四海於是焉安則是非善惡於是焉萃非藉賞罰以振之則雜揉妄施并其所有而失之矣故人君當大有之世而行大有之權必用大有之明而後享大有之業五服之章則謂之天命非有所私而章也章而非私以其明之無所蔽於命也五刑之用則謂之天討非有所私而用也用而非私以其明之無所蔽於討也故曰順天以休命也立政曰亦曰文王武王克知三有宅心灼見三有俊心以敬事上帝立民長伯蔡沉曰三宅三俊文武克知灼見皆曰心者即所謂迪知忱恂而非謀面也三宅已授之位故曰克知三俊未任以事故曰灼見以是敬事上帝則天職修而上有所承以是立民長伯則體統立而下有所寄人君位天人之兩間而俯仰無怍者以是也吕刑曰穆穆在上明明在下灼于四方罔不惟德之勤故乃明于刑之中率乂于民棐彜蔡沉曰穆穆者和敬之容也明明者精白之容也灼于四方者穆穆明明輝光發越而四達也君臣之德昭明如是故民皆觀感動蕩為善而不能自已也如是而猶有未化者故士師明于刑之中使無過不及之差率乂于民輔其常性所謂刑罰之精華也臣良勝曰治獄之道固亦多端然要其極發之以明而歸之以慎也故上之穆穆所謂和敬慎之謂也下之明明所謂精白明之謂也上而能慎則輕重適中無有淫刑而濫者矣下而能明則曲直自辨無有枉刑而寬者矣然而上之道罔兼庶獄而下之道明以折獄固其常也舜命臯陶作士曰惟明克允易象治獄之卦曰噬嗑曰賁曰豐曰旅雖有用於震之威艮之止而必離明以主之惟議獄緩死則取象於風澤之中孚死獄非他刑比也和説以訊之巽順以道之亦敬慎之道也然則君臣用刑之中必用其明而不盡用其明者乃所以為慎也晉公子出亡在楚楚子享之子玉請殺之楚子曰晉公子廣而儉文而有禮其從者肅而寬忠而能力晉侯無親外內惡之吾聞姬姓唐叔之後其後衰者也其必由晉公子乎天將與之誰能廢之違天必有大咎乃送諸秦臣良勝曰楚成王明知人也不在知重耳之必霸乃在於知其必伯而不忍傷之也何者其言曰天將興之誰能廢之是之謂知天而况於人乎哉昔楚文過鄧鄧之甥欲殺之而鄧侯不許曰人將不食吾餘楚卒滅鄧鄧焉取餘成王夫豈不知將有鄧之悔也虐賢傷善是絶天地之紀天之咎又安逃乎故嘗謂楚成知晉必伯而不殺重耳齊桓知田氏有齊而不殺敬仲漢高知東南必亂而不殺吳王濞晉武聞齊王攸之言而不殺劉元海符堅信王猛而不殺慕容垂唐玄宗咈張九齡而不殺安祿山其後卒罹其禍君子不以為非者存亡者天也得失者人也不可逆者理也以猜忌疑二欲有其富貴而殺無罪之人不亦逆天理乎君子謂齊不繁刑重賦田氏不能取齊楚不用子玉晉文不能勝楚漢景不用朝錯吳未必反晉武不立晉惠劉元海不能亂符堅不貪江左慕容不能興玄宗不用林甫祿山不敢叛此達於天人之理者也不然景帝以鞅鞅殺亞夫曹操以論建殺孔融晉以時名殺嵇康夏侯玄宋明帝以族大殺王彧齊後主以謠言殺斛律光唐太宗以讖殺李君羡武后殺裴炎豈盡能免患於當時而逃責於後世哉表記曰君子不以詞盡人天下有道則行有枝葉天下無道則詞有枝葉陳澔曰不以言盡人不以言詞而盡見其人之實蓋有言不必有德也行有枝葉根本盛而條達者也詞有枝葉則蕪辭蔓説而已皆世教盛衰所致故以有道無道言之子張問明子曰浸潤之譖膚受之訴不行焉可謂明也已矣浸潤之譖膚受之訴不行焉可謂遠也已矣朱熹曰毁人者漸漬而不驟則聽者不覺其入而信之深矣訴寃者急迫而切身則聽者不及致詳而發之暴矣二者難察而能察之可見其心之明而不蔽於近矣臣良勝曰古之時譖人以漸而入者難於察矣後世乃有以修詞而譖者其難察為何如也古之時訴寃以迫而信者為難察矣後世有緩詞而訴者其難察為何如也盧杞忌張鎰忠直欲出之議伐朱泚而請自行德宗難之則薦鎰曰才兼文武望重中外無以易卿鎰出卒為李楚琳所殺太真以忤意出居外剪髮一縷以謝玄宗曰沿身所有皆上賜也惟髮得之吾父母者遂召入不移時嗚呼若此譖訴視之浸潤膚受者不亦難察己乎情偽日滋而人主之用明也益難矣漢文帝戒太子曰即有緩急用亞夫真可任將兵景帝即位吳楚七國反乃拜亞夫為太尉將三十六將軍七國皆平臣良勝曰仲尼稱孟莊子之孝曰其不改父之臣是難能也文帝知亞夫於勞軍細柳時故擇任而命之景帝果建大功於文帝無負所知景帝明知父母所愛亦愛之亞夫之尊寵無極矣乃故設大胾顧取匕箸竟加以不足君所之罪而曰鞅鞅非少主臣下之獄而亞夫死君子有云捐殯而奔其父之使者是亦奔父也亞夫誤為文帝所知而見殺文帝亦誤知亞夫而致之死則謂景帝為殺父可也且張釋之以劾奏之恨死鄧通以吮癰之怨死皆文帝之所愛也至於梁孝王武文帝子也驕而縱之亦樂於死臨江王榮己之子也以母失愛遂使酷吏殺之是於父子君臣夫婦兄弟之間背理傷道無一可言議者止以刻薄任數歸之亦過恕之耶漢昭帝即位霍光受遺詔上官桀詐使人為燕王旦上書言光專權自恣疑有非常光聞之不入帝曰大將軍安在桀對曰以燕王告其罪故不敢入詔召光光入免冠頓首謝帝曰將軍冠朕知是書詐也光曰陛下何以知之帝曰將軍之廣明都郎屬爾調校尉以來未能十日燕王何以知之且將軍為非不須校尉時帝年十四左右皆驚而上書者果亡李德裕曰人君之德莫大於至明明以照姦則百姦不能蔽矣漢昭帝是也周成王有慚德矣成王聞管叔流言使周公狼跋而東所謂執狐疑之心來讒賊之口撓不斷之論開羣枉之門使昭帝得伊吕之佐則成康不足侔矣臣良勝曰霍光之所以獲全者固昭帝之明乃武帝之明也武帝太子既廢時有燕王旦廣陵王胥皆不知立而獨有意於鈎弋宫之子命黃門畫周公負成王圖特以賜光而上官桀桑𢎞羊之徒不與聞也故光受遺而請所立曰君未喻前畫意邪是武帝之明蓋知昭帝足以付國惟光足以輔少主也觀識書之詐而光所以輔昭十餘年臣故以為武帝之明也雖然昭帝之明若過成王而光之不學何足以語周公周公輔成王為師而召公為保畢公為傅左右前後罔非正人是以卒成令德昭帝時與光共事者惟張安世田延年而士之通經術識義理者無聞焉因論久陰不雨乃知貴夏侯勝引蒯聵事折獄而賢雋不疑終不任也故昭帝居深宫近嬖寵年及冠而志業未有所就不及成王遠甚則昭帝不充其明者光之不明有以誤之也或者又曰使光於此萬不見白一去位足矣何有赤族之慘是亦光之不明又所以自誤也豈特誤昭帝哉漢昭烈臨崩謂諸葛亮曰馬謖言過其實不可大用君其察之亮猶謂不然以謖為參軍又違衆議以謖統大衆與魏將張郃戰于街亭謖果違亮節制為郃所破亮流涕斬之臣良勝曰昭烈可謂明矣亮不可謂不公也亦有馬謖之誤知人惟帝難之况其他乎獨念三代而下君臣相信如昭烈於亮亦不多有顧命之言亦或相違有如此者昔管仲之沒桓公問之極言竪刁易牙開方三子非人情不可近桓公卒用三子致亂蒙袂而死曰何面目見仲父嗚呼桓公有違於臣亮亦有違於君皆兩賢相遇者猶然君臣保終難矣哉唐太宗謂長孫無忌曰人苦不自知其過卿可為朕明言之對曰陛下武功文德臣等將順之不暇又何過之可言上曰朕問公以己過公等皆曲相諛説朕欲面語公等得失以相戒而改之何如皆拜謝上曰長孫無忌善避嫌疑應物敏速決斷事理古人不過而總兵攻戰非其所長高士亷涉獵古今心稍明達臨難不改節當官無朋黨所乏者骨鯁規諌爾唐儉言辭便捷善和解人事朕三十年遂無言及於獻替楊師道性行純和自無愆違而情實怯懦緩急不可得力岑文本性質敦厚文章華贍而持論恆處經常劉洎性最堅貞有利益然其意尚然諾私於朋友馬周見事敏速性甚貞正論量人物直道而言朕比任使多能稱意褚遂良學問稍長性亦堅正每寫忠誠親附於朕如飛鳥依人人自憐之范祖禹曰君臣以道相與以義相正有朋友之義非徒以分相使而已太宗欲聞過而無忌納諂以悅之其罪大矣然太宗論羣臣之得失亦豈皆中於理哉遂良直道犯顔盡忠無隱王魏之比也而譬之飛鳥輕侮其臣不恭孰甚焉唐德宗從容與李泌論即位以來宰相曰盧杞忠清強介人言杞姦邪朕殊不覺其然泌曰人言盧杞姦邪而陛下獨不覺其然此乃杞之所以為姦邪也倘陛下覺之豈有建中之亂乎臣艮勝曰天下之人難知也天下之姦尤難知也其為心也甚深其為迹也甚微將營其東而刑之於西將取其有而擊之於無嗚呼豈特如是已乎蓋有厚之以利而不納強之以爵而不受委之以權而不居聽君所為竊弄威福而不知納人於禍聚人於爭使不及圖已以固其位而不厭是於其君之庸者而欺之也若君之好善亦目之為邪而不覺天下之善亦有可以謂之惡天下之惡亦有可以謂之善或先之以善而終之以惡或掩之以惡而可強名之以善試之以所不能劫之以所不從中之以所必欲示之以所必信其所以為情者萬出而一有所售皆足以行其姦此盧杞姦邪而德宗獨不知也若玄宗知林甫妬賢疾賢莫之比者而任之十有九年此豈獨異於人心哉當其任之亦德宗之不覺也流離播遷而慧知益長其對士淹之言蓋亦悔之晚矣聖祖御戟門與給事中吳去疾論政務因謂之曰吾以布衣起兵與今李相國徐相國湯平章皆鄉里所居相遠者不過百里君臣相遇遂成大功甚非偶然今掃除羣雄撫有江南人免亂離之若每終夜思之不能安枕人心難安而易動事機難成而易壞茍撫之失宜施之不當亂由是生今中原未平正焦勞之日豈能坐守一方而忘遠慮乎正當練兵選將平定中原諸將小心忠謹者惟徐達聽受吾言可任斯寄常遇春果敢有為可以佐之其餘或以偏禆或以守城皆有可用之才天若輔吾諸將足以了之去疾對曰主上知人善任使平定之功不難矣聖祖謂侍臣曰人主能清心寡欲常不忘博施濟衆之意庶幾民被其澤侍臣對曰陛下此心即天地之心也惟人主之心無欲故能明斷萬事萬事理則天下之生民受其福聖祖曰人之不能明斷者誠以欲害之也然明斷亦不以急遽苛察為能茍見有未至反損人君之明求之太過則虧人君之量臣良勝曰聖人重明以麗乎天下蓋有取於離離之卦其中虛也虛所以能明也洪惟聖祖明燭無疆而知周萬變知人善斷克顯丕基明之用亦廣矣然其所以能用其明者以清心寡欲為之本也人心如明鏡止水而無物欲以害之是所謂離之虛而明也是故以無欲為本而大欲所以成也彼內多欲而欲效唐虞之治閨門骨肉之間且有所蔽匪苛則暗斷失其平廢后思子卒不可悔所謂一指蔽目泰山在前而弗之見已嗚呼日月無私而能久照聖人之明並於日月者無欲之謂也是以不及於明則謂之暗過用其明則謂之苛二者皆欲之為纍也懿哉聖訓無餘藴矣永樂九年通政司言有指揮首天城衛千户犯罪繫刑部獄其母致貨托己為賂部官求免己不敢從并以其貨來首命法司問千户與指揮有舊乎對曰無曰非故舊而輒以違法干之獨不慮事敗哉此非人情命法司訊之至法司奏指揮所居近刑部而千户之母寓其鄰家朝夕饋子食指揮察其有賫槖紿言已與部官厚可以賂免母遂致貨旁有欲發其姦者指揮懼遂首而隱其實情論法千户之母當準與贓律指揮罷職謫屯種諭之曰愛其子而以賂求免人之常情且婦人焉知法律其宥之指揮始則欺人取貨終則隱情罔上又汙朝臣此不可恕但罷職屯種何以示懲即械送交趾充軍錦衣衛奏民與外國使人交通者宜執付法司罪之文皇問其實對曰以氊衫市之而與之交語甚久特命釋之錦衣衛官復言氊衫於物甚微交通於法難宥上曰立法以禁姦過輕則民誤用法在體情過重則民急彼小人治生富則以錢易物貧則以物易錢交議價值豈一語可決彼何知國法其釋之既而謂侍臣曰茲事若忽於聽察則愚民以氊衫獲罪矣臣良勝曰聽察之明仁愛之公不待言矣而淵微之意臣又仰窺於萬一也彼外國使人亦人也是非之心亦有也若以微物而罪人於曖昧不明之議獨無腹誹之乎歸言本國寧無生輕視之心乎昔吕夷簡以私怨黜范仲淹輩時有四賢一不肖詩契丹張于幽州館王安石行青苖法而交趾露布問民困苦則我文皇之治斯獄有足以讋服遠人之心者永樂四年錦衣衛校尉有訐朝臣謗毁時政之失者文皇曰此必誣之蓋朝廷未嘗行此政彼安得有此言命錦衣衛詰之果挾私忿誣之文皇曰人主聽言之際豈可不審向若不察付之法司則死誹謗必矣小人致誣君子此風不可長命以校尉付法司論如律臣良勝曰冕旒蔽目貴不用明而察見淵魚或以為不祥也祖宗設內巡微訪察惟大姦盜機密有人不敢言者既而乃有及人臣語言陰事非文皇明見則誹謗妖言之禁有不可己以此為法至英廟時尚有及宗室敗倫亦涉虛妄者召學士李賢曰宗室中豈願有此醜事彼初既以為實今却云無此事以此觀之其餘所行所枉多矣賢曰誠如聖諭因言法司明知其枉畏避此輩不敢辨理噫法之弊豈無端使然哉是亦司法非其人爾然當二聖之明自當無法之弊矣右衍知人之明中庸衍義卷十三
