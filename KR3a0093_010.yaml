body:
  text: 中庸衍義卷十明夏良勝撰九經之義修身尊賢親親家人象曰風自火出家人君子以言有物而行有恆程頥曰正家之本在正其身正身之道一言一動不可易也君子觀風自火出之象知事之由內而出故所言必有物所行必有恆也物謂事實恆謂常度法則也德業之著於外由言行之謹於內也言謹行修則身正而家治矣臣良勝曰君子身之所御大如綱常倫理小如事物細微無非所當致力之地而周公獨以言行槩之凡事之所當為而力之所能為者君子必言之而後可行行之而不失其言則內外一致本末無遺而君子之全德著矣况言出乎身而加乎民行發乎邇而見乎逺言行君子之樞機别榮辱而動天地率以是也修身之道何加於此大壯象曰雷在天上大壯君子以非禮勿履程頥曰雷震於天上大而壯也君子觀大壯之象以行其壯君子之大壯者莫若克己復禮古人云自勝之謂強中庸於和而不流中立而不倚皆曰強哉矯赴湯火蹈白刃武夫之勇可能也至於克已復禮則非君子之大壯不可能也故云君子以非禮弗履臣良勝曰兵者有形之冦也欲者無形之冦也兵之冦賊其身而已欲之寇賊其心而無已也是故君子之防欲甚於防寇必間其邪心以存其誠斯須不謹則邪乘虛而入而寇奪之矣非君子大壯其何能為蹇象曰山上有水蹇君子以反身修德程頥曰山之峻阻上復有水坎水為險阻之象上下險阻故為蹇也君子觀蹇難之象而以反身修德君子之遇艱阻必反求諸已而益自修孟子曰行有不得者皆反求諸已故遇艱蹇必自省於身有失而致之乎是反身也有所未善則改之無歉於心則加勉乃自修其德也君子修德以俟時而已臣良勝曰富貴利達所以厚生貧賤憂戚天所以玉爾於成也遇蹇難而反身修德是故多難興邦殷憂啓聖君德之成有可徴也畎𤱔版築魚鹽海市士師之間皆以動心忍性而增益其不能臣德之成有可徴也然則蹇難之際固君子自反之心亦君子自成之地也復初九不逺復無祗悔元吉象曰不逺之復以修身也朱熹曰一陽復生於下復之主也又居事初失之未逺能復於善不抵於悔大善而吉之道也程頥曰不逺而復者君子所以修其身之道也學問之道無他也惟其知不善則速改以從善而已臣良勝曰復者復天地之心也人之所以為人者具此天地之心而已天地之心何所不善然氣有清濁欲有開蔽故人不能皆善而未免於有過過既逺而不改是之謂文過惡斯成也若有過而知不逺而改將復於無過是天地之心全具於我而身無不修矣然此境界自難超詣以顔子克己之功而孔子但曰其庶幾乎故惟聖人而後能立於無過之地禮曰王中心無為以守至正其是之謂乎皋陶謨曰慎厥身修思永惇敘九族庶明勵翼邇可逺在兹蔡沈曰慎者言不可不致其謹也身修則無言行之失思永則非淺近之謀厚敘九族則親親恩篤而家齊矣庶明勵翼則羣哲勉輔而國治矣言近而可推之逺者在此道也蓋身修家齊國治而天下平矣臣良勝曰身者天下國家之本也言行者身之本也修身而知所以致謹於言行決非為淺近謀者其思之永也亦思所以由內及外慎終如始惟恐修於身者容有作輟怠忽於其間也若然則修身之功益加密矣推之于家于國于天下舉而措之焉爾竊伏思之古者紀君之致治莫先於典而必曰克明峻德則堯之所以為君者修身也臣之輔治莫先於謨而必曰慎厥修身則皋陶之所以正君者修身也為君如堯為臣如皋陶皆所以為萬世法程者方今典則堯庭臣惟端册臯謨以進無逸曰昔在殷王中宗嚴恭寅畏天命自度治民祗懼不敢荒寧肆中宗之享國七十有五年蔡沈曰中宗嚴恭寅畏以天理而自檢律其身至於治民之際亦祇敬恐懼而不敢怠荒安寧中宗無逸之實如此故能有享國永年之效也臣良勝曰中宗之所以修身者乃所以保身也所以保民者乃所以保治也惟修其身乃足以保其民不能修身而保民者未之有也或者乃曰後世若秦皇漢武梁武隋文及唐玄宗惟耽樂之從實未聞於修身治民之道然而臨御久逺亦數十年遂使慆淫藉口而周公陳戒之意漫若無徴臣聞蘇轍有曰人君之富其倍於人者千萬也膳服之厚聲色之美所以賊其躬者多矣朝夕於其間而無以御之至於夭死者勢也幸而夀考用物多而害民久矜已自聖輕蔑臣下至於失國宜矣然則人主之所決擇欲為中宗之享國永年者乎抑為秦皇漢武梁武隋文玄宗之永年者乎君牙曰𢎞敷五典式和民則爾身克正罔敢弗正民心罔中惟爾之中蔡沈曰𢎞敷者大而布之也式和者敬而和之也則有物有則之則君臣之義父子之仁夫婦之别長幼之序朋友之信是也典以設教言故曰𢎞敷則以民彛言故曰式和此司徒之教也然教之本則在君牙之身正也中也民則之體而人之所同然也正以身言欲其所處無邪行也中以心言欲其所存無邪思也孔子曰子率以正孰敢不正周公曰率自中此告君牙以司徒之職也臣良勝曰豈惟君哉人臣受君之命分君之職而所以立民之教亦必本之修身有如此者而所以修身必曰中與正焉中正貫天下之道也以之治已則慎以詳以之治民則安以法推之天下無所處而不當矣淇澳詩曰瞻彼淇澳緑竹如簀有斐君子如金如錫如圭如璧寬兮綽兮猗重較兮善戲謔兮不為虐兮朱熹曰以竹之至盛興其德之成就而又言其寬廣而自如和易而中節也蓋寬綽無斂束之意戲謔非莊厲之時皆常情所忽而易致過差之地也然猶可觀而必有節焉則其動容周旋之間無適而非禮亦可見矣禮曰張而不弛文武不能也弛而不張文武不為也一張一弛文武之道也此之謂也臣良勝曰衛武公年九十有五針警於國自卿以下恪恭交戒嘗作懿戒自警又作賓之初筵以禮自防其修身成德老而不倦故其成就至於如此聖人序詩列於衛風之首蓋深意也夫鄭衛之音亂世之音也比於慢矣弼首以莊薑鄘首以共薑與衛首武公無非革薄從忠使人入於善也讀詩者靜而思之桑間蝃蝀牆茨鶉奔之什人道廢矣天理滅矣將淪於鳥獸之族矣婦人乃有若莊薑共薑之節義自間丈夫有若武公之老而成德彼獨非衛之人哉天理之在人心者未嘗忘也茍為善雖之夷狄不可棄也豈鄭衛之風聲習氣能盡移之哉故曰詩可以興也訪落詩曰訪豫落止率時昭考嗚呼悠哉朕未有艾將豫就之繼猶判渙維豫小子未堪家多難紹庭上下陟降厥家休矣皇考以保明其身朱熹曰成王既朝於周廟因作此詩以道延訪羣臣之意言我將謀之於始以循我昭考武王之道然而其道逺矣豫不能及也將使豫勉強以就之而所以繼之者猶判渙而不合也則亦繼其上下於庭陟降於家庶幾賴皇考之休有以保明吾身而已矣臣良勝曰讀淇澳之詩則知武公修身之道惟保其終讀訪落之詩則知成王修身之道必謀於始靡不有初鮮克有終然而慎厥終者惟其始也成王謀始之道又見於免喪朝廟之初且終以延訪羣臣為務雖成王之夙志亦周公之本心也臣於是有以見周公正君之功而釋其踐阼之疑者焉夫天子之喪諒暗三年不言通禮也周公攝政非惟不即天子之位而其所謂攝之云者亦百官總已以聽於冢宰之常也故成王免喪朝廟即有閔豫小子之詩又有訪落之詩是周公已復政於王持衆美而效之矣何嘗一日居王位哉説者謂清廟之詩乃王在新邑蒸祭升歌是為周公攝政七年殊不知周公營洛欲成王留治不可而以周公留後則是成王即政於西周而周公還政居洛亦已久矣安得有七年之攝然則成王居喪而周公冢宰以聽百官古制也非周公一人為之也伊尹以冕服祀於先王亦以太甲在喪而攝告廟之禮其居太甲於桐宫亦諒暗也但使近於湯之墓則時思感愴發其善端為易焉爾伊尹阿衡之任亦冢宰也是則周公之攝政非踐祚也伊尹之遷桐非放君也成王太甲居喪之常禮也後世賊莽以宰衡兼任託迹伊周遂成居攝即真之禍是萬世之憂也臣故詳辨之以祛後世之惑北宫文子言於衛侯曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之則而象之故能守其官職保族宜家衛詩曰威儀棣棣不可選也言君臣上下內外大小皆有威儀也周詩曰朋友攸攝攝以威儀言朋友之道必相教訓以威儀也周書數文王之德曰大國畏其力小國懷其德言畏而愛之也詩云不識不知順帝之則言則而象之也紂囚文王七年諸侯皆從之囚紂於是乎懼而歸之可謂愛之文王伐崇再駕而降為臣蠻夷率服可謂畏之文王之功天下誦而歌舞之可謂則之文王之行至今為法可謂象之有威儀也故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也臣良勝曰君臣威儀身之表也畏愛則象身之影也春秋注曰所以尊其君也求之威儀而不得修身之道鮮矣曲禮曰毋不敬儼若思安定辭安民哉朱熹曰首章言君子修身其要在此三者而其效足以安民乃禮之本也真德秀曰敬者禮之綱領也毋不敬謂身心內外不可使有一毫之不敬其容貌必端嚴而若思其言辭必安定而不遽以此臨民有不安者乎此章凡四言而修身治國之道略備其必聖賢之道言也臣良勝曰禮者履也君子觀上天下澤之象以辨上下定民志則君子為禮乃所以安民也然而身者民之本也禮者身之本也敬者禮之本也故曰毋不敬無所不敬猶曰毋意毋必之無也萌之於思而儼然發之於辭而安然則內外動靜無不敬者所謂用敬作所者也以是修身而安民禮之至也樂記曰禮樂不可斯須去身致樂以治心則易直子諒之心油然生矣易直子諒之心生則樂樂則安安則久久則天天則神天則不言而信神則不怒而威致樂以治心者也制禮以治躬則莊敬莊敬則嚴威心中斯須不和不樂而鄙詐之心入之矣外貌斯須不莊不敬而易慢之心入之矣臣良勝曰君子之為禮樂也蓋以治身也其治身也必有以治其心也身心治然後能作禮樂禮樂成乃所以養身心人之心即天地也所以序者猶天地之序也所以和者猶天地之和也故禮樂之道與天地通有不在天地而在人之身心者哀公問孔子曰古之為政愛人為大不能愛人不能有其身不能有其身不能安土不能安土不能樂天不能樂天不能成其身方氏曰不能愛人則傷之者至矣故不能有其身不能有其身則一身無所容矣故不能安土安土則所居無所擇樂天則所遭無所怨俯能無所擇則仰亦無所怨矣故不能安土不能樂天能樂天則於禮無不順成身之道亦順其理而已子曰其身正不令而行其身不正雖令不從范祖禹曰君者本也民者末也君者源也民者流也本正則末正源清則流清矣是以先王之治必反求諸己已正則物莫不應矣家語孔子曰君子有三恕有君不能事有臣而求其使非恕也有親不能孝有子而求其報非恕也有兄不能敬有弟而求其順非恕也士能明於三恕之本則可以端身矣臣良勝曰夫子嘗曰有一言而可終身行者其恕乎則修身之道無有先於恕者然而恕之道亦多端矣君求於臣以忠也則將曰吾所以使之者未必有禮也父求於子以孝也則將曰吾所以字之者未必慈也兄之求於弟者以順也則將曰吾所以厚之者未必友也責於人者必以恕而責於已者不自恕上必以恕待於下而下不以恕望於上上以其恕下以其嚴人道立矣人道立而身無不正矣顔淵問於孔子曰何以為身子曰恭敬忠信而已矣恭則逺於患敬則人愛之忠則和於衆信則人任之勤斯四者可以政國豈特一身者哉臣良勝曰人為天下善也人有是身即有是善備是善而後為身善是身而後為人故曰踐形維肖者也不然血肉之軀謂之無身可也謂之非人可也顔淵之問不曰修身而曰為身夫子告以勤於恭敬忠信非特以為身尚可以為國善乎善乎其所以為身為家國天下之本乎大學所謂修身在正其心者有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正朱熹曰蓋是四者皆心之用而人所不能無者然一有之而不能察則其用之所行或不能不失其正矣臣良勝曰凡學之本於身心者皆內也其無預於身心者皆外也內之為學則外之者非學也身心之內無他情而已矣心藴於內待應物而發於外發於外而當乎物是得其正情之正者心之正也心之正者身之修也是故君子治心有如止水初無所動故忿懥恐懼好樂憂患遇其所當然而施之非有所主也一有所主則滯於物而為心之病矣故水初無色也投之以丹則赤以墨則黑以粉則白水初無所預也若水止可以和丹止可以和墨止可以和粉則失其水之性矣吾惟情得其當然則心正心正而身修天下之人亦各因其當然而遇之爾孟子曰事孰為大事親為大守孰為大守身為大不失其身而能事其親者吾聞之矣失其身而能事其親者吾未之聞也朱熹曰守身持守其身使不陷於不義也一失其身則虧體辱親雖日用三牲之養亦不足為孝矣漢文帝嘗幸霸陵欲西馳下峻阪袁盎攬轡帝曰將軍怯耶盎曰千金之子不垂堂百金之子不騎衡今陛下騁六飛馳不測有如馬驚車敗陛下縱自輕奈高廟太后何帝乃止漢武帝至長楊獵自擊熊彘馳獸司馬相如諫曰物有同類而殊能者故力稱烏獲捷言慶忌勇期賁育臣愚以為人誠有之獸亦宜然今陛下好陵險阻射猛獸卒然遇軼材之獸駭不存之地犯屬車之清塵是胡越起於轂下而羌夷接軫也帝善之臣良勝曰三代而下人主知保身之道者蓋亦鮮矣况有所謂修身之道者乎以文帝之恭默思道武帝之雄才大略猶或輕身逸遊不知自重其他昏庸淫侈又何足言然而害身之事非止遊獵已也淫聲艷色為伐身之斧斤旨酒厚味為迷身之鴆毒雕牆峻宇為寢身之荆棘黷貨薦賄為賈身之契劵卿士有一於身家必破諸侯有一於身國必亡有天下者身之所係尤大矣可不慎哉宋太祖謂宰相薛居正曰古之為君鮮能正心自致無過之地朕嘗夙夜畏懼防非窒欲庶幾以德化人之義如唐太宗受人諫疏直詆其失曾不愧恥豈若不為之而使天下無間言哉臣良勝曰宋祖開基終身寡過其若斯言致力於身心者亦不淺矣然其本則在讀書雖軍中而手不釋卷居常可知及聞王昭素養身莫善寡欲之言書之御屏朝夕自警故防非窒欲正所以為寡欲之防也先儒胡寅有言曰人君莫大乎修身修身莫大乎寡欲欲誠不行則心虛而善入氣平而理勝動無非禮事無不善唐虞之治不越此矣臣每謂漢昭烈宋太祖可以語王道者正以此爾聖祖退朝之暇延接儒生講論經典取古今嘉言善行書置殿廡出入省觀斥侈靡絶遊幸卻異味罷膳樂泊然無所好敦行儉朴以身為天下先聖祖祀圜丘患心不寧宋濓進曰孟軻有言養心莫善寡欲審能行之則心清而身泰矣聖祖謂詹同曰朕思聲色乃伐性之斧斤易以溺人一有溺焉則禍敗隨之故其為害甚於鴆毒朕觀前代人君以此致亡者不少蓋為君居天下之尊享四海之富靡曼之聲窈窕之色何求而不得茍不知逺之則小人乘間納其淫邪不為迷惑者幾人焉况創業垂統之君為子孫之所承式尤不可不謹同曰不邇聲色成湯所以垂裕後昆陛下此言乃端本澄源之道誠萬世子孫之法也諭福建行中書省蔡哲曰君子立身行己莫先於辨義利夫義者保身之本利者敗名之源常人則惟利是趨而不知義君子則惟義自守而竟忘乎利所以異於常人也福建濱海民物富庶番舶往來私交者衆往來官吏多以利怵陷於罪戾今命卿往必堅所守毋蹈其非哲對曰臣菲薄叨承恩命敢不盡公以報聖祖曰公即無私義之謂也私即忘公利之謂也要公之一字亦未易言此心如止水明鏡無分毫私意纍之然後揆事度物廓然無滯若使胸中微有芥蒂則不能為公矣聖祖御文華殿皇太子侍聖祖問曰此日講習何書對曰昨看書至商周之世聖祖曰看書亦知古人為君之道否因諭之曰君道以寧天愛民為重其本在敬身人君一言一行皆上通乎天下繫乎民必敬以將之而後所行無不善也蓋善天必鑒之不善天必鑒之一言而善四海蒙福一行不謹四海獲殃言行如此可不敬乎爾其識之臣良勝曰宋濓寡欲之對即王昭素所以告宋祖者也而我聖祖所以人已交修內外交養古今備美動靜備制視宋祖私曲畢見之功為益密矣又推其緒餘以訓迪皇子子孫則效謹於言行聲色之間蓋人君有恣於欲者聲色為之先也以訓飭臣工則致謹於義利公私之辨蓋人臣有縱於欲者貪利為之先也此皆實際工夫而喫緊為人道也是故治天下本之修身修身本之正心正心本之寡欲寡欲本之聲色義利聲色逺言行有則矣義利明公私自辨矣為臣子者佩服於斯則所以寧天愛民所以祈天永命入則典司政本出則經營四方將不愧乎為人君為人臣者聖訓之功其逺乎哉右衍修身之義頥彖曰天地養萬物聖人養賢以及萬民頥之時義大矣哉程頥曰聖人極言頥之道而贊其大天地之道則養育萬物養育萬物之道正而已矣聖人則養賢才與之共天位使之食天祿俾澤施於天下養賢以及萬民也臣良勝曰天之立君以亂民也君之繼天以養民也然而天下萬國恆以遍及為難但求天下之賢而養之賢者得所養而居位無非推人君養民之心以行養民之政則君為民以養賢賢為君以養民其義一也雖然是既用之賢而有以養之其常也若其未成未用之賢而養之者尤人君所深致意也故蕭何勸髙祖王漢中曰養其民人以致賢人賢人之養皆民之供也治人者食於人治於人者食人是民與賢亦相交為養也至董仲舒言於武帝曰不養士而欲求賢譬猶不琢玊而求文采也故養士莫大乎太學太學賢士之所關也是故賢不養何以周天下之用賢不用何以養天下之民然而養賢於既用必養之於未成賢之養民必資民以養賢天也君也賢也民也皆相須以為命者也人君代天理物而有賊賢害民者亦何哉雖然臣又嘗聞聖祖與儒臣論易至此有云知人最難若所養非賢反厲其民何補於國故人主養賢非難知賢為難嗚呼懿哉此廓聖賢所未發之意臣敢敬誦為今日獻姤九五以杞包瓜含章有隕自天程頥曰夫上下之遇由相求也杞髙木而葉大處高體大而可包物者杞也美實之在下者瓜也美而居下者側微之賢之象也九五尊居君位而下求賢才以至高而求至下猶以杞葉而包瓜能自降屈如此又其內藴中正之德充實章美人君如是則無有不遇所求者也雖屈己求賢若其德不正賢者不屑也故必含藴章美內積至誠則有隕自天矣猶云自天而降言必得之也自古人君至誠降屈以中正之道求天下之賢未有不遇者也高宗感於夢寐文王遇於魚釣皆由是道也商髙宗思復興殷而未得其佐乃恭默思道夢帝與之良弼髙宗以夢之所見視羣臣皆非也乃使工畫其象遍求於天下得説於傅巖是時説操版築既至髙宗曰是也遂以為相周文王將獵卜之曰非龍非彲非熊非羆非虎非貔所獲伯王之輔於是遇太公於渭水之陽與語大説曰自吾先君太公曰當有聖人適周周因以興子真是耶吾太公望子久矣號曰太公望載與俱歸立為師臣良勝曰髙宗文王思賢而求求而遇遇而有符於夢卜真若有隕自天者然使遇而不用用而不盡其賢則亦失矣若孔子於魯衛孟子於齊梁果何益哉惟髙宗於説則曰若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨故能嘉靖殷邦者以得賢而盡其用也文王於臣豫曰有疏附豫曰有先後豫曰有奔奏豫曰有禦侮矧兹太師其鷹揚燮伐用之未盡尚以貽之後也嗚呼雲之從龍風之從虎蓋亦自然感契而應必有是君而後有是臣也故曰聖人作而萬物覩立政曰亦越成湯陟丕釐上帝之耿命乃用三有宅克即宅曰三有俊克即俊嚴惟丕式克用三宅三俊其在商邑用協於厥邑其在四方用丕式見德蔡沈曰湯自七十里升為天子典禮命討昭著於天下所謂陟丕釐上帝之光命也三宅謂居常伯常任準人之位者三俊謂有常伯常任準人之才者克即者言湯所用三宅實能就是位而不曠其職所稱三俊實能就是德而不浮其名也湯於三宅三俊嚴思而丕法之故能盡其宅俊之用而宅者得以效其職俊者得以著其才賢智奮庸登於至治其在商邑用協於厥邑近者察之詳其情未易齊畿甸之協則純之至也其在四方用丕式見德逺者及之難其德未易遍觀法之同則大之至也至純至大治道無餘藴矣文王詩曰世之不顯厥猶翼翼思皇多士生此王國王國克生維周之楨濟濟多士文王以寧朱熹曰其傳世豈不顯乎而其謀猷乃能勉敬如此也美哉此衆多之賢士而生於此文王之國也文王之國能生此衆多之士則足以為國之幹而文王亦賴以為安矣蓋言文王得人之盛而宜其傳世之顯也臣良勝曰任賢享天下之福觀之湯文其信然也但賢才之任天下豈惟用之為難其生亦自以為難有生而不用猶不生也故天之生賢何代無之惟世非其君用非其道或隱匿而不見於用或小試而未竟其施則謂之世不生賢亦可也不然興國之才皆亡國之遺也文王在國成人有德小子有造譽髦多士若自文王而生之也彼關龍逢生於桀之世微子此干箕子生於紂之世其能有用協式德之治乎其能為國之楨而君以寧乎其所謂有生不如無生者乎孔子間居曰清明在躬志氣如神嗜欲將至有開必先天降時雨山川出雲其在詩曰嵩高維嶽峻極于天維嶽降神生甫及申維申及甫為周之翰四國于蕃四方于宣文武之德也陳澔曰清明在躬志氣如神即至誠前知之謂也嗜欲所願欲之事也有開必先言有以開發其朕兆者如將興必有禎祥若時雨將降山川必先為之出雲也國家將興天必為之豫生賢佐故引大雅嵩髙之詩言文武有此無私之德故天為之生賢佐以興周而文武無此詩故取宣王之詩為喻而曰此文武之德也臣良勝曰聖王開基植國根本其歷年有永不永皆定於創造之初周家八百年興王之澤在文武之德已有歷數之期已故雖經夷厲之衰而宣王中興天乃篤生申甫以應嶽神之降皆文武之德積纍深厚以致然也宣王之治益所以見文武之澤之延也夫聖王不世出出有如文武者天既為之生賢以𢎞創業之規又為之生賢以繼垂統之治夫豈偶然之故哉卷阿詩曰有馮有翼有孝有德以引以翼豈弟君子四方為則吕祖謙曰賢者之行非一端必曰有孝有德何也蓋人主常與慈祥篤實之人處其所以興居善端涵養德性鎮其躁而消其邪日改月化有不在言語之間者矣晉侯搜於綿上以治兵使士丐將中軍辭曰伯遊長昔臣習於知伯是以佐之非能賢也請從伯遊荀偃將中軍士丐佐之使韓起將上軍辭以趙武又使欒黶辭曰臣不如韓起韓起願立趙武君其聽之使趙武將上軍韓起佐之欒黶將下軍魏絳佐之新軍無帥晉侯難其人使其什吏率其卒乘官屬以從於下軍禮也晉國之民是以大和君子曰讓禮之主也范宣子讓其下皆讓欒黶為汰弗敢違也晉國以平數世賴之刑善也夫一人刑善百姓休和可不務乎臣良勝曰君子謂讀唐風可以見堯舜節儉之化臣謂讀晉史可以見唐虞德讓之遺也士丐讓善一國刑之且城濮之戰命將也其讓如是邲之戰命將也其讓如是悼公之命六官也其讓如是皆春秋諸國所未聞者霸業之盛亦賴夫是况明王有道之長者乎秦人伐晉左氏曰秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂伯西戎用孟明也君子是以知秦穆公之為君也舉人之周也與人之一也孟明之為臣也其不懈也能懼思也子桑之忠也其知人也能舉善也詩曰于以采蘩于沼于沚于以用之公侯之事秦穆有焉夙夜匪懈以事一人孟明有焉貽厥孫謀以燕翼子子桑有焉晉侯問原守於寺人勃鞮對曰昔趙衰以壺飱從徑餒而弗食故使處原栁宗元曰余謂守原政之大也所以承天子樹伯功致命諸侯不宜謀及媟近以沗王命而晉君擇大任不公議於朝而私議於家不博謀於卿相而獨謀於寺人雖或衰之賢足以守國之政不為敗而賊賢失政之端由是滋矣其後景監得以相衛鞅宏石得以殺望之誤之者晉文公也嗚呼得賢臣以守大邑則問非失舉也蓋失問也然猶羞當時陷後代若此况問與舉又兩失之者其何以救之哉孟子曰左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之朱熹曰左右近臣其言固未可信諸大夫之言宜可信矣然猶恐其蔽於私也至於國人則其論公矣然猶必察之者蓋人有同俗而為衆所恱者亦有特立而為俗所憎者故必自察之而親見其賢否之實然後從而用舍之則於賢者知之審任之重而不才者不得以幸進矣周惇頥曰心純則賢才輔賢才輔則天下治純心要矣用賢急焉臣良勝曰范祖禹云斂天下之賢者而聚之於朝使之施其所有以為國之所有則賢無不得其所而民物亦無不得其所矣是則治平天下之道雖堯舜以親賢為先務也然而擇賢之道固亦多端先其孝德則恃才者在所後已與其讓善則爭名者在所奪已能棄其過人皆可用己左右寺宦固非賢者所由進之道也審度於此而得賢才之輔治者其惟純心之主乎漢髙祖曰運籌帷幄之中決勝千里之外吾不如子房鎮國家撫百姓給餽餉不絶糧道吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信三人者皆人傑吾能用之此吾所以取天下項羽有一范增而不能用是以為我禽也臣良勝曰好善則裕自用則小創業之君每以知術先天下而英雄欺世誰肯自謂不如人者髙祖自謂不如三傑真大度也若光武唐太宗亦為賢者以其吏事責之三公而兼行將相無非與下爭能爾至於宋孝武欲擅書名而王僧虔輒用拙筆宋文擅文名而鮑照為俚語僅僅自免隋煬以詩忌薛道衡而殺之曰復能作空梁落燕泥否髙帝以後惟文帝自謂不及賈生魏明不能堪作漢文勝賈生論蘇軾謂此非獨求勝其臣乃與異代之臣爭善正如妬婦不獨禁其夫且妬人之妾也嗚呼此小技爾乃不能相容若此此髙祖所以度越千古也宋仁宗以富弼同中書門下平章事與文彥博並命宣制之日士大夫相慶於朝帝微覘之以語學士歐陽修曰古者命相或得之夢卜豈若今日人情如此哉臣良勝曰三代而下純心用賢擇賢固難其選然若漢髙祖之虛已聽人宋仁宗之人情尤協其庶幾於近古者聖祖命吏部訪求賢才曰世有賢才國之寶也古之聖王恆汲汲於求賢若髙宗之於傅説文王之於吕尚二君者豈知不足也而皇皇於版築鼓刀之徒蓋賢才不備不足以為治鴻鵠之能逺舉者為其有羽翼也蛟龍之能騰躍者為其有鱗鬛也人君之能致治者為其有賢人而為之輔也今山林之士豈無德行文藝之足稱者宜令有司採舉備禮送至京朕將任用之以圖至治使召章溢劉基葉琛宋濓同至建業入見聖祖問勞曰我為天下屈四先生耳四海紛紛何時定乎對曰天道無常惟德是輔不嗜殺人者能一之爾曰卿等其留輔豫矣王褘隱青岩山中聖祖取婺徴至行在商略機務悉契上衷語必稱子充而不名進平江西頌上覽而喜曰吾固知浙東有二儒卿與宋濓耳學問之博卿不如濓才思之雄濓不如卿臣良勝曰求賢之道旁及側微則在位之賢尊尚可知一則曰先生一則曰子充惟師惟友無間然矣至謂浙東二儒已素知之而辨其所長毫髮不爽即是堯之於舜曰豫聞如何也倪寬視畜牧上所作疑奏武帝則曰吾聞之久矣望之為治禮丞而宣帝曰此東海蕭生耶先儒有曰人主不能自知天下豪傑惟左右權臣佞幸之是聽烏能起太平之治聖祖身致太平其道何以加此聖祖開科詔曰自洪武三年為始特設科舉以起懷材抱德之士務在經明行修博古通今文質得中名實相稱其中選者朕將親策於廷觀其學識品其髙下而任之以官果有才學出衆者特以顯擢使中外文臣皆由科舉非科舉者無得與官臣良勝曰登薦被召所以羅先代遺逸之賢也設科取士所以收當代作養之賢也二者並行而野無遺才矣竊觀聖詔所選必經明行修博古通今文質得中名實相稱之士不知今科目所得果若而人乎又謂中外文臣皆由科舉非科舉者無得與官而好異議者每曰科目不足以得強拔他途而寵異之不知聖祖求賢初意果若是否也文皇外嚴內仁雄才大略條理精密知人善任使推誠待下凡所委任非浸潤所能間讒諛之人終見疏斥矜過誤略小罪不以私愛蔽大罪永樂三年命大學士解縉等於新進士中選才質英敏者俾就文淵閣進其學縉等選修撰曾棨編修周述周孟簡庶吉士楊相劉子欽彭汝器王英王直余鼎章敞王訓柴廣敬王道熊直陳敬宗沈升洪順章朴余學夔羅汝敬盧翰湯流李時勉假民倪維哲袁添祿吳紳楊勉二十八人入見文皇諭勉之曰人須立志志立則功就天下古今之人未有無志而能建功成事者爾等簡拔於千百人中為進士又簡拔於進士中至此固皆今之英俊然當立志逺大不可安於小成為學必造道德之微必具體用之全為文必並驅班馬韓歐之間如此立心日進不已未有不成者古之文學之士豈皆天成亦積功所致也朕不任爾以事文淵閣古今載籍所萃可各食其祿日就閣中恣爾玩索務實得於己庶國家將來可得其用不可自怠以辜朕期待之意時進士周忱自陳年少願進學文皇喜曰有志之士也命增忱為二十九人遂命司禮監月給筆札紙光祿給朝暮膳禮部月給膏燭鈔三錠工部擇近第宅居之臣良勝曰嗚呼休哉任賢之道以仁明誠達為之本而譖毁讒佞不足以間之不以過掩能不以私廢法而養賢之道尊尚之誠諭教之切諸司供給之具無非備者其後道德文學之臣效忠宣力黼黻皇猷不獨班馬韓歐之匹書曰敷求哲人以貽後嗣嗚呼休哉仲弓曰焉知賢才而舉之曰舉爾所知爾所不知人其舍諸程子曰人各親其親然後不獨親其親仲弓曰焉知賢才而舉之子曰舉爾所知爾所不知人其舍諸便見聖人與仲弓用心之大小推此義則一心可以興邦一心可以喪邦只在公私之間爾儒行曰儒有內舉不避親外舉不避怨程功積事推賢而進達之不望其報君得其志茍利國家不求富貴其舉賢援能有如此者吕大臨曰儒者之志以天下為度者也寬裕之至既足以有容則物我之間無所别也天下有事而不治天下有賢而不達吾任其責矣故知其賢者猶有親怨之避謂之公而實私也過計於一己之私而不同於天下之公也傳稱祁奚稱其讐不為諂立其子不為比忘乎親讎者也公叔文子之臣大夫僎與文子同升諸公忘其君臣者也范文子所舉於晉國管庫之士七十有餘家忘乎貴賤者也管仲遇盜取二人焉上以為公臣曰其所與者可人也忘乎其素者也能忘乎是而惟天下國家之利然後舉賢授能盡其功矣夫望報於人求富於己小人之道也又何足道哉毛玠典選舉所用皆清正之士雖時有盛名而行不由本者終莫得進務以儉率人由是天下之士莫不以亷恥自勵陳俊卿為尚書僕射以用人為己任所除吏皆一時之選奬恬退抑奔競或才有可用資歷尚淺奏薦於上未嘗語人韓琦在相位所汲引多正直有名或忠厚可鎮風俗列侍從備臺諫以公議用之多有未嘗識者王曾進退士人莫有知者范仲淹嘗問曾曰明揚士類宰相之任公之盛德獨少此爾曾曰夫執政者恩欲歸已怨使誰歸仲淹服其言臣良勝曰用賢人主之權也薦賢人臣之職也臣薦之君用之與治同道而野無遺賢矣巷伯詩曰彼譖人者誰適與謀取彼譖人投畀豺虎豺虎不食投畀有北有北不受投畀有昊朱熹曰此皆設言以見欲其喪亡之甚也故曰好賢如緇衣惡惡如巷伯臣良勝曰尊賢之道去讒為首讒人之説行則賢者之志沮其志沮則言不聽道不行不能一日安乎其位矣屈原之為楚使以結強援謀既效矣秦患之而賂上官靳尚之屬內及鄭袖交譖而出之懷王拘囚客死而屈原猶以讒廢則夫利害未明者雖百賢能勝一讒之喙哉胡安國曰無極以讒勝而策士竒才為敵國用矣此寺人孟子惡讒至投有昊而無所歸者情之正也十月之交詩曰皇父卿士番維司徒家伯冢宰仲允膳夫棸子內史蹶維趣馬楀維師氏艷妻煽方處朱熹曰小人用事於外而嬖妾蠱惑王心於內以為之主故也臣良勝曰後宫盛色則賢者隱微持衡之勢不待朝夕而自見艷妻若褒姒者既蠱於內則尹氏之小人盤結於外正人君子尚何為容足之地乎驪姫內嬖而申生必死重耳必出里克荀息均於不保其身史蘇謂之有女戎者必有男戎其理然也太真既寵九齡必疏九齡既疏林甫必用林甫用殺三子而亡之矣欲令智昏豈特不保其臣哉國語厲王説榮夷公芮良夫曰王室其將卑乎夫榮公好專利而不知大難夫利百物之所生也天地之所載也而或專之其害多矣天地百物皆將取焉胡可專也所怒甚多而不備大難以是教王王能久乎夫王人者將導利而布之上下者也使神人百物無不得其極猶日怵惕懼怨之來也故周頌曰思文后稷克配彼天立我蒸民莫匪爾極大雅曰陳錫載周是不布利而懼難乎故能載周以至於今今王學專利其可乎匹夫專利猶謂之盜王而行之其歸鮮矣榮公若用周必敗既榮公為卿士諸侯不享王流於彘臣良勝曰義利猶水火也其不能相入也明矣尊賢為國義之利也貪利喪國利之害也成湯懋功懋賞功德並施必以不殖貨利為之先也後世若德宗於奉天罪已其視陸贄真如魚水裴延齡以羡餘進則贄也逺州之行矣憲宗於淮蔡用命其任裴度同休社稷皇甫鎛以聚斂進則度也外鎮之命矣入者主之出者奴之入者輔之出者汙之其播遷篡弒之禍與流彘同歸爾臣良勝曰尊賢之道二有君道焉有臣道焉君如用之有養之也有求之也有擇之也有知之也有好之也有下之也有任之也有全之也而後用賢之道至臣如薦之不避親也不避怨也必崇本也必訓俗也不市恩也不責報也而後薦賢之道至又必讒無所間也色無所奪也利無所撓也而後賢之生也不為虛生賢之用也不為徒用臣所以成天下之務君所以享天下之福尊賢治道之大成也臣敢縷覼陳之惟聖明采覽焉右衍尊賢之義堯典曰克明峻德以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍蔡沈曰九族髙祖至玄孫之親舉近以該逺五服異姓之親亦在其中也睦親而和也臣良勝曰同姓之親自吾而上及於始祖自吾而下及於雲仍皆一體而分也由母而推及於父母兄弟由妻而推及於父母兄弟皆一氣而連也故惟親之而後睦之然必克明峻德以為親睦九族之本協和時雍亦自親睦九族而推周敦頥曰治天下有本身之謂也治天下有則家之謂也家難而天下易家親而天下疏也此親親所以為仁民愛物之先也可不慎哉行葦詩曰敦彼行葦牛羊勿踐履方苞方體維葉泥泥戚戚兄弟莫逺具爾或肆之筵或授之几朱熹曰言敦彼行葦而牛羊勿踐履則方苞方體而葉泥泥矣戚戚兄弟而莫逺具爾則或肆之筵而或授之几矣此言其開宴設席之初而殷勤篤厚之意藹然已見於言語之外矣臣良勝曰天地生物一本而已猶木而千枝萬葉皆一根之所發也水而千支萬派皆一源之所流也是故古之治最重親親親親而賢賢賢賢而貴貴堯舜之時九官元愷多出世族周封同姓文昭武穆並列顯侯是以入而助祭祭而宴享皆若家人之禮而略君臣之分觀行葦之詩可想見矣板詩曰價人維藩大師維垣大邦維屏大宗維翰懷德維寧宗子維城無俾城壞無獨斯畏朱熹曰言是六者皆君之所恃以安而德其本也有德則得是五者之助不然則親戚叛之而城壞城壞則藩垣屏翰皆壞而獨居獨居則所可畏者至矣富辰曰太上以德撫民其次親親以相及也昔周公弔二叔之不咸故封建親戚以藩屏周管蔡郕霍魯衛毛𣆀郜雍曹滕畢原酆郇文之昭也邗晉應韓武之穆也凡蔣邢茅胙祭周公之胤也召穆公思周德之不類故糾合宗族於成周而作詩曰常棣之華鄂不韡韡凡今之人莫如兄弟其四章曰兄弟鬩于牆外禦其侮如是則兄弟雖有小忿不廢懿親今天子不忍小忿以棄鄭親其若之何臣良勝曰富辰言周之親親可謂備矣襄王不聽是以有出居於鄭之禍所謂城壞而畏者也大傳曰是故人道親親也親親故尊祖尊祖故敬宗敬宗故收族收族故宗廟嚴宗廟嚴故重社稷重社稷故愛百姓愛百姓故刑罰中刑罰中故庶民安庶民安故財用足財用足故百志成百志成故禮俗刑禮俗刑然後樂詩云不顯不承無斁於人斯此之謂也陳澔曰祖之遷者愈逺宗之繼者無窮必知尊祖乃能敬宗收不離散也宗道既尊故族無離散而祭祀之禮嚴肅內嚴宗廟之事故外重社稷之禮知社稷之不可輕則知百官族姓之當愛官得其人則刑不濫而民安其生安生樂業而食貨所資上下俱足有恆産者有恆心倉廩實而知禮節故非心邪念不萌而百志以成乖爭陵犯不作而禮俗一致刑猶成也如此則協氣嘉生薰為太和矣豈不樂乎詩周頌清廟之篇言文王之德豈不光顯乎豈不見尊奉於人乎無厭斁於人矣引此以喻人君自親親之道推之而家而國而天下至於禮俗大成其可樂者亦無有厭斁也諸侯王表曰昔周監於二代三聖制法立爵五等封國八百同姓五十有餘周公康叔建於魯衛各數百里太公於齊亦五侯九伯之地詩載其制曰介人維藩太師惟垣大邦維屏大宗維翰懷德維寧宗子維城毋俾城壞無獨斯畏所以親親賢賢褒功表德關諸盛衰深根固本為不可拔者也故盛則周召相其治致刑錯衰則五伯扶其弱與共守自幽平之後日以陵夷至乎厄嶇河洛之間分為二周有逃責之臺被竊鈇之言然天下謂之共主強大弗之敢傾歷載八百餘年數極德盡至於赧王降為庶人用天年終號位已絶於天下尚猶枝葉相持莫得居其虛位海內無主三十餘年秦據勝勢之地騁狙詐之兵蠶食山東一切取勝因矜其所習自任私智姍笑三代蕩滅古法竊自號為皇帝而子弟為匹夫內無骨肉本根之輔外亡尺土藩翼之衛陳吳奮其白挺劉項隨而斃之故曰周過其歷秦不及期國勢然也漢興之初海內新定同姓寡少懲戒亡秦孤立之敗於是割裂疆土立二等之爵功臣侯者百有餘邑尊王子弟大啓九國自雁門以東盡遼陽為燕代常山以南大行左轉渡河濟漸於海為齊趙榖泗以往奄有龜蒙為梁楚東帶江湖薄會稽為荆吳比界淮瀕略廬衡為淮南波漢之陽亘九嶷為長沙諸侯比境周匝三垂外接胡越天子自有三河東郡潁川南陽自江陵以西至巴蜀北自雲中至隴西為京師內史凡十五郡公主列侯頗邑其中而藩國大者跨州兼郡連城數十宫室百官同制京師可謂矯枉過其正矣雖然髙祖創業日不暇給孝惠享國又淺高后女主攝位而海內宴如亡狂狡之憂卒折諸吕之難成太宗之業者亦賴之於諸侯也然諸侯原本以大末流濫以致溢小者淫荒越法大者暌孤橫逆以害身喪國故文帝采賈生之議分齊趙景帝用朝錯之計削吳楚武帝施主父之策下推恩之令使諸侯王得分户邑以封子弟不行黜陟而藩國自析自此以來齊分為七趙分為六梁分為五淮南分為三皇子始立者大國不過十餘城長沙燕代雖有舊名皆亡南北邉矣景帝遭七國之難抑損諸侯減黜其官武帝有衡山淮南之謀作左官之律設附益之法諸侯惟得衣食稅租不豫政事至於哀平之世皆繼體苖裔親屬疏逺生於帷牆之中不為士民所尊勢與富室無異而本朝短世國統三絶是故王莽知漢中外殫微本末俱弱亡所忌憚生其姦心因母后之權假伊周之稱顓作威福廟堂之上不降階序而運天下詐謀既成遂據南面之尊分遣五威之吏馳傳天下頒行符命漢諸侯王厥角稽首奉上璽紱惟恐在後或乃稱美頌德以求容媚豈不哀哉是以推其終始強弱之變明監戒焉唐太宗即位舉宗正屬籍問侍臣曰遍封宗子於天下便乎封德彛對曰歷觀往古封王者今最為多兩漢以降封帝子及親兄弟若宗室既逺非有大功如周之郇滕漢之賈澤不得濫封所以别親疏也先朝敦睦九族一切封王爵命既隆多貽力役蓋以天下為私殊非至公馭物之道帝曰朕理天下本為百姓非欲勞百姓以養己之親也於是宗室率以屬疏降爵郡公惟有功者數十人封王宋太祖即位承唐之制宗室襁褓即列土而爵之降至疏屬宗正存籍玉牒有名宗學有教郊祀明堂遇國慶典皆有祿秩所寓州縣月有餼廪凡諸王公侯伯子男皆子孫承嫡者傳襲若無嫡子及有罪疾立嫡孫無嫡孫以次立嫡子同母弟無母弟立庶子無庶子立嫡孫同母弟無同母弟立庶孫曾孫臣良勝曰三代而下享國之長曰漢曰唐曰宋其建親敘族封制屏翰強弱盛衰利害大較如是漢用其強其大必折是以煩削奪之策起叛逆之資然劉章制諸吕光武奮於長沙定王之後昭烈起於中山靖王之後害由是利亦由是唐宋用其弱雖不獲利害亦鮮矣漢之劉向唐之李白不廢仕祿而宋則玉牒科名濟濟相望趙鼎趙汝愚輩荐登相位國祚雖移苖裔日逺謂至今存可也嗚呼兹永世之利哉洪武元年十一月宴東宫官及儒士各賜袍服先是建大本堂取古今圖書充其中延四方名儒教太子諸王分番夜直選才俊之士充伴讀時賜宴賦詩商確古今評論文字無虛日洪武三年四月以封建諸王告太廟禮成宴羣臣於奉天門及文華殿聖祖諭廷臣曰昔元失其馭群雄並起四方鼎沸民遭塗炭朕躬率師徒以靖大難皇天眷佑海宇寧謐然天下之大必建藩屏上衛國家下安民生今諸子既長宜各有封爵分鎮諸國朕非私其親乃遵古先哲王之制為久安長治之道群臣稽首對曰陛下封建諸王以衛宗社天下萬世之公議聖祖曰先王封建所以庇民周行之而久逺秦廢之而速亡漢晉以來莫不皆然其間治亂不齊特顧施為何如爾要之為長久之計莫過於此臣良勝曰我祖宗肇建親藩教愛一體規制宏密度越千古者矣既無漢室尊土之強亦無煩於分邑之策王止親子無及他親其後遞封有郡王有將軍中尉之别制祿因之視唐髙祖時從弟姪始成童者悉封郡王宋太祖時宗室襁褓即裂土而爵之者為有制矣議者謂左官之制近方有同於漢玉牒之學後期有舉於宋制祿之地初省一國今宗茂以繁如山西河南陜西湖廣江西諸處國初賦止萬石今至度支百萬石而未已地不改闢民亦漸寡負經世之責者必思裒多益寡達變通之權以建萬世之策愚臣疏陋何敢僭陳謹述近聞用備采擇嘗聞一子受祿仁及其宗一家積餘周於里黨今貴為天子而天下祿糧至積欠數百萬石皇子皇孫而衣食不繼婚姻失時呌號於官府奔訴於京師雖彼自失貴貴之體要亦有負親親之仁如求目前近計户部難於處分欲賦於民而地廢民逃已不堪命欲給於官而官庫虛耗不足常供臣嘗聞太倉節年附餘銀兩久未查盤皆非常額之賦近年沒入劉瑾江彬錢寧等錢亦為官用之贓皇上富有四海出此羡餘以親九族當不惜也或曰是非可繼之策臣又曰國初分封定賦惟欲均平今初封宗室地方原祿萬石者今至有百萬石而未已若營造婚姻之費物産莊田之求齋郎民校之役又不知幾十百倍於初其他未有分封之地賦役如常以此較彼輕重懸殊若除兩京及邊境尚須他省接濟外其餘未有分封省分隨原額糧數多寡量派祿糧每年同折銀征解户部酌量原派少數去處齎赴各布政司分給是亦均平足賦之一畫也至於各處抽分鈔關錢物所收倍於所解賢者恥於羡餘自進而不肖者輒以貪黷自卑會𨽻交通侵漁無算正煩經理少濟度支仍乞戒諭宗親無得交通賭博兊放祿糧已往債負並照近年漕運私債之利免追其姦豪積年放債兊糧規取厚利者特立條例從衆科斷已往宥之庶幾可恤既往可濟方來而親親仁民之政稱物平施之道皆於是乎在若謂處補之無方而善後之無策及至有求有犯而徒挫辱之無禮懲治之無法則亦付之無可奈何而已是則非愚臣所知也嘗聞宣廟時楊士竒楊榮修玉牒成上覽之曰古人重世族譜蓋欲正倫理篤恩義我國家宗枝之盛皆祖宗積德所致今於族有親疏然泝所自實本於一人朕何敢忽士竒等對曰周自后稷以來世積忠厚是以子孫衆多維持王業所歷年世最逺國家世德隆厚故本枝繁衍陛下又逺宗帝堯明峻德以親九族將來盛福當過周家臣謂宣廟之言深有得於祖宗之心陛下之言必有契於宣廟之言在廷之臣有如士竒者不知宜何如為策也臣復何言哉嵩髙詩曰申伯番番既入于謝徒御嘽嘽周邦咸喜戎有良翰不顯申伯王之元舅文武是憲朱熹曰申伯既入于謝國人皆以為喜而相謂曰汝今有良翰矣元長憲法也言文武之士皆以申伯為法也臣良勝曰宣王于異姓之親可謂厚矣命召公定其宅徹其土選其私人重以車馬介圭之錫出郊之餞極其禮遇將為異數之恩宣王非以元舅故而私之也吉甫頌之則曰嵩嶽降神而生又曰四方于宣曰南國是式曰文武是憲其功德在人固宜優厚之者但既封之後親寵日隆幽王復娶其女為后以黜生怨至率犬戎殺之遂有東遷之禍周亦以衰臣觀始封之後隆盛如此固宜其有尾大不掉之患也君子謂秦之始封於雍已知其有朝同列之風申之始邑于謝已知其弱周室之漸矣揚之水詩曰揚之水不流束薪彼其之子不與我戌申懷哉懷哉曷月豫還歸哉朱熹曰申侯與犬戎攻宗周而弒幽王則申侯者王法必誅不赦之賊而平王與其臣庶不共戴天之讐也今平王知有母而不知有父知其立己之有德而不知其弒父為可怨至使復仇討賊之師反為報施酬恩之舉則其忘親逆理得罪於天已甚矣漢文帝竇后兄長君弟廣國字少君聞后立上書自陳后言帝召見問之具言其故是竇后持之而泣厚賜之家於長安絳侯灌將軍等曰吾屬不死命乃且懸此二人所出微不可不為擇師傅又復放吕氏大事也於是乃選長者之有節行者與居長君少君由此為退讓君子不敢以富貴驕人臣良勝曰少成若天性習慣如自然文帝以絳灌之言而擇人以教外戚遂成謙讓之德至薄昭有罪雖母后之弟必置於法此謂恩威並用待外戚之至要也文帝於此蓋懲於吕氏之禍者深矣漢章帝時皇后兄竇憲以賤直奪沁水公主園田事覺帝大怒切責憲深思前過奪主田園時何異於趙高指鹿為馬久念使人驚怖國家棄憲如孤雛腐鼠爾憲大震懼皇后為毁服謝良久乃解使以田還主臣良勝曰章帝於竇憲己洞燭其姦橫之情矣既失教於初若能如文帝不貸以法於憲非薄而竇氏之宗保全為厚尤多且不懲於王氏之禍而復使之與政鄭玄以為言竟中以漏泄機事罷之欲釋罪專封則邀功萬里父子兄弟至為卿校悍卒刺客布滿都城卒以誅夷是章帝貸竇憲一人之罪乃所以釀竇氏一宗之禍也豈曰愛之云哉雖然縱使章帝制之於終已不若文帝教之於始為得也光武時隂識以征伐軍功增封叩頭曰天下初定將帥有功者衆臣託屬掖庭仍加爵邑不可以示天下帝甚善之及顯宗立為皇太子以識守執金吾輔導東宫帝巡郡國留鎮京師委以禁兵雖極言正議及與賓客語未嘗及國事臣良勝曰崔駰嘗言外戚所以獲譏於時垂愆於後蓋在滿而太溢位有餘而仁不足也漢興以後迄於哀平外家二十保族全身四人而已真德秀又謂田蚡驕橫僅而獲免丁氏之禍見於身後其獲全者二家而已戚里之難全亦至於此則隂識之自全者宜如是也宋太宗朝李繼隆特被親信每征行必委以機要真宗以元舅之親恩禮甚篤然能謙謹保身明德皇后寢疾欲面見之上促其往繼隆但於萬安門外拜箋終不入又嘗命諸王詣第不設湯茗苐假從行茶爐烹飲焉臣良勝曰宋朝家法最正外戚不預政事其一也又若繼隆周慎若此此宋之后族保全盛節與國咸休宜也嘗考漢之戚屬以權寵敗者十有六家而吕氏王氏為盛後漢則梁竇氏晉楊賈氏唐武韋氏猶吕王也其罪之及一人之禍未足深悼蓋有數十年之愛不償一日之慘甲第厚資無赦同坎之悲豈不哀哉人君而知此必思所以保全於其始戚屬而知此必思所以自全於其終漢元帝寢疾太子希得進見駙馬都尉史丹視疾候上間獨寢時直入卧內頓首伏青蒲上涕泣言曰皇太子以嫡長立積十餘年名號繫於天下百姓莫不歸心臣子見定陶王雅素愛幸今者道路流言以為太子有動搖之議審若此公卿以下必有死爭不奉詔臣願先賜死以示羣臣天子素仁不忍見丹涕泣言又切至上意大感喟然太息吾日困劣而太子兩王幼少意中戀戀亦何不念乎然無此議且皇后謹慎先帝又好太子吾豈可違指駙馬都尉安所受此語丹即卻頓首曰愚臣妄聞罪當死衛尉馬廖慮美業難終上疏勸成德政曰夫改政易風必有其本傳曰吳王好劒客百姓多創瘢楚王好細腰宫中多餓死長安語曰城中好高髻四方髙一尺城中好廣眉四方且半額城中好大袖四方全匹帛斯言如戲有切事實臣良勝曰內戚之善諫有若史丹外戚之陳言有若馬廖蓋不徒保族宜家蓋亦有益於人國也賢可少乎但丹以父任為中庶子廖亦將軍援之後也然則連姻肺腑必擇文武世德世澤之厚者其教之也有數其制之也無難又所以為親親之先事也乎國朝李文忠父貞尚曹國長公主以舍人領軍策應器量沈閎人莫測其際臨阻遇敵膽氣益壯故敵無不勝及釋兵居家恂恂若儒士嘗師金華范祖幹胡翰講明性理之學出為詩辭皆壯偉可觀至音樂華美事泊如也臣彭韶贊曰勳戚之胄一世人豪淹貫群籍曾是六韜甲囊盡赤家有戰袍宋元故都兼舉并包宣威萬里實為爾勞庸建上公以國於曹追王廟食後裔寵褒臣良勝曰昔唐太宗以長孫無忌為司空因辭曰臣沗預外戚恐天下謂陛下為私太宗曰吾為官擇人惟才是與茍或不才雖親不用今日之舉非私親也夫無忌本太宗布衣交凡舉大事決策為多是固不以親為嫌也文忠於開創之際戰功茂著年方四十即解兵務祖宗之為後世慮也深矣太宗無忌雖不為失而武三思韋月將楊國忠之輒干大政未必不以無忌為故實也大扺守天下與取天下其道異也取之也以權守之也以正取之為英雄略守之為子孫計其運用固有難以齊者降及英廟時乃有以戚里典營務者大學士李賢言於上曰祖宗以來外戚不與政今若此不審太后知乎曰太后正不樂此初為關防之説至今獨悔賢奏曰此見太后之德但後不可為例嗚呼祖宗之立法後世之守法斯盡之矣臣故録之以備考焉右衍親親之義中庸衍義卷十
