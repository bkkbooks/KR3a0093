body:
  text: 中庸衍義卷十七明夏良勝撰平天下之義創業之治中興之治守成之治經常之治咸彖曰天地感而萬物生聖人感人心而天下和平觀其所感而天地萬物之情可見矣程頥曰天地二氣交感而化生萬物聖人至誠以感億兆之心而天下和平天下之心所以和平由聖人感之也觀天地交感化生萬物之理與聖人感人心以致和平之道則天地萬物之情可見矣感通之理黙而觀之可也繫辭曰易簡而天下之理得矣天下之理得而成位乎其中矣朱熹曰成位謂成人之位其中謂天地之中至此則體道之極功聖人之能事可以與天地參矣臣良勝曰聖人之生得天地理氣之精也聖人之位代天地生成之位也而其所以參天地者一法天地簡易之道也天以易知非徒易也以其無所為而為雖有所為猶謂之易也地以簡能非徒簡也以其有所因而成雖有所成猶謂之簡也是故天地運化聖人成能其理一也子曰大哉堯之為君也巍巍乎惟天為大惟堯則之蕩蕩乎民無能名焉巍巍乎其有成功也煥乎其有文章尹氏曰天道之大無為而成唯堯則之以治天下故民無得而稱所可名者其功業文章巍然煥然而已子曰無為而治者其舜也歟夫何為哉恭已正南面而已矣朱熹曰無為而治者聖人徳盛而民化不待其有所作為也獨稱舜者舜紹堯之後而又得人以任衆職故尤不見其有為之迹也恭已者聖人敬徳之容既無所為則人之所見如此而已臣良勝曰堯之則天舜之恭已即所謂簡易之理也其感人心而天下和平猶天地也是則所謂性之也故楊時曰堯舜所以為萬世法亦率是性而已所謂率性循天理也外邊用計用數假饒立得功業只是人欲之私與聖賢作處天地懸隔禹貢曰祗台徳先不距朕行蔡沈曰禹平水土定土賦建諸侯治已定功已成矣當此之時惟敬徳以先天下則天下自不能違越我之所行也臣良勝曰地平天成萬世永賴禹所以治平天下盖有功之可言非若堯舜之可以無為而治也即如治水之事乃開闢以來未除之害鯀治之九年績用弗成禹繼之而八年於外三過門而不入胼手胝足乃克告成自非徳為之先則民力之作勞民心之弗順民言之胥動而距行者或亦未免也今而東漸於海西被流沙朔南暨聲教訖於四海非盛德之感何以至此太甲曰先王顧諟天之明命以承上下神祗社稷宗廟罔不祗肅天監厥德用集大命撫綏萬方蔡沈曰伊尹言成湯常目在是天之明命以奉天地神祗社稷宗廟無不敬肅故天視其徳用集大命以有天下撫安萬邦大明詩曰維此文王小心翼翼昭事上帝聿懐多福厥德不回以受方國朱熹曰小心翼翼恭慎之貎即前篇之所謂敬也文王之德於此為盛昭明懐來回邪也方國四方來附之國也下武詩曰媚兹一人應侯順德永言孝思昭哉嗣服朱熹曰言天下之人皆愛戴武王以為天子而所以應之惟以順德是武王能長言孝思而明哉其嗣先王之事也臣良勝曰禹湯文武所以治天下者皆以德為之先也是所以為易簡之道也漢髙祖不修文學而性明達好謀能聽自監門戍卒見之如舊初順民心作三章之約天下既定命蕭何次律令韓信申軍法張蒼定章程叔孫通制禮儀剖符作誓丹書鐡劵金匱石室藏之宗廟雖日不暇給而規模𢎞逺矣班彪王命論曰盖在髙祖其興也有五一曰帝堯之苖裔二曰體貎多竒異三曰神武有徵應四曰寛明而仁恕五曰知人善任使加之以信誠好謀達於聽受見善如不及用人如由已從諫如順流趨時如響起當食吐哺納子房之䇿㧞足揮洗揖酈生之語悟戍卒之言斷懐土之情髙四皓之名割肌膚之愛舉韓信於行陣㧞陳平於亡命英雄陳力羣䇿畢舉此髙祖之大畧所以成帝業也唐太宗問侍臣曰帝王創業與守成孰難房𤣥齡曰草昧之初羣雄並起角力而後臣之創業難矣魏徵曰自古帝王莫不得之於艱難失之於安逸守成難矣上曰𤣥齡與吾共取天下出百死得一生故知創業之難魏徵與吾共安天下嘗恐驕奢生於富貴禍亂生於所怱故知守成之難然創業之難既已徃矣守成之難方與諸公慎之曽鞏曰太宗有天下之志有天下之才又有治天下之效而不得與先王並者法令之行擬之先王未純也禮樂之具田疇之制庠序之教擬之先王未備也躬行戰陣之間戰必勝攻必取天下莫不以為武而非先王之所尚也四裔萬古所未及以致者莫不服從天下莫不以為盛而非先王之所務也太宗之為政於天下得失如此臣良勝曰唐太宗創業之主也而迹兼守成漢光武中興之主也而志同創業才略相當亦有慚徳而太宗甚焉宋太宗既誅李筠李重進等詔趙普曰天下自唐季以來數十年間帝王凡易八姓十二君僣竊相踵鬬戰不息生民塗地其故何也吾欲息天下兵建國家久長之計其道何如普對曰陛下之言及此天地神人之福也此無他方鎮太重君弱臣强而已今欲治之宜稍奪其權制其錢穀收其精兵天下自安矣臣良勝曰宋祖所以建天下之治趙普所以輔天下之治莫大於收藩鎮之權前可以洗五季之弊後可以肇四百年之基自是一兵一民貫錢斛穀皆朝廷主之文吏掌之君子謂其始也足以戢奸雄之變而其後也亦漸無以禦外敵之驕持衡之勢輕重然也若其深長之慮尤有見於遷都之議其初幸洛陽都民垂白者曰我輩少經亂離不圖今日復見太平天子儀衛帝欲畱都而晉王諫止太祖曰遷河東未已終當都長安且曰據榆山之勝而去省冗兵循用漢故事以安天下嗚呼此策果行則南渡之禍必免矣盖天下利害每慎於切身西都則邇敵邇敵則有懼心懼則善心生而所以為謀者日宻惟其逺敵是以緩禍緩而怠怠而忘之故曰待爾家議論定吾已過河矣是亦死地而後生亡地而後存不獨兵家之法為然臣幸其收兵之謀成於趙普而恨遷都之議阻於晉王也元世祖召史天澤問治道天澤具疏言當立省部以正紀綱設監司以督諸郡霈恩澤以安反側退貪婪以任賢能頒俸祿以養㢘禁賄賂以防奸悉聽之次第舉行臣丘濬曰嗚呼世道極變之大有三曰臣而僭君之位也婦而當陽之剛也小人而敗君子之成功也自秦漢以来僭君之位有莽温焉然其惡猶顯著也當陽之位有武曌焉然其罪猶共見也至於國家大計所賴一二公忠體國之君子相與謨謀於廟堂之上而彼小人者隂賊險詖或忌其勛名或慮其不便於已乃従中而撓敗之致事僨於崇朝而禍延於百世嗚呼有國者可不慎哉聖祖謂侍臣曰前代庸君暗主莫不以垂拱無為藉口縱恣荒寧不親政事孰不知治天下者無逸然後可逸若以怠惰荒寧為垂拱無為帝舜何以曰耄期倦於勤大禹何以惜寸隂文王何以日昃不食且人君日理萬幾怠心一生則庶事壅滯貽患不可勝言朕即位有年常以勤勵自勉達旦則臨朝晡時而後還宫夜卧不能安席披衣而起或仰觀天象見一星失次即為憂惕或量民事有當速行者即次第筆記待旦發遣朕非不欲暫安但祗畏天命不敢故爾朕言及此者但恐羣臣以天下無事便欲逸樂股肱既墮元首叢脞民何所賴書曰功崇惟志業廣惟勤爾羣臣但能以此為勉朕無憂已臣良勝曰天何為哉而四時行焉百物生焉日月星辰之運風雷雨露之施何莫而非乾健不息者為之也惟有所不為而後可以有為惟有所為而後可以無為聖人之言如天也臣也飲江河止於知足繪天地難於為容也聖祖御東閣宋濂王禕進講大學𫝊之十章至有土有人濂等反覆言之聖祖曰人者國之本德者身之本徳厚則人懐人安則國固故人主有仁厚之德則人歸之如親父母人心既歸則有土有財自然之理也君徳不足以懐衆雖有財亦何用哉臣良勝曰濂等反覆於有人有土者后非衆罔與守邦民為天下本也陳謨之意臣道之當然也聖祖歸重於修德者何以守位曰仁徳為天下先也正己之意君道之當然也此上下交而德業成也大明日歴序畧曰太祖挺生於南服而致一統華裔之盛自天開地闢以來惟上為然其功髙萬古一也元季繹騷奮起於民間以圖自全初無黄屋左纛之念繼閔生民塗炭始取土地於羣雄之手而安輯之較之於古如漢髙帝其得國之正二也平生用兵百戰百勝未嘗挫䘐以至繼天出治經綸大經皆由一心運量文臣武將不過仰受成算而已其獨秉全智三也欽畏天命一動一靜森若神明在上及至郊祀存於心目有赫其臨甚至不敢仰視惠鮮小民復恐一夫不獲其於貪墨吏及豪黠之徒有加害者必威之以刑其敬天勤民四也后妃居内不預一髪之政外戚循理畏法無敢恃寵以病民貂璫之輩惟給掃除之役此皆古昔所深患今絶無之其家法之嚴五也兵戎國之大權悉歸之朝廷有事征伐則詔大帥佩將印領之既旋則上章綏歸士卒單身還第其兵政有統六也臣良勝曰史臣贊漢祖之興有五是以其取天下者言也先儒謂宋祖家法度越古今者五是以其守天下者言也我聖祖以漢祖所以取者取之以宋祖所以守者守之殆恐日歴所記所序尚有不盡名言者也聖子神孫茍思所以取之之難則知所以守之之不易祖述憲章又何事於他求哉歸而求之有餘師矣右衍創業之治廿誓曰有扈氏威侮五行怠棄三正天用勦絶其命今予惟恭行天之罰蔡沈曰威暴殄之也侮輕忽之也鯀汩五行而殛死況於威侮之者乎三正子丑寅之正也夏正建寅怠棄者不用正朔也有扈氏暴殄天物輕忽不敬廢棄正朔虐下背上獲罪於天用勦絶其命今我伐之惟敬行天之罰而已臣良勝曰孟子言啟賢能敬承繼禹之道而初立即有有扈之師史記謂啟立有扈不服而孔穎達附㑹其說謂堯舜受禪啟獨繼父故不服是大不然舜初受禪之時亦有有苗之伐又豈以受禪而不服耶盖天下治亂每每相尋堯舜禹三聖繼治且數百年而有扈之逆命適在啓立之初啓能奉天行罰是即克詰戎兵迹禹方夏此繼治之大者也能勝乎此則其率舊章守先業乃所優為者爾太甲曰皇天眷祐有商俾嗣王克終允德實萬世無疆之休蔡沈曰太甲不義有若性成一旦翻然改悟是豈人力所至盖天命眷商隂誘其衷故嗣王能終其德向也湯緒幾墜今其自是有永豈不為萬世無疆之休乎臣良勝曰天地之道為大矣隂陽之氣為正矣然而清寧或不能恒愆伏時有所倚故豳風七月之詩言藏冰之道而周官凌人之職藏周用徧亦能燮調愆伏以和隂陽之氣以順天地之道也然則人君不能無過亦在大臣調燮而改之則復於無過矣成湯聖人也亦曰改過不吝太甲既曰欲敗度縱敗禮而伊尹正之翻然改過君子謂其如日月昏蝕一復其舊光采炫燿萬景俱新不在成王之下然則人君不可自棄於過而不知圖改人臣亦不可委君於過而謂其不及改也故曰吾君不能謂之賊閔予小子詩曰念兹皇祖陟降庭止維予小子夙夜敬止於乎皇王繼序思不忘朱熹曰承上文言武王之孝思念文王常若見其陟降於庭猶所謂見堯於墻見堯於羹也皇王兼指文武也言我之所以夙夜敬止思繼此序而不忘爾康王之誥曰乃命建侯樹屏在我後之人今予一二伯父尚胥繼顧綏爾先公之臣服於先王雖爾身在外乃心罔不在王室用奉恤厥若無遺鞠子羞蔡沈曰天子稱同姓諸侯曰伯父康王言文武所以命建侯邦植立藩屏者意盖在我之後人也今我一二伯父庶幾相與顧綏爾祖考所以臣服於我先王之道雖身守國在外乃心當常在王室用奉上之憂勤其順承之毋貽我稚子之恥也臣良勝曰創業之治君用乎臣者也守成之治君資乎臣者也創業之主重於法天守成之主重於法祖法祖亦所以法天也盖祖之所法以為治者天也其理一也成康繼治汲汲訪咨於臣一則曰繼緒皇王一則曰服先王無一毫自聖而輕臣下之心是以四方賔服海内晏然百姓興於禮樂刑措不用有唐虞之風嗚呼文武成康聖賢相繼二百餘年重熙累洽卜年七百之歴宜其過矣漢文帝躬修淵黙而將相皆舊功臣少文多質懲亡秦之政論議務在寛厚恥言人之過失化行天下告訐之俗易吏安其官民樂其業畜積歲增户口浸息風流篤厚禁網疏濶罪疑者輕是以刑罰太省至於斷獄四百有刑措之風焉叙傳曰太宗穆穆允恭淵黙化民以躬率下以徳農不供貢罪不收孥宫不新館陵不崇墓我徳如風民應如草國富刑清登我漢道漢書曰孔子稱斯民也三代之所以直道而行也信哉周秦之弊網宻文峻而奸軌不勝漢興掃除煩苛與民休息至於孝文加之以恭儉孝景遵業五六十載之間至於移風易俗庶民醇厚周云成康漢言文景美矣胡寅曰文景養民厚矣稽諸仲尼之言則亦庶富而已未有以教之也班固謂孝文恭儉景帝遵業周云成康漢言文景美矣竊以為不然文帝寛厚長者以德化民無事則謙抑如不能有難則英氣奮發景帝刻薄任數以詐力下御平居則誅賞肆行緩急則懦懼失措其大致懸絶如此獨節儉不妄費育民以致豐富一事為克遵前業矣夫豈可與成康同德美稱哉胡安國曰嘗反覆真宗首末論之景德以前足為繼世之賢君祥符以後不過為矯誣上天之主吕氏云景德以前之相吕端張齊賢李沆吕蒙正畢士安㓂準王旦皆君子而沆之賢為最祥符以後之相王欽若陳堯叟馮􅀈丁謂曹利用皆小人而欽若之姦邪為最雖有向敏中李廸二賢已不逾時而去矣吁以數君子成之不見其有餘以一小人敗之不見其不足相道有闗于君德之成敗如此夫臣良勝曰宋太宗削平海内功烈炳然繼世之君斯亦賢者但其負兄簒國不可以言繼統矣故有取於真宗仁宗也宋仁宗遺制下日雖深山窮谷莫不奔走悲號而不能止吕仲曰我仁祖四十二年深仁厚澤刑以不殺為威財以不畜為富兵以不用為功人才以不作聰明為賢以寛厚待民以恩禮待士夫而以至誠待異國此蘇文忠公謂社稷長逺終必賴之元仁宗天性慈孝聰明恭儉通達儒術平居服御質素澹然無欲不事遊畋不喜征伐不崇貨利有司奏大辟為之慘怛者久之臣良勝曰蒙古之性素習以慘戮為恒若是可以言仁者固有取也文皇外嚴内仁而雄才大略條理精宻知人善任使推誠待下聴言之際明睿所照不待其盡洞見底藴臨機剛果裁制大事數語而决與下人言開心寫誠表裏明白盖唐虞三代以來若漢之髙帝世祖唐之文皇宋之太祖其寛明大度聰明文武閎逺之規乾剛之用皆兼而有之右衍守成之治夏少康有田一成有衆一旅能布其德而兆其謀以收夏衆而撫其官職夏有舊臣靡自有鬲氏收二國之燼舉兵滅浞立少康少康使其臣女艾滅澆於過使其子后杼滅豷於戈乃歸故都於是夏道復興諸侯來朝胡一桂曰少康﨑嶇亂離之間復禹迹還舊都祀夏配天不失舊物而有夏中興焉後之言中興者當自少康始少康其中興之賢君靡其中興之賢臣乎胡安國曰在易之困曰困亨因困窮而致亨也夫困於心衡於慮而後作徵於色發於聲而後喻此正憤悱自强之時而夏少康衛文公越勾踐燕昭王四君子者由此其選也無逸曰其在髙宗時舊勞於外爰暨小人作其即位乃或亮隂三年不言其惟不言言乃雍不敢荒寧嘉靖殷邦至於小大無時或怨肆髙宗之享國五十有九年蔡沈曰髙宗武丁也未即位之時其父小乙使久居民間與小民出入同處故於小民稼穡艱難備嘗之也雍和也發言和順當於理也嘉美靖安也嘉靖者禮樂教化蔚然於安居樂業之中也漢文帝與民休息謂之靖則可謂之嘉則不可小大無時或怨者萬民咸和也乃雍者和之發於身嘉靖者和之發於政無怨者和之著於民也髙宗無逸之實如此故亦有享國永年之效也周宣王時召公周公輔王修政法文武成康之遺風王命方叔征伐玁狁申伯仲山甫順天下更失理喻德教舉遺士海内翕然向風諸侯復宗周臣良勝曰宣王側身修行興衰撥亂王化復行誠中興之令主也但其不藉千畝虢公諫之弗納也料民太原仲山甫諫之弗納也殺杜伯非罪左儒爭之曰爾别君而異友也儒曰君道友逆則順君以誅友友道君逆則順友以違君率并左儒殺之夫其愎諫而至於殺其臣僅免於身子幽王嗣立遂罹犬戎之禍是亦宣王有以遺其憂者也贊曰孝宣之治信賞必罰綜核名實政事文學法理之士咸精其能至於技巧工匠器械自元成間鮮能及之亦足以知吏稱其職民安其業也遭值羌戎乖亂推亡固存伸威北討呼韓慕義稽顙稱藩功光祖宗業垂後裔可謂中興侔徳殷宗周宣矣吕祖謙曰觀宣帝之為君綜核名實信賞必罰其所以功光祖宗業垂後嗣者盖勵精之效初非申韓之功也至於用恭顯而啟元帝之信宦者貴許史而啟成帝之任外戚殺趙盖韓楊而啓哀帝之誅大臣開三大釁終以亡國此豈非擇術不審之流弊乎故論其功則為中興之君論其罪則為基禍之主其功罪相半盖失於欲速而用申韓也光武雖以征伐濟大業及天下既定乃退功臣而進文吏明慎政體總攬權綱量時度力舉無他事故能恢復前烈身致太平蘇軾曰世祖上懲韓彭之難中鑒七國之變下悼王氏之禍於是盡侯諸將而不以任事裁減同姓之封而黜三公之權以為前世之弊盡去矣及其衰也宦官之權盛而黨錮之難起士大夫相與搤腕而遊談者以為天子一日誅宦官而解黨錮則天下猶可以無事於是外召諸將而内脅其君宦官既誅而董卓曹操之徒亦因以亡漢漢之所以憂者凡六變而其亂與亡輙出於其所不憂而終不可備由此觀之治亂存亡之勢其皆有以取之抑將不可推如江河之推移其勢自有以相激而不可救與其所可以理推力救而莫為之也昭烈章武元年蜀中傳言漢帝已遇害於是漢中王發䘮制服謚曰孝愍皇帝夏四月即位於武擔之南大赦改元以諸葛亮為丞相許靖為司徒立宗廟祫祭髙皇帝以下臣良勝曰昭烈之所以能中興者大端見於草廬之言曰奸臣竊命欲信大義於天下自是帝王器度所謂他人千言萬語說不盡只此兩言而决之無遺藴矣且嘗於劉表坐中流涕曰平常身不離鞍馬髀肉皆消今不復騎髀裏肉生日月如流老將至矣而功業不建是以悲爾有如是之才有如是之志安得不興然於此益見封建為有道之長而髙祖貽謀之善也懲秦孤立大封同姓文景繼而行之光武之興出於長沙定王之後昭烈之興出於中山靖王之後仆者雖在人之所共知而興者乃出於人之所不見故姦雄窺竊神器垂涎染指卒莫敢動盖懼宗室之胄有如光武昭烈者出於其間是故英雄猶有所輔而姦邪盖有所憚也唐憲宗時李師道所養客說師道曰天子所以銳意誅蔡者武元衡贊之也請宻徃刺之元衡死則他相不敢主其謀爭勸天子罷兵矣師道資給遣之六月天尚未明元衡入朝所居靖安坊東門有賊自暗中殺之取其顱骨而去又入通化坊撃裴度傷其首度氊㡌厚得不死京城大駭宰相出入加金吾騎士或請罷度官以安恒鄆之心上怒曰若罷度官是姦謀得成朝廷無復紀綱吾用度一人足破二賊以度為中書侍郎同平章事度上言淮西腹心之疾不得不除且朝廷業已討之兩河藩鎮䟦扈者將視此為髙下不可中止上以為然悉以用兵事委度臣良勝曰唐憲宗所以稱中興者只此平淮蔡一事而淮蔡所以平者用裴度一人昔韓愈上言曰淮西三小州殘弊困劇之餘而當天下之全力其破敗可立而待然則未可知者在陛下斷與不斷爾今觀用一度足破二賊之言則淮蔡功惟斷乃成有信然者矣未幾而皇甫鎛程异以言利得幸裴度以朋黨見疑求仙迎佛卒以弑終分明為兩截人利令智昏有如是哉宋髙宗謂趙鼎曰近將士致勇爭先諸路守臣亦翕然自效乃朕用卿之力也鼎謝曰皆出聖斷臣何力之有焉或問鼎曰金人傾國來攻衆皆洶懼公獨言不足畏何也鼎曰敵衆雖盛然以劉豫邀而來非其本心戰必不力以是知其不足畏也帝語張浚曰趙鼎真宰相天使佐朕中興可謂社稷之幸臣良勝曰髙宗為康王時質於金左右驚震而意思安閑射命連中金疑其將家子還之及汴京失守復遣徃質亦不辭此其器畧足稱中興之任有李綱張浚趙鼎之相宗澤韓世忠劉錡岳飛之將竟不能建中興之績者前阻於遷議則黄潛善汪伯彦為之也後阻於和議則秦檜為之也髙宗首殺陳東歐陽徹以失天下士大夫之心張浚殺曲端秦檜殺岳飛以失天下將士之心故桀紂之失天下失其心也如此而謂天佐中興為社稷之幸乃為不幸也右衍中興之治繋詞曰黄帝堯舜垂衣裳而天下治盖取諸乾坤朱熹曰乾坤變化而無為臣良勝曰易之制器尚象此最大者以其器御而制治也然則伏羲時已作易矣衣裳之制猶有未立歴神農至黄帝堯舜而後垂衣裳以治天下盖創制變制在聖人猶以為難也故必通變而民不倦神化而民宜之乃能變通以垂久然則伏羲神農未變衣裳之制亦時未可變爾程頥謂據如此事只是一箇聖人都做得了然必須數聖人然後成亦因時而已衣裳之制上下之辨天地之位也元黄之采天地之色也君臣上下尊卑貴賤皆於是乎辨是以定民志而天下治也是衣裳制於黄帝至舜乃觀古人之象日月星辰山龍華蟲作㑹宗彛藻火粉米黼黻絺繡以五采章施於五色作服是神農以前非不能為黄衣元裳之制也必至黄帝而後制堯以前非不能為五采五色之服也必至舜而後備是皆神化之道亦至是而後適變通之宜爾後世人君動有制作其亦審於宜民之意而後可子曰為政以德譬如北辰居其所而衆星共之朱熹曰為政以徳則無為而天下歸之其象如此范氏曰為政以徳則不動而化不言而信無為而成所守者至簡而能御煩所處者至靜而能制動所務者至寡而能服衆禮運曰大道之行也天下為公選賢與能講信修睦故人不獨親其親不獨子其子使老有所終壯有所用㓜有所長鰥寡孤獨廢疾者皆有所養男有分女有歸貨惡其棄於地也不必藏於己力惡其不出於身也不必為己是故謀閉而不興盗竊亂賊而不作故外户而不閉是謂大同臣良勝曰天地無為而氣自運也聖人無為而化自成也故大同之治主治於上從治於下皆非有所為而為之者也說者以五帝為大同禹湯文武成王周公為小康為非聖人之言也然天地氣運愈厚則愈長愈長則愈生愈生則愈薄伯之不迨於王王之不迨於帝帝之不迨於皇自然節限邵雍於經世書推算有不能易者也洪荒之世譬之沃土土而生木而根荄而枝葉而暢茂而花實實而繁繁而稀稀而小小而枝葉先瘁瘁而枯枯而根傷地力且盡即如天地其初混沌既而開闢而生人物窮極而天地亦有蔽塞是故古今有不相及亦氣數使然其最可見者於文義間識之觀唐虞之書則三代訓誥不可並也觀孔孟之文則先秦兩漢不足言矣觀唐史不若漢史宋史不若唐史元史不若宋史豈人性稟學術有異乎哉天地之氣得於人者亦自漸薄豈獨治道為然哉雖然君子任治以理不可委之數也聖人耐以天下為一家以中國為一人者非意之也必知其情辟於其義明於其利達於其患然後能為之陳澔曰非意之謂非以私意臆度而為之也必是知其有此七情也故開辟其十義之途而使之忠之明達其利與患之所在而使之知所趨知所避然後能使之為一家為一人也臣良勝曰天下中國億兆其人其生於天地則一心也心之属氣則為情屬理則為義狥情而失義則利害昏矣否則無不自明者聖人知天下中國之心猶已也以己之情度人之情以己之義達人之義以己之所利知人之利而聚之以己之所害知人之害而逺之則天下中國運之一心而有餘矣大學古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物臣良勝曰自天子至於公卿大夫元士嫡子與凡民之俊秀者皆有天下國家之責故其所以為學者皆以明明德於天下為極致也然其用力之地則自格物致知始盖天下國家與吾身皆物也天與人心之知足以具衆理而天下國家與吾身運之一心之知皆吾心之知也惟不能格此物則不能致吾之知而所以治身以施之天下國家者皆自昧矣若此物理皆明而心之全知獨秉則所以誠意正心以修吾身而施之國家天下舉而措之爾孟子曰人皆有不忍人之心先王有不忍人之心斯有不忍人之政矣以不忍人之心行不忍人之政治天下可運之掌上朱熹曰天地以生物為心而所生之物因各得天地所生之心以為心所以人皆有不忍人之心也衆人雖有不忍人之心然物欲害之存焉者寡故不能察識而推之政事之間惟聖人全體此心隨感而應故其所行無非不忍人之政也孟子曰堯舜之道不以仁政不能平治天下朱熹曰仁政者治天下之法度也臣良勝曰孟子七篇無非仁義之說而仁義所以用者無非治天下之道也所謂仁者不忍人之心也推之以為政者義也然是心夫人之所必有推而極之則堯舜之治亦不過善推此心之所為而已矣然恐人不盡知又指所易見者示之曰乍見孺子入井而有怵愓惻隱之心是不忍也若視天下猶夫孺子也又安有一夫不被其澤一物不得其所者哉國語曰興王賞諫臣逸王罰之古之王者德政既成又聽於民於是乎使工誦諫於朝在列者獻詩使勿兠風聽臚言於市辨妖祥於謡考事於朝問謗譽於路有邪有正之盡戒之術也臣良勝曰唐虞君臣相與都俞吁咈未有諫之名也至禹而後懸器以待天下之士曰教寡人以道者擊皷諭以義者擊鐘告以事者振鐸語以憂者擊磬有獄頌者揺鞀然尚未有諫之官也然則古者諫無官欲其人皆有諫而無所限又賞之而使諫夫安得不興後世以諫名官則固限之以職諫復不聽而或罰之夫安得不逸善乎唐髙祖語杜正倫等曰我聞神龍可擾以馴然頷下有逆鱗嬰者死人君亦有之卿等遂犯吾鱗禆闕失朕豈慮有危亡哉思卿至此故舉酒以相樂嗚呼人臣進諫亦難矣而人主每以受諫為難亦獨何哉賈誼曰為人主計者莫如先審取舍取舍之極定於内而安危之萌應於外矣臣良勝曰天下之道二出乎此則入乎彼矣於事則有善惡於人則有忠邪於極則有安危治亂而已如其所舉者善而所用者忠雖未必治而所以治者正在也所舉者惡而所用者邪雖未必亂而所以亂者在是也與治同道罔不安與亂同道罔不危明者覩於未萌是故有重於取舍之審也然而所以審而決之非茍然也亦必有道也臣聞程頥有言曰君道稽古正學明善惡之歸正忠邪之分趨道之正又在君志先定定志者以聖人之訓為必當從先王之政為必可法而已嗚呼由賈誼之言則有以决取舍之幾由程頥之言斯有以端取舍之本董仲舒曰王者欲有所為宜求其端於天天道之大者在隂陽陽為德隂為刑刑主殺而德主生是故陽常居大夏而以生育長養為事隂長居大冬而積於空虚不用之處此見天之任德而不任刑也臣良勝曰仲舒之意重於端之一字端者事之初也事行於末視其初意固有違之者矣王者德刑以象隂陽雖若並用及其用也而刑勝於德者居多是以求其端於天則制刑之物皆不使勝於德故曰刑期於無刑也春秋傳曰爵賞以類天之生育刑罰以類天之震曜夫震曜者非以殺物也雷行天曰無妄先王以茂對時育萬物雷之動和之極而萬物皆甲拆也是故刑以禁暴以行仁也刑以治惡以安善也刑以靖亂以制治也於刑之之中恒存德之之意此則大冬嚴寒成物之終為生物之始德刑之大用也王道之大成也仲舒謂積於空虚無用之地臣故思以廣其說劉向曰道之所在天下歸之德之所在天下貴之仁之所在天下愛之義之所在天下畏之臣良勝曰漢之宗向為最賢者也向之言斯為最粹者也初以望之薦引給事於中而成帝方以宏恭石顯明習朝章專寵無比所謂刑餘周召法律詩書而道德仁義之言宜乎枘鑿之不入矣未幾望之下獄而向亦無以自容故又有言曰大道容衆大德容下聖人寡為而天下理是皆有為言之也而成帝竟不知悟其不足以有為可知矣君子謂王政君之寵成於成帝之世而王莽簒漢由於政君是故亡漢者成帝非哀平也揚雄曰天下為大治之在道不亦小乎四海為逺治之在心不亦近乎臣良勝曰揚雄見道之言此其最者也然道者心所具之理而行之者也心即道道即心也言心不言道則無政矣言道不言心則無本矣故曰以仁心仁聞而行先王之道是也諸葛亮曰親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頺也臣良勝曰讀出師二表而不為之流涕者其為人必不忠也盖亮之平生大節惟見於二表表之肯綮大義惟在於此數言非特以決漢之興亡殆徃古之斷案後世之龜鑑也然此特其言爾若開誠心布公道集衆思廣忠益又其事業之本先儒謂其有王佐之心不獨以其言已也陸䞇曰君天下者以天下之心為心而不私其心以天下之耳目為耳目而不私其耳目故能通天下之志盡天下之情臣良勝曰蘇軾嘗言陸䞇奏議論深切於事情言不離乎道德若斯言是也盖天之立君非為君也為天下也則天之心本以公也人君視天下為公乃所以奉天之公也若使天下志有不通而情有不盡皆自私其耳目也私其耳目由私其心也私其心由以天下為己私也此盖蕩蕩平平之道䞇何以語德宗也人君而不以王道自任非君也人臣而不以王道望其君非臣也德宗以苛刻為能而䞇之言則忠厚也德宗以猜忌為術而䞇之言則推誠也德宗好用兵而勢之言則消兵也德宗善畜積而䞇之言則散財也有臣如此而忠州之行一斥不復勢亦何負於學何負於天子也哉韓愈曰善醫者不視人之肥瘠察其脈之病否而已矣善計天下者不計天下之安危察其紀綱之治亂而已矣臣良勝曰嘗聞蘇軾上書神宗曰世有尫羸而夀考亦有盛壯而暴亡若元氣猶存則尫羸而無害及其已耗則盛壯而愈危是以善養生者慎起居節飲食導引闗節吐故納新不得已而用藥則擇其品之上性之良可以久服而無害者則五臟和平而夀命長不善養生者薄節慎之功持吐納之效厭上藥而用下品伐真氣而助彊陽根本已危僵仆無日天下之勢與此無殊噫味愈之言則有以審死生治亂之幾矣味軾之言則有以制死生治亂之道矣劉蕡曰為君者所發必正言所履必正道所近必正人臣良勝曰蕡之試䇿直節正論冠絶古今其切要之論則在近正人也正人得近則所以正君者自有其道而正言正道相因而善故曰一正君而國定矣蕡之意盖在於勸主逺絶宦竪有司畏憚意以抑之是以當時有劉蕡下第我輩登科寧無顔厚之嘆噫斯言一開流布萬世榮於狀元宰相多矣後以指蕡為戒而迎合新法和議以取上第者所得能幾何哉歐陽修曰為人君者以細務而責人専大事而獨斷此致治之要術也納一言而可用雖衆說不得以阻之此力行之果斷也知此二者天下無難治矣臣良勝曰天下之治非一人之治也天下之言非一人之言也修之事宋當仁宗英宗之時庸有主威未斷事或阻於衆議如濮王典禮者是修乃一人之言非所以為天下之治也堯之禪舜事孰有大於此而咨四岳既薦舜而復試之豈以獨斷為賢乎謀及卿士謀及庶人謀及龜筮豈不以阻衆說者為是乎唐太宗征遼似獨斷矣而終悔不從魏徵之言宋神宗之新法似無阻矣卒有誤於安石之僻故臣未敢以修之言為然邵雍曰聖人所以能立無過之地者以其善事乎心者也臣良勝曰心者天君也天君泰然百體從令故善事乎心則身之無過也必矣然無身過易無心過難恒人之無過易人君之無過難恒人之過辱於一身人君之過播及於天下矣宴安肇荒滛之迹珍異啓奢泰之端沾詞闢僥倖之途顧語來讒賊之口名器導僭偪之防威福移陵替之漸是故人主立無過之地視恒人萬倍其難所以善事乎心者必萬倍其功而後可也程顥曰先王之世以道治天下後世只是以法把持天下臣良勝曰治道公案歴千萬世只此兩言斷決無遺議矣所謂道者即得天理之正極人心之安無所為而為之者王者之道也法者假仁義之偏建事為之末有所為而為之者霸者之術也若顥者誠有得於聖賢之學欲效於時以為帝王之治者故常陳十事於朝曰師傅曰六官曰經畧曰鄉黨曰貢士曰兵役曰民食曰四民曰山澤曰分數且言曰無古今無治亂如生民之理有窮則聖人之法可改茍若徒知泥古而不能施之於今姑欲狥名而遂廢其實此則陋儒之見何足以論治道哉嗚呼以周程而不得行於北宋以孔孟而不得行於東周豈非天未欲平治也哉程頥曰治身齊家以至平天下者治之道也建立治綱分正百職順天時以制事至於創制立度盡天下之事治之法也聖人治天下之道在此二端而已矣臣良勝曰頥之言即顥之意也體用貴於一原道法須於兼備治非以道為本則行於法者將無以信天下矣治非以法為用則深於道者將無以濟天下矣故曰徒善不足以為政徒法不能以自行有闗睢麟趾之化而行周官之法度其於治也何有張載曰能通天下之志者為能感人心聖人同乎人而無我故能和平天下莫盛於感人心臣良勝曰生民有欲所謂欲者我之根也夫惟視天下為我有也則有我之為害也深矣如以天下為天下有也則無我之為感也深矣是故天下之患常生於有我天子以天下為我諸侯以一國為我大夫以一家為我士庶人以一身為我我則私私則利利則害隨之矣若推其極堯之禪舜舜之禪禹其有天下而不與也皆無我也臣弑其君子弑其父非有我之為害哉范祖禹曰聖人順天理而感人心斂天下之賢而聚之於朝使之施其所有為國之有則賢者無不得其所而民物亦無不得其所矣臣良勝曰天之立君以為民也天之生賢以為君也故為天養民者天子之職也為天子治民者賢者之職也故人君用賢非為賢也為民也為民所以自為也賢者之見用非自為也為民也為民所以為君也蘇軾曰古之人君收天下之英雄而不失其心故天下皆爭歸之臣良勝曰伯夷太公一歸西伯則曰天下之父歸之而其子焉徃英雄之才雖未可云二老其足以係天下之望一也所以收之者何道也哉所謂英雄者非常之才非常之才必有非常之主而後能用之亦必有非常之禮而後能盡其用彼常人者祿之可富也位之可貴也予之可寵也奪之可辱也招之而可來麾之而可去也故隨能而置列程功而叙賞皆可以為之制也非常之才富貴非其所欲也寵辱非其所驚也來去無期而死生之際有不可奪者也故禮不備不足以致之遇之不殊不足以使之知不深不足以結之恩不隆不足以感之譬之養鷹則一雉一鼠而飫以依人千里之驥非食之充其量而䇿之通其意能盡其才也哉故漢髙於韓彭黥布未見尺寸之功裂數千里而王之其殆幾於此矣蘇軾曰聖人之為天下不務逆人之心人心之所向因而順之人心之所去因而廢之故天下樂從其所為臣良勝曰佑賢輔善顯忠遂良聖人非有心命之也五服五章天命之也兼弱攻昧取亂侮亡聖人非有心討之也五刑五用天討之也然而天道㝠㝠何所依據觀諸人心而已人心順天意得矣天之所助者順而况人乎謝安之用諸桓未必是而衆之所樂則國以乂安庾亮之召蘇峻未必非而衆謂不可適以召辱是故君子立事未論物理之是非先觀人情之向背王安石以新法為人阻撓為恨而程子曰相公何故欲作此拂人心事安石無以為應意轍之言是亦有為而發也朱熹曰王者知有天而畏言行必信政教必立喜怒必公用舍必當黜陟必明賞罸必行臣良勝曰人君至尊無上者也上之者惟天爾天下無足畏也畏之者亦惟天爾然非徒畏也動與天惟一爾一有愆違則與天不相似非肖子矣所以付托之者有所負所以責望之者有所孤則所以譴告之者至矣可不畏哉胡寅曰人君莫大乎修身修身莫先於寡欲欲誠不行則心虚而善入氣平而理勝動無非禮事無不善唐虞之治不越此矣臣良勝曰唐虞之治古今以為極隆而伯益致戒亦曰儆戒無虞罔失法度罔遊于逸罔滛于樂則致盛治保盛治如唐虞者修身寡欲之外無餘事矣夫人之身一人之身也人君則天下恃以為治亂者則天下之身也夫人之欲一人之欲也人君一心則天下之求遂其欲者皆思以中之則天下之欲也是人君修身乃以正天下之身而其寡欲乃以絶天下之欲致治之原孰大於此聖祖謂禮部侍郎曽魯曰朕求古帝王之治莫盛於堯舜觀其授受其要在允執厥中後之儒者講之非不精及見諸行事徃徃背馳魯對曰堯舜以此道宰制萬事如執權衡物之輕重長短自不能逆而皆得其常所以致雍熙之治後世鮮能此道處事之際欲求其至當難矣聖祖曰人君一心治化之本存於中者無堯舜之心欲施於政者有堯舜之治決不可得也戊戌十二月辟儒士葉祖幹葉儀既至祖幹持大學以進聖祖問治道何先對曰不出乎此書命剖析其義祖幹以為帝王之道自修身齊家以至治國平天下必上下四旁均齊方正使萬物各得其所而後可以言治聖祖曰聖人之道所以為萬世法吾自起兵以來號令賞罰一有不平何以服衆夫武定禍亂文致太平悉此道也臣良勝曰徒善不足以為政徒法不能以自行是故欲求堯舜之治必先堯舜之心聖祖自得之師心得之言也至謂大學之道惟在於平一言以蔽之矣是故論治之本惟存於心之一字論治之效惟在於平之一字古今言治理者只此二字可以集大成矣故以為終卷獻焉右衍經常之治中庸衍義卷十七
