body:
  text: 中庸衍義卷十一明夏良勝撰九經之義敬大臣體羣臣子庶民乾九五飛龍在天利見大人朱熹曰剛健中正以居尊位如以聖人之德居聖人之位故其象如此臣良勝曰乾之道易知也然非日月星辰之麗乎天茫然而已天之用於是乎息也坤之道簡能也然非山川草木之麗乎地隤然而已地之用於是乎息也君之尊猶天地也非大臣左右則百司庶府將亦不得其職而庶事隳矣故以九五聖德而居尊位猶必利見九二之大人利於見之故亦利於用之欲有以用之必有以敬之或曰有聖君矣無九二中正之大臣足以當其敬者則如之何曰雲從龍風從虎水流濕火就燥聖人作而萬物覩有堯舜禹湯文武之為君必有臯陶伊傅周召之為臣天地理數陽一陰二則君一臣二有自然者有臣而無君者蓋有之矣有君而無臣者未之聞也不然則用非其臣與無臣等爾頥上九由頥厲吉利涉大川程頥曰上九以陽剛之德居師傅之任六五之君柔順而從於己賴己之養是當天下之任天下由之而養也以人臣而當是任必常懷危厲則吉也如伊尹周公何嘗不憂勤兢畏故得終吉夫以君之才不足而倚賴于己身當天下大任宜竭其才力濟天下之艱危成天下之治安故曰利涉大川得君如此之專受任如此之重茍不濟天下艱危何足稱委遇而謂之賢乎師九二在師中吉王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也臣良勝曰文武並用長久之道也大臣之任不特宰相之職將之責固匪輕也由爻詞觀之可以得任將者之心也以象詞觀之可以得為將者之心也以六五柔中之主而任九二剛中之將在閫外有專制之權在居中有異數之寵將得行其志而成其功是以為吉然而為將者不敢自矜其能故師中之吉承天寵也則無恃功驕恣之過矣王三錫命懷萬邦也則有平定安戢之道矣夫必有是君而後能任其將有是將而後能用其師將者師之命也衆之死生君之安危國之存亡係焉故足以當大臣之位者如此然而戡亂以武致治以文承平之世率尚文士至鄙武夫於不齒故若宋真宗於澶淵之役渡浮橋及半高瓊執御轡曰此處好喚宰相吟兩首詩則其平日忿憾可知瓊猶稍知大義能成寇凖之謀者言猶若是則在驕悍之夫又何如持衡之勢人主有以審度之焉君奭曰我聞在昔成湯既受命時則有若伊尹格于皇天在太甲時則有若保衡在大戊時則有若伊陟臣扈格于上帝巫咸乂王家在祖乙時則有若巫賢在武丁時則有若甘盤呂大臨曰此章序商六臣之烈蓋勉召公匹休于前人也伊尹佐湯以聖輔聖其治化與天無間伊陟臣扈之佐大戊以賢輔賢其治化克厭天心自其遍覆言謂之天自其主宰言謂之帝書或稱天或稱帝各隨所指非有重輕至此章對言之則聖賢之分而深淺見矣巫咸止言其乂王家者咸之為治功在王室精微之藴猶有愧於二臣也亡書有咸乂四篇其乂王家之實與巫賢甘盤而無指言者意必又次於巫咸也臣良勝曰商六臣者人品固殊功烈亦異然皆列大臣之位而盡大臣之職商之五王所以敬之之道則一也故曰湯之於伊尹學焉而後臣之高宗曰小子舊學于甘盤先後例之則五王於六臣皆師而臣之者也王通曰天子必有師然亦何常師之有惟道所存以天下之身受天下之訓得天下之道成天下之務民不知其由也是故人君之敬大臣師之云乎豈曰臣之云乎周官曰立太師太傅太保兹惟三公論道經邦燮理隂陽官不必備惟其人賈誼曰保者保其身體傅者傅之德義師者道之教訓此所謂三公也陰陽以氣言道者陰陽之理恆而不變者也易曰一陰一陽之謂道是也論者講明之謂經者經綸之謂燮理者和調之也非經綸天下之大經參天地之化育豈足以任此責故官不必備惟其人也少師少傅少保曰三孤二公𢎞化寅亮天地弼于一人蔡沉曰孤特也三少雖三公之二而非其屬官故曰孤天地以形言化者天地之用運而無迹者易曰範圍天地之化是也𢎞者張而大之寅亮者敬而明之也公論道孤𢎞化公燮理隂陽孤寅亮天地公論於前孤弼於後公孤之分如此冢宰掌邦治統百官均四海蔡沉曰天官卿治官之長是為冢宰內統百官外均四海蓋天子之相也百官異職管攝使歸于一是之謂統四海異宜調劑使得其平是之謂均吕大臨曰冢宰相天子統百官則司徒以下無非冢宰所統乃均列一職而并數為六者綱在網中也乾坤之與六子並列於八方冡宰之於五卿並列於六職也臣良勝曰任之重者職亦重職之重者責亦重人君之於大臣必能舉是職者而後敬禮之也若孔光桓榮而尊之亦妄施也大臣之於人君必克舉是職而當敬禮之也若陳平丙吉而居之亦冒寵也蒸民詩曰王命仲山甫式是百辟纘戎祖考王躬是保出納王命王之喉舌賦政于外四方爰發呂祖謙曰仲山甫之職外則總領諸侯內則輔養君德入則典司政本出則經營四方此章蓋備舉仲山甫之職臣良勝曰山甫之職備矣重矣其所以克舉之者斯亦難矣惟其有柔嘉之美質令好之儀色內之而小心恭敬外之而訓式典刑剛柔適中舉德弗遺足以補王之闕格心之非而宣王任之誠為得人茲特命城齊國出祖之禮儀衛之盛吉甫頌言乃以式遄其歸為望雖其僚友之情亦道其君臣之素也宣王於敬禮大臣之道可謂得矣天王使家父來聘胡安國曰虞史以人主大臣為一體春秋以天王宰相為一心以為一體故帝庸作歌則曰股肱喜哉元首起哉百工熙哉臯陶賡歌則曰元首明哉股肱良哉庶事康哉而垂益九官之徒不與也以為一心故歸賵仲子㑹葬成風則宰咺書名於前而王不稱天於後來聘桓公賜桓公命則宰糾書名以正其始王不稱天以正其終而榮叔家父之徒不與也故人主之職在論相而已矣公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘胡安國曰其曰宰周公者以冢宰兼三公也古者三公無其人則以六卿之有道者上兼師保之任冢宰或闕亦以三公下行端揆之職禹自司空進宅百揆又曰作朕股肱耳目是以宰臣上兼師保之任也周公為師又曰位冡宰正百工是以三公下行端揆之職也所以然者三公與王坐而論道固難其人而冢宰統百官均四海亦不易處也夫以冢宰兼三公其職任重矣而不殊㑹之何也人臣則有進退之節出入均勞之義非王世子貴有常尊之可比矣臣良勝曰大臣雖尊終不敢以王世子為比春秋尊君抑臣之意微矣以此垂法而後世有楊素懷奸而太子勇囚林甫獻諂而太子瑛戮端本議刑隋文帝唐𤣥宗不能擇大臣之賢者而敬任之也將誰咎哉緇衣曰大臣不親百姓不寧則忠敬不足而富貴已過也大臣不治而邇臣比矣故大臣不可不敬也是民之表也邇臣不可不慎也是民之道也君毋以小謀大無以遠言近無以內圖外則大臣不怨邇臣不疾而遠臣不蔽矣陳澔曰大臣不見親信則民不服從其令故不寧也此蓋由臣之忠不足於君君之敬不足於臣徒富貴之大過而然耳由是邇臣之黨相比以奪大臣之柄而使之不得治事故大臣所以不可不敬者以其為民瞻望之儀表也邇臣所以不可不慎者以君之好惡係焉乃民之所從以為道者也人君不使小臣謀大臣則大臣不至於怨乎不以不使遠臣間近臣則近臣不至於疾其君不使內之寵臣圖四方宣力之士則遠臣之賢無所壅蔽得見知於上矣臣良勝曰人君之敬大臣者必自擇邇臣之慎也蓋大臣之正者恆為邇臣之所憚邇臣之所無憚者大臣必非其人也蕭望之建白不近刑人之義𢎞恭石顯指為朋黨召致廷尉望之飲鴆自殺而元帝曰果然殺吾賢𫝊仇士良歸第教其徒以固寵曰但使人主不近儒生爾臣故曰人君之敬大臣者必自擇邇臣之慎也子曰所謂大臣者以道事君不可則止朱熹曰以道事君者不從君之欲不可則止者必行己之志臣良勝曰大臣之責與天下共其安危利害也凡所建立蓋有徇天下而不徇君者夫豈固為拂逆以自取罪戾乎哉如使徇君以害天下也是害君也雖拂君而利天下也是利君也其計利害於天下雖君有所不計也而况己之利害云哉故惟以道事君者乃能不可而止爾若夫讒夫宵人內外交締善刺主意爭先售術以竒中之又豈能去乎魏世祖惑於寇謙之符籙之說崔浩上書明證曰聖王受命必有天應河圖洛書皆寄言於蟲魚之文未若今日神人接對手筆燦然李義府既出璧州司馬王德儉為之畫策曰武昭儀方有寵上欲立以為后未有以發君能建白是轉禍為福也義府叩閣上表請立昭儀即召見賜珠一斛乃如是之人也惟中君欲以自固也尚何望其拂君以去為道也哉孟子曰所謂故國者非謂有喬木之謂也有世臣之謂也朱熹曰世臣纍世勳舊之臣與國同休戚者也親臣君所親信之臣與君同休戚者也此言喬木世臣皆故國所宜有然而所以為故國者則在此而不在彼也臣良勝曰世臣云者必其元德顯功著在王室而其子孫繩武世篤忠貞植根深而耳目廣德澤厚而用物宏平居無事若不足為輕重至利害大變凝然持之而不變卒然撼之而不動國人信之呼吸舉措足以轉禍為福易危以安者也若夫張詠再行足正蜀亂彥博出鎮叛卒俯降固有不言而孚不疾而速之機名臣輔德亦有然者又不在於世秉機軸而後謂之世臣也後世有輕忽世胄老臣一切以新進浮薄從事鮮有不敗者矣魏文侯以卜子夏田子方為師每過假干木之廬必式四方賢士多歸之胡寅曰常主於其臣愛順巳而已賢主於其臣欲其諌己焉始乎求諌中而勉從終而惡聞者多矣况於師乎諌爭之臣則有朋友之義逆耳拂意之言至悻然發於心勃然變乎色者賢君之所未免也爭臣之位卑其勢可以進退而制指則其憚之尚淺也一成乎為師其位尊其道嚴其教詔輔拂必一於聽從而莫得違拒其威儀體貌必與之終始而不敢廢棄故君於得師為難非世之人無可師也以人主無求師之意事師之道也不自得師而臣其所受教雖有願治之意其成就亦卑近蹇淺而止矣文侯非自得師者也而三人又非一世之士也雖然不既與庸主遠矣乎敦信以治國則不失於虞人修睦以善鄰則不失於韓趙聞翟璜之對則悟任座之言直聽田子之論則知鍾聲之問非將相大任也謀諸李克而皆得其人其去六國之庸主誠遠矣雖然文侯與子思同世不知師也而子思亦非文侯之所得師也文侯聽古樂則惟恐卧聽鄭衛之音則不知倦是以不能師子思也賈誼曰人主之尊譬如堂羣臣如陛衆庶如地故陛九級上亷遠地則堂高陛無級亷近地則堂卑高者難攀卑者易陵理勢然也臣良勝曰三代而下言敬禮大臣之道自賈誼始誼亦有所為而言也文帝寬厚德化君臣之間鮮有過舉於斯言待臣有禮勞軍細柳按轡徐驅申屠嘉既相得以召鄧通而議法遣使謝之誼之言蓋亦行矣自夫敬臣之禮文侯而後大廢於秦一切以尊君抑臣為典要漢祖復遵用之蕭何起秦故吏習見而不為非自受其斃至於械繫以衛尉之言幸免徒跣請罪文帝由此而繫周勃景帝由此而殺張釋之武帝由此而殺劉屈氂宣帝由此而殺趙蓋韓楊元帝由此而殺蕭望之哀帝由此而殺王嘉其積習之所由來也光武號為哲后亦循故常三公以吏事責之事權無統而後世托孤之命未免歸之房闈終漢之世政事大權不在母后則在外戚不在外戚則在宦官不在宦官則在將帥漢隨以亡賈誼所以長大息於斯者蓋深達於國體者也議者猶以其識之不足為咎何哉唐太宗時李世績嘗得暴疾方云鬚灰可療上自剪鬚為之和藥世績頓首出血泣謝上曰為社稷非為卿也何謝之有世績嘗侍宴上從容謂曰朕求羣臣可託幼孤者無以踰公公往不負李密豈負朕哉世績流涕辭謝齧指出血因飲沉醉上解御衣以覆之臣良勝曰太宗自以李績可任託孤之寄將以為社稷臣也故於績也雖髮膚有所不愛以為敬禮足以結其心矣殊不知績亦匹夫之俠以死狥人誠不為難故李密既敗不忍以地求利單雄信將戮割股肉啖之皆其所能為也然其理義不明出處不正欲寄以社稷安危之任斯亦難矣太宗疾革以知數黜之而命高宗用之將謂羣臣真無績之比者未幾高宗立武后顧命大臣皆不可績獨以家事無問外人成之武氏之禍戮及襁褓唐室不絶如線則唐臣之負太宗者績為首也太宗可謂失所敬矣唐𤣥宗方躬萬幾詢事他宰相畏帝威决皆謙憚惟姚崇佐裁决故得專任崇病痞移告凡大政事必令乾曜就咨焉帝欲崇自近詔徙寓四方館日遣問食飲起居高醫尚食踵造崇以館局華大不敢居帝使語崇曰恨不處禁中此何避蘇轍曰唐𤣥宗豪傑之主也而崇復以豪傑事之方其君臣遇合天下事迎刃而解若無足為者雖然以水濟水後將有不可食者開元四年天下大蝗民祭且拜之坐視食苗而不敢捕崇奏遣御史為捕蝗使分道殺蝗然遇災而懼修德以答天變古之正道也崇置之不言而專以捕為事已可疑矣帝幸東都而太廟屋壞宋璟蘇頲皆言三年喪未終不可巡幸壞壓之變天戒也請罷東巡修德以答天譴帝以問崇曰此符堅故殿也歲久朽壞而崩木蠧而折理無足怪但壞與行㑹非緣行而壞也今關中無年餽餉勞弊出幸東都所以為人非為己也百司已戒供億已具請車駕即東而遷神主太極殿更作新廟此大孝也孰謂崇獨賢乎從崇之議使人君上不畏天戒中不敬宗廟下不恤人言皆忠臣之所諱而崇居之不疑何哉其後崇璟既殁𤣥宗愈老輕蔑羣臣方任張九齡而廢太子瑛用牛仙客則聽李林甫方用楊國忠而縱安祿山則用輔璆琳專以適已為悅類崇有以啓之也臣良勝曰若轍之論𤣥宗始有敬大臣之禮而姚崇不能盡大臣之道以應之故後𤣥宗之於臣寖失於無禮矣宋太祖謂昭文館大學士宋琪等曰在昔帝王多以崇高自處顔色嚴毅左右無敢貢言者朕與卿等周旋欵曲商確時事蓋欲通上下之情無有壅蔽卿等但直道而行無得有所顧避琪謝曰臣等菲才待罪相府陛下曲賜溫顔令盡愚懇敢不傾竭以副聖意宋孝宗召張浚赴行在賜手書浚即就道至即引見帝改容曰久聞公名今朝廷所倚惟公賜坐降問再四浚言人主以務學為先人主之學本於一心一心合天何事不濟所謂天者天下之公理而已必兢業自持使一心清明則賞罰舉措無有不當人心自歸四裔自服遂以浚為少傅江淮宣撫使封魏國公臣良勝曰從古待臣有道惟宋為至鞭撲不行於殿陛罵辱不及於公卿是故平居而有直言敢諌之風臨難而有仗節死義之志獲報之厚振古如茲臣舉太祖之言足以見其貽謀於始述孝宗之事足以見其率行於終大誥曰昔者人臣得與君同游者其竭忠成全其君飲食夢寐未嘗忘其政所以政者何惟務為民造福檢君之失撙君之過補君之闕顯祖宗於地下顯父母於生前榮妻子於當時身名流芳千萬載不磨臣良勝曰君臣之間同心同德宴游不忘警戒敬愛存於責成虞廷之歌卷阿之詩殆無以專美於前矣聖祖嘗與宋濓飲濓辭强之至五巵面如赭行不成步上歡笑親御翰墨賦詩一章以賜仍命侍臣咸賦醉學士歌曰俾後世知朕君臣同樂如此也復以公難於行步特詔皇太子選良馬以賜上親作馬歌命羣臣咸作之以寵耀焉濓致仕歸瀕行賜緡帛文綺及御製文集皇太子贈以衣二襲上諭曰朕最慎於賞豫嘉卿忠信可貫金石故以是賜卿卿今年幾何曰六十有八上曰藏此綺俟三十二年後作百歲衣也洪武元年章溢奏定處州七縣稅糧比宋制畝悉加五合聖祖特命青田縣糧止作五合起科曰使劉伯溫鄉里子孫世世為美談也天威嚴重伯溫抗言直議不以利害怵其中上甚禮重稱為老先生而不名又曰吾子房也聖祖諭魏國公徐達曰卿等連年征伐犯霜露冒矢石臨危决機之際死生以之今天下既定卿等宜少休息可自今或三日五日一朝有大事則召卿等議之達對曰臣等荷陛下威靈仰奉成算遂翦羣雄顧臣等愚陋犬馬微勞何足齒録伏䝉聖恩特加優禮揆之於心實加愧悚豈敢自逸聖祖曰朕固知卿等不忘恭敬之意但念卿等久勞于外思有以慰卿之勞爾達等復固辭弗許大賚天下致仕武臣諭之曰元末兵爭中原鼎沸人不自保爾諸將臣奮起從朕效謀宣力共平禍亂勤勞備至天下既定論功行賞使爾居官任事子孫世襲永享富貴朕思起兵時與爾等皆少壯今皆老矣久不相見心恆思之故召爾等來所賜薄物以資養老爾等還家撫教子孫以終天年諸將叩首謝上因笑曰同厯艱難致有今日顧朕子孫保有無窮之天下則爾等子孫亦享有無窮之爵祿諸將臣無不感激至有墮淚者洪武十八年命大都督府選武臣子弟入國子學讀書諭之曰武臣從朕定天下以功世祿其子弟長於富貴又以父兄早沒鮮知學問宜令讀書知古今識道理俟有成立然後命官庶幾得實用也昔霍光功非不高身死未久而子孫橫肆卒致禍滅者不學故也郭子儀中興唐室功蓋天下位極人臣而心常謙退保全令名而福及後嗣者識道理也今武臣子弟但知習武事特患在不學爾文皇入正大統建內閣於東角門內命解縉黃淮胡廣胡儼楊榮金幼孜楊士竒七人處其中典機密務上時步至閣中親閲視所治且勞之曰天下事朕與若等共計非若六卿之分理也臣良勝曰我祖宗任臣敬臣同歸于厚而有分焉在文臣則優其地分隆其禮遇恩及其身後惠及其鄉里嘉其德焉在武臣則念其勞動略其邊幅賚資以貨財訓飭其子弟稱其功焉道並行而不相悖此所以為天地之大也但文臣有任子末品終其身武臣一例䕃叙世世勿絶其後邊功日煩以官為賞視國初已踰百倍而膏梁柔脆多不任兵目不知書何云畏法雖麗重典不廢先功故諺有軍官錫帽之喻謂其可毁可復是以益無所憚也為國家深長之慮者恆有為裁省之議率以成法為詞臣伏讀大明律軍官有犯私罪該笞者附過收贖杖罪解先任降等叙用該罷職不敘者降充總旗該徒流者照地方遠近充軍及文皇之時奉天征討官犯罪法司奏以律行則今日議此正須率用祖宗成法而有餘矣所以厚報之者仁之至也所以重治之者義之至也然治之於末莫若成之於初各都司選舉武舉一員如提調學校之制每歲按行各衛所將應襲官舍考校武藝字法可任官者方許送部覆考果稱方許授官不稱者發回再考三考不稱者降用且聖祖初命教武臣子弟之言曰宜令讀書知古今識道理使有成立然後命官微意遠略已有所在其犯私罪一遵文皇以律科斷官有實用法不虛行足以仰體祖宗優厚報功之恩默存今日裁省重官之意於成法無所變焉右衍敬大臣之義舜典曰詢于四嶽闢四門明四目達四聰蔡沉曰舜既告廟即位乃謀治于四嶽之官闢四方之門以來天下之賢俊廣四方之視聽以决天下之壅蔽臣良勝曰舜以聖人聰明睿知自側微受禪試之三年攝政二十有八年其於天下視聽固亦廣矣壅蔽之患可自無矣乃受終傳位之初謀治四嶽惟務來四方之賢以布有位則其效知宣力各得盡其聞見以敷于治而四方幽隱之情必無壅於上聞者然而人主之心攻之甚衆左右有所伺隙以投其好者日相萬也一有所蔽則聰明之德日損矣易於豐卦之爻有曰日中見斗蔽障之甚至於晝夜不辨又何以辨人之邪正政之得失而言治乎哉臯陶謨曰無教逸欲有邦兢兢業業一日二日萬幾無曠庶官天工人其代之臣良勝曰此亦言知人之謨也知人之道以九德為本宣三德者則使之有家嚴六德者則使之有邦是以俊乂在官百僚師師其原皆出於君也人君不以逸欲為教故其下觀感有邦君子皆持兢業之心而日進于德言有邦則有家者可知矣况茲庶務之煩一日二日之間而有萬幾豈能獨理必俊乂百僚分治而無曠職然後可也人君所以帥教成德而使之布列庶位無非所以代天理物而非為其私也是庶官之職所以代君之事人君任庶官之職所以代天之工故曰知人之謨也伊訓曰制官刑警于有位曰敢有恆舞于宫酣歌于室時謂巫風敢有殉于貨色恆于遊畋時謂淫風敢有侮聖言逆忠直遠耆德比頑童時謂亂風惟茲三風十愆卿士有一于身家必喪邦君有一於身國必亡臣下不匡其刑墨具訓于䝉士蔡沉曰三風愆之綱也十愆風之目也卿士諸侯十有其一已喪其家亡其國矣墨墨刑也臣下而不能匡正其君則以墨刑加之具詳悉也童䝉始學之士則詳悉以是訓之欲其入官而知所以正諫也臣良勝曰自天子而下有諸侯大夫皆羣臣也君臣一體故有體其事而察其心者彼大夫之心孰不欲保其家也諸侯之心孰不欲保其國也是以風愆之戒警于有位蓋欲諸侯大夫知所謹守保其家國於無虞也然而大夫之下有家臣焉諸候之下有卿大夫焉交修之責有歸也大夫有嫡子庶子焉諸侯有世子公子焉䝉養之教有素也其所以制法如是者無非欲諸侯大夫保其邦家是之謂體其心也說命曰惟治亂在庶官官不及私昵惟其能爵罔及惡德惟其賢蔡沉曰庶官治亂之原也庶官得其人則治不得其人則亂臣良勝曰賢能治之表也亦世之表也人君必求能者而官之賢者而爵之是所以表異於天下而求治焉則賢能之心亦可以自慰矣若使私昵而官之則能者乃曰彼以私昵而可官也吾烏用能惡德而爵之則賢者乃曰彼以惡德而可爵也吾烏用賢夫其有所不安于心則必有所不屑于職又何以圖治為哉羔羊詩曰羔羊之皮素絲五紽退食自公委蛇委蛇朱熹曰南國化文王之政在位皆節儉正直故詩人美其衣服有常而從容自得如此臣良勝曰有道之世舒以和無道之世急以厲惟文王仁厚之化行於南國故在位得以養其節儉之德行其正直之志政裕情豁而退食之際從容自得如此若夫苛煩督責泯泯棼棼正直者將擯斥而無容節儉者欲自汙以免禍厝火束濕救過不暇背不帖席而食不下咽安得有退食委蛇如羔羊之詠者乎四牡詩曰四牡騑騑周道委遲豈不懷歸王事靡盬我心傷悲朱熹曰此勞使臣之詩也夫君之使臣臣之事君禮也故為臣者奔走於王事特以盡職分之所當為而已何敢自以為勞哉然君之心則不敢以是而自安也故燕饗之際叙其情而閔其勞言駕此四牡而出使于外其道路之回逺如此當是時豈不思歸乎特以王事不可以不堅固不敢狥私以廢公是以內顧而傷悲也臣勞於事而不自言君探其情而代之言上下之間可謂各盡其道矣傳曰思歸者私恩也靡盬者公義也傷悲者情思也無私恩非孝子也無公義非忠臣也君子不以私害公不以家事辭王事取郜大鼎于宋戊申納于太廟臧哀伯曰君人者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫是以清廟茅屋大路越席大羮不致粢食不鑿昭其儉也衮冕黻珽帶裳幅舄衡紞紘綖昭其度也藻率鞞鞛鞶厲游纓昭其數也火龍黼黻昭其文也五色比象昭其物也錫鸞和鈴昭其聲也三辰旗旗昭其明也夫德儉而有度登降有數文物以紀之聲明以發之以臨照百官百官於是乎戒懼而不敢易紀律今滅德立違而置其賂器於太廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失德寵賂章也郜鼎在廟章孰甚焉武王克商遷九鼎于雒邑義士猶或非之而况將昭違亂之賂器於太廟其若之何臣良勝曰百官庶民之所以治也人君百官之所由以正也君者臣之表也表正而影直矣故凡體察於羣臣者亦自顧其所以照臨之者何如爾禮運曰用人之知去其詐用人之勇去其暴用人之仁去其貪臣良勝曰人君操用人之權者也惟用之也恕故體之也必得其情惟體之也誠故用之也不求其備若求之備則責之詳又何以用之而體之得其心哉善夫子思言於衛侯曰合抱之木不以數寸之朽棄也是故光嶽之分全才益寡知近於詐勇易於暴仁類於貪豈真善惡相去之遠如是耶有所長者或亦有所短也趙葵言於理宗曰有勇略者治兵有心計者治財寬厚者任牧養剛正者持風憲為官擇人而不為人擇官嗚呼是所謂能取其長皆可用也羣臣效用將無有不得其心者漢宣帝厲精為治五日一聽事自丞相以下各奉職奏事敷奏其言考試功能侍中尚書功勞當遷及有異善厚加賞賜至於子孫終不改易及拜刺史守相輒親見問觀其所由退而考察其所行以質其所言有名實不相應者必知其所以然常曰庶民所以安其田里而無歎息愁恨之聲者政平訟理也與我共此者其惟良二千石乎以為太守吏民之本數變易則下不安民知其將久不可欺罔乃服從其教化故二千石有治理效輒以璽書勸勉增秩賜金或爵至關內侯公卿缺則選諸所表以次用之是故漢世良吏於是為盛臣良勝曰宣帝之於臣下綜核名實人人得陳其言得行其志得盡其才蓋亦有以體之矣若使人君深居高拱於事無裁决之明信意指使於人無審擇之素頻更數易無自固之心僭賞濫刑無自明之路功能混於所施毁譽偏於所寄如是而欲用舍之當功效之著如宣帝者斯亦難矣乎唐𤣥宗東封還至宋州宴從官謂張說曰懷州刺史王邱餼牽之外一無他物魏州崔沔供張無錦繡示我以儉濟州裴耀卿表數百言莫非規諌且曰人或重擾則不足告成朕常置之坐隅如三人者不勞人以市恩真良吏矣顧謂刺史寇泚曰比亦屢有以酒饌不豐訴於朕者知卿不借譽於左右也自舉酒賜之於是以邱為尚書左丞沔為散騎侍郎耀卿為定州刺史臣良勝曰𤣥宗於道途之間而灼知臣下之善可謂善體之矣至如宋璟入相道途不與使者交言𤣥宗亦嘗賜以金筯曰表君直也其後在蜀與裴士淹論及璟曰彼賣直以取名爾然則人主聰明固有在近而蔽在遠而徹者邪何其明於此而暗於彼也故有問長吏之政於鈴下馬卒而不得至田間野老能厯厯言之此舜之明目達聰必闢四門以來遠方之見聞也或曰璟以直道事君屢拂上意一斥不復至是猶有餘憾焉林甫一意迎合雖知其妬賢嫉能無以為比而任之久好惡一偏賢否莫辨雖有英明之資卒歸暗繆之禍如𤣥宗者衆矣宋太祖即位之初交廣劍南太原荆湖江表遼夏皆為敵國也因注意謀帥命李漢超屯關南馬仁瑞守瀛州韓令坤鎮常山賀惟忠守易州何繼筠領棣州郭進控西山武守琪戍晉州李謙溥守隰州李繼勳鎮昭義以禦太原趙贊屯延州姚內斌守慶州董遵誨屯環州王彥升守原州馮繼業鎮靈武以備西夏其族屬在汴京者撫之甚厚郡中管𣙜之利悉以與之恣其貿易免其所過征稅許其召募亡命以為爪牙凡軍中事皆得便宜每入朝必召對命坐厚為錫賚以遣之由是邊臣富資能養死士使為間諜洞知敵情及其入寇設伏掩擊多致克捷二十年間無西北之憂以至平蜀楚拓吳越所向遂志蓋能推赤心以馭羣下之所致也臣良勝曰宋太祖經理天下只此十四鎮使而足有藩鎮之權而無藩鎮之弊本之以誠而濟之以法也有專兵而無專地有專利而無專殺族屬在汴而易置在朝便宜在軍而文法在吏故文臣知州朝官知縣京朝官監臨財賦運使通判縣尉之司各有守焉鎮使亦何能為故李漢超取部女為妾貸錢不還雖小民亦得而訟之矣太祖雖折以言責其人遣之而諭漢超亟還其女償其貸軍校誣郭進終於不殺遣使立功而薦之董遵誨嘗以紫氣黑龍之侮而卒用此又委之以心而濟之以知也曽鞏曰太祖最得馭將之宜為此故爾國朝指揮張溫守蘭州元將王保保兵圍城溫督將士備守夜二鼓圍兵登城千户郭佑醉卧不之覺巡城官軍擊却之圍既解溫執佑將斬之天策衛知事朱友文諍曰當賊犯城時將軍斬佑以令衆所謂以軍法從事人無得而議之今賊既退乃追罪之非惟無及於事且有擅殺之名竊以為不可溫悟杖而釋之聖祖聞之謂輔臣曰友文以幕僚能守朝廷法直言開諭長官此正人也宜加賚豫遂賜綺帛各五匹凌漢為監察御史鞫獄平恕人有德漢者遇諸途邀漢飲厚報以金漢曰子罪當爾律有定法非我私子酒可飲金不可受聖祖聞而嘉之擢漢右副都御史金吾衛知事黃福改龍江左衛早暮勤職而才識開敏刻剔宿弊數出意見輔翼上官升本衙經厯上書論國大計聖祖覽而奇之升工部右侍郎特見信用臣良勝曰君門遠於萬里謂其難於達也我聖祖誠明體下雖下僚之善必聞必用而道路辭受之際亦所奬拔所謂無幽不燭無遠弗届如是而人臣不知自勉於善者非有人心者也右都御史袁泰奏監察御史胡昌齡等四十一人緘口不言時事當罪之聖祖曰言之非難言而當理者為難昌齡輩安知其終不言邪復執奏曰昌齡等非不能言但心懷詭詐不肻言爾聖祖曰人臣進言於君必有關於國之利病民之休戚亦豈得輕易若遽以懷詭計罪之此何異張湯腹誹之法泰不敢復言臣良勝曰聖朝無闕事自覺諌書稀聖祖興道致治至於末年凡志之所欲為力之所能為者將無遺闕可指泰猶以臺臣不言為罪泰固失矣聖祖之盛於是益徴先儒吕祖謙云欲觀君德成就只於言者驗之若言之委曲回謢則是德之未成未孚於人故也言之剴切直指是德之既成有以孚於人也聖祖德既大成孚于人者久矣泰猶欲責人以言視之多方以阻言者為何如哉然而聖祖卒不罪昌齡者非樂人之無言也蓋深重於有言也古者臺諫官無所統謂之天子耳目故言及天子天子改容言及宰相宰相待罪若泰而視為屬吏而督責之言亦可陰持之而使之不言矣殊失建置重言之意然則淵微之意殆亦在於斯乎聖祖行後苑見巢鵲卵翼之勞喟然嘆曰禽鳥勤勞若是况人母子之恩乎乃令羣臣有親老者許歸養時故元鎮撫陳興被俘來京恩待甚厚興言有母嵩州年八十餘欲求歸養即賜白金衣帽遣之陛辭聖祖顧侍臣曰孝弟之性天下皆同陳興雖武夫聞朕言即愴然思歸朕始不知其有母若知之豈肻令其違遠耶人壽不過百歲今其年已八十餘萬一不得相見興有無窮之痛興歸母子相見其樂宜何如侍臣曰陛下以孝治天下推測人情無微不燭非惟一家之老得所天下之􅑏獨鰥寡皆䝉其惠矣聖祖曰人情莫不愛其親必使之得盡其孝一人孝衆人皆趨於孝此風化之本也故聖人之於天下必本人情而為治臣良勝曰體羣下之情至於俘臣所謂充類至義之盡也永樂四年進士陳紀等還鄉陛辭文皇諭之曰為學至以進士發身亦出乎等倫然道理無窮古人至老務學不厭今人茍遂一得即不復前進故遠不逮古爾等年富力强當立志遠大務進修非獨成己之德將來國家亦得實才之用紀等皆叩首謝復諭之曰鄉里父兄所在不可以一得輒生驕慢驕慢凶德孔子於鄉黨恂恂似不能言爾曹勉之各賜鈔五錠為道里費臣良勝曰進士筮仕之初而文皇所以諭勉之者若此蓋教之以為人臣為人子為人少之行也教之以修身以齊家以治國平天下之道也待之誠而養之厚有若是乎右衍體羣臣之義益彖曰損上益下民說無疆程頥曰卦之為益以其損上益下損於上而益下則民說之無疆謂無窮極也臣良勝曰君民一體君之富藏於民也君何嘗不欲益民也哉然而諂佞之徒進則誘以狗馬導以工役引以宴遊開以征伐百費不供而興利之臣入則陰增賦斂明奪商賈𣙜及酒鹽稅及間架無非損下益上而不知割肌充腹其所損於上者大矣故益若九五之君有孚惠心有孚惠我德上下交惠勿問元吉其益何如故曰保民如子君猶父也父而有可以益其子者雖髮膚有不愛也况其他乎井象曰木上有水井君子以勞民勸相程頥曰木承水而上之乃器汲水而出井之象君子觀井之象法井之德以勞徠其民而勸勉以相助之道也勞徠其民法井之用也勸民使相助法井之施也臣良勝曰水性下而井居於下猶能上之以養是所難也君處乎上下施其澤以養民固易事爾然而民之仰賴無窮君之施與有限容有不得盡遂其養者故君子勞徠於民俾其有以自養而又勸於民使之相助為養則民之不得其養者寡矣節彖曰天地節而四時成節以制度不傷財不害民程頥曰推言節之道天地有節故能成四時無節則失序也聖人立制度以為節故能不傷財害民人欲之無窮也茍非節以制度則侈肆至於傷財害民矣大禹謨禹曰於帝念哉德惟善政政在養民水火金木土榖惟修正德利用厚生惟和九功惟叙九叙惟歌蔡沉曰益言警戒之道禹歎而美之謂帝當深念益之所言也且德非徒善而已惟當有以善其政政非徒法而已在乎有以養其民下文六府三事即養民之政也水火金木土榖惟修者水克火火克金金克木木克土而生五榖或相制以泄其過或相助以補其不及而六者無不修矣正德者父慈子孝兄友弟恭夫義婦聽所以正民之德也利用者工作什器商通貨財之類所以利民之用也厚生者衣帛食肉不饑不寒之類所以厚民之生也六者既修民生始遂不可以逸居而無教故為之惇典敷教以正其德通工易事以利其用制節謹度以厚其生使皆當其理而無所乖則無不和矣九功合六與三也叙者言九者各順其理而不汩陳以亂其常也歌者以九功之叙又詠之歌也言九者既以修和各由其理民享其利莫不歌詠而樂其生也臣良勝曰君臣警戒所以為德也德不足以行政非德也政不足以養民非政也天之立君以為民也君之為政以養民也故益之警戒禹之歎美舜之深念無非上之為德下之為民也此所以為唐虞之君臣而後世所當法也泰誓曰惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母蔡沉曰亶誠實無妄之謂言聰明出於天性然也大哉乾元萬物資始至哉坤元萬物資生天地者萬物之父母也萬物之生惟人得其秀而靈具四端備萬善知覺獨異於物而聖人又得其最秀而最靈者天性聰明無待勉强其知先知其覺先覺首出庶物故能為大君於天下而天下之疲癃殘疾得其生鰥寡孤獨得其養舉萬民之衆無一而不得其所焉則元后者又所以為民之父母也夫天地生物而厚於人天地生人而厚於聖人其所以厚於聖人者亦惟欲其君長乎民而推天地父母之心而已天之為民如此則任元后之責者可不知所以作民父母之義乎商紂失君民之道故武王發此是雖一時誓師之言而實萬世人君之所當體念也臣良勝曰湯之放桀其作誥也則曰惟皇上帝降𠂻于下民若有恆性克綏厥猷維后則所以教民者人君之責也武之伐紂其作誓曰惟人萬物之靈元后作民父母則所以養民者人君之責也此湯武革命所以順乎天而應乎人也雖然天視自我民視天聽自我民聽天之順也其何徴也亦順乎民焉爾咸有一德曰后非民罔使民非后罔事無自廣以狹人匹夫匹婦不獲自盡民主罔與成厥功蔡沉曰伊尹言君民之使事雖有貴賤之不同至於取人為善則初無貴賤之間蓋天以一理賦之於人散為萬善人君合天下之萬善而後理之一者可全也茍自大而狹人匹夫匹婦有一不得自盡於上則一善不備而民主亦無與成厥功矣伊尹於篇終致其警戒之意而言外之㫖則又推廣其所謂一者如此蓋道體之純全聖功之極致也嘗因是言之以為精粹無雜者一也終始無間者一也該括萬善者一也一者通古今達上下萬化之原萬事之幹語其理則無二語其運則無息語其體則并包而無所遺也咸有一德之書而三者之義悉備前乎伏羲堯舜禹湯後乎文武周公孔子同一揆也臣良勝曰君之與民非特相須以為養蓋亦相須以為善是故可近也不可下也然而君之所以為君者以其有邦也邦之所以為邦者以其有民也民之所以為民者以其有養與教也民之弗善邦國瘁殄故曰民者邦之本也本固而後邦寧人君欲寧其邦以自固也不於本焉圖之可乎南山有臺詩曰南山有杞北山有李樂只君子民之父母樂只君子德音不已臣良勝曰天子燕饗之樂而率以民之父母為頌祝之辭蓋君子之在上民之所攸塈也其所以足為民之塈者以其不懈于位也上而愛民有若其子民而愛上有若其父母所謂德音之昭于久遠者孰大於此哉大學引此詩以釋平天下之義而申之曰民之所好好之民之所惡惡之蓋上下之分雖殊而好惡之情則一故君子而反思於己是故政之行也吾之所安也民之心亦所安也吾必勉之而民亦遂其安焉是故令之出也吾之所危也民之心亦所危也吾必改之而無以危吾民焉吾之所施於吾子欲安而必惡危是心也推之而施於吾民欲安而惡危猶是心也是愛民如子也民有不愛之如父母者哉朝錯曰人情莫不欲壽三王生之而不傷人情莫不欲富三王厚之而不困人情莫不欲安三王扶之而不危人情莫不欲逸三王節其力而不盡充是類也則所謂潔矩之道何以外此甘棠詩曰蔽芾甘棠勿翦勿伐召伯所茇蔽芾甘棠勿翦勿敗召伯所憩蔽芾甘棠勿翦勿拜召伯所說朱熹曰召伯循行南國以布文王之政或舍甘棠之下其後人思其德故愛其樹而不忍傷也臣良勝曰召伯之行於南國推行文王之德也其所致思召伯者即所以思文王也召伯聽治於民不安所居至舍棠下以便於民則凡所施為措置無非所以便民者矣讀是詩者固可知其感民之德尚當思其便民之政師曠曰天生民而立之君使司牧之勿使失所有君而為之二使師保之勿使過度是故天子有公諸侯有卿卿置側室大夫有二宗士有朋友庶人工商皂𨽻牧圉皆有親昵以相輔佐也善則賞之過則匡之患則救之失則革之自王以下各有父兄子弟以補察其政史為書瞽為詩工誦針諌大失規誨士傳言庶人謗商旅于市百工獻藝故夏書曰遒人以木鐸徇于路官師相規工執藝事以諌正月孟春於是乎有之諌失常也天之愛民甚矣豈其使一人肆于民上以從其淫而棄天地之性必不然矣鄭子展卒子皮即位於是鄭饑而未及麥民病子皮以子展之命餼國人粟户一鍾是以得鄭國之民故罕氏常掌國政以為上卿宋司城子罕聞之曰鄰於善民之望也宋亦饑請於平公出公粟以貸使大夫皆貸司城氏貸而不書為大夫之無者貸宋無饑人叔向聞之曰鄭之罕宋之樂其後亡者也二者其皆得國乎民之歸也施而不德樂氏加焉其以宋升降乎臣良勝曰子民之責也豈惟君哉觀師曠之言也罕樂之政也臣亦與有政焉然而罕樂之施其末也將以為宋商人齊陳氏矣未可以為法也子路治蒲以簞食壺漿勞溝瀆者孔子使子貢止之子路曰夫子以仁教人而禁其行仁由也不受子曰爾以民為饑何不告於君而以爾私饋之是汝不明君之惠見汝之德義也速已則可否則爾之罪不久矣然則人臣而子民也輔君以行之可也專君而私之不可也召公之澤宜其遠矣檀弓孔子過泰山側有婦人哭於墓者而哀夫子式而聽之使子路問之曰子之哭一似重有憂者而曰然昔者吾舅死於虎吾夫又死焉今吾子又死焉夫子曰何為不去也曰無苛政夫子曰小子識之苛政猛於虎也陳澔曰虎之殺人出於倉卒之不免苛政之害雖未至死而朝夕有愁思之苦不如速死之為愈此所以猛於虎也為人上者可不知此哉顔淵侍魯定公于臺東野畢御馬于臺下公曰善哉顔淵曰善則善矣其馬必將佚須㬰馬敗聞矣定公問曰子何以知其馬之將佚也顔淵曰臣以政知之昔者舜巧於使人造父巧於使馬舜不窮其民力造父不窮其馬力是以舜無佚民造父無佚馬今東野畢之御也升馬執御銜體正矣步驟馳騁朝禮畢矣厯險致遠馬力盡矣然而猶乃求馬無己是以知其佚也定公曰善可以少進乎顔淵曰鳥窮則啄獸窮則攫人窮則詐馬窮則佚自古及今窮其下能無危者未之有也臣良勝曰聖賢時人之耳目也孔子因猛虎而戒苛政顔子因佚馬而喻窮民皆足以見行道濟時之心致君澤民之志也老􅔶曰聖人無常心以百姓為心臣良勝曰人之常言老子之教主於無然觀百姓為心之言則謂之有可也其謂之無者曰無為而民自化好靜而民自正無事而民自富無欲而民自朴以是而無蓋有百姓為心之先也矧其生當春秋末造五伯紛爭諸侯大夫家臣僭叛駸駸然入於戰國之風故矯而鎮之以靜故孔子生同其時而曰吾見老子其猶龍乎且其論禮則曰吾聞之老􅔶云宗其教者自蓋公有聞秦自商君變法如毛劉項之際死者十九曹參延之又承高祖蕭何規畫既定之後是以治齊治漢一以無擾著于近效漢文雖尚其術而賈誼建策亦略施行勞軍細柳奮擊丐奴豈真溺志於無者至晉王衍何晏之流漸入𤣥虛之論以事物有形目為芻狗臣不必忠子不必孝禮法不必事威儀不必修是學老子之過非老子之教本然也况其高談𤣥妙而名寵勢利一莫之能遠晏圖台鼎戎執牙籌衍營三窟浩達空函安知所謂百姓為心者彼老子超然萬物之表肻為是哉范寧謂王何之罪深於桀紂其必有以恕夫􅔶者不然彤管之什取其節焉可也文帝勸農詔曰農天下本也民所恃以生也而民或不務本而事末故生不遂朕憂其然故今茲親率羣臣農以勸之其賜天下民今年田租之半真德秀曰按文帝即位十二三年間減租稅半者再除租稅者一後世人主未有能及之者豈非躬行節儉之效與景帝令二千石修職詔曰今歲榖不登民食頗寡其咎安在或詐僞為吏吏以貨賂為市漁奪百姓侵牟萬民縣丞長吏也姦法與盜盜甚無謂也其令二千石各修其職不事官職耗亂者丞相以聞請其罪布告天下使明知朕意武帝遣博士循行詔曰仁不異遠義不辭難京師雖未為豐年山林池澤之饒與民共之今水潦移於江南迫隆冬至朕懼其饑寒不活江南之地火耕水耨方下巴蜀之粟致之江陵遣博士中等分循行諭告所抵無令重困吏民有拯救饑民免其厄者具舉以聞宣帝令二千石察官屬詔曰獄者萬民之命所以禁暴止邪養育羣生也能使生者不怨死者不恨則可謂文吏矣今則不然用法或持巧心析律二端深淺不平增詞飾非以成其罪奏不如實上亦無由知此朕之不明吏之不稱四方黎民將何仰哉二千石各察官屬勿用此人吏務平法或擅興徭役飾厨傳稱過使客越職踰法以取名譽譬猶踐薄氷以待白日豈不殆哉光武封卓茂詔曰前密令卓茂束身自修執節淳固誠能為人所不能為夫名冠天下當受天下重賞故武王誅紂封比干之墓表商容之閭今以茂為太傅封褒德侯真德秀曰西都之亡以士節不厲故爾光武舉此所以洗二百年靡敝之俗與禮嚴光周黨之意同或者乃謂其褒表循吏夫茂於出處去就之節煥然光明如此豈徒一循吏而已是不惟不知帝亦不知茂矣章帝廪給嬰兒詔曰蓋君人者視民如父母有慘怛之憂有中和之教匍匐之救其嬰兒無父母親屬及有子不能養食者廪給如律臣良勝曰漢詔數條藹然惻怛慈愛猶存子民之意録之以存古焉唐太宗詔朝集使刺史以上升殿親問之曰卿等在州何以撫教定州刺史薛獻對曰老者國家所養臣每存恤之少者國家所使臣每勸誡之田疇荒廢漸加墾闢禮義既行産業咸振此皆稟之聖化非臣之力帝曰如公所奏足稱循良清淨為政朕所望於公等也宋仁宗時契丹歲大饑流民過界河帝曰皆吾赤子也可大賑救之乃詔轉運司分送唐鄧襄汝州處以閒田所過州縣給食臣良勝曰臯陶陳謨曰在知人在安民知人固為安民之本也漢帝唐宗拳拳於刺史二千石州縣官之勸戒者無非欲其代子民之職也若宋仁宗推及契丹流民濟之一體此所以為仁也在方外之民厚費不惜則於京師之疫又何愛於通天之犀乎然而世運升降隆替相因四十餘年深仁厚澤民豐物阜可謂太平英宗繼統未久而神宗嗣位安石變法天下紛紛民物太耗黨籍學禁馴致靖康而兵戎相尋無一日息肩之期君子嘗謂齊桓方盛而陳完來奔異時代齊者陳氏也漢宣於呼韓來朝之歲王政君得幸於太子生成帝於甲觀異時代漢者王氏也驗之天道若夏至六陽極盛萬物繁鮮一隂己生其中則天地沍寒肅殺萬物實自伊始天道人事相為流通人君尤謹於盛衰之際也乎聖祖嘗大宴羣臣因諭之曰朕本布衣以有天下實由天命當羣雄初起所在剽掠生民惶惶不保朝夕朕見其所為非道心常不然既而與諸將渡江駐兵太平深思愛民安天下之道自是十有餘年收攬英雄闕仁四克賴諸將輔佐之功尊居天位念天下之廣生民之衆萬幾方殷朕中夜寢不安枕憂懸于心御史中丞劉基對曰往者四方未定勞煩聖慮今四海一家宜少紆其憂上曰堯舜聖人處無為之世尚猶憂之矧德歉堯舜治非雍熙天下之民方脫於創殘其得無憂乎洪武元年諭中書省臣曰中原兵難之後老稚孤貧者多有失所宜遣人賑恤之省臣以國用不足為對聖祖曰得天下者得民心也夫老者民之父母幼者民之子孫恤其老則天下之為子孫者悅恤其幼則天下之為父母者悅天下之老幼咸悅其心有不歸者寡矣茍視其困窮而不之恤民將撫然曰惡在其為我上也故周窮乏者不患無餘財惟患無是心能推是心何憂不足今日之務此最為先洪武八年命中書省令天下郡縣訪窮民無告者月給以衣食無所依者給以屋舍仍諭之曰天下一家民猶一體有不獲其所者當思所以安養之昔吾在民間目擊其苦鰥寡孤獨饑寒困踣之徒常自厭生恨不即死如此者宛轉於溝壑可坐而待也吾亂離遇此心常惻然故躬提師旅誓清四海以同吾一家之安今代天理物已十餘年若天下之民有流離失所者非惟昧朕之初志於代天之工亦不能盡也爾等為輔相當體朕懷不可使天下有一夫之不獲也洪武十七年諭禮部曰古者治天下有掩骼埋胔之令推恩及於朽骨近世狃於薄俗親死或以火焚之而投其骨於水孝子慈孫之心何忍傷恩敗俗莫此為甚其禁止之苦貧無地葬所在官司擇近城寬間地為義冢俾之葬埋或有宦遊遠方不能歸葬者官給舟車以歸之臣良勝曰得天下之道得其民也得民之道得其心也况救民有若湯武憂民有若堯舜澤及鰥寡枯骨有若文王集羣聖之大成其在斯己臣嘗因義冢之令而考之至元間西僧嘉木揚喇勒智與僧格表裏為㚥請發宋㑹稽諸陵取寶器以諸帝遺骨建浮屠于杭之故宫戳理宗顱為飲器聖祖受命初年即命索飲器于西僧而藏之故陵嗚呼聖人之仁不可勝用也於下民骨櫬尚圖安厝况於先代帝王哉然以此知元政之虐豈及百年聖政之仁視文王之澤為益厚萬世之祚其基之矣天下來朝府州縣官陛辭聖祖諭之曰天下初定百姓財力俱困譬猶初飛之鳥不可拔其羽新植之木不可搖其根要在安養生息之惟亷者能約已而利人貪者必朘人而厚己况人有才敏者或昵於私善柔者必昧於欲此皆不害之害也爾等深戒之文皇初命監察御史分詣各布政司巡視民瘼陛辭諭之曰父母於赤子先寒而備之衣先饑而備之食適其溫飽之宜避濕就燥以處之無不盡心人主為民父母理亦當然朕居深宫一飲一食未嘗不念及軍民然在下之情不能周知爾等為朝廷耳目其用心咨訪但水旱災傷之處有司不言者悉具奏來軍民之間何利當興何弊當革亦悉以聞臣良勝曰得天下有道得其民也得其民有道得其心也故古者天子巡守以行慶讓之典者以為民也諸侯述職以行黜陟之典者以為民也今觀聖祖改元而諭述職之守令如此文皇繼統而諭代巡之御史如此無非視民如傷之心也所以固結人心以延萬世之祚者端在斯乎永樂九年戶部言賑北京臨城縣饑民三百六十五户給糧三千七百石有奇文皇曰國家儲蓄上以供國下以濟民故豐年則斂凶年則散但有土有民何憂不足隋開皇間大旱民饑文帝不肻開倉賑濟聽民流移就食末歲計所積可供五六十年倉廪雖豐民心不固煬帝無道遂至滅亡前鑒具在今後遇水旱民饑即開倉賑給毋令失所臣良勝曰仁者以財發身不仁者以身發財文皇以隋為鑒而必賑饑民至仁之道也雖然豈特隋可鑒哉武王既集大統而散鹿臺之財發巨橋之粟非商紂之積者耶臣又嘗聞解州儒學教諭白威言安邑民饑流徙吏不知恤旱傷田稼而科徴不已其稅糧乞折收錢帛庶少蘇息之文皇曰守令民之父母艱難困苦而不之恤又重以徴斂豈為民父母之道命户部停徴稅糧令御史治縣官罪命吏部以威為安邑知縣嗚呼從古以救荒難為善政若體文皇之鑒戒法文皇之聽納凡人皆得以言聞而有司不容以不恤如是而曰天下有饑民臣亦未之信也右衍子庶民之義中庸衍義卷十一
