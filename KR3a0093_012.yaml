body:
  text: 中庸衍義卷十二明夏良勝撰九經之義來百工柔遠人懷諸侯兌彖曰説以先民民忘其勞説以犯難民忘其死程頥曰君子之道其説於民如天地之施感於其心而説服無斁故以之先民則民心説隨而忘其勞率之犯難則民心説服於義而不恤其死臣良勝曰養民之道在愛其力工役之興民勞癉瘁然而亦有説焉而忘之者葢其平日所以愛養之者無非悅懌之地也惟其説之是以來之惟其來之是以趨之惟其趨之是以忘之故古之役民可任也者家三人而歲不過三日則其賦於民者簡矣民安有不說而忘之者哉繫詞曰上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨葢取諸大壯臣良勝曰凡役皆工也而宮室之工最其大者然聖人初制取其足以庇風雨而已取其安於壯固而已是故其役於民者無幾也後世則殿陛尊嚴門觀深密龍樓雉帳桂寢椒房窮極富麗已不勝其煩者至若秦建阿房可以坐萬人隋宫一柱之費數十萬工宜其自速滅亡之禍矣舜典曰疇若予工僉曰垂哉帝曰俞咨垂汝共工垂拜稽首讓于殳斨暨伯與帝曰俞往哉汝諧蔡沉曰若順其理而治之也曲禮六工有土工金工石工木工獸工草工周禮有攻木之工攻金之工攻皮之工設色之工塼埴之工皆是也帝問誰能順治于百工之事者垂臣名有巧思莊子曰攦工倕之指即此也殳斨伯與三臣名也殳以積竹為兵建兵車者斨方鑿斧也古者多以其所能為名殳斨豈能為二器者與往哉汝諧者往哉汝和其職也臣良勝曰一人之身而百工之所為備矧于天子其所以供宗廟宫寢乗輿服御之用者又非若尋常工役之比然天下事物各有其理而凡人藝能各有所長一順其理則物物各中其則一和其職則人人各盡其才奇技淫巧之惑不興妬賢嫉能之患自息而百工熈矣緜詩曰乃召司空乃召司徒俾立室家其繩則直縮版以載作廟翼翼朱熹曰賦也司空掌營國邑司徒掌徒役之事繩所以為直凡營度位處皆先以繩正之既正則束版而築也縮束也載上下相承也言以索束版投土築訖則升下而上以相承載也君子將營宫室宗廟為先廐庫為次屋室為後翼翼嚴正也臣良勝曰安土同情也遷都重事也違宗廟棄社稷委朝市振族屬失久宅之田里憚新造之工役皆人力之所不堪而人情之所難强也故盤庚以天子之尊徙都邑之民違害就利去危即安而世家大族胥動浮言必丁寧反覆播告之備而後定其難若此太公去豳遷岐民如歸市至於作室鼛鼓弗勝其易若此何也葢商有天下世濟賢王民安於治而水患之來猶冀朝夕之幸免安而驅之以勞是宜其為難也周之始封于邰密邇戎翟迨于其後吞噬日肆公劉遷豳民既易從大王又遭獯鬻之侵不獲一息寧居危而易之以安是宜其為易也矧太王仁德固結人心尚何以工役為煩哉靈臺詩曰經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來朱熹曰國之有臺所以望氛祲察災祥時觀遊節勞逸也文王之臺方其經度營表之際而庶民子來作之所以不終日而成也雖文王心恐煩民戒令勿亟而民心樂之如子趨父事不召而來也孟子曰文王以民力為臺為沼而民歡樂之謂其臺曰靈臺謂其沼曰靈沼此之謂也文王有聲詩曰豐水有芑武王豈不事貽厥孫謀以燕翼子武王烝哉朱熹曰鎬京猶在豐水下流故取以起興言豐水猶有芑武王豈無所事乎貽厥孫謀以燕翼子則武王之事也謀及其孫則子可以無事矣臣良勝曰武王末受命其所以治天下之大經大法固多所事而亟遷鎬京去文王所作豐邑才二十五里是非有所謂違害就利者無亦有擇於風氣之完水土之厚民物之便將詒於萬世之謀故不憚於一時之役也故詩人謂之以燕翼子雖或違先人之意有不避者詒謀孫子己之心亦先人之心也是之謂西周其克商也遷九鼎于洛邑故曰我南望三塗北望岳鄙顧瞻有河粤瞻洛伊母遠天室其後周公之營洛者亦武王之志也是之謂東周創業之君所以為後謀者慎於建都如此夫周自后稷封邰公劉治邠太王居岐文王作豐武王遷鎬又欲宅洛以為末世永安之圖譬則富室厚貲以數十年之經營而後卜宅子孫不幸而敗生息耗敝而不鬻故宅人亦未敢傲然輕之將謂有所振也周平王一有犬戎之禍遂議東遷君子謂之一敗而鬻宅子也是宜其不振也然則何以不亡洛都固武王之志亦成王周公之業也不然則若魏惠遷大梁楚昭遷郢項襄遷陳考烈遷壽春漢末之長安宋末之臨安未或不亡者也議者謂惟漢高祖之遷闗中光武之都南陽我文皇之遷北平當盛而舉擇而居之即武王作鎬周公營洛之意所以為萬世之謀也新作南門胡安國曰言新者有故也言作者創始也其曰南門南非一門也書新作南門譏用民力於所不當為也臣良勝曰魯以周公之勲受成王之賜故禮文僭侈先公習用其故未有創為僭擬如僖公之作南門者僖公賢君也何以有是意者季孫之所為也僖公以成風事季友而得直故賜友汶陽之田及費俾世為卿遂致成風為夫人則友之為也友以素賢終身未敢動於惡友卒數月而行父繼之僖公方在㑹而專兵滅項浸不用公之命越三年而有南門之作是必行父導使為之夫既以諸侯而僭天子則已之以大夫而僭諸侯固其所也復何所憚乎觀僖之脩泮宮復閟宫行父請命于周而史克作頌則其導諛行僭假禮畜奸亦故知也是故奸雄之欲無禮於其國或先為非禮以導君行父之作南門是也或為非禮以動民意如之大蒐是也或濟其好或啟其欲或徇其名或制其心固不獨行於愚暗亦有因其高明如魯僖公者惟人主有以察之而制之於始則不墮其術中矣宋皇國父為太宰為平公築臺妨於農功子罕請俟農功之畢公弗許築者謳曰澤門之晳實興我役邑中之黔實慰我心子罕聞之親執朴以行築者而抶其不勉者曰吾儕小人皆有闔廬以避燥濕寒暑今君為一臺而不速成何以為役謳者乃止或問其故子罕曰宋國區區而有詛有祝禍之本也臣良勝曰子罕可謂善分君宰之謗矣昔齊桓公多内好立宫中七市宫閭七百國人非之管仲不諌而作三歸以掩君過君子每不之與也人臣於君過則當諌諌而不用則當去若曲為汙行以分謗亦懷祿固寵者之為知者為之賢者不為也惟是之為恒以知免也而後逄君長君之惡者得以為口實矣石言於晉魏榆晉侯問於師曠曰石何故言對曰石不能言或馮焉不然民聽濫也抑臣又聞之曰作事不時怨讟動於民則有非言之物而言今宫室崇侈民力彫盡怨讟並作莫保其性石言不亦宜乎於是晉侯方築虒祁之宫叔向曰子野之言君子哉臣良勝曰物無知者必曰草木其發生開落榮悴猶有知也至於石信其頑朴一無所知今而工役敝民亦有所感馮而言者人之與物其初之生皆一氣也人不敢言有託物以言之者矣人不能言有託物以言之者矣晉築虒祁之宫崇侈為甚叔向為卿乃不之言石言之師曠言之而稱曰君子哉則非不知其可言也及諸侯往落而齊侯中壺有志代興乃言曰諸侯貳矣不可以不示威治兵建斾惡是何言也可言而不言是謂不忠不可言而言是謂不知叔向賢者也臣故責備之焉王制曰凡使民任老者之事食壯者之食陳澔曰老者食少而功亦少壯者功多而食亦多今之使民雖少壯但責以老者之功程雖老者亦食以少者之飲食寛厚之至也子曰道千乗之國敬事而信節用而愛人使民以時程頥曰聖人言雖至近上下皆通此三言者若推其極堯舜之治亦不過此臣良勝曰為政者愛養斯民在重其力民力足則生養遂生養遂則教化行教化行則風俗美矣故夫子言治道敬信以正其志節愛以厚其生然後使之而必以時焉所謂時者有歲時也有時勢也故龍見而戒事火見而致用水星正而栽日至而畢此審於歲時而使者也韓昭侯作南門屈宜曰不時所謂時者非時日也人固有利時不利時前年秦㧞宜陽今年旱君不以此時䘏民之急而顧益奢所謂時詘而舉嬴者此審於時勢而使者也君子謂役不違時又當分財用平扳幹稱畚築程土物議遠邇畧基址揣厚薄仍溝洫具餱􅀈度有司董工命日不愆于素然後為愛養斯民之道也嗚呼民力民時其當慎重有如此哉孔子入后稷之廟有金人焉三緘其口而銘其背曰古之慎言人也戒之哉無多言多言多敗無多事多事多患安樂必戒無行所悔勿謂何傷其禍將長勿謂何害其禍將大勿謂不聞神將伺人熖熖不滅炎炎若何涓涓不壅終為江河綿綿不絶或成網羅毫末不札將尋斧柯誠能慎之福之根也口是何傷禍之門也强梁者不得其死好勝者必遇其敵君子知天下之不可上也故下之知衆人之不可先也故後之温恭慎德使人慕之江海雖左長於百川以其卑也天道無親而能下人戒之哉臣良勝曰老氏有言為天下谿為天下谷為天下君其原葢出於此老氏無足取也而斯言有不可廢者人君至尊無上固以下人為難也昔楚子入鄭鄭伯肉袒牽羊以迎楚子曰其君能下人必能信用其民矣是金人者置周后稷之廟則凡嗣君致禮於祖廟必將親繩於祖武覩斯人而誦斯銘固若祖宗之靈有以命之必將有警于心而無敢以君上人矣無上則必下能下則能君矣易曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙盈者上之謂也謙者下之謂也周公之政其後也弱而後亡其以是哉孔子觀於魯桓公之廟有欹器焉問於守廟曰此何器對曰此為宥坐之器孔子曰虛則欹中則正滿則覆明君以為至誡故常置之坐側顧謂弟子曰試注水焉中則正滿則覆夫子喟然歎曰嗚呼夫物烏有滿而不覆者哉子路進曰敢問持滿有道乎子曰聰明睿知守之以愚功葢天下守之以讓勇力振世守之以怯富有四海守之以謙此之謂損之又損之道也臣良勝曰宥坐之器凡君當置之也而必曰明君以為至誡明者易於滿也亦觀諸月三五而盈則明之極矣亦滿之極矣三五而缺葢亦自然之數也魏武得荆州而張松見忽唐莊宗自矜取汴而高氏不朝二君皆明者也葢亦明之為累也人君而知謙之必益滿之必損則戒滿之有器而持盈之有道斯明之至也嗚呼制器尚象聖人有取於易也金人置於后稷之廟百世不遷者也欹器置於魯桓之廟亦三桓所自出將以不毁者也是器也將以為世守而世戒者視之竒技淫巧有不侔矣漢高祖至長安蕭何治未央宮見其壯麗甚怒謂何曰天下匈匃勞苦數歲成敗未可知是何治宫室過度也何曰天下方未定故可因以就宫室且夫天子以四海為家非壯麗無以重威且無令後世有以加也上説臣良勝曰謀臣策士之所為衆人固有不識也蕭何治家不治垣屋欲後世師其儉更欲以侈導上决不為也然則何居闗中可都婁敬曰此扼天下之吭而拊其背也張良曰金城千里天府之國也項羽入咸陽宫殿燒燬乃思東歸遂失大勢高祖起豐沛而諸將多山東人何嘗一日忘洛陽哉高祖雖於五年夏之闗中時宫殿未成寄治於櫟陽爾秋征臧荼復至洛六年取韓信還又至洛七年自征韓信自洛歸宫闕始成高祖自櫟陽徙治而後都長安之心始固然則何之為是順適其意以成大計故假詞曰欲無令後世加爾是則何之深意高祖亦由其術中而不得窺其秘也漢史書上說二字以終之意亦遠矣雖然是非臣之說也葢聞之劉安世云漢文帝即位二十三年宫室苑囿車騎服御無所増益有不便輙弛以利民嘗欲作露臺召匠計之直百金上曰百金中人十家之産也吾奉先帝宫室嘗恐羞之何以臺為唐太宗問褚遂良曰舜造漆器諌者十餘人此何足諌對曰奢侈者危亡之本漆器不已將以金玉為之忠臣愛君必防其漸若禍亂已成無所復諌矣帝曰然朕有過卿亦當諌其漸貞觀六年公卿奏依禮曰季夏之月可以處臺榭今隆暑未退秋霖方始宫中卑濕請營一閣以居上曰朕有氣病豈宜下濕若遂來請糜費良多固請竟不許宋太祖嘗令後苑造薫籠數日不至責怒左右對以事下尚書省尚書省下本部本部下本曹下本局覆奏又得㫖復依方下製造乃進御以經厯諸處行遣至速須數日太祖怒曰誰做這般條貫來約束我左右曰可問宰相上曰呼趙學究來趙普既至上曰我在民間時用數十錢可買一薫籠今為天子乃數日不得何也普曰此是自來條貫葢不為陛下設乃為陛下子孫設使後代子孫若非理製造奢侈之物破壞錢物以經諸處行遣須有臺諌理㑹此條貫深意也太祖大喜曰此條貫極妙若無薫籠是甚小事也臣良勝曰國家工費直是不貲然若文帝惜費之㣲太宗防事之漸唐臣假禮以導侈宋臣立法以防奢玩味於斯是臺閣之小者必慎也况其大者乎器物之用者必慎也况其異者乎洪武八年改建大内宫殿聖祖謂廷臣曰唐虞之時宫室朴素後世窮極侈麗習尚華美去古遠矣朕今所作但求安固不事華麗凡雕飾竒巧一切不用惟樸素堅壯可傳永久使吾子孫守以為法至於臺榭之作勞民費財以事遊觀之樂决不為之宋國公馮勝督建周王殿宇開封府敕諭之曰中原民食所恃者二麥耳近聞爾令有司集民夫欲以九月赴工正當播種之時而役之是奪其時也過此則天寒地凍種不得入土來年何以續食自古治天下者必重農時朕封建諸子將以福民今福未及施而先奪民時朕恐小民之怨咨也敕至其即放還俟農隙之時赴工未晩也聖祖賜臨濠造作軍士衣米諭中書省臣曰憂人者常體其心愛人者每惜其力朕常親軍旅備知其疾苦凡有興造未免資軍民之力土木之工亦甚難集朕每造一膳即思天下軍民之饑服一衣即思天下軍民之寒今臨冬興作之士宜加給米一石衣一襲庶不至饑寒也諭工部曰曩以邊境未寧兵甲未弛故集天下工匠𨽻于京師其中有以病疾致死者不能歸葬深可憫也爾工部即遣人收其遺骸函送其家各以鈔七錠給其妻子瘞之著為令江西行省以陳友諒鏤金牀進聖祖觀之謂侍臣曰此與孟昶七寶溺器何異以其一牀工巧若此其餘可知陳氏父子窮奢極靡焉得不亡即命毁之司天臺進元氏所製水晶宫漏備極工巧中設二木偶人能按時自擊鉦鼓聖祖覽之謂待臣曰廢萬幾之務而用心於此所謂作無益害有益也使移此心以治天下豈至滅亡立命碎之臣良勝曰嘗聞宋儒胡安國曰魯僖公嘗修泮宮復閟宫奚斯董其役史克頌其事春秋不書者宗廟以祀其祖考學校以教國之子弟雖用民力不可廢也我聖祖諸役或以宅中圖大或以報本追遠或以貽謀燕翼或以分建屏翰皆義之所當為者而閔閔焉惟恐傷民之力耗民之財妨民之時又加賜以厚其生歸襯以厚其死而恤及其後是之謂人道使人示萬世子孫法也至於勝國竒技淫巧器用一切毁而不用示萬世子孫戒也而國奢示儉國儉示禮轉移導化之機固有行乎其間矣永樂初建北京採宫殿材木于東南命夏原吉督視運送於號令中備矜恤之意初遷北都軍儲未充文皇命平江伯陳瑄董運百萬石從海道給之建百萬倉於直沽城天津衞籍兵萬人戍守之海溢坍没堤岸起揚之海門厯通泰抵鹽城八百里發卒四十萬修之既罷海運復濟寧臨清河始通南北疏清江浦引水由管家湖入鴨陳口達淮免風濤之患就湖築堤十里以便引舟浚儀真𤓰步二壩鑿吕梁徐州二洪築沛縣刁陽湖濟寧南望湖揚州高郵湖堤内鑿渠四十里以通舟行建橋以便陸行自徐至兖魏相水高下建閘四十有七以時啟閉於淮建常盈倉五十區貯江南輸粟建徐州臨清通州倉以便轉輸濵河置舖舍五百六十八置卒守使導舟行縁堤鑿井樹木為永世利焉臣良勝曰繄我聖祖積累之深足宏文皇經濟之畧工役之興莫重於遷北都而天下不知其害莫煩於通運河而天下不失其利葢定都以鎮北衝所以己萬世之害也通運以制國用所以享萬世之利也其時文武臣工有如原吉如瑄者足以祗承從事通變宜民是謂有君有臣而政無不舉己臣嘗考漢唐初都長安與西北之敵密邇其後亡也東漢則在洛陽南唐則在江南宋遠闕都汴闕南宋之亡又在臨安大叚敵患邇則懼心生懼心生則防之者日慎慎所以能安也敵患遠則怠心生怠心生則忽之者日肆肆所以必危也故曰無怠無荒四方來王文皇所以自南遷北向邇於敵者真高萬古之見貽萬世之安也至於漕河直達京師省民節費迨十之九視秦漢之運率三十鍾而至一鍾者為利既博視元海運委民命於波濤魚龍之區者去害為遠議者恒為過慮謂喉嗌或梗萬一藉海道以濟變殊不思元當盛時海運時至及其衰敗則以蟒衣賜張士誠方國珍僅得百一之償既而升斗不發若果喉嗌有梗國不可為奸雄有如士誠國珍者海道適資彼内侵之道爾以此計彼孰利孰害必有能辨之者若云海道無所不通是則固然文皇時海運百萬抵直沽尹兒灣秦時運負海粟以給北邊吳徐承自海率舟師入齊漢武自㑹稽道海入閩是燕可達齊齊可達吳吳可達閩閩可達粤但計利害終未可重物而輕人也亦未可棄常而圖變也方今漕政日廢軍民困窮或謂畿輔郡邑開田廢地廣召江南之民因高就下相宜開種或引河為渠或因汙為沼使旱有所備潦有所歸縱是逃民遺業亦許坐户代耕止令上供賦税毋假復業毋爭年豐榖賤官糴運京可省漕粟之半折價以為糴本視元儒虞集所議圩海為田為費大減為效尤速至於通州厚儲及鄭村壩上等倉正坐宋人牟駞岡之弊郭藥師以擊毬窺見虛實後引金人據之芻茭有餘京城坐困杞人之憂恒切于此今惠通河於春夏閑月陸續轉運入京亦為思患預防之計隂奪奸雄窺伺之心即如己巳之變議者焚棄通倉殆數百萬策亦晩矣迂陋不知長策冐昧附陳伏惟聖明裁察永樂元年三月有司言殷太師比干墓及祠圯壞請發民脩理上從之因諭侍臣曰君子為國不為身故犯顔諌諍死且不避小人為身不為國惟讒謟面諛以茍富貴明君樂諌諍而國以興昏君樂讒謟而國以亡桀紂殺龍逄比干明效具在而後世人主如秦隋之末皆不監覆轍國安得不亡哉朕方以是為戒爾等當以君子之道自勉庶幾共保祖宗之洪業江西饒州府言鄱陽康山忠臣祠壞請命脩治文皇謂侍臣曰此皆首佐皇考成帝業者也不幸遇艱難效忠奮義以死昔人盛德百世祀今不數年而廟壞不治豈報德勸功之道今國家於異代忠義之臣猶致禮其祠墓况皇考股肱牙爪之臣哉禮父母所愛亦愛之况有功於國乎遂命工部遣官督修仍諭所司歲時嚴祀禮守廟者悉復其家臣良勝曰事無常形禮有義起法有時制未可以執一論也祖宗最慎工役行於其所當行止於其所不可不止皆視理義之當然若脩忠臣之祠嚴佐命之祀是也至論君子敢諌而明君樂諌足以示萬世之忠父母所愛亦愛足以示萬世之孝矣右衍來百工之義舜典曰食哉惟時柔遠能邇惇德允元而難任人蠻夷率服蔡沉曰王政以食為首農事以時為先舜言足食之道惟在於不違農時也柔者寛而撫之也能者擾而習之也遠近之勢如此先其畧而後其詳也惇厚允信也德有德之人也元仁厚之人也難拒絶也任古文作壬包藏凶惡之人也言當厚有德信仁人而拒姦惡也凡此五者處之各得其宜則不特中國乂安雖蠻夷之國亦相率而服從臣良勝曰天無所不覆也地無所不載也雖至於旃裘毳幕之地雕題漆齒之鄉其生育長養於覆載之間與中國無異其心之靈知是非善惡亦人性也故帝王順治生民既遂遠附邇安進善絶惡必有以體天地覆載之德闕故聖王之治外本乎内也又何以虛内事外為哉大禹謨曰帝乃誕敷文德舞干羽于兩階七旬有苗格蔡沉曰舜之文德非自禹班師而始敷苖之來格非以舞干羽而後至史臣以禹班師弛其威武專尚德教干羽之舞雍容不迫有苖之至適當其時故作史者因即其實以形容有虞之德數千載之下猶可以是而想其一時之氣象也旅獒曰明王慎德四夷咸賔無有遠邇畢獻方物惟服食器用蔡沉曰方物方土所生之物明王謹德四夷咸賔其所貢獻惟服食器用而已言無異物也既濟九三高宗伐鬼方三年克之小人勿用程頥曰九三當既濟之時以剛居剛用剛之至也既濟而用剛如是乃高宗伐鬼方之事高宗必商之高宗天下之事既濟而遠伐暴亂也威武可及而以救民為心乃王者之事也惟聖賢之君則可若騁威武忿不服貪土地則殘民肆欲也故戒不可用小人小人為之則以貪憤私意也非貪憤則莫肻為也三年克之見其勞憊之甚聖人因九三當既濟而用剛發此義以示人為法為戒豈淺見所能及也六月詩曰戎車既安如輊如軒四牡既佶既佶且閑薄伐玁狁至于大原文武吉甫萬邦為憲朱熹曰凡車從後視之如輊從前視之如軒然後適調也至于大原言逐出之而已不窮追也先王治夷狄之法如此吉甫尹吉甫此時大將也憲法也非文無以附衆非武無以威敵能文能武則萬邦以之為法矣臣良勝曰天生五材民並用之何能去兵誅討不庭有不能以德來者故不得已而有征伐之舉然若苖民逆命舜禹敷文德以來之鬼方之伐三年乃克玁狁薄伐亦至大原而止以威服夷終非聖王之所尚也又况師危道也器具未備以其卒與敵也士卒未習以其將與敵也將非其人以其國與敵也宣王六月之師車如軒輊戎車整矣壮而佶閑戎馬壯矣戌卒有一月三捷之心矣大將有文武為憲之吉甫矣以此遇敵何敵不禦以此進攻何攻不克况玁狁侵及鎬京又門庭之寇所必禦者亦薄伐之又于大原而止其慎於用師如此此宣王所以為中興之令主也吉甫所以為文武之將也此所以為萬世禦敵之上策也齊人伐山戎胡安國曰北戎病燕職貢不至桓公内無固國外無從諸侯越千里之險為燕闢地可謂能修方伯連帥之職矣何以譏之乎桓不務德勤兵遠伐不正王法以譏其罪則將開後世之君勞中國而事外夷捨近攻而貴遠畧困吾民之力爭不毛之地其患有不可勝言者故特貶而稱人以為好武功而不修文德者之戒也漢武帝時雁門馬邑豪聶壹因大行王恢言匈奴初和親親信邊可誘以利致之伏兵襲擊必破之上召公卿問韓安國曰臣聞高皇帝嘗圍於平城七日不食及解圍反位而無忿怒之心夫聖人以天下為度者也不以己私怒傷天下之功故遣劉敬結和親至今為五世利臣竊以為弗擊便恢曰不然高帝身披堅執鋭行幾十年所以不報平城之怨者非力不能所以休天下之心也今邊境數驚士卒傷死此仁人之所隱也故曰擊之便上從恢議蘇軾曰王恢與韓安國論匈奴於上前至三往復安國初持不可擊甚堅後乃云意者有他謬巧可以擒之則臣不可知也安國揣知主意所向故自屈其議以信恢爾不然安國所論殆天下所以存亡者豈計於謬巧哉安國少貶其論兵連禍結至漢幾亡可以為後世君子之戒罷田輪臺詔曰前有司奏欲益民賦三十助邊用是重困老弱孤獨也迺者貳師敗軍士死畧離散悲痛常在朕心今請遠田輪臺欲起亭隧是擾勞天下非所以優民也當今務在禁苛暴止擅賦力本農脩馬復令以補闕毋乏武備而已眞德秀曰此武帝悔過之書也其事有四益民賦一田輪臺二募囚徒送匃奴使者三明封侯賞以報忿四方帝志盛氣壯時聞羣臣此請必鋭然從之矣更變知難乃始悔艾帝之齒已六十九雖徙義弗早然漢家社稷幾危而實安實有賴焉臣良勝曰武帝之開邊患始於馬邑之議終於輪臺之詔雖帝之矜能自大原始要終皆臣下之罪也嚴安書曰今欲徇南夷朝夜郎深入匃奴燔其龍城此人臣之利非天下之長策也夫惟人臣一有所利而人主恒有所欲欲期於中中先於試主之欲有所貪也試之以利者進矣有所淫也試之以色者進矣有所怠也試之以遊者進矣有所忍也試之以殺者進矣有所驕也試之以譽者進矣有所侈也試之以土木者進矣有所伐也試之以兵革者進矣有所誕也試之以神仙者進矣有所夸也試之以祥瑞者進矣人主一心其欲甚衆鑿秘巧施其術以求試於一中者日且萬也故武帝雄才大畧幾續亡秦皆起於馬邑之一試爾嗚呼人臣自享其利而不顧其君負怨於天下取譏於萬世如漢廷之公卿者觀此亦為之少省矣唐太宗征高麗還京師江夏王道宗薛萬徹等招諭鐵勒諸部酋長請入朝上大喜詔曰夷戎與天地俱生上皇並列流殃搆禍乃自運初朕聊命偏師遂擒頡利始恢廟畧已滅延陀鐵勒百萬萬户散處北漠遠遣使人委身内屬請同編列並為州郡混元以降殊未前聞宜備禮告廟仍頒示普天范祖禹曰太宗不得志於東夷而欲收功於比荒因延陀破亡以兵臨之勢如振槁左袵之民解辮内屬自以為開闢以來未之有也殊不思域外隔絶之氓山川之所限風氣之所移言語不通嗜欲不同得其地不可居得其民不可使也列為郡縣是慕虛名而受實害也且得之既以為功則失之必以為恥其失不在於己則在於子孫故有征討之勞饋餉之擾民不堪命而繼之以亡隋煬帝是也太宗矜其功能好大無窮華夷中外欲其為一非所以遺後嗣馭外國之道此當以為戒者不可慕也魏相諌伐匃奴書曰救亂誅暴謂之義兵兵義者王敵加於己不得已而起者謂之應兵兵應者勝爭恨小故不忍憤怒者謂之忿兵兵忿者敗利人土地貨寶者謂之貪兵兵貪者破恃國家之大矜民人之衆欲見威於敵者謂之驕兵兵驕者滅間者匈奴未有犯於邊境今聞欲興師入其地臣愚不知此兵何兵也今年計子弟殺父兄妻殺夫者凡二百二十二人臣愚以為此非小變也今左右不憂此乃欲發兵報纎芥之忿於遠夷殆孔子所謂吾恐季氏之憂不在顓臾而在蕭墻之内也嚴尤策曰夷狄為害所從來久矣未聞上世有必征之者也後世三家周秦漢征之然而未有得上策者也周得中策漢得下策秦無策焉周宣王時玁狁内侵至于涇陽命將征之盡境而還其視玁狁之侵猶蟁蝱驅之而已故天下稱明是為中策漢武帝選將練兵約賫輕糧深入遠戍雖有克㨗之功胡輙報之兵連禍結三十餘年中國疲弊匃奴亦創艾而天下稱武是為下策秦皇不忍小恥而輕民力築長城之固延袤萬里轉輸之行起於負海疆境既完中國内竭以喪社稷是為無䇿今天下比年飢饉西北邊尤甚大用民力功不可必立臣伏憂之房𤣥齡遺表曰邊鄙賤類不足待以仁義責以常禮古者以方外畜之陛下每决重囚必令三覆五奏進素膳止音樂者重人命也今驅無罪之士卒委之鋒刃之下使肝腦塗地老父孤子寡妻慈母望槥車抱枯骨椎心掩泣其所以變動陰陽傷害和氣實天下之痛也臣願下沛然之詔許高麗自新即臣死骨不朽臣良勝曰古今勤兵於遠者衆矣臣獨舉漢武帝唐太宗者二君皆才武傑出其復平城之讎雪臣民之恥名既正矣師將紀律亦近世無倫偉功茂績漢至幕南無王庭唐至四夷郡縣若足以垂耀萬世然其虛内事外幾於不戢自焚二君亦自悔之况天下後世之議乎三臣之言已盡兵革之憂班固云介胄之士則言征伐尚鑒于茲坎彖曰天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉臣良勝曰自家天下之後而守天下之策立矣至於設險守國固末世之議亦君子所不廢也孔子發此義於坎坎陷之際亦將以重險為足恃也故虞之下陽趙之上黨魏之安邑燕之榆闗吳之西陵秦之函谷蜀之劍閣皆曰一夫當闗萬夫莫敵在中國隣境亦有必守以為固者况中外之大防其山川之險要城壘之堅完可視之為末務而不知謹乎秦始皇廵北邊盧生入海還因奏錄圖書曰亡秦者胡也始皇乃遣䝉恬發兵三十萬人北伐匈奴收河南地為四十四縣築長城因地形用制險塞起臨洮至遼東延袤萬餘里隋煬帝詔發丁男百餘萬築長城西距榆林東至紫河二旬而畢臣良勝曰長城之守至今為防邊之利而秦隋適當其弊遂至於亡何也葢天地間本有此界限至秦隋而後備不然疆場之防弛矣臣謂秦隋之所以亡其故多也豈真以長城哉秦法如毛人心久失阿房宫之建取之錙銖用之泥沙隋暴嗣秦盗錢至死顯仁宫之修運米載兵死者相枕其無益之費於長城者又數倍也使其他無營制而仁愛及民則築城之役未必非保民利也况先始皇而築者秦昭王自隴西以至上郡燕武靈王自代陰山以至高闕其後燕破東胡自遼東以至襄平皆築長城以拒敵矣先臣邱濬曰繼秦者皆因其已城之勢稍加修補之功世世不廢安知天下後世不賴之以界限外内也哉臣故曰君子不以成敗論事也唐景龍間張仁愿於河北築三受降城三疊相距各四百里其北皆大磧置烽火千八百所自是敵人不敢踰山牧馬宋慶厯間范仲淹以慶州西北馬鋪砦當後橋川口在賊腹中欲城度賊必爭密遣其子純佑與蕃將趙明先據其地引兵隨之諸將不知所向行至柔遠版築皆具旬日城成即大順城也大順既城而白豹金湯皆不敢犯環慶自此寇盗益少李牧嘗居代鴈門備匃奴以便宜置吏市租皆輸幕府為士卒費日擊數牛享士習騎射謹烽火多間諜為約曰匃奴入盗則急收保有敢捕賊者斬如是數歲無所亡失匃奴皆以為怯邊士得賞賜而不用皆願一戰於是大破殺匃奴十餘萬騎滅襜襤破東胡單于奔走十餘歲不敢近趙邊趙充國上屯田奏曰臣所將吏士馬牛食月用糧榖茭藁調度甚廣徭役不息恐生他變且羌易以計破難用兵碎也故臣愚以為擊之不便東至浩亹羌虜故田及公田民所未墾可二千頃以上臣願罷騎兵留步兵萬三百八十一人分屯要害處浚溝渠人二十畆省大費曹瑋知鎮戎軍時陜西歲取邊人為弓箭手瑋以塞上廢地募人為之若干畆出一卒至其種歛為發州兵戍守邊賴以安所募皆為精兵使馳射較强弱勝者與田二頃再更秋課市一馬馬必勝甲然後官籍之則加田五十畆至三百人以上團為一指揮擇要害處為築堡使自塹其地為方田繯之立馬社衆為出錢市馬開邊壕山險因其峭絶治之使足限敵後皆為法敵聞曹瑋姓名即以手加額种世衡初至清澗城逼近賊境守備單弱芻糧俱乏世衡以官錢貸商旅使通貨嬴其利未幾倉廩皆實教吏民習射雖僧道婦人亦習以銀為的中者輙與之或事徭役射中得優式有過失射中釋之數年遂成富强延州諸寨中獨不請益兵糧而自足臣良勝曰守邊將吏多賢獨舉法效於古而可施之今者錄之然皆上之人任之專久而不制以法迺克有勲如李牧便宜置吏市租皆聽經費故得死士力後世少有出入文吏有以繩之一議建置將以變更啟釁從法議矣如是而望張范李趙曹种之得策可乎王制曰中國夷蠻戎狄皆有安居和味宜服利用備器五方之民言語不通嗜欲不同達其志通其欲東方曰寄南方曰象西方曰狄鞮北方曰譯方氏曰以言語之不通也則必達其志以嗜欲之不同也則必通其欲必欲達其志通其欲非寄象鞮譯則不可故先王設官以掌之劉氏曰寄者寓也以其言之難通如寄託其意於事物而後能通之象像也如以意倣像其形似而通之周官象胥是也狄猶逖也鞮戎狄屨名猶履也遠履其事而知其言意之所在而通之周官鞮屨氏亦以通其聲歌而以舞者所履為名譯釋也謂以彼此言語相謄釋而通之也越裳氏重九譯而朝是也漢光武時西域諸國侍子久留燉煌皆愁思亡歸莎車王賢知都䕶不至擊破鄯善攻殺龜茲王鄯善王安上書願復遣子入侍更請都䕶都䕶不出誠迫於匃奴帝報曰今使者求兵未能得出如諸國力不從心東南西北自在也於是鄯善車師復附班固曰孝武之世圖制匃奴患其兼從西國結黨南羌乃表河曲列四郡開玉門通西域以㫁匃奴右臂隔絶南羌月氐單于失援由是遠遁而幕南無王庭遭值文景恭黙養民五世財力有餘士馬强盛故能覩犀布瑇瑁則建珠崖二郡感蒟醬竹杖則開牂柯越巂聞天馬葡萄則通大宛安息自是殊方異物四面而至於是開苑囿廣宫室盛帷帳美服玩設酒池肉林以享四夷之客作魚龍角抵之戱以觀視之及賂遺贈送萬里相奉師旅之費不可勝計至於用度不足乃𣙜酒酤筦鹽鐵鑄白金造皮弊算至車船租及六畜民力屈財用竭因之以凶年寇盗並起道路不通直指之使衣繡杖斧斷斬於郡國然後勝之是以末年遂棄輪臺之地而下哀痛之詔豈非仁聖之所悔哉建武以來西域思漢威德咸樂内屬數遣使置質于漢願請都䕶聖上遠覽古今因時之宜辭而未許雖大禹之序西戎周公之讓白雉太宗之郤走馬義兼之矣江統徙戎論曰夫夷蠻戎狄地在要荒禹平水土而西戎即叙其性氣貪婪凶悍不仁四夷之中西北為甚弱則畏服强則侵叛是以有道之君牧夷戎也惟以待之有備禦之有常雖稽顙執䞇而邊城不弛固守强暴為寇而兵革不加遠征期令境内獲安疆場不侵而已魏興之初與蜀分隔疆場之戎一彼一此武帝徙武都氐於秦川此葢權宜之計非萬世之利也今者當之已受其弊矣夫闗中土沃物豐帝王所居未聞夷狄宜在此土也非我族類其心必異而因其衰敝遷之畿服士庶翫習侮其輕弱使其怨恨之氣毒於骨髓至於蕃育衆庶則坐生其心以貪悍之性挾憤怨之情候隙乗便輙為横逆而居封域之内無障塞之隔掩不備之人收散野之積故能為禍滋蔓暴害不測此必然之勢已驗之事也犬馬充肥則有噬嚙况於仇讐能不為變但顧其㣲弱勢力不逮爾此等皆可申諭發遣還其本域慰彼羈旅懷土之思釋我疆宇纎芥之憂惠此中國以綏四方德施永世於計為長也臣邱濬曰昔人有言晉之亡大率中原半為敵居劉淵勁敵也而居晉陽石勒羯也而居上黨姚氏羌也而居扶風符堅氐也而居臨渭慕容鮮卑也而居昌黎種族日蕃其居處飲食日趨於安惟其桀暴貪悍樂鬬喜亂之志態則無時而可變也是以劉淵一倡而并雍之衆乗時四起自長淮之北無復晉土而為戰爭之塲者幾二百年嗚呼後之人思為國家遠慮者其尚為子孫計預有以杜絶消弭之無謂彼既久處中國必無後患而輕忽之哉晉之事可鑒也已臣良勝曰居敵於内地始於漢武綂之所論則魏興之事也徙戎之論始於郭欽綂葢引而申論之也渾邪王降之時漢發車二萬乗以迎之縣官貲馬不得欲斬長安令乃命降者居隴西北地上郡朔方雲中為五屬國至羌胡鮮卑降者漢魏皆居之闗中晉武太康初已殺害長史漸為民患而郭欽之疏竟不見用君子已知五戎之亂不可制也覆車在前晉鑒不遠唐太宗復從温彦博議準漢武故事處突厥降衆東自幽州西至靈州左置定襄右置雲中願入居長安者數萬家夫漢一綫之緒尚存之遠竟為劉淵所賊則西北之遺孽也唐祚幾移於祿山之禍則營州牧豎皆蕃將也則受其蔽者豈特晉哉嗚呼前人不鑒又後人哀之臣恐前人之不鑒非前人而後人之復哀後人也西川節度使李德裕奏吐蕃維州副使悉坦謀請降已遣兵入據其城且陳出師之利百官集議皆請如德裕策牛僧孺曰比來修好約罷戍兵中國禦戎守信為上上以為然詔德裕以其城歸吐蕃執悉坦謀及所與偕來者悉歸之吐蕃盡誅之於境上臣良勝曰君子不登叛人僧孺之議是也但維州唐故地也天寶中改維州郡明皇自陜幸蜀此其喉嗌要害失而復之未為不可君子執論固當右德裕而下僧孺矣或者謂德裕以李宗閔議切父吉甫之政遂相傾斥而分牛李之黨故凡李之議牛輙抑不行大臣不為國謀而專以黨同伐異為能罪亦大矣臣觀德裕達於國體者使非故地而通秦蜀之要害决不為貪廣地以開邊隙之拙謀也異時黠戛斯來言取安西德裕以為不可曰假令安西可得即須置都䕶以萬人往戍何所興廢何道饋輓彼天德振武於京師猶近力猶恐不足况七千里安西哉即安西而有所不取則維州之受必有以策其可取而無疑也宋真宗時詔羣臣議靈州棄守之宜楊億即日奏以為比賊方黠其財猶豐未可以歲月破也須廢棄靈州退保環慶然後以計困之爾帝訪於左右輔臣咸以為靈武乃必爭之地茍失之則沿邊諸州亦不可保帝頗然之宰相李沆奏曰繼遷賊不死靈州必非朝廷所有莫若遣使密召州將使部分軍民空壘而歸如此則闗右之民息肩矣呂中曰靈州之議當以輔臣之言為是而李沆楊億之言為非臣良勝曰君子不以人廢言也輔臣之言獨盡利豈害楊億李沆當局故迷而旁觀亦有聖算惜乎其不能用也漢靈帝時西羌與邊卒亂隴右司徒以為宜棄凉州議郎李燮曰斬司徒天下以安凉州天下衝要國家藩衞牧御失人使一州叛逆崔烈為宰相不思所以弭之之策乃欲割棄一方臣竊惑焉若烈不知是極蔽也知而故言是不忠也噫凉州之不可棄猶靈州之必當守也故何亮上安邊書曰靈武地方千里捨之則戎狄之地廣且饒一患也西域戎狄合而為一二患也冀地馬之所生自匃奴猖獗戰馬咸取足乎西戎今既合而為一夏賊不許諸戎貨馬未知馬從何來五患也觀是書則當時固有定論矣富弼使契丹契丹主曰吾祖宗故地當見還爾弼曰晉以盧龍賂契丹周世宗復取闗南地皆異代事若各求地豈北朝之利哉契丹主召弼同獵引弼馬自近謂曰得地則歡好可久弼反復陳其不可狀且言北朝既以得地為榮南朝必以失地為辱兄弟之國豈可使一榮一辱哉遼使蕭喜來言疆宇神宗問王安石安石對曰將欲取之必姑與之乃詔於分水嶺為界東西失地七百里遂為異日興兵之端云臣良勝曰内外之辨固辨也疆域之辨亦辨也在故地則當世守在要地不可輕棄富弼於遼折其求地讋其氣而服其心矣安石所以輔神宗者厭薄祖宗所以欲圖富强以鞭笞强敵乃降心歛手無故而削七百里之故地終宋之世何能復其尺寸而顧以將欲取之大言欺主獨不内愧於心乎魏絳曰和戎有五利焉戎狄薦居貴貨易土土可賈焉一也邊鄙不聳民狎其野穡人成功二也戎狄事晉四隣震動諸侯威懷三也以德綏戎師徒不勤兵甲不煩四也鑒于后羿而用德度遠至邇安五也君其圖之公悦使魏絳盟諸戎臣良勝曰和戎自絳始也行而既效悼公以是徴賞賜金石之樂矣然絳之意非以和戎為永利也晉當中衰而邇於戎時天下之大敵而爭伯者在楚敵楚未可而復事於戎則腹背皆兵矣雖有智者其何以應之哉其為此者消衆敵而畜力以當大敵權宜之術也後世狃於茍安恒以絳為得策而效之致有假兵來援中夏被毒如肅宗之於回紇信而結盟臣主䝉恥如德宗之於尚結贊皆五利之説有以誤之也悲夫漢高帝八年匈奴冐頓數苦北邊上患之劉敬曰天下初定士卒罷於兵未可以武服也冐頓殺父代立妻羣母以力為威未可以仁義説也誠能以嫡長公主妻之彼必慕以為閼氏生子必為太子冐頓在固為子壻死則外孫為單于豈嘗聞外孫敢與大父抗禮哉九年取家人子名為長公主以妻單于使劉敬結和親約司馬光曰建信侯謂冒頓殘賊不可以仁義説而欲與為婚姻何前後之相違也夫骨肉之恩尊卑之序惟仁義之人為能知之奈何欲以此服冐頓哉葢上世帝王之御戎狄也服則懷之以德叛則震之以威未聞與為婚姻也且冐頓視其父如路人而殺之奚有於婦翁建信侯之術固已疎矣况魯元已為趙后又可奪乎臣丘濬曰夫以創業之君任百戰之將馭戎豈無他䇿而必以所愛以遺所惡哉葢高帝因劉敬之言劉敬本魏絳之説後世遂祖之以為馭戎上策夫以閨閫窈窕之姿為語言不通之配田舍翁溺所愛者尚不忍也孰謂英雄之主如漢高祖唐太宗者乃忍為之哉葢其慕割愛為民之名而不明内外之分人倫之理故也漢文帝遺匈奴書曰漢與匈奴約為兄弟所以遺單于甚厚背約離兄弟之親者常在匈奴然右賢王事已在赦前勿深誅單于若稱書意明告諸吏使無負約有信敬如單于書使者言單于自將并國有功甚苦兵事服繡袷綺衣長襦錦袍各一比疎一黄金飾具帶一黄金犀毗一繡十匹錦二十匹赤綈綠繒各四十匹使中大夫意謁者令肩遺單于賈誼曰天子者天下之首何也上也蠻夷者天下之足何也下也今匃奴慢侮侵掠至不敬也而漢歲致金絮綵繒以奉之是足反居上首顧居下倒懸如此莫之能解猶為國有人乎可為流涕者此也班固匃奴傳贊曰久矣夷狄之為患也故自漢興忠言嘉謀之臣曷嘗不運籌策相與爭於廟堂之上乎人持所見各有異同然總其要歸兩科而已縉紳之儒則守和親介胄之士則言征伐要皆偏見一時之利害而未究匃奴之終始也自漢興至于今有脩文而和親之矣有用武而克伐之矣有卑下而承事之矣有威武而臣畜之矣詘伸異變强弱相反是故其詳可得而言也昔劉敬約和親賂遺單于冀以救安邊境孝惠高后時遵而不違而單于反加驕倨至于孝文與通闗市妻以漢女増厚其賂而匃奴數背約束邊境屢被其害是以文帝中年赫然發奮遂躬戎服親御鞍馬從六郡良家材力之士馳射上林講習戰陣聚天下精兵軍於廣武顧問馮唐與論將帥喟然歎息思古名臣此則和親無益已然之明驗也仲舒親見四世之事猶欲復守舊文頗増其約與之厚幣以没溺其意與盟於天以堅其約質其愛子以累其心當孝武時雖征伐克捷而士馬物故亦畧相當匃奴人民每來降漢單于亦輙拘留漢使以相報復其桀驁尚如斯安肯以愛子而為質乎此不合當時之言也夫邊城不選守邊武畧之臣修障隧備塞之具厲長城勁弩之械恃吾所以待邊寇而賦歛於民遠行貨賂割剥百姓以奉寇仇信甘言守空約而幾胡馬之不窺不已過乎孝宣之世乗武帝奮擊之威值匈奴百年之運因其壞亂幾亡之厄權時施宜覆以威德然後單于稽首臣服遣子入侍三世稱藩賔于漢庭是時邊城晏閉牛馬布野三世無犬吠之警黎庶無干戈之役後六十餘載遭王莽篡位始開邊隙單于由是歸怨自絶邊境之禍搆矣夫規事建議不圖萬世之固而媮恃一時之事者未可以經遠也若乃征伐之功秦漢行事嚴尤論之當矣揚雄諌絶單于書曰匃奴本五帝所不能臣三王所不能制其不可使隙明甚以秦皇之彊䝉恬之威然不敢窺西河乃築長城以界之㑹漢初興以高祖之威靈三十萬衆困於平城高皇后時匃奴悖慢大臣權書遺之然後得解孝文時匈奴侵暴北邊候騎至雍甘泉京師大駭發三將軍屯細栁棘門霸上以備之數月乃罷孝武即位設馬邑之權欲誘單于徒費財勞師一虜不可得見况單于之面乎其後深惟社稷之計規恢萬世之策乃大興師數十萬使衞青霍去病操兵前後十餘年於是浮西河絶大幕破寘顔襲王庭窮極其地追奔逐北封狼居胥山禪於姑衍以臨瀚海自是之後匃奴震怖益求和親然而未肯稱臣也且夫前世豈樂傾無量之費役無罪之人快心於狼望之北哉以為不一勞者不久逸不暫費者不永寧是以忍百萬之師以摧饑虎之喙運府庫之財填盧山之壑而不悔也至本始之初匈奴有桀心欲掠烏孫侵公主乃發五將之師十五萬騎以擊之時鮮有獲徒奮揚威武明漢兵若雷風爾雖空行空反尚誅兩將軍故北狄不服中國未得高枕安寢也逮至元康神爵之間大化神明鴻恩溥洽而匃奴内亂五單于爭立日逐呼韓邪攜國歸死扶服稱臣然尚覊縻之不專制自此以後欲朝者不拒不欲者不强今單于歸義奈何疑而隙之使有恨心因以自絶終無北面之心書奏天子悟焉臣良勝曰和戎之説大行於漢故言議之臣亦盛於漢高帝初欲伐敗而後和文帝守於和憤而欲伐有武帝之功伐而後有宣元成哀之臣服高文武帝當匈奴之强宣元成哀值匈奴之内亂觀賈誼班固之論則無備而安之一於議和不可也觀揚雄之書既服而隙之使之不和不可也宋真宗時契丹次澶州自將禦之次澶州悉以軍事付寇準承制專决號令明肅士卒畏悦已而契丹數千騎來薄城下逆擊之斬獲太半乃引去帝還行宫留凖居北城上曹利用自契丹還言契丹欲得闗南地帝曰所言歸地事極無名若必要求朕當决戰若欲貨財漢以玊帛賜單于有故事宜許之凖不欲賂之以貨財且欲要其稱臣及獻幽薊之地因畫策以進曰如此可保百年無事不然數十年後敵且生心矣凖欲擊之使隻輪不返帝方厭兵曰數十年當有扞禦之者吾不忍生靈重困姑聽其和可也復遣曹利用議歲幣竟以絹二十萬匹銀拾萬兩定和議南朝為兄北朝為弟交誓約各解兵歸陳瑩中曰當時若無寇凖天下分為南北矣凖之功不在於主親征之説而在於當時畫策欲百年無事之計向使其言獲用不惟無慶厯之悔亦無靖康之禍矣臣良勝曰凖之策葢有見於漢之故也漢武之先有公主下嫁歲致金繒之辱漢武之後有稽顙稱藩佩印贊謁之盛强敵之性縱之則佚制之則伏畏戰而求和和不可恃戰勝而後和和必可久故澶淵之和幸有薄城之一勝是以能固不幸而不獲大勝是以不能久也且真宗之主和議久矣是故非凖倉卒之言所能移也曹彬疾時嘗訪以契丹事宜彬曰太祖英武定天下猶委經營和好真宗曰此事朕當屈節為天下蒼生嗚呼豈知和之一字終始為宋宗社之大累也哉宋高宗紹興十二年策進士于射殿賜陳誠之秦熺等及第南省擢熺第一檜以為嫌故以誠之為首以其策專主和議云以孟忠厚為迎䕶梓宫禮儀使王次翁為奉迎兩宫禮儀使金使劉筈來以衮冕圭册册帝為大宋皇帝宋史斷曰宋於金則書奉表稱臣金於宋則書以衮冕來册帝中國屈於外藩至是極矣臣丘濬曰嗚呼帝者中國所自立上受天命而下應人心者也所傳者二帝二王之綂所踐者祖宗列聖之阼况高宗被衮冕即皇帝位郊天享廟君國子民至是已十六年矣乃始受金人之封册被其衮冕以為大宋皇帝抑不知自此以前所被者何等服所稱者何等號耶嗚呼宋之國統至是極矣天理人倫於是乎掃地天冠地履於是乎倒置秦檜之罪上通於天矣洪武元年聖祖將發汴梁大將軍徐達等自陳橋入辭乃諭之曰朕與公等率衆渡江誓除禍亂以安天下今士卒舍父母妻子戰鬭於矢石之間百死一生久未休息朕每念之惕然于心然非得已也中原之民人為羣雄所苦死亡流離徧于道路天監在茲朕不敢怠故命爾等帥師北征廓清中原極民艱苦昔元起沙漠祖宗有德天命入主中國將及百年今其子孫怠荒㒺恤民難天厭棄之君則有罪民復何辜前代革命之際兵戈相加視如仇讐大肆荼戮逆天虐民朕實不忍爾諸將帥當以為戒克城之日毋虜掠毋焚蕩毋妄殺人必使市不易肆民安其生凡元之宗戚皆善待之上答天心下慰人望以成朕伐罪救民之志有不恭命者必罰無赦闕得而治哉爾民其體之如䝉古色目雖非闕族類然同生天地之間有能知禮義願為臣民者與中夏之人撫養無異臣劉基曰冬寒之極必有陽春湍激之下必有深潭十亂之後必有大治理則然也元德既衰九土糜沸鴟張狼顧之豪彌滿山澤萬姓魚喁無所籲告天乃命我皇帝肅將威武代伐不道故一伐而定荆湖再伐而舉全吳三伐而海甸廓清四伐而東越南閩悉歸版圖於是肆伐中原拾宋掇秦挈趙㧞燕兵鋒未至聲聞先及神懾鬼慄匍匐俯伏𤣥莵青海崑崙大漠交趾鐻耳之國莫不獻琛奉表稽首闕下無敢後者闕洪武十八年五開山獠為亂命信國公湯和率師討之掃其窟和入朝乞骸骨上喜為造第於鳳陽謂之曰日本小虜履援東海卿雖老强為朕行視要害地築城増城以固守備遂築海上數十城民四丁取其一為兵以守之雲南梁王拒險弗賔禮部侍郎王禕奉命招諭禕見梁王君臣以天命人心從違吉凶之道反覆開諭王已有降意㑹元後嗣有自立于沙漠遣使托克托欲連兵拒命因以危言迫梁王殺公以固其志托克托欲以威屈禕禕罵曰天迄爾元命我朝實代之汝如爝火餘燼尚欲與日月爭光邪顧謂梁王曰爾朝殺我大兵夕至矣遂被害後命平西侯沐英副頴國公傅友德征之梁王駐兵白石江拒守英敗其軍擒達爾瑪得甲士二萬馬萬匹梁王死滇池島中分兵下烏撒澂江擒大理酋叚世雄雲南大定留王鎮守辨方物定貢賦疎節目以寧使其人於是麓川緬甸車里八百皆内附聖祖深倚信之曰使我無西南之憂者英之功也永樂初西北諸夷來貢命光祿卿賜食既罷禮部尚書李至剛曰西北諸夷陛下撫綏皆已向化邊境已寧文皇曰人嘗言以不治治夷狄夫好善惡惡人情所同豈問於夷狄撫之有道未必不來虎至暴擾之能使馴帖况夷亦飢食渴飲具人心者何不可馴哉但有來者推誠待之爾文皇北征駐蹕上莊堡寧陽侯陳懋為前鋒遇韃靼王額森托噶率妻子部屬來歸懋以入見額森托噶遥望天顔尚有懼色文皇命稍前與語備述誠悃久願來歸但為阿嚕台牽制今幸見陛下是天賜臣再生之日也文皇曰中外本一家朕奉天命為天子天之所覆地之所載皆朕赤子豈有彼此爾今順天道而來君臣相與共享富貴勿憂額森托噶及部屬皆叩首呼萬歲命悉賜酒饌額森托噶退謂所親曰大明皇帝真吾主也舍此何適文皇諭文武羣臣曰遠人來歸宜有以旌異之其封額森托噶為忠勇王賜姓名曰金忠額森托噶之來歸也其甥巴圖罕實贊之遂授巴圖罕都督俱賜冠帶及織金襲衣遂賜宴命金忠坐侯之下伯之上御前珍羞悉輟以賜之宴罷御用金杯等物亦輙賜之於是左右皆贊美功德之盛文皇曰昔唐突厥頡利朝太宗言中外一家有矜大自得之意朕所不取惟天下之人皆遂其生邊境無虞兵甲不用斯朕志也臣良勝曰嗚呼休哉我祖宗馭外之道於古之至善者兼綂條貫而㑹于一也人之恒言大上以德其次以戰以守以辨和斯下矣有戰而示之不戰有守而擇其可守有辨而不殊於辨德以來之誠以安之有撫綏而無議和有謙下而無矜喜至賜姓而不混於天潢視漢賜劉唐賜李宋賜趙姓者不倫位次侯下視待以不臣而位諸王上者尤有體焉嗚呼休哉皇明祖訓曰四方諸夷皆限山隔海僻在一隅得其地不足以供給得其人不足以使令其不自揣量來犯我邊則彼為不祥彼既不為中國患而我興兵輕伐亦不祥也吾恐後世子孫倚中國富强貪一時戰功無故興兵致傷人命切記不可但韃靼與西北邊境互相密邇累世戰爭必選將練兵時謹備之臣良勝曰大哉聖言懿哉聖心以天地界限自有定理有中國必有四方而身親戰陣謀慮深長是以示後之典親切如此以文皇英畧葢古初封逼塞經度圖回故定都鎮扼實其要衝嘗綂六師出塞僅得額森圖罕之附其後大寧故土捐以為賞而東隣之患迫遼東之備僅能撫賞薊州之備益為單弱雲密外蔽棄而不守而西戎之勢合洮岷之守遂為離析甘肅之守亦覺孤懸東勝州既亡黄河套既失而北戎南牧已無寧歲至於交南郡縣竟莫之能為而自委於漢棄珠崖之義皆仰遵祖訓不敢易於言兵故也至英廟時權奄王振誤主决策親征厄於土木之變益足以見聖謨之宏遠矣然則坐削故疆自委要地付之不省已乎曰祖訓所謂選將練兵時謹備之葢有深意存也夫以内治未修外警有急人臣不能效忠宣力必煩天子之尊下與夷狄為敵雖彼殘孽亦策中國之無人也故曰將非其人以其國與敵也天子自將是以身與敵也然則寇凖主澶淵之役非與夫以真宗聞曹彬垂絶之言曰當屈節為天下蒼生是以一意主和奸邪如欽若輩又有遷西蜀江南之議凖以奮𬒮幸而有成足以為解爾孤注之説不意奸臣以此為敗凖之策若其取喻葢亦未可盡非也大抵將帥屢敗不過為邊境之憂天子一敗遂將為宗社之辱英雄勇畧何如漢高謀臣武將何如陳平樊噲擁兵且數十萬而平城之辱幾於不免况其他守成主哉臣嘗以為從古禦戎漢文帝最為得策聖祖之見葢出於此時匃奴宼雲中烽火通甘泉但遣兵屯飛狐句注命將出細栁棘門霸上親往勞之邊陲自足備禦而京師大為聲援戎知有備而不敢輕將知應援而有可恃彼戎且自敝而圖歸也必矣聖祖謂選將練兵為謹備之策者意不取之必不與之也若使邊備廢弛而故彊要地棄不之惜一有議及自度不任而輙以不征遠戎籍口恐非為國之忠謀也臣愚以為祖訓所戒貪戰功無故興師致傷人命者謂貪彼無用之地言也曰邊境密邇累世戰爭時謹備之謂守我故有之地言也今欲舉偏言以隳全盛臣恐非聖祖垂訓之意迂謬末議未敢畢陳焉爾右衍柔遠人之義比象曰地上有水比先王以建萬國親諸侯朱熹曰地上有水水比於地不容有間建國諸侯亦先王所以比於天下而無間者也臣良勝曰聖人之視天下一體也故上之比下下之比上必若水地之無間而後為一此封建之制所以比天下乃所以公天下也公則久故論者恒云周封建而厯年八百秦廢之而郡縣二世而亡惟栁宗元以為封建非聖人之意勢也蘇軾是之遂謂秦建郡縣足為萬世法胡寅折之無遺論矣但封建所以能久郡縣所以速亡臣尚有以申其説焉謂秦專以郡縣速亡則未然而郡縣固有速亡之勢也謂周專以封建而久則未然而封建固有長久之勢也何者封建以天下分而為公其封域之世守者視之為私也郡縣聚天下而為私其守宰之更代者視之為公也天下大數為公之人不若為私者之衆也守公之器不若守私者之衆也人之親孰若父子其饑寒憂樂榮辱成敗相與共之耕父之田不若耕已之田之勤也葺父之廬不若葺已之廬之密也用父之財不若用己之財之嗇也則守宰於郡縣望其若諸侯自守之固斯亦難矣且其疆域世守尺寸不移縱有奸雄强暴併隣兼弱積歲月之勞兵革之費取一邑併一城天子有討之方伯有問之敵國有撓之隣國有救之雖有齊桓晉文之盛兼數國而老且死矣豈若後世一舉兵而下數十城哉是以厯春秋爭奪戰鬭而周擁虛器莫之敢動其假以率諸侯如桓文者必以尊周為名而後可以動衆况能併天下而取周也哉此封建為制中國之利所以能長久之道也况夫天下所以敗亡一在中國一在外藩周之衰時北戎之患晉自當之而不及周也西戎之患秦自當之而不及周也東夷之患燕齊當之而不及周也南夷之患荆楚吳越當之而不及周也列數强國自消肘腋之憂而王室居中絶無邊陲之警此封建為制戎夷之利所以為長久之道也宗元與軾謂封建非聖人意也豈其然哉晉康侯用錫馬蕃庶晝日三接程頥曰大明之君安天下者也諸侯能順附天子之明德是康民安國之侯也故謂之康侯是以享寵錫而見親禮晝日之間三接見於天子也不曰公卿而曰侯者天子治於上者也諸侯治於下者也在下而順附於大明之君諸侯之象也旅􅋙曰王乃昭德之致于異姓之邦無替厥服分寶玉于伯叔之國時庸展親人不易物惟德其物蔡沉曰昭示方物於異姓之諸侯使之無廢其職分寶玉於同姓之諸侯使之益厚其親如分陳以肅慎氏之矢分魯以夏后氏之璜之類王者以其德之所致方物分賜諸侯故諸侯亦不敢輕易其物而以德視其物也顧命曰柔遠能邇安勸小大庶邦蔡沉曰懷來馴擾安寧勸導皆君道所當盡者合遠邇大小而言又以見君德所施公平周溥而不可有所偏滯也蓼蕭詩曰蓼彼蕭斯零露瀼瀼既見君子為龍為光其德不爽壽考不忘朱熹曰為龍為光喜其德之詞也其德不爽則壽考不忘矣臣良勝曰天子燕來朝諸侯而歌此詩既以並笑譽處為樂而此以龍光之德為訓者發乎情止乎禮義也夫德者壽之基也皇極之道曰富曰壽曰康寧必以攸好德終之故惟不爽於龍光之德而後壽考之不忘也雖然此常理也亦有不得其常者顔仁而不壽其德在人永永不忘謂之壽可也若其否德如跖之壽何足筭乎彤弓詩曰彤弓弨兮受言藏之我有嘉賔中心貺之鐘鼓既設一朝饗之吕祖謙曰受言藏之言其重也弓人所獻藏之王府以待有功不敢輕與人也中心貺之言其誠也中心實欲貺之非由外也一朝饗之言其速也未嘗有遲留顧惜之意也後世視府藏為己私分至有以武庫兵賜弄臣者則與受言藏之者異矣賞賜非出於利誘則迫於事勢至有朝賜鐵劵而暮屠戮者則與中心貺之者異矣屯膏吝賞功臣解體至有印刓而不忍與者則與一朝饗之者異矣臣良勝曰君臣勢隔其所以相通者一心而已彤弓之詩只在中心貺之為要也方弓人初獻而藏先有待功之心矣及遇有功而心貺之又何愛惜之焉故凡錫予之恩有一羽重於千鈞其心所與彼亦心受之也萬金視之若無者非心所與亦非心受之也非物視物惟心視物故一彤弓之賜足以昭功懋賞乃其心貺之是以與之者為寵而受之者為榮敵愾之功所以益勤也不然裂土而王不能制侯景之命殘炙之惠陰鏗亦獲脱死之報也謂之何哉王制曰天子之縣内諸侯祿也外諸侯嗣也葉夢得曰内之公卿大夫其受田視公侯子男故亦通稱諸侯也内以世祿為主而有賢者亦得世爵外以世爵為主而不賢者亦止於世祿然則諸侯之子自非大惡猶得襲位而公卿大夫之子必賢而後爵豈輕内而重外乎葢古者公卿大夫有功德則出封為諸侯是在外之世爵乃在内之世祿臣也至諸侯有功德亦必入而為公卿則在内之世祿者或在外之世爵諸侯者内外更易而輕重所以均者此先王之仁政也聘義曰天子制諸侯比年小聘三年大聘相厲以禮使者聘而誤主君弗親饗食也所以愧厲之也諸侯相厲以禮則外不相侵内不相陵此天子所以養諸侯兵不用而諸侯自為正之具也吕大臨曰上下不交則天下無邦人道之所以不能羣也故先王之御諸侯使之相交以修其好必使之相敬以全其交其相交也必求乎疏數之中故比年小聘三年大聘也其相敬也必相厲以禮故使者之誤主君不親饗食以愧厲之然後仁達而禮行外則四隣相親而不相侵内則君臣有義而不相陵也先王制禮以善養人於無事之際多為升降之文酬酢之節賔主有司有不可勝行之憂先王未之有改者葢以養其德意使之安於是而有憚也故不安於偷惰而安於行禮不恥於相下而恥於無禮也天子以是養諸侯諸侯以是養其士大夫上下交相養此兵所以不用天下所以平也武王追思先聖乃褒封神農之後於焦黄帝之後於祝帝堯之後於薊帝舜之後於陳大禹之後於杞於是封功臣謀士而師尚父為首封於營丘曰齊封周公於曲阜曰魯召公奭於北燕畢公高於畢弟叔鮮於管叔度於蔡叔振鐸於曹叔武於郕叔處於霍兼制天下立七十一國臣良勝曰興滅國繼絶世天下之民歸心焉武王封建先聖賢之後次功臣次兄弟同姓有賢賢有庸庸有親親輕重有倫内外屏翰曹冏曰百足之虫至死不僵以其扶之者衆此之謂也宣王欲得國子之能訓導諸侯者樊穆仲曰魯侯孝王曰何以知之對曰肅恭明神而敬事耉老賦事行刑必問於遺訓而咨於故實不干所問不犯所咨王曰然則能訓治其民矣乃命魯孝公於夷宫胡安國曰昔畢高以父師而保釐東土衞武以列國而入相于周葢與後世出入均勞之意同漢高帝六年剖符封諸功臣異姓為王者八人列侯一百四十四人班固諸侯王表曰昔詩書述虞夏之際舜禹受禪積德累功洽於百姓攝位行政考之於天經數十年然後在位殷周之王乃由稷契脩仁行義厯十餘世至於湯武然後放殺秦起襄公章文繆獻孝昭嚴稍蠶食六國百有餘載至始皇乃并天下以德若彼用力如此其難也秦既稱帝患周之敗以為起於處士横議諸侯力爭四夷交侵以弱見奪於是削去五等墮城銷刃鉗語燒書内鋤雄俊外攘胡粤用壹威權為萬世安然十餘年間猛敵横發乎不虞適戍强於五伯閭閻偪於戎狄響應㿊於謗議奮臂威於甲兵向秦之禁適所以資豪傑而速自斃也是以漢無尺土之階由一劍之任五載而成帝業書傳所紀未嘗有焉何則古世相革皆承聖王之烈今漢獨收孤秦之弊鐫金石者難為功摧枯朽者易為力其勢然也故據漢受命譜十八王月而列之天下一綂乃以年數訖于孝文異姓盡矣臣丘濬曰古者爵有公侯伯子男然既列之以爵則必分之以土使以蒞其土主其神以君其民自秦漢以來始有封以郡邑之名而惟奉朝請於朝曽不一出國門者漢之封爵止於侯而無有所謂公伯子男者書於此以志其始文帝令列侯之國詔曰朕聞古者諸侯建國千餘各守其地以時入貢民不勞苦上下歡欣靡有違德今列侯多居長安邑遠吏卒給輸費苦而列侯亦無由教訓其民其令列侯之國為吏及詔所止者遣太子臣良勝曰漢初封異姓功臣皆未就國同姓諸王則分裂天下大半田肯謂秦得百二齊得十二非親子弟莫可王齊而吳王鑄山煮海資以强戾主父偃建議於武帝朝曰諸侯子弟十數而適嗣代立餘無尺地之封故詔令推恩分子弟邑則藩國益分而子弟悉侯是為同姓分國之始文帝此詔是為異姓就國之始宣帝封丙吉後詔曰葢聞褒有功繼絶綂所以重宗廟廣賢聖之路也故博陽侯吉以舊恩有功而封今其祀絶朕甚憐之夫善善及子孫古今通誼也其封吉孫中郎將闗内侯是故博陽侯奉吉後光武賜諸侯策曰在上不驕高而不危制節謹度滿而不溢敬之戒之傳爾子孫長為漢藩封功臣詔曰人情得足苦於放縱快須臾之欲忘其罰之義惟諸將策逺功大誠欲傳之無窮宜如臨深淵如履薄氷戰戰慄慄日慎一日其顯功未酬名籍未立大鴻臚趣上朕將差而録之臣良勝曰右三詔義近古詞亦近古故錄之以為後世法唐太宗時諸王歸藩上與之别曰兄弟之情豈不欲常相共處耶但以天下之重不得不爾諸子尚可復有兄弟不可復得因流涕嗚咽不能已真德秀曰太宗此言其殆有感於隱巢之事乎昆弟至情雖不幸怵於利害或有時而忘然是理之真終有不可掩者使能因此心之發而知夫天理之不可昧則見之於事必有充其實矣惜太宗之不能也唐憲宗遣裴度至魏博宣慰以錢百五十萬緡賞軍士六州百姓給復一年軍士受賜歡聲如雷成湘兖鄆使者數軰見之相顧失色歎曰倔强者果何益乎度為田興陳君臣上下之義興聽終夕不倦臣良勝曰唐之方鎮擬古諸侯至於賜錢宣慰不可以言懷柔之道矣但憲宗當其難裴度處其變固亦有足稱者議者每謂方鎮非能亡唐唐自亡也臣謂唐非自亡奸邪亡之也貞觀之時嘗任蕃將阿史那社尒契苾何力皆以忠奮一有文臣總制之其後以積勞多入相如郭元振張說者林甫忌之恐奪己權乃請悉以蕃將代漢將而安思順安祿山高仙芝哥舒翰遂為大將而起天寶之禍其後成德則李寶臣魏博田承嗣相衞薛嵩盧龍李懷仙各收安史餘黨擁勁兵數萬治兵完城自署文武將吏不供貢賦遂請襲封朝廷不能制雖在中域藩臣實同蠻貊憲宗剛明輔以李絳裴度乃能諭河北平淮蔡終於復叛而唐因以亡然則自天寶迄建隆初凡二百有七年推原禍本由林甫以蕃將代漢將之故也彼其用心不過欲絶節度入相之階以久已權耳而遂貽宗社之禍斷棺之戮葢亦晩矣宋太祖乾德初吳越王錢俶來朝帝待之甚厚晉王乃與中外臣僚表請留俶帝曰俶職貢無闕今又來朝若利其土宇而留之何以示信於天下也俶辭歸國賜與金帛名馬以黄綃封署文書一束付俶曰候至國開之俶開封乃羣臣請留五十餘封俶大驚上表稱謝元城語錄曰大哉太祖之神武也既平孟蜀而兩浙錢王入朝羣臣爭欲留之聖意不允晉王從容言及太祖曰二哥你也出這言語我平生不曽欺善怕惡不容易留住這漢候捉得河東薛王來令納土至太平四年河東既平乃令錢王納土先生曰太祖此意何也僕曰此所謂不欺善也先生曰此固然錢氏久據兩浙李氏不能侵藉使錢王納土使大將鎮之未必能用其民須本朝兵去鎮服又未必能守兩浙必不敢附李氏李氏既平則兩浙安歸乎此聖謨之宏遠也宋高宗紹興元年詔曰太祖皇帝創業垂綂德被萬世神祖詔封子孫一人為安定郡王世世勿絶今其封不舉朕甚憫之有司其上合封人名遵故事施行遂以燕懿王𤣥孫令疇襲封臣良勝曰高宗此詔實天理民彛之不可泯焉者也惟有此詔而後有婁寅亮之請有孝宗理宗之立德昭德芳之後皆嗣帝業以終太祖之綂矣洪武初廣東何真率其官屬入朝詔授真江西行省㕘政聖祖諭之曰天下紛爭所謂豪傑有三易亂為治者上也保民達變識所歸者次也負固偷安流毒生民身死不悔斯不足論矣頃者師臨閩粤卿即輸誠來歸不煩一旅之力使兵不血刃民庶按堵可謂識時達變者矣真叩首謝曰昔武王伐暴救民諸侯不期而㑹者八百聖上除暴亂以安天下天命人歸四海景從臣本外邦之人始者逢亂不過結聚鄉民為保生之計實無他志今幸遇大明麗天無幽不燭臣愚豈敢上違天命聖祖曰夫能不賈禍於生靈者必世享其澤朕嘉卿忠念江西地近廣東用是特授江西行省㕘政以表來歸之誠古云令名德之輿也令名既著尚懋脩厥德以輔我國家臣良勝曰按秦史胡亥時南海尉任囂病且死召龍川令趙佗語曰番禺負山險阻南海東西數千里頗有中國人相輔此亦一州之主可為國陀遂行南海尉事至漢文帝時乃有賜尉佗書入貢稱藩而已光武於竇融亦賜書曰必有任囂教尉佗制七郡之計融既歸遂以為凉州牧今何真所據尉佗故國也不煩檄諭而服既服而官于近地威德並行視文帝光武之為遠邁之矣永樂五年安南國陳王為黎季犛篡弑文皇命新城侯張輔綂兵八十萬往問其罪賊沿江列栅六七百里水陸拒守王師扼江口破其堅壁遂㧞多邦城進攻交州引兵蹙清化城覆其巢穴降夷民十餘萬季犛遁入海輔屯兵醎子闗賊襲我朝擊敗之擒季犛并二子蒼澄交南平遂議復古郡縣都布按三司綂鎮之輔還進爵英國公以刑部尚書黄福兼掌三司事狥其所欲革其所惡勞輯訓飭戒郡邑吏脩撫字之政福以新造之邦新附之民改令區畫靡問纎鉅悉盡心焉臣良勝曰按名臣錄所叙如右嘗讀五倫書載四年文皇諭成國公朱能往征有曰陳日煃在我太祖高皇帝時率先歸順日煃死其後王為賊臣黎季犛所弑僭稱大號殺陳氏子孫殆盡罪人既得即擇陳氏子孫之賢者立之使撫治一方嗚呼大哉斯言興滅繼絶治亂持危真古懷諸侯之道也至五年而輔始討平之郡縣其地以福鎮治之七年而餘孽簡定煽亂又命輔往討獲之以歸九年陳季擴假復陳氏後以叛復命輔往討獲之以歸福撫治幾二十年交人戴福如父中官馬騏怙恩肆虐為福所抑誣福有異志文皇曰此君子不容於小人寢其奏仁廟驛召福還以兵部尚書陳洽代治馬騏激變交人復叛命將帥討之載福以往我師失利福為賊所得皆下馬拜館禮如昔津送北歸至宣廟初交人乞立陳氏後命大學士楊士奇與楊榮謀之咸曰十數年來兵民困於交阯極矣漢棄珠崖前史以為美遂從其請至是而文皇擇立陳氏復之初命始行安南職貢惟謹南人無兵革之擾已為百年利聖謨宏遠臣故備陳之若預阻外徼生事之心則犬馬之愚也永樂七年甘肅總兵何福奏托克托布哈率所部來歸命諭德楊榮往同福處置西寧侯宋琥奏叛寇婁達衮逃居赤斤䝉古衞將為邊患命豐城侯李彬𠞰之且命楊榮往與計度可否還奏曰天時沍寒人疲馬瘠不可行且小敵不足煩大軍無幾叛者復歸臣良勝曰我文皇英畧葢世而於懷綏邊境慎重如此此所以收内外寧謐之效也右衍懷諸侯之義中庸衍義卷十二
