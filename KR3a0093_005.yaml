body:
  text: 中庸衍義卷五明夏良勝撰達道之義君臣之常君臣之戒君臣之變乾彖曰首出庶物萬國咸寧朱熹曰聖人在上髙出於物猶乾道之變化萬國各得其所而咸寧猶萬物各正性命而保合太和也臣良勝曰君之道一天之道也乾道運四德以時而萬物各有其生故一物之失其節者天道之未備也聖人行四德以治而萬物各遂其生故一物之失其所者君道之未至也泰彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也臣良勝曰天下者天之天下也天不能自治而付之君君不能獨治而資之臣資則交交則同大同則泰道成矣故天地之交時運所以為泰君臣之交治道所以為泰然而隂陽內外君子小人其消長之機間不容髮若使昵于羣小比之匪人固亦謂之交也而可以為泰乎恆彖曰日月得天而能久照四時變化而能久成聖人久於其道而天下化成臣良勝曰日月之所以恆者以其得天天德剛健而不息也四時之所以恆者以其變化變化流動而不滯也君治之所以恆者以其有道道則合內外貫終始而一致若日月之不息四時之不滯是以天下化成皆聖人之道之恆也若漢武帝欲效唐虞之治而內則多欲唐太宗身致太平而魏徵十漸之陳其不克終者多矣此君道以恆為貴也觀六四觀國之光利用賔于王程頤曰聖明在上則懷抱才德之人皆願進於朝廷輔戴之以康濟天下四既觀見人君之德國家之治光華盛美所宜賔于王朝效其知力上輔於君以施澤天下故云利用賔于王也臣良勝曰君德之修天下所觀也况下觀而化孰不願賔于王朝者乎雖然蠱之上九亦有不事王侯髙尚其事者蠱壞之極非君子可以有為之時而又無所於幹其蠱者既不能屈道以狥時則亦髙尚其事以守志節而已故曰有道則見無道則隱人臣出處之大節也豫九四由豫大有得勿疑朋盍簪程頤曰四大臣之位六五之君順從之以陽剛而任上之事豫之所由也故云由豫大有得言得大行其志以致天下之豫也勿疑朋盍簪四居大臣之位承柔弱之君而當天下之任危疑之地也獨當上之倚任而下無同德之助所以疑也惟當盡其至誠勿有疑慮則朋類自當盍聚矣蹇九五大蹇朋來程頤曰以陽剛中正之君而方在大蹇之中非得陽剛中正之臣相輔之不能濟天下之蹇也二之中正固有助矣欲以隂柔之助濟天下之難非所能也自古聖王濟天下之蹇未有不由賢聖之臣為之助者湯武得伊吕是也中常之君得剛明之臣而能濟大難者劉禪之孔明唐肅宗之郭子儀德宗之李晟是也雖賢明之君茍無其臣則不能濟於難也繫辭曰君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也楊萬里曰唐髙宗告武后以上官儀教我廢汝此君不密而失臣也陳蕃乞宣臣章以示宦官此臣不密而失身也臣良勝曰易興於中古是以有憂患之道也若上古君臣如天地顯設都俞吁咈雍容一堂知無不言言無不盡曰嚚訟曰象恭滔天曰方命圯族言之者無諱受之者無怨人何密言之有故李沆作相獨無密啓公事則公言之凡人臣而有密啓非讒即佞也然則易之訓也不得已而待衰世之意耶又曰二與四同功而異位二多譽四多懼朱熹曰同功謂皆隂位異位謂逺近不同四近君故多懼柔不利逺而二多譽者以其柔中也臣良勝曰易爻五位君也其用陽也剛也其四與二位臣也其用隂也柔也四以近君而懼二以逺君而譽然則為人臣者皆以逺君為利而近君之地有不可居者乎恐未必然四之近君者以權寵之盛而日進不已所謂臣而作威作福近於逼矣是以多懼若霍光是也然有身在外服而威震朝廷若桓溫者亦以位近於君而懼乎二之逺君以權寵方盛而履滿知足所謂罔以寵利居成功知所忌矣若伊尹是也然有身在相位不任薦士之恩如王曾者豈必以位逺於君而譽乎元儒許衡有曰君猶日也臣猶月也月近於日則魄滅而弦月逺於日則魄生而望若月與日敵則食矣此言最善名狀庶乎知易理者大禹謨曰后克艱厥后臣克艱厥臣政乃乂黎民敏德蔡沉曰禹言君而不敢易其為君之道臣而不敢易其為臣之職夙夜祗懼各務盡其所當為者則其政事乃能修治而無邪慝下民自然觀感速化於善而有不容己者矣真德秀曰大禹言君臣之道蔽之以克艱一言可謂至矣蓋以為艱則存敬畏之心以為易則啓驕逸之志此治亂安危之所以分也益稷帝庸作歌曰敕天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉臯陶拜手稽首揚言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉帝拜曰俞往欽哉蔡沉曰舜作歌而責難於臣臯陶賡歌而責難於君君臣之相責難如此有虞之治兹所以不可及也歟臣良勝曰舜先述作歌之意則敬天之命而已臯陶述賡歌之意則慎君之憲而已蓋君之所尊者天臣之所尊者君其義一也君責於臣則先股肱而後元首臣望於君則先元首而後股肱其一德一心而相待之一體自足以想見唐虞之盛說命曰惟后非賢不乂惟賢非后不食其爾克紹乃辟于先王永綏民說拜稽首曰敢對揚天子之休命蔡沉曰君非賢臣不與共治賢非其君不與共食言君臣相遇之難如此克者責望必能之詞敢者自信無慊之詞對者對於己揚者揚於衆休命上文髙宗所命也至是髙宗以成湯自期傅說以伊尹自任君臣相勉勵如此異時髙宗為商令主傅說為商賢佐無愧於成湯伊尹也宜哉臣良勝曰髙宗傅說其自任自信果如是之重也其初責望蓋亦有然者說曰監于先王成憲其永無愆是以成湯望髙宗也王曰毋俾阿衡專美有商是以伊尹望說也惟其相望之深是以相信之篤而自任之重也中興之治豈偶然哉鹿鳴詩曰呦呦鹿鳴食野之蘋我有嘉賔鼓瑟吹笙吹笙鼓簧承筐是將人之好我示我周行朱熹曰君臣之分以嚴為主朝廷之禮以敬為主然一於嚴敬則情或不通而無以盡其忠告之益故先王因其飲食聚㑹而制為燕享之禮以通上下之情其樂歌又以鹿鳴起興而其禮意之厚如此庶乎人之好我而示我以大道也記曰私惠不歸德君子不自留焉蓋其所望於羣臣嘉賔惟在於示我以大道則必不以私惠為德而自留矣嗚呼此其所以和樂而不淫也歟假樂詩曰之綱之紀燕及朋友百辟卿士媚于天子不解于位民之攸塈朱熹曰言人君能綱紀四方而臣下賴之以安則百辟卿士媚而愛之惟欲其不解于位而為民所安息也吕祖謙曰君燕其臣臣媚其君此上下交而為泰之時也泰之時所憂者怠荒而已此詩所以終不解于位民之攸塈也方嘉之又規之者蓋臯陶賡歌之意也民之勞逸在下而樞機在上上逸則下勞矣上勞則下逸矣不解于位乃民之由休息也臣良勝曰鹿鳴所以望於臣者厚禮意而示道也假樂所以愛其君者戒怠寧以安民也合說命觀之則三代之時君臣相與庶幾唐虞矣齊景公曰維據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心故詩曰亦有和羮既戒且平鬷假無言時靡有爭臣按晏子之告景公者如此則春秋君臣於可否之成和同之辨有不足言無復西周警戒之道矣坊記曰善則稱君過則稱己則民作忠君陳曰爾有嘉謀嘉猷則入告爾后于內爾乃順之於外曰斯謀斯猷惟我后之德於乎是惟良顯哉吳澄曰人臣善稱君過稱己則民化之皆興起而盡忠於君引書君陳歸美於君之事於乎歎詞是謂如此也言臣能如此則是良臣而君之名亦顯矣臣良勝曰人臣之義無以有已况敢有其善哉但由左氏觀之則君以同欲為忠由坊記觀之則臣以讓善為良故伯宗道取輦者之意以應梁山之召子反在君之側而專平國之功皆非君子所韙也然惟斯言之興也君每以臣專其善為嫌其失也妬臣每以欲遜其名為良其失也諂故桓公多嬖而管仲亦有三歸晏子諫築臺不聽則執杖而督工以為當然皆將曰善稱君而過稱己也諂者愈多而妬者日積紛然與下爭能皆此說啓之也定公問君使臣臣事君如之何孔子對曰君使臣以禮臣事君以忠臣良勝曰乾侯柩返􅻤隤嗣位昭公不得正其終定公不得正其始死生廢置盡出季氏之手君臣之間無復有聞禮與忠者去同欲專善又甚逺焉定公之問夫子之對其有慨於時者深矣其後穆公問反服於子思對曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若將加諸膝退人若將墜諸淵毋為戎首不亦善乎至孟子告齊王則以草芥冦讎為比去夫子之論又逺矣至秦而後尊君卑臣之禮日以益甚君亢然自尊於上如天地神明之不可親臣退然自卑於下如僕𨽻趨奔之惟恐後此皆末流之勢有不能已者孟子曰欲為君盡君道欲為臣盡臣道二者皆法堯舜而已矣朱熹曰法堯舜以盡君臣之道猶用規矩以盡方員之極此孟子所以道性善而必稱堯舜也臣良勝曰世教既衰君臣道喪然而人心義理足以為堯舜者自在也善反之以造其極亦存乎人焉爾臣故有望於今日而以孟氏之說進焉晉悼公即位于朝始命百官施舍己責逮鰥寡振廢滯匡乏困救灾患禁淫慝薄賦斂宥罪戾節器用時用民欲無犯時使魏相士魴魏頡趙武為卿荀家荀惠欒黶韓無忌為公族大夫使訓卿之子弟共儉孝弟使士渥濁為大傅使修范武子之法右行辛為司空便修士蒍之法辨糾御戎校正屬焉使訓諸御知義荀賔為右司士屬焉使訓勇力之士時使卿無共御立軍尉以攝之祈奚為中軍尉羊舌職佐之魏絳為司馬張老為侯奄鐸遏冦為上軍尉籍偃為之司馬使訓卒乘親以聽命程鄭為乘馬御六騶屬焉使訓羣騶知禮凡六官之長皆民譽也舉不失職官不易方爵不踰德師不陵正旅不逼師民無謗言所以復霸也李廉曰晉悼公其猶有君子之資乎不獨伯功之美也齊桓歷變履險以數十年之經營而行事未免過舉晉文老於奔走晚而復國然血氣之驕悍未除悼公之齒淺矣乃能忠厚而不迫堅忍而持重有回顧郤慮之謀無輕逞輒快之舉其亦稍知以道養心者與臣良勝曰若晉悼亦知有君道乎惜乎其施止於晉國而已然皆自其己君而言權力足以任是亦其恆也方初迎立之時皆出欒書中行偃之䇿使程滑弒厲公者亦二子也其依違蘊畜之念待悼公啓口以為向背者未嘗置也今其言曰孤始願不及此雖及此豈非天乎二三子用我今日否亦今日天命君威一時伸令縱有奸雄喪心讋氣而不敢動故入國而逐不臣者七人舉六官於民譽自負迎立之功如欒如偃者卒不齒焉君臣大義凛然可畏但恨其未正法爾檀弓文子曰我則隨武子乎利其君不忘其身謀其身不遺其友晉人謂文子知人文子其中退然如不勝衣其言呐呐然如不出諸其口所舉於晉國管庫之士七十家生不交利死不屬其子焉陳澔曰左傳言夫子之家事治言於晉國無隱情蓋不忘其身而謀之知也利其君不遺其友皆仁也雖有舉用之恩於其人而生則不與之交利將死亦不以其子屬託之亷潔之至也蘇軾曰料敵强弱而知師之勝負此將帥之能也不求一時之功愛君以德而全其宗嗣此社稷之臣也鄢陵之役范文子獨不欲戰晉卒敗楚范文子疑若懦而無謀者矣然不及一年三郤誅厲公弒胥童死欒書中行幾不免於禍晉國大亂鄢陵之功實使之然也臣良勝曰桓文之佐如仲如軫皆近功利若本諸身刑諸家如文子者不可得已故其初王命黻冕將中軍晉國之盜遂奔于秦此豈一朝一夕之故哉其所本者深矣鄢陵之戰獨舉聖人能內外無患為言及既勝而還師不有其功且曰愛我者祈余速死無及於難捐館而匠麗氏之難作矣及虢之㑹子木致問為何如人趙武言其家事治楚以是知晉未可敵也夫君子而修於身宜於家用人於朝死生有益於國而重於敵臣之則也趙武九原之遊而擇所歸也得之矣漢光武長於民間頗達情僞見稼穡艱難百姓病害至天下已定務用安靜解王莽之煩密還漢世之輕法身衣大練色無重綵耳不聽鄭衛之音手不持珠玉之玩宫房無私愛左右無偏恩其以手迹賜方國者皆一札十行細書成文勤約之風行於上下故能內外匪懈百姓寬息真德秀曰光武早為儒生及即位孜孜經術又如此宜其光復舊物身致升平視少康周宣蓋庶幾焉在位三十餘年雖鮮有過事而以無罪廢正后易太子則有愧刑家之義以直諫殺大臣則有乖從諫如流之美蓋其所學未至於明善誠身之地故於父子夫婦君臣之際不能無可憾者焉曹操南擊劉表㑹表卒子琮為嗣操至新野琮遂舉州降操時劉備屯樊大驚呼部曲共議或勸備攻琮荆州可得備曰劉荆州臨危託我以孤遺背信自濟吾所不為備將其衆去過襄陽州人多歸備比到當陽衆十餘萬人輜重數千兩日可行十餘里别遣關羽乘船數百艘使㑹江陵或謂備曰宜速行保江陵備曰濟大事者以人為本今人歸吾吾何忍棄去習鑿齒曰劉𤣥德雖顛沛險難而信義愈明勢逼事危而言不失道追景升之顧則情感三軍戀赴義之士則甘與同敗終濟大業不亦宜乎臣良勝曰明其道不計其功正其義不謀其利斯之謂仁𤣥德於此蓋近之矣其後既敗當陽劉璋以好迎之不數月扼其吭拊其背而奪其國璋亦表之匹也蘇軾以歸責孔明曰遷劉璋既已失忠臣義士之望乃始治民振旅為仁義之師東嚮長驅而欲天下響應蓋亦難矣昭烈病篤命丞相亮輔太子謂亮曰君才十倍曹丕必能安國終定大事若嗣子可輔輔之如其不才君可自取亮涕泣曰臣敢不竭股肱之力效忠貞之節繼之以死敕太子曰人五十不稱夭吾已六十有餘何所復恨但以卿兄弟為念耳勉之勉之勿以惡小而為之勿以善小而不為惟德惟賢可以服人汝父德薄不足效也汝與丞相從事事之如父胡寅曰或謂昭烈自知劉禪之不才羣臣無出孔明之右者不能保孔明之必與禪也故於臨終正言之冀亮德己而不忍取嗚呼可謂以小人之腹度君子之心矣𤣥德襟度夷曠磊磊落落與孔明兼君臣師友之契三代以還未見其比也夫豈以欺詐相待如市道之交乎曹操僞定一時名在英雄之列夷考其心事乃真小人爾雖暴戾强亢殺人不忌至其病亡子孫滿前咿嚶涕泣留連妾婦分香賣履區處衣物平生奸僞死乃盡見方之𤣥德治命無一語及私豈不猶蔓草之與長松乎語禪曰勿以惡小而為之勿以善小而不為惟賢惟德可以服人㫖哉斯言皆可師法則知𤣥德天資既髙克己有力其從盧植陳元方鄭康成游啓告詳至宏益多矣宋太祖性仁孝豁達質任自然不事矯飾即位之初頗好微行或諫輕出歎曰帝王之興自有天命有天命者任自為之一日罷朝坐便殿不樂者久之左右請其故曰爾謂為天子容易邪早作乘快誤决一事故不樂爾嘗宴近臣紫雲樓下因論及民事謂宰相曰愚下之民雖不分菽麥藩侯不為撫養務行苛虐朕斷不容之新宫成御正殿坐令洞開諸門皆端直軒豁無有壅蔽因謂左右曰此如我心少有邪曲人皆見之矣胡一桂曰即此而觀君人之道真偉然矣究其所以然者豈無所本哉帝嘗聞道理最大一言既足以為植國之根本而其正心修身之學實有非人所能企及者朱文公稱太祖不為言語文字之學而方寸之地正大光明直與堯舜之心合誠哉是言矣諸葛亮出師表略曰臣本布衣躬耕南陽茍全性命於亂世不求聞達於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中咨臣以當世之事由是感激遂許先帝以驅馳後值傾覆受任於敗軍之際奉命於危難之間邇來二十有一年矣先帝知臣謹慎故臨崩寄以大事也受命以來夙夜憂懼恐付託不效以傷先帝之明故五月渡瀘深入不毛今南方已定兵甲已足當奬率三軍北定中原庶竭駑鈍攘除奸凶興復漢室還于舊都此臣所以報先帝而忠陛下之職分也陳壽曰諸葛亮之為相國也撫百姓示儀軌約官制從權制開誠心布公道盡忠益時者雖讎必賞犯法怠慢者雖親必罰服罪輸情者雖重必釋游詞巧飾者雖輕必戮善無微而不賞惡無纎而不貶庶事精練物理其本循名責實虛僞不齒終於邦域之內咸畏而愛之刑政雖峻而無怨者以其用心平而勸戒明也朱黻曰孔明髙卧南陽自比管樂時人莫之許也余切論之孔明王者之佐伊尹之儔也管樂之比特主乎撥亂繼絶之志一時自寓之言耳胡寅曰孔明一代之英逺謀宏議無不售者至其自明之語曰謹慎而已何其約也詩不云乎惟此文王小心翼翼昭事上帝聿懷多福若亮者有文王之小心矣彼劉禪凡庸何足以當元臣如此之敬而孔明事之靡不盡道握國魁柄總御六師而無專意恣行毫末可指者非盛德孰能臻此張栻贊曰維忠武侯識其大者仗義履仁卓然不舍方卧南陽若將終身三顧而起時哉屈伸難平者事不昧者幾大綱既得萬目乃隨我奉天討不震不竦惟一其心而以時動噫侯此心萬世不泯遺象有嚴瞻者起敬唐太宗與羣臣語及教化曰今承大亂之後恐斯民未易化也魏徵對曰不然久安之民驕佚驕佚則難教經亂之民愁苦愁苦則易化譬猶饑者易為食渴者易為飲封德彞非之曰三代以還人漸澆訛故秦任法律漢雜霸道蓋欲化而不能豈能之而不欲邪徵曰五帝三王不易民而化行帝道而帝行王道而王顧所行何如耳若謂古淳朴漸致澆訛則至今日當悉化為鬼魅矣人主安得而治之上從徵言後天下大稔流散者咸歸鄉里斗米不過三四錢終歲斷死刑才二十九人東至海南及五嶺皆外户不閉行旅不齎糧取給於道路焉帝謂羣臣曰此魏徵勸我行仁義既效矣惜不使封德彞見之臣良勝曰五季之衰壞亂極矣徵乃有勸行仁義之論斯亦河汾之教有所自者仁義之效豈獨益國於其家亦當有食報者徵寢疾時帝數遣問至撤殿材以為之第既後而停叔玉婚不知天理冥冥乃所以全魏氏當時𤣥齡之子尚主遂貽宗禍為李績所笑徵子叔玉之後五世謨為文宗史官亦存直節為家裕慶憲宗時孫稠貧甚以故宅質錢李師道私贖之白居易奏云事關勸懲帝出庫錢二千緡贖以賜稠則徵行仁義效於家者亦既逺矣歐陽修贊唐書謂唐柳方稱徵死知與不知莫不恨惜以為三代遺直諒哉韓琦欲太后撤簾還政乃取十餘事稟帝裁决悉當琦即詣太后覆奏后每事稱善琦因白后求去后曰相公不可去我當居深宫耳卻每日在此甚非得已琦即稱前代如馬鄧之資不免貪戀權勢今太后便能復辟誠馬鄧之所不及審决取何日撤簾太后遽起琦即厲聲命鸞儀司撤簾簾既落猶於御屏後見太后衣也吕中曰當國家危疑之日大臣以能任事者一曰德望二曰才智有才智而無德望以鎮之則未足以服天下之心有德望而無才智以充之則未足以辦天下之事故曰可以託六尺之孤可以寄百里之命臨大節而不可奪韓魏公不動聲色垂紳正笏而措天下於泰山之安者蓋自慶厯嘉祐之時可屬大事重厚如勃其德望服人心久矣至於處事應變胸中才智又足以運用天下此其所以正英宗之始與在真宗之初有吕端在仁宗之初有王曾皆安國家社稷之名臣也蘇軾曰文致太平武定亂略謀安宗社而不自以為功急賢才輕爵祿而自不知其恩殺伐果敢而六軍安之四夷八蠻想聞其丰采而天下以其身為安危此公之所有而樂天之所無也忠言嘉謨效於當時而文采表於後世死生窮達不易其操而道德髙於古人此公與樂天之所同也臣良勝曰春秋之盛賴霸以尊王而已若悼公文子未可以伯小之也漢道雜伯其趨益下昭烈宋祖身心功業自有王道之緒孔明三代遺才魏公自是間氣亦確論也光武之治不究其終魏徵之直不追其始殆庶幾焉夫英君名佐何勝紀述臣聞楊時有云外邉用計用數假饒立得功業只是人欲之私與聖賢作處天地懸隔愚臣欲期斯世於三代之隆是故慎斯選也聖祖詔以歷代名臣從祀帝王廟先是禮官奏以風后等三十六人宜從祀聖祖曰古之君臣同德終始一心載在史傳萬世不泯國家祀典必合公論不可徒觀其迹不究其實若宋趙普負太祖為不忠不可從祀元臣四傑穆呼哩為首不可以其孫從祀而去其祖可祀穆呼哩而罷安圖既祀巴延則阿珠亦不必祀如漢陳平馮異宋潘美皆節義廉善始終可從廟祀於是定以風后力牧臯陶䕫龍伯夷伯益伊尹傅說周公旦召公奭太公望召虎方叔張良蕭何曹參陳平周勃鄧禹馮異諸葛亮房𤣥齡杜如晦李靖李晟郭子儀曹彬潘美韓世忠嶽飛張浚穆呼哩博勒呼博爾濟齊拉衮巴延凡三十有七人從祀歷代帝王廟臣良勝曰大聖人舉動足以重綱常昭勸戒為萬世法程有若此者且曰君臣同德終始一心言約而盡訓典式昭追斷趙普尤得史外傳心之懿足以衛宗社而遏邪心視宋祖去白起像于武成王廟者意益逺矣聖祖親製中山武寧王徐達神道碑曰王平昔言簡慮精提兵之時令出不二諸將敬若神明所至之處攻城不屠與人不戲凡受命而出及功成而旋每不自矜至於封姑蘇之府庫置元宫之美人財寶無所取婦女無所愛忠志無疵昭明乎日月云聖祖答宋景濓書其略曰先生教吾子以嚴相訓是為不佞也以聖人文法變俗教之是為疏通也所守者忠貞所用者節儉是為得體也昔聞古人今則見之又嘗諭廷臣曰古之人大上為聖其次為賢其次為君子若宋景濂者事朕十有九年而未嘗有一言之僞誚一人之短寵辱不驚始終無異其誠所謂君子人乎非止君子抑可謂之賢者矣臣良勝曰天降時雨山川出雲聖人龍飛萬物斯覩有聖祖之君而後有徐達宋濓之臣有君有臣政無不舉者矣劉安世嘗曰興王之初人才色色過人且如唐太宗朝將相固不可及至技藝之士醫有孫真人隂陽有李淳風吕才相法有袁天綱亦後世不及臣謂聖祖之興也亦然監察御史解縉初入道時都御史袁泰怙勢家人橫恣諸道御史欲糾之無敢執筆為章者縉揮筆立就歷舉其過而一時多其直聖祖慮縉少涵養將為衆所傾召其父至諭曰才之生甚難而大器者晚成其以而子歸益進其學又諭縉曰朕於爾義則君臣恩同父子其歸益盡心於古人後十年來朝當大用爾侍父歸文皇嘗與解縉論羣臣書蹇義等十人名命各疏于下十人皆文皇所信任政事之臣亦多與縉善而具以實對於義曰其資厚重而中無定見於夏原吉曰有德有量而不逺小人於劉雋曰雖有才幹不知顧義於鄭賜曰可為君子頗短於才於李至剛曰誕而附勢雖才不端於黃福曰秉心易直確有執守於陳瑛曰刻於用法好惡頗端於宋禮曰戅直而苛人怨不恤於陳洽曰疏通警敏亦不失正於方賔曰簿書之才駔儈之心既奏文皇以授皇太子曰李至剛朕洞燭之餘徐驗之問尹昌隆王汝玉對曰昌隆君子而量不𢎞汝玉文翰不易得所惜者市心爾臣良勝曰君臣之際喜怒好惡死生榮辱係之不特用舍己也若縉者聖祖深愛之而成之於始隱然留齊賢以相太宗之心矣文皇果用之而驗之於終且以付託仁廟矣後十餘年仁廟果出其奏以示楊士奇曰人率謂解縉狂士縉非狂士向所論皆定見也夫縉以一身而三朝遭際真所謂義則君臣而恩同父子亦萬古希濶之遇也然縉亦無以善後而保其終斯其所以為難也文皇以璽書諭皇太子令儒臣黃淮楊士奇等採古名臣直言如張良對漢髙鄧禹對光武諸葛亮對昭烈及董賈劉向谷永陸贄奏疏之類彚輯以便觀覽書成以進文皇覽而嘉之賜名歷代名臣奏議因謂侍臣曰致治之道千古一揆君能納善言臣能盡忠不隱天下未有不治觀是書足以見當時人君之量人臣之直為君者以前賢所言便作今日耳聞為臣者以前賢事君之心為心天下國家之福也臣良勝曰論其世則思其人思其人而不得則因其言而求之將有取法乎前人者則今人與居古人與稽有若羮牆見堯將無所師而不得也文皇御世一時名臣碩輔濟濟相望君臣之間可謂兩成其美猶以為未足而輯古名臣昌言正論以為昭鑒越百世而相通亘萬古而一見視文帝問趙將李牧之賢每飯未嘗不在巨鹿意益逺矣且以璽書諭之皇太子者文皇自知為君之難行之身者思以裕諸後亦知為臣之難得之今者尚欲嫓於前非徒然也厥後宣廟問侍臣曰唐虞何以為盛治侍臣對曰堯舜聖人以德為治所以盛也上曰有其君貴有其臣使是時無禹稷契臯陶伯益堯舜能獨治乎元首股肱必相資也當時又皆互相戒謹不敢有一毫自滿之心此其所以盛萬世之下論唐虞盛治當本諸此嗚呼休哉聖聖相承言皆至理欲效唐虞之治則祖宗寶訓自可得師而漢唐以下君臣言議僅致小康之治又有不足言者矣右衍君臣之常渙六四渙其羣元吉渙有丘匪夷所思程頤曰方渙散之時用剛則不能使之懷附用柔則不足為之依歸四以巽順之正道輔剛中之君君臣同功所以能濟渙也天下渙散而能使之羣聚可謂大善之吉也渙有丘匪夷所思贊美之詞也邱聚之大也方渙散而能致其大聚其功甚大其事甚難其用至妙夷平常也非平常之見所能思及也非大賢知孰能如是睽九二遇主于巷無咎象曰遇主于巷未失道也程頤曰當暌之時君心未合賢臣在下竭力盡誠期使之信合而已至誠以感動之盡力以扶持之明義理以致其知杜蔽惑以誠其意如是宛轉以求其合也遇非枉道逢迎也巷非邪僻由徑也故夫子特云遇主于巷未失道也臣良勝曰君明臣良志同道合斯其致治信無難者不幸而有睽離之釁君子圖難於易是以委曲求遇庶幾於合而有濟睽之功使或後時既睽而求合斯益難矣又必不失其道如程頤所云而後可若枉道求合徒以失已君子不為也君子於此蓋亦當勢之難為機之可為而任道以必為是以獨苦於心若此豈其身之進退為謀哉亦恐睽離之勢張天下之患成君或不能以自安尚何以身為哉故當睽而後有遇主于巷之道在坎而後有納約自牖之明君子因時之變而行道之權甚非所得已也若明君在上必無使人臣至於是已說命曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祇若王之休命蔡沉曰木從繩喻后從諫明諫之决不可不受也然髙宗當求受言於已不必責進言於臣君果從諫臣雖不命猶且承之况命之如此誰敢不敬順其美命乎伍員曰昔有過澆殺斟灌以伐斟鄩滅夏后相后緡方娠逃出自竇歸于有仍生少康焉為仍牧正惎澆能戒之澆使椒求之逃奔有虞為之庖正以除其害虞思於是妻之以二姚邑諸綸有田一成有衆一旅能布之德而兆其謀以收夏衆撫其官職使女艾諜澆使季杼誘􅜦遂滅過戈復禹之績祀夏配天不失舊物熊禾曰羿浞之禍已無夏矣羲黃堯舜以來相傳之正統其絶者蓋四十年區區庖正一成之地一旅之衆卒能復禹舊跡踐天子位者要之亦為君者有撥亂之志為臣者有盡忠之節人事既盡能以天道為定命故能臻兹大業推原其故亦由虞君思之為也虞舜之後也一代之興則先代子孫賔于王家與國同其休戚古之人慮蓋深逺矣後世得人之國則絶人之祀不知天道昭明禍亦反踵虞夏商周之祖若孫傳祚二千年其效斷可覩矣太甲曰豫小子不明于德自底不類欲敗度縱敗禮以速戾于厥躬天作孽猶可違自作孽不可逭既往背師保之訓弗克于厥初尚賴匡救之德圖惟厥終蔡沉曰當太甲不惠于阿衡之時伊尹之言惟恐太甲不聽及太甲改過之後太甲之心惟恐伊尹不言夫太甲固困而知之者然昔之迷今之復昔之晦今之明如日月昏蝕一復其舊而光采炫耀萬景俱新湯武不可及已豈居成王之下乎車攻詩曰之子于征有聞無聲允矣君子展也大成朱熹曰周公相成王營洛邑為東都以朝諸侯周室既衰久廢其禮至于宣王內修政事外攘夷狄復文武之境土修車馬備器械復㑹諸侯于東都因田獵而選車徒焉故詩人作詩此章總叙其事之始終而深美之也定之方中詩曰靈雨既零命彼倌人星言夙駕說于桑田匪直也人秉心塞淵騋牝三千朱熹曰言方春時雨既降而農桑之務作文公於是命主駕者晨起駕車亟往而勞勸之然非獨此人所以操其心者誠實而淵深也蓋其所畜之馬七尺而牝者亦已至於三千之衆矣蓋人操心誠實而淵深則無所為而不成其致此富盛宜矣按春秋傳衛懿公九年冬狄入衛懿公及狄人戰于滎澤而敗死焉宋桓公迎衛之遺民渡河而南立宣姜子申以廬于曹是為戴公是年卒立其弟燬是為文公大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能元年革車三十乘季年乃三百乘明夷彖曰明入地中明夷內文明而外柔順以蒙大難文王以之朱熹曰䝉大難謂遭紂之亂而見囚也史記曰紂以周侯昌及九侯鄂侯為三公九侯進女於紂女不喜淫紂殺之而醢九侯鄂侯爭之併殺鄂侯昌聞之歎息崇侯虎以告紂紂乃囚昌於羑里昌之臣散宜生之徒求有莘氏之美女及珍寶進上大悅乃釋昌昌出而獻洛西之地以請除炮烙之刑乃許之更賜昌得專征伐帝王世紀曰紂囚文王文王之長子曰伯邑考質於殷為紂御紂烹為羮賜文王曰聖人當不食其子羮文王食之紂曰誰謂西伯聖者食其子羮尚不知也孔子曰三分天下有其二以服事殷周之德其可謂至德也已范祖禹曰文王之德足以代商天與之人歸之乃不取而服事焉所以為至德也明夷六五箕子之明夷利貞朱熹曰居至暗之地近至暗之君而能正其志箕子之象也貞之至也柳宗元曰借使紂惡未稔而即斃武庚念亂以圖存國無其人誰與興理先生所以隱忍而不死者意者有在於斯乎洪範曰惟十有三祀王訪于箕子蔡沉曰商曰祀周曰年此曰祀者因箕子之詞也箕子嘗言商其淪喪我罔為臣僕史記亦載箕子陳洪範之後武王封于朝鮮而不臣也蓋箕子不可臣武王亦遂其志而不臣之也蘇洵曰箕子之不臣周也而曷為為武王陳洪範也天以是道畀之禹傳至於我不可自我而絶以武王而不傳則天下無可傳者矣故為箕子之道者傳道則可仕則不可狼跋詩曰狼跋其胡載㚄其尾公孫碩膚赤舄几几朱熹曰周公雖遭疑謗然所以處之不失其常故詩人美之言狼跋其胡則㚄其尾矣公遭流言之變而其安肆自得乃如此蓋其道隆德盛安土樂天有不足言者所以遭大變而不失其常也夫公之被毁以管蔡之流言也而詩人以為此非四國之所為乃公自讓其大美而不居耳蓋不使讒邪之口得以加乎公之忠聖此可見其愛公之深敬公之至而其立言亦有法矣范祖禹曰神龍或潛或飛能大能小其變化不測然得而畜之若犬羊然有欲故也唯其可以畜之是以亦得醢而食之凡有欲之類莫不可制焉惟聖人無欲故天地萬物不能易也富貴貧賤死生如寒暑晝夜相代乎前吾豈有二其心乎哉亦順受之而已矣舜受堯之天下不以為泰孔子厄於陳蔡而不以為戚周公逺則四國流言近則王不知而赤舄几几德音不瑕其致一也文侯之命曰父義和汝克昭乃顯祖汝肇刑文武用㑹紹乃辟追孝于前文人汝多修捍我于艱若汝豫嘉蔡沉曰幽王為犬戎所殺晉文候與鄭武公迎太子宜臼立之是為平王遷于東都平王以文侯為方伯賜之秬鬯弓矢作䇿書命之顯祖文人皆謂康叔即上文先正昭事厥辟者也後罔或耆壽俊在厥服則刑文武之道絶矣今刑文武之道自文侯始故曰肇刑文武㑹者合而使之不離紹者繼而使之不絶前文人猶云前寧人汝多所修完捍衛我于艱難若汝之功我所嘉美也黍離詩曰彼黍離離彼稷之苗行邁靡靡中心搖搖知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉朱熹曰周既東遷大夫行役至于宗周過故宗廟宫室盡為禾黍閔周室之顛覆倣徨不忍去故賦其所見黍之離離與稷之苗以興行之靡靡心之搖搖既歎時人莫識已意又傷所以致此者果何人哉臣良勝曰讀文侯之書則平王之有東周也文侯之功也讀黍離之詩則平王之遂東遷也亦文侯之失也君弒國危諸侯同心戮力王室雖其職分亦為盛美文侯之後伯業恢𢎞終春秋之世周懷以為安而周之不振以底于亡則東遷之失計也蘇軾有云大家世族子孫或不幸而弱以敗典鬻器具稱貸乞假則每有之至於鬻公田賜宅則不肖之甚人類不齒者也今平王舉文武成康之業而大棄之是一敗而鬻田宅子也尚何以振後世若蘇峻之變淹淹江左溫嶠議遷王導獨以為不可曰王者不可以豐儉移都北冦方强一旦示弱聲實皆喪乃不遷晉亦稍安當時文侯果若導之見則豐鎬之民固有文武成康之遺澤在豈西秦所能遽迫而有之哉及其大夫孔父公羊傳曰及者何纍也弒君多矣舍此無纍者乎曰有仇牧荀息皆纍也舍仇牧荀息無纍者乎曰有有則此何以書賢也何賢夫孔父孔父可謂義形於色矣其義形於色奈何督將弒殤公孔父生而存則殤公不可得而弒也於是先攻孔父之家殤公知孔父死已必死趨而救之皆死焉孔父正色而立於朝則人莫敢過而致難於其君者孔父可謂義形於色也臣良勝曰君弒而死於難者無纍百十而春秋以節表著者三人孔父以義形於色仇牧以不畏彊禦荀息以不食其言皆以為賢也胡安國曰欲示後世人主崇奬節義之臣此天下之大間有國之急務也而諸傳中猶以孔父無能致於君德仇牧不能討賊荀息所輔非正為責備之論者是故以其賢而求之也然人臣不幸至以身而殉其君於難所謂一死萬事足也故曰殺身以成仁舍生以取義如是而或訾焉者不即人心之論也陳殺其大夫泄冶胡安國曰比干諫而死商有三仁焉泄冶諫而死何獨無褒詞夫語默死生當其可而止爾泄冶之盡言無隱不愧乎史魚之直矣方諸比干自靖自獻于先王則未可同日而語也冶雖效忠其猶在宋子哀魯叔肹之後乎故仕於昏亂之朝若異姓者如子哀潔身而去可也其貴戚邪不食其祿如叔肹善矣臣良勝曰人臣致命遂志古今之大善也而不為褒詞者人臣事君無過分之事雖周公之功皆臣子之分也雖無異詞而有人心者所共與也况人臣之所以為此既無徼榮於當時又何徼名於後世然而大善之譽不善人之毁忠直節義之士全軀保妻子者必媒孽之非讐善也不如是不足以容其不善也君子持議又或助之攻焉不曰非其職則曰失其時不曰傷於訐則曰失之愚此大為傷善之端而隂為不善人之地也且如泄冶之死雖不敢方諸比干抑豈在子哀叔肹之後臣謂子哀叔肹泄冶之所優為者也使昏亂之朝如宋魯聽其去而不祿鄰國可容本國可居則可然有先事以防而不使之去或汚其志而不使之善去雖深山窮谷必强致之如賊莽之於龔勝者其何以自善乎哉故凡為是說者皆未察乎春秋之微者也善人之名不善人之所欲泯而無聞也春秋於節義之臣皆以名書蓋欲其名昭於萬世而不泯也豈得謂之無褒詞哉衛侯出奔齊孫林父曰君忌我矣弗先必死并帑於戚而入見蘧伯玉曰君之暴虐子所知也大懼社稷之傾覆將如之何對曰君制其國臣敢奸之雖奸之庸知愈乎遂行臣良勝曰蘧伯玉在春秋時最為賢者當孫林父寧殖欲出其君而先告伯玉蓋亦以為國望而難之也伯玉行而君出矣昔驪姬欲殺申生而難里克克以中立免而難作君子謂速申生之死卒以弒君之罪歸之伯玉之行無亦近是及寧喜謀納君亦告伯玉曰瑗不得聞君之出敢聞其入遂行夫所貴乎賢者其出處進退有益於君國也今欲仕則仕欲行則行視君之出之歸若於已無與焉以是為賢則夫人能之矣至如晏嬰於齊亦曰賢相崔杼之弒莊公殺三史氏而執簡書弒嬰獨曰人有君而人弒之吾焉得死之而焉得亡之臣謂左氏紀此二假最害義理大逆之人自知不為公議所與而國有君子為人所宗故假僞詞以攜衆志欲惡歸於君而曰君子不吾罪也欺當時惑後世莫大於此韓愈氏曰左氏浮誇若此類殆近於誣已太后崩諸吕欲為亂時趙王吕祿梁王吕産將南北軍酈商子寄與吕祿善絳侯與丞相平謀使人劫酈商令寄紿說吕祿歸將印以兵屬太尉太尉遂將北軍然尚有南軍丞相平召朱虛侯章佐太尉遂捕諸吕皆斬之武承嗣三思營求為太子太后意未决狄仁傑每從容言於太后曰文皇帝櫛風沐雨親冒鋒鏑以定天下傳之子孫先帝以二子託陛下今乃欲移之他族無乃非天意乎且姑姪之於母子孰親陛下立子則千秋萬歲後配食太廟承繼無窮立姪則未聞姪為天子而祔姑於廟者也太后意悟遣徐彥伯召廬陵王立為皇太子臣良勝曰人臣當國祚危疑之際而欲以大施其幹運之功斯亦難矣陳平方端居深念而納陸賈交歡之䇿故與周勃深自結納卒成誅吕安劉之功在易之夬曰孚號有厲所謂盡誠相與合力尚有厲也狄仁傑甘事賊后含垢納汙從容待釁卒動以子母至親而成反周為唐之功在易之坎曰納約自牖所謂因其明而通之也但平勃雖安劉而君子必罪其初王諸吕時不若王陵之正其後討諸武乃五王之力而君子以取日虞淵必歸之仁傑蘇轍嘗曰王陵裴炎迎禍亂之鋒欲以一言折之故不廢則死陳平狄仁傑待其已衰而徐正之故身與家國俱全故曰魚不可脫於淵國之利器不可以示人二公得之矣臣謂此太以術論使幾不可待而平與仁傑先死國事又安所恃哉書曰乃心罔不在王室略其迹而論其心斯可也平多知人也惠帝崩無可輔者而吕后之悍猾有不可制豈惟平不能制髙帝云安劉必勃亦知吕之為禍而不制之矣平之大義何得如陵然其曰全社稷安劉氏君亦不如臣平亦有成算於胸中必無后而後可以有為也是平之心罔不在劉氏也仁傑之心路人知之其後五王柬之等皆仁傑所進也使太后疾甚而仁傑猶在則固不反兵而先發之矣彼所以進五王者欲何為哉是故宜首善也平之心事萬古猶疑我聖祖定從祀名臣黜趙普乃特進平無亦以其心之不負髙祖者歟元師薄宋中軍㑹日暮風雨昏霧四塞咫尺不相辨陸秀夫走帝舟度不能出乃先驅其妻子入海即負帝同溺後從官諸臣從死者甚衆張世傑復還崖山收兵遇楊太后欲奉以趙氏後而立之太后始聞帝崩大慟曰我忍死間關至此者正為趙氏一塊肉耳今無望矣遂赴海死世傑將趨安南至平章山下遇颶風大作世傑曰無以為也為我取瓣香來至則仰天呼曰我為趙氏亦已至矣一君亡復立一君今又亡我未死者庶幾敵兵退别立趙氏以存祀爾今若此豈天意耶若天不欲我復趙祀則大風覆我舟舟遂覆世傑溺焉宋丞相文天祥至燕京館人供張甚盛天祥不寢處坐逹旦遂移兵馬司設卒守之博囉召見於樞密院天祥入長揖不屈仰首而言曰天下事有興有廢自古帝王以及將相滅亡誅戮何代無之天祥今日忠於宋以至于此願早賜死遂囚于獄後中山狂人稱宋王有衆千人欲取文丞相乃召天祥入帝諭之曰汝何願天祥曰天祥受宋恩為宰相安事二姓願賜之死足矣帝猶未忍遽麾之使退左右力贊帝從其請乃詔有司殺于燕京之柴市有詔使止之至則天祥死矣天祥臨刑殊從容謂吏卒曰吾事畢矣南向拜而死其衣帶有贊曰孔曰成仁孟曰取義而今而後庶幾無愧數日其妻歐陽氏收其尸面如生南北人聞者皆為流涕吕中曰嗚呼宋之亡也士大夫大負國文丞相毁家紓難九死而不悔死矣彼負國者獨不死乎而公之死與日月爭光天地無窮矣宋史講義曰宋亡節義之臣文丞相湖南安撫李芾池州通判趙昻發揚州都統姜才真州守苗再成常州統制王安節湖北提刑張起巖安吉守趙良淳無為守趙淮淮東制置李庭芝刺史趙孟壘常州守姚訔參政陳文龍將軍張世傑丞相陸秀夫察訪趙與澤興化守陳瓚通判張日中潮州守馬發江東制置謝枋得信州守唐震等皆其章著者其餘尚多有之當奸臣似道柄國時最忌文李二公擯不容於朝及丙子之變朝臣或降或遁而節義最著者二公也蘇軾有云平居無犯顏敢諫之士臨難無伏節死義之臣豈不信哉臣劉定之曰考諸野史景炎葬於海濵亂山之中其民為之諱其處而世莫得聞焉祥興嗣位詔云豫無樂乎為君天未擇于不愸遺黎為之隕涕莫不欲為其君死而力莫如之何也民且如此則食其祿而立乎其本朝者若秀夫之朝服負主與之俱溺世傑之取香祝天願風覆舟與夫天祥之如金百鍊而益徑如水萬折而必東有死之心無生之志者無惑乎其然也其所以致兹者豈非以宋立國雖不能純於仁義而未嘗不慕義强仁焉是以其效若是乎臣良勝曰北宋之亡如金師以死節著惟李侍郎若水一人及陷京師惟劉資政韐一人而南宋之亡大節表著從古所無蓋紹聖之後以道為僞以學為禁而理義之湮塞於人心者幾乎泯矣自理宗闡明道義崇尚正學聖賢之成法具在而理義之薰染益深善端日廣忠奮時行蓋有洽乎肌膚淪乎骨髓者韓人張良父祖以上五世相韓韓亡良為報讐始皇東遊至博浪沙中良令力士操鐵錐狙擊始皇誤中副車始皇驚求弗得令天下大索十日後良聚百人道遇沛公遂屬焉數以太公兵法說沛公善之常用其䇿良曰沛公殆天授遂從不去入關即導引不食穀曰家世相韓及韓滅不愛萬金之資為韓報讐强秦天下振動今以三寸舌為帝者師封萬戶侯此布衣之極於良足矣願棄人間事欲從赤松子遊爾胡寅曰良本為韓報讐非有仕漢之志者茍得吕政斃於一椎則其心愜矣餘亦遑恤臣邱濬曰嗚呼韓亡至是十三年矣而張良以家世相韓猶散千金之産募壯士以為其故主報讐嗚呼世有躬於其身食君之祿而懷二心以事異姓者視此則亦可以感愴矣史綱紀人臣之事而首之以此以示萬世之委質事人者劉基嘗遊西湖有異雲起光映湖水中時魯道元宇文公諒皆以為慶雲公縱飲不顧曰天子氣也應在金陵十年後有王者起我當輔之聖祖下金華定括蒼遣使聘基基由間道詣金陵陳時務十八䇿從之中書省設御座將奉小明王基曰彼牧豎爾不拜遂陳天命所在聖祖大悟遂定征伐之計天威嚴重惟基抗言直議不以利害怵其中甚見禮重呼為老先生而不名又曰吾子房也封誠意伯歸老鄉里彭韶贊曰華淪於夷曷仕於時夷歸諸夏仕上乃宜就桀就湯節義奚虧大哉王佐燭物炳幾運籌制勝翼龍以飛昭回制作文章是咨允為宗臣爾爵爾祠臣良勝曰人臣當屯難之際固經綸之是責也震撼擊撞調和劑量或諫或去或報或死各適於義而已是變之大而有常也若張良憤宗國之迫於强暴興漢滅秦以代寬仁之政劉基痛中華之淪於蒙古翊運宣城以復文明之統是變之變而達權也臣故以是終之也右衍君臣之變豐六五豐其蔀日中見斗往得疑疾有孚發若吉朱熹曰六二居豐之時為離之主至明者也而上應六五之柔暗故為豐蔀見斗之象蔀障蔽也大其障蔽故日中而昏也往而從之則昏暗之主必反見疑惟在積其誠意以感發之則吉戒占者宜如是也臣良勝曰人君之患莫大於蔽也君非昏暗以障蔽之而無所見聞雖賢明者亦昏暗矣故若日中見斗晝以為夜也然其震動得中本明未盡賢臣猶得在位盡其誠以發之左右之蔽猶有不能盡肆其奸者使君無震動動而不中若弄嬰兒於股掌間大臣雖明何所用其誠也哉昔司馬光讀輪臺詔曰漢武用兵之久而中國不亡蓋成敗勝負輒以實聞無毫髮不知者故不為左右欺罔其後田千秋一言而大悟封富民侯矣若後世雲南荆襄喪師數十萬而以捷聞安有不亡者哉臣謂䝉蔽天下之通患也豈特萬里之逺君臣之間有之親之近者莫若父子子有不得於其父者必嬖寵為之蔽也情之密者莫若夫婦婦有不得於其夫者必妾媵為之蔽也善反其初亦惟用誠然爾至誠可以開金石感豚魚而况於人心本明者乎鼎九四鼎折足覆公餗其形渥凶程頤曰大臣之位任天下之重者也天下之事豈一人所能獨任必當求天下之賢知與之協力得其人則天下之治可不勞而致也用非其人則敗國家之事貽天下之患四下應於初初隂柔小人不可用者也而四用之其不勝任而敗事猶鼎之折足也鼎折足則傾覆公上之餗餗鼎實也居大臣之位當天下之任而所用非人至於覆敗乃不勝其任可羞愧之甚也其形渥謂赧汗也其凶可知繫辭曰德薄而位尊知小而謀大力小而任重鮮不及矣言不勝任也蔡仲之命曰率自中無作聰明亂舊章詳乃視聽罔以側言改厥度蔡沉曰中者心之理而無過不及之差者也舊章者先王之成法厥度者吾身之法度皆中之所出者作聰明則喜怒好惡皆出於利而非中矣其能不亂先王之舊章乎戒其本於已者然也側言一偏之言也視聽不審惑於一偏之說則非中矣其能不改吾身之法度乎戒其徇於人者然也洪範曰臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒真德秀曰夫君臣上下之分如天冠地履之不可易臣而福威則盜上之柄矣臣而玉食則擬上之奉矣大夫為此則害于家諸侯為此則凶于國臣民尤而效之亦將順邪而妄作僭忒而踰分矣孟子所謂不奪不饜者理固然也或謂吳楚嘗僭天子魯之三家嘗僭諸侯不聞其害與凶何邪曰惠迪吉從逆凶順乎道則吉逆乎道即凶也臣而僭上即所謂害即所謂凶也况吳楚之篡弒相尋而季孟之家臣繼叛又非凶害而何以此防民猶有竊弄威福如齊田氏選物上第盡歸私室如董賢者湯誓曰夏王率遏衆力率割夏邑有衆率怠弗協曰時日曷喪豫及汝偕亡蔡沉曰夏王率為重役以窮民力嚴刑以殘民生民厭夏德亦率皆怠於奉上不和於國疾視其君指日而曰是日何時而亡乎若亡則我寧與之俱亡蓋苦桀之虐而欲其亡之甚也按史記桀觀炮烙於瑤臺謂龍逢曰樂乎龍逢曰樂桀曰觀刑何無惻怛之心龍逢曰天下苦之而君以為樂臣君之股肱何不樂乎桀曰聽子諫諫得我改之諫不得我刑之龍逢曰臣觀君冠危石也臣觀君履春冰也未有冠危石而不壓蹈春冰而不陷桀歎曰是日亡則與俱亡子知我之亡而不知自亡乎子就炮烙之刑吾觀子龍逢遂火而死泰誓曰今商王受狎侮五常荒怠弗敬自絶于天結怨于民斫朝涉之脛剖賢人之心作威殺戮毒痡四海崇信奸回放黜師保屏棄典刑囚奴正士郊社不修宗廟不享作奇技淫巧以悅婦人上帝弗順祝降時喪蔡沉曰紂於君臣父子兄弟夫婦典常之道䙝狎侮慢荒棄怠惰無所敬畏上自絶于天下結怨于民孔氏曰紂冬月見朝涉水者謂其脛耐寒斫而視之史記云比干强諫紂怒曰吾聞聖人心有七竅遂剖比干觀其心痡病也作刑威以殺戮為事毒痡四海之人言其禍之所及者逺也回邪也正士箕子也郊所以祭天社所以祭地奇技謂奇異技能淫巧為過度之巧列女𫝊紂膏銅柱下加炭令有罪者行輒墜炭中妲己乃笑夫欲妲己之笑至為炮烙之刑則其奇技淫巧以悅之者宜無所不至矣祝斷也言紂於奸邪則尊信之師保則放逐之屏棄先王之法囚奴忠正之士輕廢奉祀之禮專意淫䙝之行悖亂天常故天弗順斷然降是喪亡也厲王虐國人謗王召公告王曰民不堪命矣王怒得衛巫使監謗者以告則殺之國人莫敢言道路以目王喜告召公曰吾能弭謗矣乃不敢言召公曰是障之也防民之口甚於防川川壅而潰傷人必多民亦如之是故為川者決之使導為民者宣之使言故天子聽政使公卿至於列士獻詩瞽獻典史獻書師針􅕓賦矇誦百工諫庶人傳語近臣盡規親戚補察瞽史教誨耆艾修之而後王斟酌焉是以事行而不悖民之有口也猶土之有山川也財用於是乎出猶其有原隰衍沃也衣食於是乎生口之宣言也善敗於是乎興行善而備敗所以阜財用衣食者也夫民慮之於心而宣之於口成而行之胡可壅也若壅其口其與能幾何王弗聽國人莫敢言三年乃流王于彘幽王以褒姒而嬖愛之褒姒不好笑王說之萬方故不笑王與諸侯約有冦至舉烽火為信則舉兵來援王欲褒姒笑乃無故舉火諸侯悉至至而無冦褒姒乃大笑虢石父佞善諛好利王以為卿用事專任國人皆怨政治多邪諸侯或畔王室始騷申侯召西夷犬戎伐王王舉火諸侯兵莫至犬戎殺王于驪山下西周遂亡臣良勝曰孔子有云湯武革命順乎天而應乎人以桀紂之惡天人所厭也孟子亦云名之曰幽厲雖孝子慈孫百世不能改也是君之大戒也桓帝建和元年京師地震杜喬以灾異䇿免梁冀誣李固杜喬以為與妖賊劉鮪交通請逮按罪太后素知喬忠不許冀遂收固下獄死於獄中冀使人脅杜喬曰早從宜妻子可得全喬不肯遂收繫亦死獄中河內張成善風角推占當赦教子殺人司𨽻李膺督促收捕竟案殺之成素以方技交通宦官帝亦頗信其占宦官教成弟子牢修上書告膺等與大學遊士交結諸郡生徒互相驅馳共為部黨誹訕朝廷疑亂風俗於是帝大震怒班下郡國逮捕黨人布告天下使同憤疾案經三府太尉陳蕃郤之曰今所案皆海內人譽憂國忠公之臣此等猶將十世宥也豈有罪名不彰而致收掠者乎不肯平署帝愈怒下膺等於黃門北寺獄其詞所連及陳實范滂以下二百餘人或逃遁不獲懸金搆募使者四出相望靈帝熹平五年永昌太守曹鸞上書曰夫黨人者或耆年淵德或衣冠英賢皆宜股肱王室左右大猷者也而久被禁錮辱在泥塗灾異水旱皆由於斯帝大怒詔收鸞下獄掠殺之何進召董卓將兵詣京師卓即時就道并上書曰中常侍張讓等竊幸承寵濁亂海內請收讓等以清海內讓詐以太后㫖召進斬於嘉德殿前袁紹及何苗聞進被害引兵屯朱雀關下捕得趙忠等及諸宦官皆殺之凡二千餘人讓困迫遂將帝與陳留王出穀門讓投河而死臣良勝曰天下權寵固有相禪而盛者天下禍咎亦有相禪而至者自恭顯盛而有王氏之專自竇憲誅而拜鄭衆之爵其後誅閻顯立順帝皆出於宦官黜清河王殺李固皆由於外戚梁冀勢重天下不能容後假宦官以去之宦官害極朝廷不能堪至召外兵以除之張讓等既戮董卓亦誅袁術曹操繼起而漢遂以亡諸葛亮曰先帝與臣論此未嘗不痛恨於桓靈也王莽既尊重欲以女配帝為皇后以固其權奏言長秋宫未建請考定五經定娶禮正十二女之義以廣繼嗣莽女遂立為后又采伊尹周公稱號加莽宰衡位上公莽先遣風俗使者八人還詐為郡國造歌謠頌功德凡三萬言泉陵侯劉慶言周成王幼稱孺子周公居攝今帝富於春秋宜令安漢公行天子事平帝崩莽選宣帝𤣥孫最幼子嬰年二歲託以卜相最吉莽居攝如周公故事立嬰號曰孺子後以居攝三年為初始元年即真天子位定有天下之號曰新班固曰王莽始起外戚折節力行以要名譽及其居位輔政成哀之間勤勞國家動見稱述豈所謂色取仁而行違者邪莽既不仁而有邪佞之才又承四父歷世之權遭漢中微國統三絶而太后壽考為之宗主故得肆其奸慝以成篡竊之禍及其竊位南靣處非所據顛覆之勢隆於桀紂而莽晏然自以為黃虞復出也乃始恣睢奮其威詐滔天虐民最凶極惡毒流諸夏亂延四方自書傳所載亂臣賊子無道之人考其禍敗未有如莽之甚者也曹操下令曰孤始於譙東築精舍欲秋夏讀書冬春射獵為二十年規待天下清乃出仕爾然不能如意徵為典軍校尉意遂更欲為國家討賊立功使題墓道曰漢故征西將軍曹侯之墓此其志也而遭值董卓之難興舉義兵後領兖州破降黃巾三十萬衆又討袁術使窮沮而死摧破袁紹梟其二子後定劉表遂平天下身為宰相人臣之位已極意望已過矣設使國家無有孤不知當幾人稱帝幾人稱王或者人見孤彊盛妄相忖度言有不遜之志每用耿耿故為諸君陳道此言皆肝鬲之要也然欲孤便爾委捐所典兵衆實不可也誠恐已離兵為人所禍已敗則國家傾危是以不得慕虛名而處實禍也侍中陳羣等曰漢祚已終非適今日殿下功德巍巍羣生注望故孫權在逺稱臣此天人之應也宜正大位操曰若天命在吾吾為周文王矣操至洛陽薨漢帝使御史大夫張音奉璽綬詔册禪位於魏王丕即帝位改元黃初奉漢帝為山陽公追尊操為武皇帝劉安世曰老先生居洛日無三日不見之一日見老先生曰昨夕看三國志識破一事乃理㑹武帝遺令也老先生曰遺令之意如何安世曰曹公平生奸至此盡矣故臨死諄諄作此令也老先生曰不然此乃操之微意也遺令者世所謂遺囑也必擇緊要言語囑付子孫至若纎細不緊要之事則或不暇矣且操身後之事有大於禪代者乎今操之遺令諄諄百言下至分香賣履之事家人婢妾無不處置詳盡無一語及禪代其意若曰禪代之事自是子孫所為吾未嘗教為之是實以天下遺子孫而身享漢臣之名此遺令之意歷千百年無人識得昨夕偶窺破之老先生自有喜色且戒安世曰非有識之士不足以語此尹起莘曰嗚呼亂臣賊子竊人家國常患於取之無名則必曲為委折以文之三家分晉田氏并齊借周人之命以自好莽賊篡漢欲求其說而不可得乃以周公居攝稱之至操丕始以傳禪為文後世篡竊相繼皆踵而行之其原起於曹氏之作俑也臣良勝曰弒君篡國接迹當世而臣獨舉莽操者二賊奸之雄也於篡弒之中而又要其名為周公為文王隂奪人國而瞢主愚人有不知者是宜有以表異而誅其心也且莽為王太后之姪子曹為宦官曹騰之養子使成帝不任外戚桓靈不任宦官亦何由致此患哉易曰履霜堅冰至人主固當辨之於早也秦檜從二帝至燕金主以檜與達蘭為其任使及南伐以為參軍事檜與妻王氏自軍中趍祀水寨自言殺金人監已者奪舟而來航海至越州見帝帝命先見宰執首言欲天下無事須是南自南北自北朝士多疑之檜初言有二䇿可以竦動天下後陳二䇿欲以河北人還金中原人還劉豫帝曰南人歸南北人歸北朕北人將安歸檜語乃塞金烏珠遺檜書曰汝朝夕以和請而嶽飛方為河北圖必殺飛始可和檜以飛不死終梗和議已必及禍故力謀殺之洪皓在金以蠟書奏言金人所畏服者惟飛及聞其死諸酋酌酒相賀檜病遺表曰臣願陛下益堅鄰國之歡盟謹國是之搖動檜居相位凡十九年劫制君父倡和誤國一時忠臣良將誅鋤略盡其頑鈍無恥者率為檜用爭以誣陷善類為功又隂結內侍及醫師王繼先伺上動靜開門受賂富敵於國外國珍寶死猶及門隂險深阻與同列論事帝前未嘗力辨但以一二語傾擠之俾帝自怒凡陷害忠良率用此術晚年殘忍尤甚數興大獄焉宋史論斷曰奸臣之惡莫甚於宋之秦檜焉蓋宋至髙宗危亡已甚自檜挈家北還專主和議以罷四方援兵上蔽日月之光下亂彞倫之叙大讐不復辜二帝望救之心報本義虧廢七廟蒸嘗之祭陷生民於水火喪廉恥於偏安妬害忠良殺嶽飛而并父子擠排讜論竄趙鼎以及諸臣賄通外夷寃含九地惡固同於檮杌凶實類於窮奇使聖人再生春秋再作亦不能書其彌天之罪矣然則秦檜以奸邪賣國誠天地不容之人人神共怒之賊然猶得保首領以沒追封加諡者何哉嗟夫此又天地至微之理也蓋太宗負太祖背盟專位使其子孫幾至滅絶天安得不生秦檜使負髙宗以喪其社稷與不然何朝士皆疑之惟范宗尹李回力薦其忠卒使其秉執大權也君子觀乎宣和殿檜生玉芝則知亡宋之禍已兆於是矣詩云取譬不逺昊天不忒此之謂也臣良勝曰古今憤檜之奸猶以其得保首領為有遺恨以臣觀之檜本無子取妻兄王煥孽子養為已子曰熺生塤雖奕世仕途而秦氏之廟異姓主之先世有靈不祀久矣是太宗之報尚在數世之後而奸檜之報當寵盛之時而身親見之比之誅夷之後無遺類者尤為慘矣天道果無知也哉三學生臺諫侍從皆上疏乞誅賈似道有㫖護遣歸越以終喪制似道留揚不還王爚復論似道既不死忠又不成孝乞下詔切責太后下詔曰卿其亟歸喪次以盡臣子之道則當曲示保全否則衆論益甚忠孝靡容雖欲屈法伸恩而不可得似道還紹興府守臣閉城不納王爚復言貶似道三官婺州居住婺人率衆為露布逐之詔徙建寧御史孫榮叟等乞斬之以正法方回復論似道僥詐貪淫𥚹驕吝專忍謬十罪翁合言似道以妬賢無比之林甫輒自託於伊周以不學無術之霍光敢效尤於莽操滔天之罪人人能言臺諫交章乞行逺竄迫於衆論僅謫建寧建寧實朱熹講道之闕里雖三尺童子亦知向方聞似道名咸欲嘔唾况見其面乎乞逺投荒昧以禦魑魅詔謫授髙州團練使鄭虎臣以父嘗為似道所配請行為監押似道寓建寧開元寺侍妾尚數十人虎臣至悉屛去奪其寶玉撤轎蓋暴行秋日中令舁夫唱杭州歌謔之窘辱備至入古寺壁上有吳潛所題字虎臣呼似道曰吳丞相何以至此舟次黯淡灘虎臣曰水清甚何不死於此似道曰候有詔即死至木棉庵虎臣曰吾為天下殺似道雖死何憾遂拘似道妻子於别室即厠上拉似道胸殺之殯于庵側吕中曰賈似道當國十五年殺三大臣行公田困浙右百姓吝軍賞失將士心背和約挑釁敵國禍宗廟社稷其罪可勝誅哉人有恆言奸臣富貴則自取之留禍患以遺君父然秦檜似道之敗身死家僇前後一轍後之謀人國者亦可以鑒矣臣良勝曰人臣專權蔽主禍國殃民何能指數然若秦檜之賣國賈似道之誤國使帝后辱於沙漠區宇淪于寇讎尤萬世所痛恨也臣故曰此罪之尤者也胡廣周流四公三十餘年歷仕六帝禮任極優京師謠曰萬事不理問伯始天下中庸有胡公然溫柔謹慤常遜言恭色以取媚於時無忠直之風天下以此薄之趙弼曰孔子曰中庸之為德也其至矣乎廣有何德而以天下中庸稱之廣事六帝為司空再為司徒三為大尉又為太傅未聞出一讜正之言獻一匡時之䇿惟遜言恭色取媚戚宦趨炎附勢陷害正人滕撫方直之賢不交權勢為宦者所惡論討賊功當封大尉廣承㫖奏黜之使撫憤恚而卒孝桓時梁冀與唐衡共誣李固杜喬下獄固與廣書曰梁氏迷謬公等曲從漢家之微從此始矣嗚呼斯言可傷也哉廣得書但悲慚而已既而五侯專橫白馬令李雲切說政事之失帝大怒詔送黃門北寺獄五官掾杜衆傷雲以忠諫獲罪上書願與雲同日死嗟夫雲居下僚憂時之危捐生以諫杜衆傷雲忠而以死諍此廣親目所覩也靈帝信王甫曹節之誣以李膺范滂諸名士為鈎黨廣為三公尸其位視諸賢之寃枉如盲如喑曾無片言之諍不但為漢廷之罪人亦雲衆之罪人也孔子曰志士仁人無求生以害仁有殺身以成仁廣為國之大臣值天下多故羣奸亂政既不能匡扶漢祚又不能引身而退竊祿固位與時浮沉八十二乃死諺所謂愚福而癡壽也鄉原德之賊也廣之謂也馮道少以孝謹知名唐莊宗世始貴顯自是屢朝不離將相三公三師之位為人清儉寬𢎞人莫測其喜慍滑稽多知浮沉取容嘗著長樂老叙自述屢朝榮遇之狀時人往往皆以德量推之歐陽修曰禮義廉恥國之四維四維不張國乃滅亡禮義治人之大法廉恥立人之大節既為大臣而無廉恥天下其有不亂國家其有不亡者乎余讀馮道長樂老叙見其自述以為榮其可謂無廉恥者矣天下國家可從而知也司馬光曰天地設位聖人則之以制禮立法內有夫婦外有君臣婦之從夫終身不改臣之事君有死無二此人道之大倫也茍或廢之亂莫大焉范質稱馮道厚德稽古宏才偉量雖朝代遷貿人無間言屹若巨山不可轉也臣愚以為正女不從二夫忠臣不事二君為女不正雖復華色之美織絍之巧不足賢矣為臣不忠雖復才智之多治行之優不足貴矣何則大節已虧故也道之為相歷五朝八姓若逆旅之視過客朝為讐敵暮為君臣易面變詞曾無愧怍大節如此雖有小善庸足取乎或以為自唐室之亡羣雄力爭帝王興廢逺者十餘年近者四三年雖有忠智將若之何當是之時失臣節者非道一人豈得獨罪道哉臣愚以為憂公如家見危致命君有過則强諫力爭國敗亡則竭節效死知士邦有道則見無道則隱或滅跡山林優游下僚今道尊寵則冠三師權任則首諸相國存則依違拱默竊位素餐國亡則圖全茍免迎謁勸進君則興亡接踵道則富貴自如兹乃奸臣之尤安得與他人為比哉臣良勝曰奸邪如檜如似道若毒藥猛虎人知必死少有知識猶將避之中立如廣如道若厚味冶色人每稱愜雖賢者亦多效之不知荼毒消耗終以自斃其亂亡一也臣故并以為戒焉右衍君臣之戒中庸衍義卷五
