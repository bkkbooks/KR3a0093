body:
  text: 中庸衍義卷十六明夏良勝撰三重之義經濟之文詞翰之文舜彈五絃之琴歌南風之詩曰南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮臣良勝曰南風長養之風也萬物長養而後民財可阜民財阜而後民愠可解蓋財者天之利也民之心也聖人以美利利天下亦因民所利而利之焉爾然當唐虞盛時亦復以財阜民為説者人生有欲無主乃亂為之主以治其亂君也故曰聖人之大寶曰位何以聚人曰財後世托為清曠視財計為末務而或若以凂焉固非也顓顓以利媚上若漢之桑玄羊唐之宇文融宋之王安石者又不足言矣訓有之內作色荒外作禽荒甘酒嗜音峻宇雕牆有一於此未或不亡蔡沈曰此亦禹之訓也色荒惑嬖寵也禽荒耽逰畋也荒者迷亂之謂甘嗜皆無厭也峻髙大也宇棟宇也雕繪飾也言六者有其一皆足以致滅亡也臣良勝曰三代家天下自禹始故其示後以保天下亦自禹始其為訓昭明若此太康一犯禽荒遂以失邦夏桀一犯色荒遂以亡國嗚呼不愆不忘率由舊章為人後者於先世懿訓其慎保之哉湯誥曰俾豫一人輯寧爾邦家兹朕未知獲戾於上下栗栗危懼若將隕于深淵蔡沈曰天使我輯寧爾邦家其付豫之重恐不足以當之未知已得罪於天地與否驚恐憂畏若將墜於深淵蓋責愈重而憂愈大也臣良勝曰成湯勝夏誕告萬方與之更始乃自戒懼若此堯之兢兢舜之業業禹之臨兆民若朽索之馭六馬其道一而已矣其心一而已矣繫辭曰易之興也其當殷之末世周之盛德耶當文王與紂之事邪是故其詞危危者使平易者使傾其道大百物不廢懼以終始其要無咎此之謂易之道也朱熹曰危懼故得平安慢易則必傾覆易之道也臣良勝曰生於其心克於其道發於其道成於其言文王羑里之囚雖死生利害不足以動其心而憂患疢疾益足以深其道故其易彖之言容有近乎危者然而言之危者心之安也心之安者道之大也故履和以至謙尊以光復小而辨恆雜而理損難而易益裕而施困窮而通井安而遷巽稱而隱凡其所以為危者皆反身修德以即於安也嗟夫天有健之道而後有日月星辰之文也地有順之道而後有山川草木之文也聖人有參天地之道而後有經天緯地之文也是文王之易之謂也武王席銘曰安樂必敬無行可悔一反一側爾不可不念所監不逺視爾之所代鑑銘曰見爾前慮爾後盤銘曰與其溺於人也寧溺於淵溺於淵猶可逰也溺於人不可救也楹銘曰毋曰胡殘其禍將然毋曰胡害其禍將大毋曰胡傷其禍將長牖銘曰隨天之時以地之財敬祀皇天敬以先時劍銘曰帶之以為服動必行德行德則興倍德則崩臣良勝曰武王之銘得於丹書之戒者深矣天下之道二理與欲而已出乎此則入乎彼故敬則毋怠從怠非敬也義則無欲多欲非義也武王之銘志敬而辭義此其所以垂拱而天下治也周公曰嗚呼君子所其無逸先知稼穡之艱難乃逸則知小人之依蔡沈曰逸者人君之大戒自古有國家者未有不以勤而興以逸而廢也益戒舜曰罔逰於逸罔淫於樂舜大聖人也益猶以是戒之則時君世主其可忽哉成王初政周公懼其知逸而不知無逸也故作是書以訓之言則古昔必稱商王者時之近也必稱先王者王之親也舉三宗者繼世之君也詳文祖者耳目之所逮也上自天命精微下至畎畝艱難閭里怨詛無不具載豈獨成王之所當知哉實天下萬世人主之龜鑑也臣良勝曰上知之君可正也中才之主難乎其為正也老成之君可道也幼沖之主難乎其為道也故拂其志之所不欲不可也強其力之所不能不可也矧周公有聖人之德叔父之親冡宰之位攝政之權而所事成王又幼沖中才之主無逸之陳亦難乎其為言矣故其書之綱領但知稼穡艱難而已此夫人之所能為固不阻之以難從者推其至於為三宗為文王者實不外是而所以永年所以享國長久亦不外是夫繼世之君所欲孰有大於永年享國者乎是亦誘之以易從也夫以成王之賢周公之聖而以文致戒其委曲之難如此况其下乎故伯益於舜則曰罔逰於逸臯陶於禹則曰無教逸欲有邦警戒之詞若臨師保而昌言是拜弗逆於心萬世而下每有望於都俞之遇難矣哉蒸民詩曰吉甫作頌穆如清風仲山甫永懷以慰其心臣良勝曰詩三百篇皆不言作者之名惟蒸民詩則曰吉甫作頌穆如清風嵩髙詩則曰吉甫作頌其詩孔碩蓋朝寧公言友朋正義無隱義無愧詞亦足以見宣王之治上下無回故公事而公言之也况申伯往邑於謝山甫城彼東方皆王命有作以大其行君臣禮義亦非後世之可言矣惟節南山之刺尹氏亦曰家父作誦以究王訩夫以尹氏厲威專權使人無得戲談家父乃欲自表言出於己以身當尹氏之怒則當時權臣猶有所憚而人猶敢以言犯之卒未聞家父之禍若後世誦君子之澤五世而斬而慘禍繼之視幽厲之世又逺矣巷伯惡讒之詩初無所指而曰寺人孟子作為此詩斯人也而有斯作也詩固可以觀也魯頌詩曰思無邪思馬斯徂朱熹曰孔子曰詩三百一言以蔽之曰思無邪蓋詩之言美惡不同或勸或懲皆有以使人得其情性之正然明白簡切通於上下未有若此言者故特稱之以為可當三百篇之義以其要為不過乎此也學者誠能深味其言而審於念慮之間必使無所思而不出於正則日用之為莫非天理之流行矣臣良勝曰六經之文以載道也道一而已故千條萬緒而本原之地必歸於一而後為道之文也詩之本思無邪也禮之本無不敬也易之隂陽必知其所以消長變化者何如書之政事必知其所以治亂升降者何如春秋褒貶必知其所以王伯名分者何如是之謂知本是之謂善學不然博聞強記皆糟粕而已至如讀屈騷人皆知其屈抑悲憤之志而莫知大意只在逺逰一篇當時君暗臣讒世莫可與但相與歸之冥漠焉爾讀陶詩人但知其恬淡隱况之髙而不知其大意在述酒一篇蓋劉裕以進酒行弒而莫能正者則託酒而逃以慕於仙也是故作文者不可不有是也考文者不可不知是也是孔子讀詩之遺教也夫人薑氏薨左氏曰穆薑薨於東宫始往而筮之遇艮之八史曰是謂艮之隨隨其出也君必速出薑曰亡是周易曰隨元亨利貞旡咎元體之長也亨嘉之會也利義之和也貞事之幹也體仁足以長人嘉德足以合禮利物足以和義貞固足以幹事然固不可誣也是以雖隨無咎今我婦人而與於亂固在下位而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣不可謂貞有四德者隨而無咎我皆無之豈隨也哉我則取惡能無咎乎必死於此弗得出矣臣良勝曰書傳所記婦人之言近於理者甚衆若其析性命之理斷吉凶之占達死生之道有補於聖賢之學惟穆薑數言而已孔子繫易而文言取之以明乾之大義不可以人廢也夫以薑之明達識事而溺於宣伯至行譖毁幾殺其子卒禍其身後世若武曌機術能不動聲色潛移唐祚而溺於二張殺廢其子而不惜大類夫此哲婦傾城信若是哉叔孫豹如晉左氏曰穆叔如晉范宣子逆之問焉古人有言曰死而不朽何謂也穆叔未對宣子曰昔丐之祖自虞以上為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜氏晉主夏盟為范氏其是之謂乎穆叔曰以豹所聞此之謂世祿魯有先大夫曰臧文仲既沒其言立其是之謂乎豹聞之太上有立德其次有立功其次有立言雖久不廢此之謂不朽若夫保姓受氏以守宗祧世不絶祀無國無之祿之大者不可謂不朽臣良勝曰穆叔之言加於宣子數等矣文仲之稱於魯惟告糴於齊與弔宋災為可稱述而行父之出莒僕亦曰文仲之教以事君也其言信有立者可不朽也獨不思三不仁不智其名亦將不朽者乎穆叔特取其言而功德不與焉是亦有所别矣晉侯使韓起來聘左氏曰韓宣子來聘且告為政而來見禮也觀書於太史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也公享之季武子賦綿之卒章韓子賦角弓武子拜曰敢拜子之彌縫敝邑寡君有望矣武子賦節之卒章既享宴於季氏有嘉樹焉宣子譽之武子曰宿敢不封殖此樹以無忘角弓遂賦甘棠宣子曰起不堪也無以及召公臣良勝曰魯閔公時齊桓使仲孫省難有乘亂取國之心仲孫曰魯猶秉周禮國家之本未拔也於是務寧魯難而親之是之謂周禮以先世俗政而言也今宣子之謂周禮者徒有其文而已武子方以私交為重一譽其樹則欲封殖無忘且以召公甘棠之德諂之此其志欲何為哉専國逐君其勢既成於此矣而曰周禮在焉何哉史記世家曰康子乃召孔子而孔子歸魯實哀公之十一年丁巳而孔子年六十八矣然魯終不能用孔子孔子亦不求仕乃敘書傳禮記刪詩正樂序易彖繫易象説卦與文言弟子蓋三千焉身通六藝者七十二人十四年庚申魯西狩獲麟孔子作春秋劉安世曰後生未可遽立議論以褒貶古今蓋見聞未廣而涉世淺故也且如孔子萬世師也方孟僖子且死戒其嗣懿子師孔子時孔子年尚少也又齊景公晏子適魯問禮時孔子年方三十其後孔子年五十餘方歷聘諸國十四年而歸退居魯時孔子年六十八歲乃始刪詩定書繫周易作春秋只數年間了却一生著述蓋是時學問成矣涉世深矣故其著述始可為後世法譬如積水於千仞之淵源一日決之滔滔汩汩直至於海其源深也若夫潢潦之水乍流乍涸終不能有所至者其源淺也古人著書多在暮年蓋為此也漢髙帝至豐沛酒酣擊築而歌曰大風起兮雲飛揚威加海內兮歸故鄉安得猛士兮守四方臣良勝曰髙祖以馬上得天下不事詩書而歌詞壯烈樂而不縱安不忘危數言之間而天時人事鄉情治道咸具焉三代而下人君製作此其最簡而切者孰謂其不事詩書而有是哉武帝謂倪寬曰吾始以尚書為朴學弗好及聞寬説可觀乃從寬問一篇真德秀曰典謨訓告誓命之文凡百篇皆人主之軌範也武帝初以為朴學弗好既失之矣及聞寬説可觀又止從問一篇則是其弗好如故也然聖經之藴無窮隨其所入皆必有獲百篇之書無所不備使帝於其一篇果嘗深玩而服膺焉修已治人亦有餘用而帝之行事未見有一與書合者是亦徒問而已果何益哉唐太宗至鄴自為文祭魏太祖曰臨危制變料敵設竒一將之知有餘萬乘之才不足胡氏曰知人則易自知則難太宗之評魏武正所以自狀爾或問漢髙祖光武昭烈魏武唐太宗人品如何曰髙祖尚矣光武昭烈猶魯衛之政也魏武太宗並驅中原未知鹿死誰手其所長短蓋略相當光武昭烈才德俱優魏武太宗才優於德然規模建立皆在髙祖範圍之內爾又幸靈州敕勒諸部相繼詣靈州者數千人上為詩序其事曰雪恥酬百王除凶報千古公卿請勒石於靈州從之臣良勝曰有其善喪厥善矜其能喪厥功太宗自矜才知而欲逞志髙麗及無成功而欲自掩於北代復為詩詞勒石示武自矜功伐正與曹操一等見識爾故有識者觀之將謂太宗除凶而凶未可除突厥之禍終唐之世則所謂雪恥乃自雪其恥也何與於百王也哉唐憲宗留意墳典及觀貞觀開元實録見太宗撰金鏡書及帝範玄宗撰開元訓誡遂採尚書春秋及史漢等書君臣行事可為金鏡者集成十四篇曰君臣道合辨邪正戒權幸慎微行任賢臣納忠諫謹征伐重刑法去奢泰崇節儉奬忠臣修德政簡田獵録勳賢書於屏風列之座右臣良勝曰憲宗於文知所以鈎玄提要為世切用其用心亦勤矣然推其心特以太宗玄宗均有制作垂世故為是彌文之具以耀前而誇後爾淮西既平驕侈自恣程異皇甫鎛以言利幸裴度以忠直踈李逢吉以讒諂行土木既興仙術並進所謂十四篇無一不背是謂無本之文若潢潦之朝滿夕涸亦何貴於文哉唐宣宗夜召學士令狐綯出金鏡書曰太宗所著也卿為我舉其要綯語對曰至治未嘗任不肖至亂未嘗任賢任賢享天下之福任不肖罹天下之禍帝曰善朕謂此書三復乃已臣良勝曰宣宗少有至性而隱德不形宫中以為不慧蓋當時援立之權皆出宦官若見英明必為所忌矣初臨政而奪德裕之權聽樵夫父老而知涇陽醴泉之政聞綯之言即曰凡求致太平當以此言為首則於任賢退不肖之説知之審矣其最可稱者樂聞規諫封駁合理必屈意從之得大臣章疏焚香盥手而讀之宰相徙其故人為鄰州刺史詰責之曰詔命既行廢閣不用宰相可為有權雖自謂猶畏宦官而有罪勿舍有闕勿補圖為漸耗之術至今猶為可行故大中之治人稱為小太宗得於金鏡之文者多矣惜其溺於方士以藥餌終人故有遺恨焉宋太宗雅好文史於禁中建清心殿收藏圖籍以資觀覽視朝之暇必讀太平御覽三卷有所闕廢即進補之雖隆冬短晷必足其數大臣請少息曰朕開卷有益不為疲也常作戒詞戒州縣官書於治所曰爾俸爾祿民膏民脂下民易虐上天難欺寧宗為王時深慕朱熹之學每講官進講必問熹説何如及即位熹進大學講議一日啓曰臣所進講議於聖意何如曰其要只在求放心熹頓首曰陛下天縱生知舉此正是要領願推之以見於行理宗製訓廉慎刑二銘戒飭中外訓廉銘曰周典六計吏治條陳以亷為本乃良而循彼肆貪虐與豺虎均肥於其家多瘠吾民縱逭於法愧其冠紳貨悖而入災及後人我朝忠厚黜貪為仁咨爾羣辟是訓是遵謹刑針曰民吾同胞疾痛猶已服虐以威刑非得已仰惟祖宗若保赤子明謹庶獄惻怛恩旨金科玉條毫析銖纍夫何大吏蔑棄法理逮於郡邑濫用笞箠典聽朕言式克欽止臣良勝曰天下有實心乃有實理有實理乃有實學從古人君不廢講學未有如宋之盛者若寧宗尊尚朱熹而知本原用力之地只在求放心尤大要也然制於其母而大位不受之父此心之大失何以救之哉聞彭龜年進講魯莊公事曰母不可制當制其侍御之人此其心惕然有動乎理宗製作尤當緝熙有記道統有贊元良有規皆近義理若兹訓亷謹刑之銘尤切吏治但真德秀云窒賄送而賄進者尚存懲贓吏而贓多者漏網宋獄之濫最甚於理宗之朝監司郡守擅作威福擅制獄具非法殘民富實之家稍有罥罣動籍其資不問輕重並從科罰至有監司郡守毋籍民家之禁而未己嗚呼文乎文乎豈將謂飾虛名之具而已乎聖祖命有司訪求古今書籍以資覽閲謂詹同曰三皇五帝之書不盡傳於世故後世鮮知其行事漢武帝購求遺書而六經始出唐虞三代之治始得而見武帝雄才大略後世罕及至表章六經開闡聖賢之學有功於後世又曰吾每於宫中無事輒取孔子之言觀之如節用而愛人使民以時真治國之良規萬世之師法也洪武六年祖訓録成聖祖謂侍臣曰朕著祖訓録所以垂訓子孫朕更歷世故創業艱難常慮子孫不知所守故為此書日夜以思具悉周至紬繹六年始克成編後世子孫守之則永保天祿茍作聰明以亂舊章是違祖訓矣又曰日月之能久照萬世不改其明堯舜之道不息萬世不改其行三代因時損益其小過不及爾若一代定法不可輕改故荒墜厥緒幾於亡夏顛覆典刑幾於亡商後世子孫當思敬守祖法臣良勝曰天縱聖學能自得師求帝王之遺書誦孔子之格言皆以資治臻於至理出其緒餘見之制作金匱所藏莫窺祕奧惟祖訓典章流布海宇真大禹典則之訓成湯風愆之戒也伏聞仁廟在御言曰朕十餘歲侍太祖皇帝側親見作祖訓屢更改而後成書秦晉周世子皆在太祖間暇即召太孫及諸世子於前分條逐事委曲開諭之皆持身正家以至治天下之要為天子為藩王能每事遵守豈有不福祿永逺者嗚呼休哉惟創業而知慮子孫之易惟守成而知繼祖宗之難必有萬世無疆之恤而後有萬世無疆之休諒哉御製大誥三編成頒示天下初上以中外臣民染元之俗往往不安職業觸罹憲章欲倣成周乃作大誥之制以訓化之乃取當世事之善可為法惡可為戒者為條目以誥天下又慮誥條未能盡天下之情續為一編以申其意使民觀感知所勸懲自是民之作非者鮮從化者多故又作三編大誥其意切至而詞益加詳焉每編成上親序之臣良勝曰周公治殷亂民乃有大誥之作尚未格乂乃有多士多方之作怙侈滅義之風未息而召公畢公君陳復治之矧聖祖繼故元之亂而大誥之訓勸解始明務使家傳人誦故論刑以有大誥則減罪一等極有深意而今以為虛文故案未之省也洪武三年命儒士魏俊文等六人編類天下郡縣地里形勢歸附始末為大明志臣良勝曰聖謨宏逺蓋序禹貢述職方意也所以一區宇用以昭示子孫創守艱難皆於是乎在故文皇十六年又遣官分行天下採托事實至睿皇又命儒臣通輯成書為大明一統志於古今建置人賢地里形勢民物登耗風俗媺惡不出殿廷而可知天下足以成聖祖之盛制云洪武十七年命禮部頒行科舉程式士各專一經皆兼大學中庸論語孟子四書義主朱氏集注章句易主程朱傳書主蔡氏傳及古注疏詩主朱氏集傳春秋主三傳及胡氏張洽傳禮記主古注疏文皇帝修五經四書大全易詩書如舊惟春秋則宗胡氏禮記則加陳澔集説焉臣良勝曰天下一統有徵於書同文也而文之同者其轉移導化之機莫先於科目蓋上以是取下以是應師以是教弟子以是學也我祖宗垂訓明切如此而今之業易業春秋者置易傳與三傳而不省業書業禮者已不聞有古注疏之書是在主司者當有一道德而同風俗之志也申明初制是有望焉聖祖與侍臣論及古之女寵寺人外戚權臣藩鎮邊徼之禍曰木必蠧而後風折之體必虛而後病乘之國家之事亦猶是已漢無外戚奄寺之權唐無藩鎮邊徼之禍國何能滅朕觀往古深用為戒然制之有其道若不惑於聲色嚴宫闈之禁貴賤有體恩不掩義女寵之禍何自而生不牽於私愛惟賢是用茍於政典裁以至公外戚之禍何由而作閽寺便習職在掃除供給使令不假兵柄則無寺人之禍上下相維大小相制防耳目之壅蔽謹威福之下移則無權臣之患藩鎮之設本為民使財歸有司兵必待符而調豈有跋扈之憂至於制四裔則修武備謹邊防來則禦之去不窮追豈有侵暴之虞常欲著書使後世子孫觀覽亦社稷無窮之福也臣良勝曰戒之者所以圖存也警惡者所以思善也昔孔子觀周明堂門墉間見圖有桀紂之象嘆曰此周之所以盛也明鏡所以察形往古所以知今也我聖祖歷舉前代所以滅亡者皆由女寵寺人外戚權臣藩鎮邊徼之禍而思所以制之皆原於人主之身古今經濟之略殆無遺慮若果成編藏之祕府聖子神孫有所取法誠萬世長存與天無極之道也如其未就之志則繼述之孝無有大於是者臣不勝惓惓仰望之至右衍經濟之文繫辭曰上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬臣良勝曰文字之興自庖犧氏而書制有六曰象形若日月之類象日月形體而命之也曰會意若人言為信止戈為武會人意而命之也曰轉注若考老之類文意相受而命之也曰指事若人在一上為上人在一下為下事得宜也曰假借若令長之類一文而二用也曰諧聲若江河之類皆以水為形耳為聲也是天下義理必歸文字天下文字必歸六書又不特魚鳥之迹點畫之求而已也卿雲歌曰卿雲爛兮糾縵縵兮日月光華旦復旦兮臣良勝曰聖人為世瑞也故舜之時卿雲之見乃以章禮鳯凰之儀乃以成樂不以瑞名之也若後世天馬寶鼎朱鴈之歌則甚侈矣箕子麥秀詩曰麥秀漸漸兮禾黍油油彼狡童兮不我好仇臣良勝曰箕子朝周過殷墟咸生禾黍傷之欲哭不可欲泣為近婦人故作是詩以歌之民為流涕東周大夫賦黍離之詩是本於此陶淵明曰去鄉之感猶有遲遲矧伊代謝觸物皆非哀哀箕子云胡能夷狡童之歌悽矣其悲噫是可以觀箕子之心矣采薇歌曰登彼西山兮采其薇矣以暴易暴兮不知其非矣神農虞夏忽焉沒兮我安適歸矣吁嗟徂兮命之衰矣臣良勝曰按史記武王滅商伯夷叔齊恥食周粟隱於首陽山采薇而食之乃作此歌其後四皓隱商巖亦祖此義而作歌曰莫莫髙山深谷逶迤􅀈􅀈紫芝可以療飢駟馬髙蓋其憂甚大富貴之畏人不知貧賤之肆志然則西山之歌可以察天下興亡之幾商山之歌可以識一身安危之理孔子獲麟歌曰唐虞世兮麟鳯逰今非其時來何求麟兮麟兮我心憂公羊傳曰麟者仁獸也有王者則至無王者則不至有以告者曰有麕而角者孔子曰孰為來哉孰為來哉反袂拭靣涕淚沾袍臣嘗聞夫子之生有麟而赤紱人以為祥也今出而見獲豈惟夫子道之窮越二年而兩楹之奠夢矣故曰聖人之生天地之交感五行之秀會也豈偶然哉漢武帝幸河東祠后土作秋風辭曰秋風起兮白雲飛草木黃落兮雁南歸蘭有秀兮菊有芳懷佳人兮不能忘泛樓船兮濟汾河擊中流兮揚素波簫鼓鳴兮發掉歌歡樂極兮哀情多少壯幾時兮奈老何臣良勝曰武帝此詞雄壯激烈為辭人所宗其意既壯感歎繫之固亦悔心之萌也然留連光景耽樂追歡而所懷佳人其不逮髙祖之思猛士逺矣曹操神龜篇曰老驥伏櫪志在千里烈士暮年壯心不已臣良勝曰詩言志也操之詩姦雄之志也所謂壯心不已欲何為哉九錫未已篡奪而後厭也晉王敦極愛此詩每醉則歌以鐡如意擊唾壺壺為之缺二姦心事率於此一詩見之故曰詩可以觀魏文帝雖在軍中手不釋卷少誦詩論及長備歷五經史漢諸子百家之言靡不畢覽所著書論詩賦凡六十篇陳夀曰文帝天資文藻下筆成章博聞強識材藝兼該若加之曠大之度勵以公平之誠邁志存道克廣德心則古之賢主何逺之有真德秀曰文帝之為太子也與一時文士若王粲阮瑀諸人逰號建安七子帝及粲瑀所為文章至今具在其藻麗華美則誠有之揆諸風雅典誥則罪人也魏髙祖好讀書手不釋卷在輿據鞍不忘講道善屬文多於馬上口占既成不更一字自太和十一年以後詔䇿皆自為之臣良勝曰宋魏之世魏髙祖為獨賢變北語用文士欲興禮樂鬱然有太平之風最可稱者誅沙門廢佛寺而曰法者朕與天下共之何敢輕也是豈可以北朝少之惜其恃於嚴明肆行殺伐初破南兖徐豫青冀六州丁壯斬截嬰兒貫於槊上盤舞為戲所過赤地春燕歸巢於林木此豈為久長之道哉宜其傳世幼君蕭衍以六貴同朝必知有亂爾朱榮髙歡之毒既施而魏以三歲之嬰亡天道何還之速而顯也唐太宗時著作佐郎鄧世隆表請集上文章上曰朕之詞命有益於民者史皆書之足為不朽若其無益集之何用梁武帝父子陳後主隋煬帝皆有文集行於世何救於亡人主患無德政文章何為臣良勝曰太宗可謂真知輕重者矣然而太宗固非不好文者特論欲占上格爾嘗作宫體詩使虞世南賡和世南曰聖作誠工然體非雅正後為一詩述古興亡世南已即世命褚遂良即世南靈座焚之推是心也與隋煬帝忌薛道衡王胄等爾又何嘆於梁陳也哉但太宗别有政事可觀不専於文此其所以致治安也宋真宗天僖四年作天章閣藏御集臣良勝曰真宗遘疾既久太子於資善堂決事時作也不逾年而真宗晏駕矣或曰時丁謂用事搆隙兩宫托藏御集實欲尊奉所降天書恱其意以固寵爾觀其後以之殉葬則建閣珍藏亦或然也真宗有御集可藏其於文字甚所注意故於邢昺講春秋則曰勤學有益又曰資於政理無如經書然卒不免於矯誣上天之議人君不事實德而崇飾虛文則臣下以虛文應之如丁謂者衆矣元宗時張説宋璟乾曜同上官命宴東堂賜詩曰赤帝收三傑黃軒舉二臣由來丞相重分掌國之鈞我有握中璧雙飛席上珍子房推要道仲子訝風神復輟台衡老將為調護人鵷鸞同拜日車騎擁行塵樂奏南宫宴觴連北斗醇俾豫成百揆垂拱敘彛倫臣良勝曰元宗遊意詞翰動有可傳此其一也其後擇廷臣出刺史諸州詔宰相祖道洛濵命髙力士賜詩令題座右帝親書且給筆札令自賦觀此境界豈不為盛而天寶之亂竟亦無救蓋其心自矜於是也夫矜文則輕士輕士則棄賢棄賢則政亂煬帝曰天下皆謂朕承籍緒餘而有四海設令朕與士大夫髙選亦謂天子矣矜侈若此夫豈不亡唐莊宗既取汴謂臣下曰吾於十指上得天下而髙氏不朝魏武才得荆州而于張松忽之率此纍也尚戒之哉唐憲宗見洪州觀察判官栁公權書迹愛之以公權為右拾遺翰林學士上問公權卿書何能如是之善對曰用筆在心心正則筆正上默然改容知其以筆諫也宋英宗於資善堂出御書唐人詩分賜在坐翌日吕公著奏曰陛下日新典學誠以堯舜三代為法則四海不勞而治將來論語終帙進講尚書二書皆聖人格言為君之要道臣輒取其中及孝經內節要語共百假進呈聖人之言本無可去取臣惟取明白切於治道者庶便省覽若逰意筆硯之間以備揮染亦日就月將之一助也臣良勝曰公著之善諫自公權而來公權直攻其所短匡救之意也公著因就其所長將順之意也二者皆引君當道足為事君者之法也理宗時魏了翁在朝凡六月前後二十餘疏皆當世急務帝將引以共政而忌者相與謀排擯之且言了翁知兵體乃命出視師賜便宜詔書如張浚故事陛辭御書唐嚴武詩及鶴山書院四大字賜之臣良勝曰理宗篤於向道不獨詞翰之工而已其幸太學則書道統贊及白鹿洞學規賜諸生於邱嶽則賜忠實事皆其所優也觀於此了翁不為不知竟傷於忌者之口而出之於外非帝之不明也蓋忌者之言近於理是則曰君子可欺以方也夫其曰知兵且倣張浚故事在理宗固當深信在了翁不得自避在天下亦不得而非議之也昔盧杞忌張鎰則薦曰才兼文武望重中外遂使朱泚以殺之於顔真卿於李揆率用此術此小人忌嫉之尤者人主有以察此而後為至明是何敢望於理宗也獨惜了翁與真德秀俱以正直為邪人所忌且造為飛語曰魏了翁偽君子真德秀真小人流落十年遭遇未幾而不終於用非二賢之不幸亦宋室之不幸也國朝陶安知饒州府時閩冦陷浮梁樂平進圍郡城安諭父老率子弟固守後寇就擒脅從者立宥之全活甚衆聖祖嘉其功詩以美之曰匡廬岩穴甚濟濟水怪無端盈彭蠡鱷魚因韓去逺洋陶安鄱陽即一理又製門帖賜之曰國朝謀略無雙士翰苑文章第一家魏國公徐達薨聖祖愴然不樂謂羣臣曰朕起自徒步大將軍為朕股肱心膂戮力行陳東征西討削平羣冦克濟大勳今邊境未殄朕方倚任為萬里長城之寄而太隂屢犯上將不意遽殞其命天何奪吾將之速朕夜來竟夕不寐欷噓流涕思盡國家為社稷之重安得復有斯人乃欲有以報之無所用其情耳但著其勳烈宣於金石永垂不朽使後世知斯人為國之元勳也遂親製碑文樹之於墓臣良勝曰文以載道也文藝也道實也篤實而藝書美而愛愛而傳矣聖祖文翰以道為之實也故文若陶安武若徐達乃克堪之豈溢美而濫施者倫哉蘇軾曰為文如萬斛原泉行其所當行止其所不可止此之謂也聖祖問侍臣曰三代以上所讀何書宋濓對曰上古載籍未立不專讀誦而尚躬行人君兼治教之責躬行以率之天下有不從化者乎聖祖至白虎殿見有孟子書顧問許存仁曰孟子何説為要對曰勸國君行王道施仁政省刑罰薄稅斂其要也聖祖曰孟子専言仁義使當時有一賢君能用其言天下豈有不定於一乎聖祖看書議論英發每儒臣進講必有辨説因講君之視臣如草介臣之視君如冦讐辨曰孟子于此處只是有意感動齊王近人錯理會便幹出許多背義忘君事體讀書固不可無識又講攻乎異端斯害也已辨曰攻是攻城之攻己止也孔子之意蓋謂攻去異端則邪説之害止而正道可行也宋儒乃以攻為專治而欲精之為害已甚豈不謬哉臣良勝曰孔明讀書不務記誦止觀大意真讀書法也聖學天縱而本之躬行根極抵要注疏之外輒得新意內內外外之辨崇正黜邪之旨凛然萬世之正議皆不主故常而發先聖賢所未發者此聖人之文之本也世之學者因是得師亦或於傳注之外而求自得之意者則羣攻力詆直指以為叛教誣賢蓋不知義理自是無窮以一人言之而有餘以萬世人言之而未足臣敢請以聖祖之辨注者示天下為萬世法文皇既遷北都敕翰林院凡南京文淵閣收貯古今一切書籍自一部至有百部以上者各取一部送京餘悉封識收貯如故臣良勝曰帝王之學與儒生異然而載籍所考有古今治亂之迹焉有禮樂名物之資焉有人物賢否之辨焉是以聖祖開國即訪遺書文皇於南京貯書尚存正本大有深意凡載籍在天地間經厄為多秦王之初王莾之末獻帝既遷西京燔蕩劉石憑陵失墜既多侯景破梁周師焚郢君子謂經籍已經五厄至隋唐又備而祿山黃巢之變極於五代女真蒙古至正之末又不知經幾厄已繄我祖宗購求收畜不遺於力不遺於慮故典充棟指取可稽而文子文孫宸章炳耀輝映海宇蓋亦有所自云文皇命楊士竒侍講皇太子兼春坊諭德時贊善王汝玉每以詩法進皇太子以問士竒士竒對曰陛下明品講道之暇娛意文事兩漢詔誥皆可觀非為文詞髙古亦可裨益治道詩非所急也皇太子曰儒者亦作詩否士竒曰儒者固皆作詩然儒者之經有髙下有道德之儒有經濟之儒專意詞章君子謂之俗儒人主尤當辨於此永樂二年仁廟在東宫翰林學士王達講乾之九四舉儲二為語講畢召問楊士竒曰於此恐無儲二之説達不含譏否士竒對曰講臣非正道不陳豈敢含譏此出宋儒胡瑗之説仁廟曰對我言此常人得此爻亦舉此説乎士竒因舉程子云凡卦中六爻人人有用聖賢有聖賢用衆人有衆人用君有君用臣有臣用無所不通又舉王昭素對宋太宗之言仁宗恱臣良勝曰帝王之學固有資於載籍之富尤有資於輔導之臣蓋九重邃密親儒生亦無幾時萬幾叢委親簡册亦難遍閲惟於講讀之際每慎決擇之幾則萬古之書皆在目前羣臣之學皆為度內使進講讀皆若達承顧問皆若士竒若汝玉者將無容議矣蓋達之講實有所師士竒之對亦有所戒程頥嘗講賢哉回也一章乃曰顔淵之賢簞瓢陋巷其貧如此以季氏而富於周公魯之用舍如此何以為國此達之所師也陳後主隋文帝專意詞章至以空梁落燕泥庭草無人隨意緑之句殺戮臣下以成忌嫉此士竒之所戒也故曰宰相須用讀書人又況於君人者哉右衍詞翰之文中庸衍義卷十六
