body:
  text: 中庸衍義儒家類提要臣等謹案中庸衍義十七卷明夏良勝撰良勝字子中南城人正德戊辰進士官至太常寺少卿事迹具明史本傳自宋以來取古今之義括舉條目而衍其説者始葉時禮經會元嗣則真德秀大學衍義良勝又因德秀之例以闡發中庸其書成於嘉靖間蓋以大禮疏稿事謫戍遼海時作也自性道教達道達德九經三重之屬一一援據古今推廣演繹至於崇神仙好符瑞改祖制抑善類數端尤究極流弊惓惓言之蓋皆為世宗時事而發然務抒獻納之忱而無一毫怨懟譏訕之意斯所以為純臣之言也中頗採邱濬大學衍義之説考良勝於正德嘉靖間兩以鯁直杖謫風節凛然為當世所重其書雖近于濬書至其人品則非濬所可企及矣乾隆四十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀中庸衍義原序臣聞言帝王之學者必本於道言帝王之道者必達于治然一以孔氏為宗孔氏道之大成也雖厄于治而學道以圖治者非尊孔則絀孔道之傳得其宗者曰曽子述大學言天下之治必本道而學也曽子之傳得其宗者曰子思作中庸言天下之學必達道而治也體用一原而師門之説家教之緒莫有軒輊焉者其示孔道之宗旨一也聖逺言微經焚而説鑿以雜宋仁宗時王堯臣及第賜中庸篇吕臻及第賜大學篇始掇取於載記中至大儒程皓及頥尊信之簡編循次旨趣有歸朱熹集説章句别為或問自謂平生心力盡在二書而孔曽之道益明真德秀衍大學義而程朱之説大備臣自知學每惜中庸尚或缺義竊有志焉幸參仕籍近三十年而立朝才逾一考恆以痛戚罪遣屏居放廢弗之能就往者以禮文罪案蒙詔逮治繫獄凡三年自計一旦奄忽竟齎于志省愆餘息謬有繹思則擁被默稿片紙蠅書納敗絮中既而有死語燬之今幸生戍遼海而隨行無車邊士家亦罕得貸本賴二三友朋腹笥維富時就咨質緝舊思聞漫次成録曰中庸衍義臣惟孔氏之道至宋而明亦至宋而厄厄而復明固其理也程頥明是道者入道學之禁至刻黨碑及禁解吕大防列本朝事以進皆祖宗家法禁始於變法故也朱熹明是道者入偽學之禁至燬書板及禁解真德秀衍大學義以進皆聖賢成法禁始於嫉賢故也嗚呼臣不得已而以言事君二者備矣人君而比類屬思覆視于册有相發焉必曰古之聖賢則然吾弗慕聖賢而何學焉必曰吾之祖宗則然吾弗率祖宗而何學焉如是而有弗即于道弗底于治弗尊于孔氏者未之有也故臣不揣荒陋僣有是編綱目雖具義例罔修摛經摘史列傳注論斷而折衷以聖祖文皇之懿訓蓋竊比於德秀之書而附益以大防之義也伏愧病與老乘懼弗終業搜剔挂漏莫副初心然以畎畝餘忠兵戎偶暇犬馬一得之愚附録謹藏敝篋尚望聖恩終貸解禁生還將昧死以獻焉臣良勝惶恐頓首謹序
