body:
  text: 中庸衍義卷六明夏良勝撰逹道之義父子之常父子之戒父子之變五子之歌其四曰明明我祖萬邦之君有典有則貽厥子孫闗石和鈞王府則有蔡沈曰典猶周之六典則猶周之八則所以治天下之典章法度也鈞與石五權之最重者也闗通以見彼此通同無析閱之意和平以見人情兩平無乖爭之意言禹以明明之德君臨天下典則法度所以貽後世者如此至於鈞石之設所以一天下之輕重者王府亦有之其為子孫後世慮可謂詳且逺矣伊訓曰敷求哲人俾輔于爾後嗣臣良勝曰自家天下而後所以貽孫謀燕翼子者要道也乃若商王敷求哲人尤大要也自商以光為虞夏所用之人不過一二世族八元八愷則髙辛髙陽氏之才子舜禹稷契世系均出黄帝商以後為周武王兄弟九人為顯諸侯而畢召亦以同姓為上公吕望蘇公三恪之外異姓之賢亦鮮矣凡民論官司馬不過州閭族黨出掌入治之職孔門弟子仕者止於大夫家臣是亦求賢之道未之廣也惟湯立賢無方以為貽後之大訓故伊尹告於太甲者莫大於此是故終商之世伊尹仲虺莱朱伊陟巫咸傅說祖已祖伊皆以䟽逺之賢得盡其用湯之孫子中興歴世七王之澤入人之深周既革命而人心思商歴再世而後定雖周目之為頑民在商不失為義士此振古所未有者哲人貽後其效有若此哉禹湯皆身致太平者禹之貽後以法湯之貽後以人君子曰有治人無治法臣願聖明决擇輕重而並施之則貽以萬世之太平也文王詩曰亹亹文王令聞不已陳錫哉周侯文王孫子文王孫子本支百世凡周之士不顯亦世朱熹曰文王非有所勉也純亦不已而人見其若有所勉耳其徳不已故今既没而其令聞猶不已也令聞不已是以上帝敷錫于周維文王孫子則使之本宗百世為天子支庶百世為諸侯而又及其臣子使凡周之士亦世世脩德與周匹休焉臣良勝曰文王之貽後者以其德也視人與法尤為要矣夫文王之徳非以永令聞也文王令聞非以徼後福也所謂無所為而為之者與天為一也是以於昭于天陟降左右而天之厚之不于其身而及其孫子為天子為諸侯延及百世至其所以輔孫子者亦波及焉在天則因材而篤在文王則德厚而流光皆無所為而為之者也故曰瑟彼玉瓉黄流在中明寳器不薦於䙝味黄流不注於瓦缶盛徳必享於祿夀福澤不降於淫人天人一理相為流通斷可識矣假樂詩曰干祿百福子孫千億穆穆皇皇宜君宜王不愆不忘率由舊章朱熹曰言王者干祿而得百福故其子孫之蕃至于千億適為天子庶為諸侯無不穆穆皇皇以遵先王之法者臣良勝曰王者福祿得於天者可謂極矣而享厚之報尚有流及於子孫者固在於蕃尤在於賢也子孫所以為賢者非自賢也亦守先王之舊章賢其先王之賢乃所以為賢也先王創業垂統功德並懋越歴艱險安危成敗皆身親而熟慮之者故典則貽謀必度其子可世守而能行之者所謂可繼而可傳也惟子孫自賢而或小前人所為故有作聪明以亂舊章者諂諛並進法度紛更傾覆顛危而先王之澤亦因以斬矣故商之孫子其麗不億惟紂自賢故曰雖無老成人尚有典刑曾莫是聽大命以傾然則子孫非能守法為賢雖多何為哉文王之後有若武王之聖而周公穪之亦曰丕承哉武王烈而已君子知紂之所以亡武王之所以興則知先王之所以貽子孫者欲其何所法哉震亨震來虩虩笑言啞啞震驚百里不喪匕鬯朱熹曰震動也一陽始生於二隂之下震而動也其象為雷其屬為長子震有亨道震来當震之來時也虩虩恐懼驚顧之貌震驚百里以雷言匕所以舉鼎實鬯以秬黍酒和鬰金所以灌地降神者也不喪匕鬯以長子言也此卦之占所以為恐懼則致福而不失其所主之重矣臣良勝曰乾一索而得男為震是乾天子之卦也震天子長子之卦也一人元良萬邦以貞長子雖未居位而為天子之貳将有天下國家之責非知所恐懼而以勢位為樂則未免有驕縱之失徒知恐懼而不以誠敬為主亦未免為柔懦之歸故曰震驚百里不失匕鬯長子主祀匕鬯其所有事者震而驚及百里震之極也當此震懼而所事之匕鬯猶能不失其常度非誠敬在躬有不能也是亦幾於烈風雷雨弗迷長子之道於是為至他日為天子而措之天下固所優為也文王於震彖訓垂戒若此而周公象詞亦曰君子以恐懼修省何長子之道以恐懼為首務也蓋崇髙天位惟驕泰與期而畏懼若無所庸者世祿之家鮮由禮義矧天子之子乎禹之示訓曰予臨萬民若朽索之馭六馬成湯撫有萬方曰慄慄危懼若將隕於深淵皆懼也此文王周公垂訓之微旨也伊訓曰今王嗣厥徳罔不在初立愛惟親立敬惟長始于家邦終于四海蔡沈曰初即位之初言始不可以不謹也謹始之道孝弟而已孝弟者人心之所同非必人人教詔之立愛敬於此而形愛敬於彼親吾親以及人之親長吾長以及人之長始於家逹於國終而措之天下矣蓼莪詩曰父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我欲報之徳昊天罔極臣良勝曰讀蓼莪詩者孝弟之心油然而生矣蓋賢人君子理義以養心師友以資識其所以為孝固亦有得於性命之理者閭閻野夫武人孺子夫何所學但求其鞠育撫養之劬勞而思其屬毛離裏之所受天性之真藹然呈露所謂不學而知不學而能者此詩之所以可興也是凡人之受恩於父母者若是其大也若卿大夫之子又受家於父母也諸侯之子又受國於父母也天子之子又受天下於父母也其恩尤厚又何徳以為報乎孝經曰昔者明王事父孝故事天明事母孝故事地察臣良勝曰明王事父母固所以明察天地之理然必能明察天地之理而後盡事父母之道也盖天地萬物之父母也吾父母天地之子也天下人物亦天地之子也吾視父母猶天地也則視天地之所子者皆吾父母之子者故曰斷一樹殺一獸不以其時非孝也况天地父母至公無私其所望於子以事之者亦至公無私也惟其公也則菽水之奉在所歡也特羊之薦在所享也不得不可以為恱無財不可以為恱若必遂其私而有所僣有所假焉豈天地父母之心哉仲尼居曽子侍子曰先王有至德要道以順天下民用和睦上下無怨爾知之乎曾子避席曰參不敏何足以知之子曰夫孝徳之本也教之所由生也臣良勝曰孔門弟子曾參以孝稱而夫子開示之者以先王之至德要道也夫德而謂之至德道而謂之要道所以立徳所以成教不外乎孝而已矣其所以為孝順於天下而已矣夫以一人之孝而順於天下者順於理而已矣一人之心天下人之心也一心之理天下人心之理也吾之心順天下之心亦順也吾之理順天下之理亦順也故有順於一人而逆於天下不可以言順也逆於一人而順於天下不害其為順也一人或繫於私而天下之理則公也故君子之為孝不以順己而以順理不以順一人而以順天下成於己而為德施於天下而為教民用和睦又何上下之怨懟者乎祭義曰孝有三大孝尊親其次弗辱其下能養臣良勝曰孝者百行之本其所以行之固亦多端也尊親者孟子所謂孝子之至莫大乎尊親尊親之至莫大乎以天下養是養為至孝而非為下也然有分焉若魯用天子禮樂而三家以雍徹亦得謂之尊親己乎弗辱云者若曾子所謂居處不莊事君不忠蒞官不敬朋友不信戰陣無勇皆辱及其親也然有納汙含垢囚服變形蹈刃膏野世方以為大辱亦將謂之辱親己乎養之下者口體之謂也如先意承志諭之以道若文王食上在視寒煖食下問所膳命膳宰曰末有原亦謂之下可乎又曰孝有三小孝用力中孝用勞大孝不匱思慈愛忘勞可謂用力矣尊仁安義可謂用勞矣愽施備物可謂不匱矣陳澔曰庶人思父母之慈愛而忘己躬耕之勞可謂用力矣此其下能養之事也諸侯卿大夫士尊重於仁安行於義功勞足以及物可謂用勞矣此其次弗辱之事也博施謂德教加於百姓刑于四海也備物謂四海之内各以其職来助祭可謂不匱矣此即大孝尊親之事也子夏問孝子曰色難有事弟子服其勞有酒食先生饌曾是以為孝乎朱熹曰孝子之有深愛者必有和氣有和氣者必有愉色有愉色者必有婉容故事親之際惟色為難耳服勞奉養未足為孝也真德秀曰父母之顔色有􅆭有舒為人子者所當潛觀黙察其色愉則其心樂固可以自慰若其色有異焉其可不兢兢焉自省且自責乎慶雲甘雨天之喜也迅雷烈風天之怒也善事天者必於此焉察之父母者子之天地察之可不謹乎知此而後知色難之義臣良勝曰由熹言之人子事親之色常欲其和而安也有所未安和之未至也由德秀言之人子承親之色常欲其和而樂也有所未樂和之有違也合是二者而事親之道備矣九月丁卯子同生左氏曰以太子生之禮舉之接以太牢卜士負之士妻食之公與文姜宗婦命之公問名於申繻對曰名有五有信有義有象有假有類以名生為信以徳命為義以類命為象取於物為假取於父為類不以國不以官不以山川不以隠疾不以畜牲不以器幣周人以諱事神名終將諱之故以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒宋以武公廢司空先君獻武廢二山是以大物不可以命公曰是其生也與吾同物命之曰同程頤曰書子同生聖人所以正大本而防僭亂也子同者桓之嫡長子也於其始生即書之其位固已定矣臣良勝曰嫡子之生其禮之重若此子也者親之枝也敢不重乎至於命名之義其詳若此尤不可不慎也晉穆侯以條之役生太子命之曰仇其弟以千畆之戰生命之曰成師師服曰異哉君之名子也夫名以制義義以出禮禮以體政政以正民是以政成而民聽易則生亂嘉耦曰妃怨耦曰仇古之命也今君命太子曰仇弟曰成師始兆亂矣其後晉亂而成師封於曲沃是為桓叔弑哀侯而有國又薦賂釐王命之以服師服之言於是乎騐矣至若漢武既立太子而昭帝以十四月生乃命鉤弋之門曰堯母奸臣逆探君意所屬遂有危皇后太子之心以成巫蠱之禍此尤足為永鑒也孔子曰唐虞禪夏后殷周繼其義一也韓愈曰或問曰堯舜傳諸賢禹傳諸子信乎曰然然則禹之賢不及堯舜也與曰不然堯舜之傳賢也欲天下之得其所也禹之傳子也憂後世争之之亂也堯舜之利民也大禹之慮民也深曰然則堯舜何以不憂後世曰舜如堯堯傳之禹如舜舜傳之得其人而傳之堯舜也無其人慮其患而不傳者禹也舜不能以傳禹堯為不知人禹不能以傳子舜為不知人堯以傳舜為憂後世禹以傳子為慮後世曰禹之慮也則深矣傳之子而不淑則奈何曰時益以難理傳之人則争未前定也傳之子則不争前定也前定則雖不遇賢猶可以守法不前定而不遇賢則争且亂天之生大聖也不數其生大惡也亦不數傳諸人得大聖然後人莫敢争傳諸子得犬惡然後人受其亂禹之後四百年然後得桀亦四百年然後得湯與伊尹湯與伊尹不可待而傳也與其傳不得聖人而争且亂孰若傳諸子雖不得賢猶可守法曰孟子之所謂天與賢則與賢天與子則與子者何也曰孟子之心以為聖人不茍私其子以害天下求其說而不得從而為之辭臣良勝曰官天下者堯舜非常之舉也家天下者大禹常行之道也嘗考之史黄帝之位傳之少昊子也少昊傳之顓頊則黄帝孫也顓頊傳之帝嚳則少昊孫也帝嚳傳之摯少子也摯廢而尊堯則帝嚳仲子也是堯舜之先子孫世次相傳以為常也至堯舜之傳賢以朱均之不肖或以貽天下憂而舜禹之聖足以繼堯舜之治也然則傳子之事非禹肇之者也堯舜之事二聖非常之舉也禹之事萬世常行之事也若使世世有非常之傳則人人懐非分之望亂益滋矣漢文帝元年有司請早建太子曰豫建太子所以重宗廟社稷不忘天下也古者殷周有國治安皆千餘歲用此道也今子啓最長純厚慈仁請建以為太子乃許之吕祖謙曰景帝年三十二即位然則文帝之元年景帝方十歲爾平勃所以亟請建太子者懲惠帝繼嗣不明之禍也文帝所以固讓者蓋踐祚之初懼不克勝所言皆發於中心非好名也臣良勝曰太子天下之本也建之不可不豫也大位奸邪之窺也建之不可不慎也文帝即位才數月有司建白與帝謙讓真德秀以為可後世法也臣嘗考帝對有司之言曰楚王季父也春秋髙閱天下之義理多矣吴王於朕兄也惠仁以好德淮南王弟也秉德以輔朕豈為不預哉斯言一聞而三國覬覦之端於是兆矣太子疑忌之心於是生矣其後淮南於帝不終於愛景帝既立吴楚首叛是七國之禍已萌於豫立太子時矣豈必晁錯激成之哉文帝賢主也建儲盛事也謙讓美徳也而命詞之誤幾為宗社之憂可不慎哉可不慎哉文王世子曰教世子必以禮樂樂所以脩内也禮所以脩外也禮樂交錯於中發形於外是故其成也懌恭敬而温文立太傅少傅以養之欲其知父子君臣之道也太傅審父子君臣之道以示之少傅奉世子以觀太傅之德行而審喻之太傅在前少傅在後入則有保出則有師是以教喻而德成也師也者教之以事而喻諸德者也保也者慎其身以輔翼之而歸諸道者也記曰虞夏商周有師保有疑丞設四輔及三公不必備惟其人賈誼曰古之王者太子乃生固舉以禮有司齋肅端冕見之南郊過闕則下過廟則趨故自為赤子而教固已行矣孩提有識三公三少固明孝仁禮義以道習之逐去邪人不使見惡行於是皆選天下之端士孝弟博聞有道術者以衛翼之故太子生而見正事聞正言行正道左右前後皆正人也及太子少長知妃色則入於學承師問道退習而考於太傅太傅罰其不則而匡其不及則徳智長而理道得矣及太子既冠成人免於師保之嚴則有記過之史徹膳之宰進善之旌誹謗之木敢諫之鼔瞽史誦詩工誦箴諫大夫進謀士傳民語習與智長故切而不愧化與心成故中道若性三代所以長乆者以其輔翼太子有此具也及秦則不然使趙髙傅胡亥而教之獄所習者非斬劓人則夷人之族也胡亥今日即位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若艾菅然豈惟胡亥之性惡哉彼其所以道之者非其理故也臣良勝曰周公抗世子法於伯禽以教成王也然則成王日有所就月有所將緝熙單心以基宥宻卒為令主則周公之教之然也况當時召公為太保太公為太師伯禽受撻而所以善成王者日至也夫安得不日進於善乎仲尼曰為人臣者殺其身有益於君則為之况汙其身以善其君乎周公優為之也漢文既立太子而賈誼陳治安之䇿乃及於此必以其時輔教景帝之道有未備也故當時吴王太子侍飲博以争道故引博局提殺之遂啓反釁晁錯又復進說曰皇太子所讀書多矣而未深知術數帝善之拜錯為太子家令是以養成刻薄之性盡發術數之邪既立太子榮無罪廢之而輕許梁王以傳位卒以生禍錯亦躬受其惨刑并顧命之臣如亞夫者亦以鞅鞅誅君子每咎文帝貽謀未善而大惜誼言之不行也夫世子之法養其理於中而應之於外也保傅之篇制其欲於外而保其中也輔道之方斯其盡之人主教諭太子欲建三代有道之長盍於此致意焉唐太宗作帝範十二篇以賜太子曰君體建親求賢審官納諫去䜛戒盈崇儉賞罰務農閱武崇文且曰脩身治國備在其中一旦不諱更無所言矣又曰爾當更求古之哲王以為師如吾不足法也吾居位以来不善多矣錦繡珠玉不絶於前宫室臺榭屡有興作犬馬鷹鶻無逺不至常使四方供頓煩勞此皆吾之深過勿以為是而法之顧我𢎞濟蒼生其益多肇造區夏其功大益多損少故人不怨功大過㣲故業不墮爾無我之功勤而承我之富貴竭力為善則國家僅安驕惰奢縱則一身不保且成遲敗速者國也失易得難者位也可不惜哉可不慎哉臣良勝曰太宗之所以教太子者可謂備且要矣盖有懲於承乾之廢是以不惜任過而懇切若是也且嘗語侍臣曰自立太子遇物則誨之見其飯則曰汝知稼穡之艱則常有斯飯矣見其乗馬則曰汝知其勞不竭其力則常得乗之矣見其乗舟則曰水以載舟亦以覆舟見其息於木下則曰木從繩正后從諫聖可謂無所不用其言也及有疾則謂太子曰李世勣才智有餘然爾與之無恩恐不能懐服我今黜之俟我死爾用為僕射親任之亦可謂無所不貽之謀也太子既立是為髙宗以忌日詣寺納武才人為昭儀是其為太子侍宫中見而恱之烝淫之志畜之乆矣及立為后又成於世勣陛下家事之一言唐之子孫屠戮幾盡則太宗所以教而貽之久者果何益哉胡安國曰其身不正雖令不從高宗之納才人正巢刺王妃之遺範也范祖禹曰以是心待其臣利祿之士可得而使也賢者不可得而致也故凡教太子而以空言若𤣥宗有承華要畧之書未幾一日殺三子而不為怪又况托孤寄命不擇豪傑而付之反覆無恥之世勣何足以副所望哉宋太宗謂冦凖曰諸子孰可以付神器者凖曰陛下為天下擇君謀及婦人中官不可也謀及近臣不可也惟陛下擇所以副天下望者帝曰襄王可乎凖曰知子莫若父聖慮既以為可願即决定遂立為皇太子廟見還宫京師民擁道喜躍曰少年天子也帝聞之不懌召凖曰人心遽屬太子欲置我何地凖再拜賀曰此社稷之福也帝悟命李至李沆並兼賓客詔太子事以師傅禮每見必先拜至等不敢當上表辭謝詔答曰朕旁稽古訓肇建承華用選端良資於輔導藉卿宿望委以調䕶蓋将朂以謙冲故乃異其禮數勿飾當仁之讓副余知子之心至等相率謝真宗春秋髙未建儲君衛尉寺丞陳執中進演要三篇以早定天下根本為說翌日帝以他䟽示輔臣皆賛曰善帝指袖中曰又有善於此者乃演要也逾月立皇太子作元良箴以賜之後皇子就學於資善堂以張士遜崔遵度為王友士遜一日謁王旦稱皇子學書有法旦曰公為王友職止於是耶臣良勝曰宋太宗真宗相繼建儲答詔賜箴李至李沆之當禮師傅王旦之責望王友與陳執中之建議冦凖之决䇿均可為後世法矣是以真仁承統近五十年仁厚之澤培益基業刑以不殺為威財以不畜為富兵以不用為功人才以不作聪明為賢以寛厚待民以恩禮待士以至誠待外國蘇軾有云社稷長逺終必頼之此輔教太子之效若此明也人君可不知所務乎至若冦凖之言尤為藥石者曰謀及婦人中官近臣不可也昔雍紏以厲公之命圖祭仲雍姬知之以告仲而殺之厲公曰謀及婦人宜其死也晉文公問原守於寺人得趙衰栁宗元謂其後景監得以相衛鞅𢎞石得以殺望之皆始於此則凡國事謀及若人皆不可也况建儲君之大事乎唐𤣥宗之殺子謀及於惠妃其後忽忽不樂而髙力士問其故乃曰汝我家老僕豈不能揣我意力士曰豈非以郎君未定邪𤣥宗以立子謀及婦人中官其後若之何也臣故曰冦凖之言尤為藥石也聖祖命詹同取東宫官制觀之謂同等曰朕今立東宫官取廷臣勲徳老成動有典則者若新進之賢亦選擇叅用夫舉賢任才立國之本崇徳尚齒尊賢之道輔導得賢人各盡職故合抱之木必以授良匠萬金之璧不以付拙工同對曰陛下立法垂憲之意實深逺矣於是以李善長等皆兼東宫官諭善長等曰朕於東宫官不别設府僚而以卿等兼之者蓋軍旅未息朕若有事於外必留太子監國若設府僚卿等在内事當啓問太子間有聽斷不明而與卿等意見不合卿等必謂府僚導之嫌疑由是而生朕所以特置賓客諭徳等官以輔太子徳性且選名儒為之賓友昔周公告成王首以克詰戎兵召公告康王首以張皇六師此居安慮危不忘武備蓋繼世之君生長富貴溺於安逸軍旅之事多忽而不務一有緩急罔知所措二公所言不可忘也臣良勝曰立法創制裁自一心備上古之至善絶近世之弊端若斯舉是已以勲徳老臣兼東宫官即文王世子所謂太傅在前少傅在後也當成王時召公為保周公為傅太公為師皆文武之舊勲也别置府僚自唐太宗始招選茂異謂之十八學士如登瀛洲其後嫌隙僚佐多外遷及遷杜如晦房𤣥齡曰餘人不足惜如晦王佐之才太宗遂决異志而建成元吉之禍成矣貞元中王伾王叔文得幸東宫宰相聽其指使亦有永貞之變徵徃事以思聖制真洞視萬古者也至舉周召所以告君安不忘危尤足以示聖子神孫之法為臣下者亦當服膺而弗失也聖祖謂皇太子曰天子之子與公卿士庶人之子不同公卿士庶人之子係一家之盛衰天子之子係天下之安危爾承主器之重將有天下之責也公卿士庶人不能脩身齊家取敗止於一身一家若天子不能脩徳其敗豈但一身一家之比将宗廟社稷有所不保天下生靈皆受其殃可不慎哉可不戒哉臣良勝曰聖祖之所以諭皇太子者如此其所以諭官僚者如彼仰承懿訓是以上下交脩德業大成以有今日隆平之盛聖祖退朝皇太子與諸王侍指宫中隙地謂之曰此非不可起亭館臺榭為遊觀之所今但令内使種􅂼不忍傷民之財勞民之力耳昔商紂崇飾宫室不恤人民天下怨之身死國亡漢文帝欲作露臺惜百金之費當時民安國富奢儉治亂懸判爾等當記吾言常為儆戒又命工畫古孝行及身所經歴艱難起義戰伐之事為圖以示子孫謂侍臣曰朕家本業農祖父皆長者世承忠厚積善餘慶以及於朕今圖此者使後世觀之知王業艱難也詹同頓首曰陛下昭德垂訓若此為切聖祖曰富貴易驕艱難易忽乆逺易忘後世子孫生長深宫惟見富貴習於侈靡不知祖宗積累之難吾示之以此朝夕覽觀庶有所儆也臣良勝曰大禹有訓曰内作色荒外作禽荒甘酒嗜音峻宇雕墻有一於此未或不亡周公之戒成王陳無逸作豳風詩雖以重農亦以見周家積功累仁本於農事開國其艱難如此子孫可不思所以慎保之哉聖祖垂訓義兼之矣永樂元年文皇御順天門命侍臣輯自古以来嘉言善行有益於太子者為書以授長子且曰昔堯試舜自慎徽五典至納於大麓歴試諸艱乃命以位舜生長民間躬親稼穡堯尚試之如此朕今令長子守北京親庶務雖吏案奏牘皆躬閱之以知為臣之難也日後庶可為人君也永樂二年文華寳鑑成文皇御奉天門召皇太子授之曰脩已治人之要具於此書昔堯舜相傳惟曰允執厥中帝王之道貴乎知要使足為法爾其勉之皇太子拜受而退文皇顧翰林學士觧縉曰朕皇考訓戒太子嘗采經傳格言為書名曰儲君昭鑒錄今朕此書稍充廣之益以皇考聖謨大訓以為子孫帝王萬世之法誠能守此足為賢君昔秦始皇教皇太子以法律晉元帝授太子以韓非書帝王之道廢而不講此所以亂亡朕此書皆大經大法卿等兼輔東宫從容閑暇亦當以此為說庶幾成其徳業他日不失為守成之令主臣良勝曰太子者帝王之貳也其所以預養之者上承之於親下輔之於臣固將以舉帝王之道也帝王之道至堯舜而極矣故不以堯舜望太子非父道之至也不以堯舜輔太子者亦臣道之賊也文皇二書以授皇子皆所謂堯舜之道也其命縉等以從容陳說者亦堯舜之道也且臣聞所謂皇子即仁皇也聖資夙成而聖祖黙而授之愛而教之亦有素矣嘗命閱中外臣民章䟽獨取其切於兵民疾苦及闗宗社者白之聖祖覽之稱善其間有一語一字之謬者悉置之聖祖指示之曰爾忽之邪對曰顧小過失不足天聽聖祖喜曰猶有君人之度哉又嘗問之堯九年之水湯七年之旱當時百姓何恃對曰恃聖人有恤民之政爾自是益見重是在洪武二十八年閏九月也於時皇太孫無他恙文皇居潛邸而聖祖所以待仁皇者若此蓋已有為天下擇堯舜之君矣天命人心之微妙豈有一毫已意於其間哉惜乎龍馭早賓天下不得乆被堯舜之澤蓋臣民之不幸也文皇諭羣臣曰凡開創之主謀慮深逺作一事必籌度數日乃行亦欲子孫世守之故詩書所載後王之善必曰不愆不忘率由舊章於警戒後王必曰率乃祖攸行曰監于先王成憲其永無愆此皆老成之言後世輕佻諂諛之徒立心不端以其私智小見導嗣君改更祖法嗣君不明以為能而寵任之狥小人之邪至於法敝民叛而喪其社稷者有之矣豈可不以為戒臣良勝曰文皇創業守成並臻於盛故有以洞燭人情精錬事理故其所示訓專專以克守成法為言既有以儆嗣君亦有以戒人臣也從古輕改祖法必曰宋之神宗然其所以誤之者安石祖宗不足法之言也其黨又若吕惠卿者放言無忌曰先王之法有一年一變者有五年一變者有三十年一變者司馬光力辨其非且曰三代之君常守禹湯文武之法雖至今存可也神宗信向既偏以天下公論謂之流俗内而太后有言則曰羣臣惟安石為國家當事親而岐王有言則曰是我敗壊天下耶汝自為之是以顧命大臣侍從臺諫州縣之言徒以取禍增其勢爾卒以産憂遂亡北宋哲宗嗣位吕大防特列祖宗所行事親事長治内待外戚尚儉勤身尚禮寛仁八法以進曰祖宗家法所以致太平者陛下不湏逺法前代但盡行家法足以為天下大防陳善最得所以開導嗣君惜其不得陳於神宗之朝爾今夫巨室之子亦多闊視輕人若言及祖父雖至悻戾必不敢顯非而力訾者亦至性也嘗有酗號於市怒隣傷類有人曰而祖父至則必少戢而隨以歸矣臣謂使當時有如大防數十軰神宗之志庶亦有可變者乎嗚呼我祖宗彛訓具在小大臣工以安石惠卿為戒以光大防為法則我祖宗之法可以萬世無變也臣於衍義必取祖宗言行為折𠂻者犬馬之誠竊有取大防之意聖明留意天下幸甚萬世幸甚聖祖定鼎金陵遣使召宋濓至授皇太子經後以疾告還家賜金帛皇太子致贈有加濓上箋謝奉書勉以孝友恭敬勤敏讀書毋怠惰毋驕縱進脩德業以副天下之望聖祖覽書甚喜召太子語以書意且賜書答又嘗從容謂濓等曰皇太子留心治道卿等宜常與論議庶廣識見幸喜調䕶之濓致仕至家即拜表稱謝仍上箋皇太子申明正心治國之要聖祖賜詔褒答云忠良之臣勲業既著文章必傳功成身退惟先生獨全文皇一日召楊士竒問東宫所行如何士竒以孝敬對使言其實對曰有事宗廟祭器皆親閲車駕北征不敢寧居恒日中昃始食駕還而後能安文皇曰此子道當然士竒曰古聖賢亦皆盡其當然者耳後舉侍皇太孫講讀衆以儀智為老士竒曰儀智道理明執守正精神不衰老成正大廷臣未見其比文皇喜曰智雖老識大體能直言不阿向言日食宜免賀朕知之可謂得人矣文皇召試胡儼稱㫖授翰林院檢討侍講直内閣陞春坊諭德文皇北征命以祭酒兼侍講掌翰林院事輔皇太孫監國儼在内閣遇有故問必從容審度而後對及兼宫僚在講筵凡古今治亂得失必反覆敷陳以圖禆益以外艱去詔起復道過南京見東宫詢及民情所對切時務臣良勝曰古者輔導太子必選端良孝弟博聞有道之士若祖宗推任宫僚如宋濓楊士竒胡儼及士竒之薦儀智乃其人矣君徳治道之本有由然哉文皇命蹇義為皇太子詹事義委曲周悉所言無不信用車駕廵守北京命皇太子監國中外庶務惟諸王及逺方所奏請詣行在餘悉啓聞處分夏原吉扈從兼行在禮部都察院事車駕親征北皇嫡長孫留守北京原吉輔導脩舉庶務京師肅然臣良勝曰唐髙祖立秦王為太子詔軍國庶事無大小悉委處决然後奏聞彼秦王推刃同氣挟而居之髙祖所以委之者實非其心無足法也宋真宗時命太子開資善堂親政而皇后裁决於内丁謂用事於外幾以成隙惟王曽正色立朝而調和其間乃得永仁宗太平之治祖宗監國留守之命因事以行大非唐制可擬而輔導以付老成之人如義如原吉者雖無内外之隙亦足以繼王曾之羙矣文王之為世子朝於王季日三雞初鳴而衣服至於寢門外問内豎之御者曰今日安否何如内豎曰安文王乃喜及日中又至亦如之及暮又至亦如之其有不安節則内䜿以告文王文王色憂行不能正履王季復膳然後亦復初武王帥而行之不敢有加焉文王有疾武王不脱冠帶而養文王一飯亦一飯文王再飯亦再飯旬有二日乃間漢文帝居代時母薄太后嘗病三年帝為之目不交睫衣不解帶湯藥非口親嘗弗進仁孝聞於天下唐髙宗為太子時嘗從幸翠華宫太宗苦痢増劇太子侍疾旬日之間髪有變白者太宗泣曰吾聞古之孝者不過文王今數日不食晝夜不離吾側口嘗湯藥盛年髪則變白爾之孝殆過文王矣吾雖殞没亦無所恨臣良勝曰人皆可以為堯舜此類是也文武之孝古今以為極致今觀文帝髙宗之孝是亦文武之孝也文武之孝是亦堯舜之孝也其所以自盡其良知良能者一也若其終身成就全徳固未可以一節盡之者下武詩曰成王之孚下土之式永言孝思孝思維則朱熹曰言武王所以能成王者之信而為四方之法者以其長言孝思而不忘是以其孝可為法耳若有時而忘則其孝者偽耳何足法哉漢髙祖詔曰人之至親莫親於父故父有天下傳歸於子子有天下尊歸於父此人道之極也前日天下大亂兵革並起萬民苦殃朕披堅執鋭平暴亂立諸侯偃兵息民天下大安此皆太公之教訓王侯卿大夫已尊朕為皇帝而太公未有號今上尊太公為太上皇唐太宗時李靖帥驍騎三千自馬邑進屯惡陽嶺夜襲定襄破之突厥頡利可汗不意靖猝至大驚戰於隂山斬首萬餘級俘男女十餘萬斥地自隂山北至大漠露布以聞擒頡利送京師上御順天樓盛陳文物引見上皇聞之嘆曰漢髙祖困白登不能報今我能滅突厥吾付託得人復何憂哉臣良勝曰武王之所以為逹孝者以其能纉三后之緒而追王之禮因之以成也然其所以能然者以永言於孝思也謂之永者永之而不忘也興於此有滯於彼不可以言永也行於今有遺於後不可以言永也若漢祖尊歸於父唐宗雪恥於親亦纉緒而有成者但當項羽置太公於俎上時曰必烹而翁願分一杯􅅅此豈人子之心哉故曰殺一不辜而得天下有不為也彼何所料項羽之不殺而太公得遂其歸乎亦付之無可奈何而已至於拾徃言而較仲業不足責者髙祖之恥太宗為之也不自以為過而歸辱於其親曰徃者太皇以百姓之故稱臣於突厥朕常痛心曾不自反曰其初臣而借兵者果父之志乎抑已之志乎况父母所愛亦愛之至於犬馬盡然建成元吉父之子也同氣不恤而推刃及之尚何有於親哉漢祖唐宗自以為孝視之永言孝思則愧多矣雖然彤管之什有取節焉二君固英傑之主也哉顧命曰思夫人自亂於威儀爾無以釗冒貢於非幾蔡沈曰亂治也威者有威可畏儀者有儀可象舉一身之則而言也蓋人受天地之中以生是以有動作威儀之則成王思夫人之所以為人者自治於威儀爾自治云者正其身而不假於外求也貢進也成王又言羣臣其無以元子而冒進於不善之幾也蓋幾者動之微而善惡之所由分也非幾則發於不善而陷於惡矣威儀舉其著於外者而勉之也非幾舉其發於中者而戒之也威儀之治皆本於一念一慮之微可不謹乎孔子所謂知幾子思所謂謹獨周子所謂幾善惡者皆致意於斯也康王之誥曰惟新陟王畢恊賞罰戡定厥功用敷遺後人休今王敬之哉張皇六師無壊我髙祖寡命蔡沈曰陟升遐也成王初崩未𦵏未諡故曰新陟王畢盡恊和也好惡在理不在我故能盡合其賞之所當賞罰之所當罰而克定其功用施及後人之休羙今王嗣位其敬勉之哉皇大也張皇六師大戒戎備無廢壊我文武艱難寡徳之基命也臣良勝曰人君嗣世而大臣陳戒以遺休後人無墜先業為首務所謂前有所述後有所傳能為之子能為之父義兼之矣然而他務未遑先於賞罰兵戎者蓋新君繼統人心未一非賞罰無以勵之非兵戎無以震之此帝啟所以有甘誓少康所以有𦙍征也况成康之際商頑未靖三監首叛出於近親淮夷徐戎奄土妹邦卒未帖服雖以成王之賢周公之聖積數十年未之丕變視之召誥洛誥酒誥多士多方之命可想見矣周公既没復命君陳康王之世再命畢公尚拳拳以怙侈㓕義為慮則在當時賞罰雖明而兵戎之備誠有不可緩者是故克詰戎兵張皇六師之訓周公召公審時度勢而為之言也繼世之主習於宴安欲不言兵固不可也若託言周召故欲恃兵以毒天下亦未可也夫以成王之受終易代而所以遺命於臣子者若此内外之交修康王之繼體守成而所以陳戒於臣子者若此文武之並用此其四十餘年刑措不用之治所以成也漢興接秦之弊自天子不得具鈞駟而將相或乗牛車齊民無蓋藏天下已平髙祖乃令賈人不得衣絲乗車重税以困辱之孝惠髙后時為天下初定復弛商賈之律然市井之子孫亦不得仕宦為吏量吏祿度官用以賦於民而山川園地市井租税之入自天子以至於封君湯沐邑皆各為私奉養焉不領於官天下之經費潛轉山東以給中都官歲不過四十萬石繼以孝文孝景清浄恭儉安養天下七十餘年之間國家無事非遇水旱之灾則人給家足都鄙廩庾皆滿而府庫餘貲財京師之錢累巨萬貫朽而不可校太倉之粟陳陳相因充溢露積於外至腐敗不可食衆庶街巷有馬而阡陌之間成羣乗牸牝者擯而不得聚㑹守閭閻者食梁肉為吏者長子孫居官者以為姓號故人人自愛而重犯法先行義而後絀恥辱焉臣良勝曰父子相承並臻治效班固謂周云成康漢云文景信也孔子曰三年無改於父之道可謂孝矣但胡寅有云文帝寛厚長者以徳化民無事則謙抑而不能有難則英氣奮發景帝刻薄任數以詐力御下平居則誅賞肆行緩急則惴懼失措其懸絶如此獨節儉一事為克遵前業夫豈可以成康並美哉然則守成之主尚當以成康為法毋曰為文景之富庶足哉予曰子生三年然後免於父母之懐夫三年之喪天下之通喪也真徳秀曰三年之喪自唐虞三代未有改者夫以欲報之徳昊天罔極正雖終身之喪未足以舒無窮之悲其所以三年而止者特以聖人立為中制使不可過焉耳自漢文率言變古始為易月之制然詳其遺詔蓋為吏民設景帝嗣君也乃冒用其文自短三年之制豈非萬世之罪人乎其後晉武欲復古制而厄於羣臣之邪說獨後魏孝文斷以不疑孝文外國之主也猶能行此可以中國而弗若乎子張曰書云髙宗諒隂三年不言何謂也子曰何必髙宗古之人皆然君薨百官總已以聽於冢宰三年朱熹曰髙宗商王武丁也諒隂天子居喪之名總已謂總攝已職冢宰太宰也百官聽於冢宰故君得以三年不言也宋孝宗祔髙宗主於太廟詔曰朕比下令欲衰絰三年羣臣屢請御殿易服故以布素視事内殿雖詔俟過祔廟勉從所請然稽諸典禮心實未安行之終制乃為近古宜體至意勿得有請留正曰以日易月之論發於應劭陋儒習之其後遂斷為二十七日之制先王之禮既已大壊雖有明知之君賢哲之輔惮於更張因循相襲良可嘆也夀皇慕親之孝根於天性事亡之敬發於至誠雖聖躬以不毁之年羣臣屢致易服之請而睿志先定斷然不疑山陵已事退奉几筵衰絰三年以終喪制千載以来一人而已於乎聖哉祭義曰文王之祭也事死者如事生思死者如不欲生忌日必哀稱諱如見親祀之忠也如見親之所愛如欲色然其文王與陳澔曰如不欲生似欲隨之死也宗廟之禮上不諱下故有稱諱之時如祭髙祖則不諱曾祖以下也如欲色然言其想像親平生所愛之物如見親有欲之之色也唐太宗謂近臣曰吾今日生日世俗皆以為樂在朕反成傷感今君臨天下富有四海而欲承歡膝下永不可得此子路所以有負米之恨也詩曰哀哀父母生我劬勞奈何以劬勞之日更為宴樂乎臣良勝曰曾子有云慎終追逺民德歸厚矣文王於親忌日為終身之哀也真德秀曰古之聖王能盡此道者其惟文王乎蓋難乎其繼也夫豈皆不念其親哉亦以逺而忘爾唐太宗於人倫大節慙徳最多若以生日而哀及其親却自文王忌日之喪觸類而長之斯大善也胡可以瑕掩瑜哉其後明皇以乾曜軰阿諂遂立千秋節名移社以就之令天下宴㑹真徳秀又謂近世士夫以尊君之禮而事權臣餽遺之珍歌頌之侈末流之弊莫之能救是若太宗之哀慕者亦難乎其繼也漢和帝時南海獻龍眼荔枝十里一置五里一候奔騰險阻死者相繼時臨武長唐羌上書陳狀帝下詔曰逺國羞􅈿本以薦宗廟茍有傷害豈愛人之本其勅令大官後勿復受獻臣良勝曰天子之孝生必備養祭必備物所以昭德之所致亦孝子慈孫不以天下儉親無所不用其誠也今而於人有所傷則親存之日必有不安於心物變其味則親存之日必有不適於口若和帝之罷獻未必不為順親之心為大孝也但當事者假貢獻為結納之地當權者以受獻為規取之地一言不便徃徃以薦廟藉口而人君世主不敢以親故而自形於薄亦徃徃信之不敢議罷則和帝之事亦可法者也聖祖嘗命懿文太子及諸王徃鳳陽祭皇陵惻然命之曰吾祖宗去世既逺吾父母又相繼早亡每念劬勞鞠育之恩惟有感慟而已今日雖尊為天子富有四海欲至敬盡孝為一日之奉不可得已哀慕之情昊天罔極今鳳陽陵寝所在特命爾等躬詣致祭以代朕行孔子曰事死如事生事亡如事存爾等敬之因悲咽不自勝太子諸王皆感泣文皇將詣孝陵有司請具法駕文皇曰不用但以騎士數人前導已而顧侍臣曰明日皇考升遐之日正屬感慕之時何用法駕非為辟除道路則前導騎士亦可不用臣良勝曰我祖宗純孝天至使德秀生於今日必將曰母俾文王專羙有周矣右衍父子之常大禹謨曰帝初於歴山徃於田日號泣於旻天于父母負罪引慝祇載見瞽瞍夔夔齋慄瞽瞍亦允若蔡沈曰舜耕歴山徃于田之時以不獲順於父母之故而日號泣于旻天于其父母蓋怨慕之深也負罪自負其罪不敢以為父母之罪引慝自引其慝不敢以為父母之慝也舜以誠孝感格雖瞽瞍頑愚亦且信順之即孟子所謂底豫也臣良勝曰自古聖帝明王獨稱舜為大孝者以其處父子之至變而能順其度以歸於常也昔曾子謂公明儀曰君子之所謂孝也者先意承志諭父母於道也瞽瞍允若是諭於道而烝烝日進於善矣二子乗舟詩曰二子乗舟汎汎其景願言思子中心養養朱熹曰舊說以為宣公納伋之妻是為宣姜生夀及朔朔與宣姜愬伋於公公令伋之齊使賊先待於隘而殺之夀知之以告伋伋曰君命也不可以逃夀竊其節而先徃賊殺之伋曰君命殺我夀有何罪賊又殺之國人傷之而作是詩也臣良勝曰天下之性一也人莫不有父子之親也而有宣公奪婦而殺子人莫不有兄弟之義也而有朔之黨母而殺兄以宣之父而有伋之子以朔之弟而有夀之兄其善惡何相逺哉天道於此良有㣲意若涇而以渭濁者然伋夀之賢有足傷悼而宣公與朔之罪益不可逭矣不有蹈火剖心之􅆭夏臺羑里之囚夏商之咎于盈于貫不有莊姜正静自守而莊公狂惑之迹亦幾冺矣豈惟父子兄弟然哉檀弓曰晉獻公將殺其世子申生公子重耳謂之曰子盍言子之志於公乎世子曰不可君安驪姫是我傷公之心也曰然則行乎世子曰不可君謂我欲弑君也天下豈有無父之國哉吾何行如之使人辭於狐突曰申生有罪不念伯氏之言也以至於死申生不敢愛其生雖然吾君老矣子少國家多難伯氏不出而圖吾君伯氏茍出而圖吾君申生受賜而死再拜稽首乃卒是以為共世子也陳澔曰申生自經而死陷父於不義不得為孝但得謚共而已長樂陳櫟曰申生於親可言而不言於義可逃而不逃且謂天下豈有無父之國以至於忘其躬之不憫而恤其國家之多難不顧死生之大節而且謹再拜之末儀是共而已非孝也臣良勝曰申生不幸與伋夀皆處父子之大變者但不能若舜諭親於道爾其禮節雍容言論雅正不忍傷君之心而尚欲謀父之國辭於狐突隐然託國於重耳君子亦悲其志可也尚何責之於無已乎其諡曰共敬共君臣父子禮也天下無不是父也子以父死而諡之孝又何所置其父哉此或諡議之微㫖也國語王子晉曰其在有虞有崇伯鯀播其滛心遂稱共工之過堯用殛之於羽山其後伯禹念前之非度釐改制量象物天地比類百則儀之於民而度之於羣生共之存孫四岳從之髙髙下下䟽川導滯鍾水豐物封崇九山决汩九川陂障九澤豐殖九藪汩越九原宅居九隩合通四海故天無伏隂地無散陽水無沉氣火無灾燀神無間行民無淫心時無逆數物無害生帥象禹之功度之於軌儀莫非嘉績克厭帝心皇天嘉之胙以天下賜姓曰姒氏曰有夏謂其能以嘉祉殷富生物也胙四岳國命為侯伯賜姓曰姜氏曰有吕謂其能為禹股肱心膂以養物豐民人也胡一桂曰禹傷父以治水殛死故直以此自任卒之建立偉績克蓋前愆禹之心從可識矣故於宗廟則致其孝於祭服則致其羙於溝洫則盡其力寧飲食之菲衣服之惡宫室之卑皆不敢暇顧者其心誠不忍一日安於天子之常奉也味吾夫子無間然之言深有以識禹之心者乎吁孝也者天之經也地之義也民之行也中心仁愛誠敬之至也堯舜之道孝弟而已矣一孝立而萬善從之其於立功也夫何有蔡仲之命曰爾尚蓋前人之愆惟忠惟孝爾乃邁迹自身克勤無怠以垂憲乃後率乃祖文王之彛訓無若爾考之違王命臣良勝曰三叔流言實違成王之命是謂不忠其所以然者是不能率文王之彛訓也是謂不孝仲能不違王命可謂曰忠能蓋前人之愆可謂曰孝由是而繩祖武由是而貽後謀皆仲率徳改行之羙周公之心無非欲其同歸於治也亦所以率文王之彛訓也乎漢書賛曰炎正中微大盗移國九縣颷囬三精霧塞人厭淫祚神思反德光武誕命靈貺自甄沉幾先物深畧緯文㝷邑百萬貔虎為羣長轂雷野髙鋒彗雲英威既震新都自焚䖍劉庸代紛紜梁趙三河未澄四闗重擾神旌乃顧逓行天討金湯失險車書共道靈慶既啓人謀咸賛明明廟謨﨣﨣雄斷於赫有命系隆我漢吕祖謙曰髙祖創西漢光武創東漢皆是創業垂統以為一代之規模體統以大要論之髙祖識大體其間條目品節有踈陋處光武條目品節甚詳悉然大體郤遺所以兩漢風聲氣習寛狭厚薄大扺不同唐書賛曰德宗猜忌刻薄以彊明自任恥見屈於正論而忘受欺於奸䛕及奉天之難深自懲艾遂行姑息之政由是朝廷益弱而方鎮愈强至於唐亡其患以此憲宗剛明果斷自即位初慨然發奮志平僭叛能用忠謀不惑羣議卒收成功自斬吴元濟諸强藩悍將皆欲悔過而效順當此之時唐之威令幾於復振則其為優劣不待較而可知也范祖禹曰憲宗伐叛討逆威令復張而變生近習身陷大禍由任相非其人故也可不為深戒哉臣良勝曰在易蠱之初六幹父之蠱有子考無咎厲終吉程頤謂子幹父蠱之道能堪其事則為有子必惕厲而能終吉也光武憲宗可謂能幹前人已壊之蠱者然光武不任三公而憲宗任非其人是以廢后易子齊家之道以􅃜好仙迎佛保身之術益謬皆非惕厲終吉之占也然光武大度同於髙祖非憲宗所儔匹者焉古公有長子㤗伯次曰虞仲其妃太姜生少子季歴季歴娶太任皆賢婦人太任生子昌有聖瑞㤗伯虞仲知古公欲立季歴以傳昌二人乃亡如荆蠻文身斷髪以讓季歴古公卒季歴立是為王季脩古公遺道篤於仁義諸侯順之王季卒子昌立是為西伯朱熹曰既作之邦又與之賢君以嗣其業蓋自其初生泰伯王季之時而已定矣於是泰伯見王季生文王又知天命之有在故適吴不返太王没而國傳於王季及文王而周道大興也吴子使季札来聘胡安國曰按吳子夀夢有子四人長曰諸樊次曰餘祭次曰夷昧札其季子也夀夢賢季札欲立以為嗣札辭不可然後立諸樊樊既除喪則致國於季子季子又辭而去之諸樊乃舍其子而立弟約以次傳必立季子故諸樊卒而餘祭立餘祭卒而夷昧立夷昧卒則季子宜受命以安社稷成父兄之志矣乃狥匹夫之介節辭位以避夷昧之子僚僚既立諸樊之子光曰先君所以不與子國而與弟者凡為季子爾将從先君之命與則季子宜有國也如不從先君之命則我宜立僚烏得為君於是使專諸刺僚而致國於季子季子不受去之延陵終身不入吳國故曰季子辭國以生亂因其来聘而貶之以示法焉臣良勝曰立子以嫡立嫡以長古今之通誼也太王立少而興天為之也故皇矣詩曰帝作邦作對是也若非太王之徳㤗伯之讓王季之友文王武王之聖啓隙召亂雖以季子之賢諸兄弟亦尚賢者其爭弑之禍猶若是也故孔子於太王未有所賛而獨稱㤗伯曰可謂至徳也已三以天下讓也昔魯武公以括與戲見王王立戯仲山甫曰不可立也不順必犯犯王命必誅故出令不可不慎也令之不行政之不立行而不順民将棄上後戯立魯人殺之然則廢長立少父有不行於子君有不行於臣惟有太王泰伯王季文王之賢聖而後可臣故亦以父子之變言之也宋穆公疾召司馬孔父而屬殤公焉曰先君舍與夷而立寡人寡人弗敢忘若以大夫之靈得保首領以没先君若問與夷其何詞以對請子奉之以主社稷寡人雖死亦無悔也對曰羣臣願奉馮也公曰不可先君以寡人為賢使主社稷若棄徳不讓是廢先君之舉也豈曰能賢使公子馮出居於鄭君子曰宋宣公可謂知人矣立穆公其子享之臣良勝曰父子至親也享國大利也天子利於天下諸侯利於一國卿大夫士庶人利於家孰不願歸之子也此古今天下之至情也宋宣公以弟為賢舍其子而以國讓之弟穆公以光昭令德為賢亦舍其子而歸國於兄之子是皆輕千乗之國之利而一正於義公天下之遺風也君子亦有責備焉者非所以勸賢也縱曰未賢視父子兄弟相爭奪以為利者何如哉彼殤公者當宣公致國穆公而已無所爭及穆公使馮居鄭曰生無相見死無相哀則言曰先君之所以不與臣國而納國於君者以君可以為宗廟社稷主也今君逐君之子而将致國於與夷此非先君之意也殤公於此際固亦父兄之心也及其既君而變焉遂忌馮而搆禍於鄭曾不念穆公在位一日一有忌心則宋國安有殤公也哉是故喪大善者惡必積忘大德者咎必深專大利者殃必甚殤公卒見弑於華督而宋國乃歸之馮善惡之報明矣哉杜太后疾革召趙普入受遺命謂太祖曰爾知所以得天下乎太祖曰祖考及太后之積慶也后曰不然正由周世宗使㓜兒主天下故汝得至於此爾萬歲後當傳位光義光義傳光羙光羙以傳德昭國有長君社稷之福也太祖泣曰敢不如教劉安世曰以立後嗣言之髙帝太宗所立皆其子多少時處置不下髙帝即悲歌泣下太宗不獨泣欲引刀自刺無處置如此我太祖自冒矢石取天下自有魏王齊王各長立竒偉乃以天下與弟且一命之卑十金之産尚欲與其子况天下之富貴乎此正諸佛菩薩用心為生靈而来既了此一大事即脱然而歸不復為子孫計此堯舜用心也臣良勝曰太祖不利於天下不私於其子誠大道也然太宗無宋穆之賢而太祖不享宋宣之報燭下斧聲且啓萬世之議徳昭德芳并光美亦不得其死其禍乃甚於僚光視夀夢父子不可及矣嗚呼牝雞之晨惟家之索杞伯姬朝魯為子求婦春秋猶罪其與於外事也求婦之事不可與也而杜后遺命乃欲專繼統立君之事乎君子有謂曹髙向孟之賢有所則效臣則謂后位當陽垂簾視政乃其肇端也太祖不從於義而從其命謂之何哉諸侯盟于首止胡安國曰王將以愛易世子桓公有憂之控大國挟小國㑹於首止以定其位太子踐祚是為襄王一舉而父子君臣之道皆得焉故曰首止之盟美之大者也臣良勝曰父子君臣嫌疑禍難之際此人所難言也惠王寵愛庶孽將有奪嫡之幾尚隠而未之發也人臣之義固有難以顯言者使桓公不請於王命而自要㑹於世子是為乗内釁以要君世子不禀於父命而自徃㑹於諸侯是藉外援以脅父惡莫大焉惟世子當危疑之際而齊桓有主盟之權有請於王而以世子之名歸鄭則不待㑹盟而惠王已知人心所向世子之位不可得而易矣故是㑹盟世子桓公得請於王而為之雖逆其志而違其命猶以為羙之大也漢髙以寵如意欲易惠帝子房曰難以口舌爭也乃招致四皓從太子遊髙帝亦曰羽翼既成難動之矣子房之䇿即桓公之意也但齊桓㑹盟在境外世子必王命而後得行四皓從太子在帝側則固有若出於偶然然足以成大義而格君心之非君子不嫌於專也宋仁宗連失三王臣下爭以立儲為言包拯范鎮言尤激切一日韓𤦺懐漢書孔光傳以進曰成帝無嗣立弟之子彼中才之主猶能如是况陛下乎㑹司馬光吕誨皆有請𤦺進讀二䟽未有所啓帝遽曰朕有意乆矣誰可者𤦺皇恐對曰此非臣輩所可議當出自聖擇帝曰宫中嘗養二子少者甚純近不慧大者可也琦請其名帝以宗實告議乃定後仁宗崩帝立𤦺嘗獨見帝曰太后待我少恩琦對曰自古聖帝明王不為少矣獨稱舜為大孝豈其餘盡不孝哉父母慈而子孝此常事不足道惟父母不慈而子不失孝乃為可稱帝大感悟龜鑑曰父子之間人所難言也自魏公一倡而歐陽繼之吕誨王疇繼之司馬光又數數繼之既以保佑之語勉太后又以承順之語勉太子卒也慈聖以慈稱英宗以孝聞魏公之功蓋亦偉矣他日門人親客燕坐從容語及定䇿事公正色曰此仁宗神徳聖斷為天下計皇太后母道内助之力朝廷定議乆矣臣子何與焉勞而不伐公之襟量益可想見乆旱喜雨詩云須㬰慰滿三農望郤歛神功寂若無公之口不言功於此見之矣宋髙宗以皇嗣未立語近臣曰太祖以神武定天下子孫不得享之可閔同知樞宻院李囬曰藝祖不以大位私其子發於至誠陛下為天下逺慮合於藝祖可以昭格天命遂詔選太祖七世孫伯琮育禁中立為皇子後遜位太子固讓不允帝退居徳夀宫太子服袍履步出祥㬢門冒雨掖輦以行及宫門弗止帝麾謝再三且令左右扶掖以還明年改元隆興正月朔帝朝於文徳殿遂朝於德夀宫歲以為常胡安國曰建儲之議雖出於范宗尹之造膝岳飛之宻䟽張浚之建請趙鼎之賛决然以藝祖之後為嗣則出於帝心之獨斷而助以選人婁寅亮之一言藝祖在天之靈可以慰矣異時揖遜之舉曾無係戀所以為中興治國平天下之根本者不在是歟臣劉定之曰孝宗之奉親考諸史氏所載朝太上皇於德夀宫從幸聚景園無歲不然無節不然太上皇年七十既加尊號年八十又加尊號其文與情兼至始與終無倦可謂於子道無􅃜者矣或謂孝宗以旁支入繼大統於其所後者貽已以不貲之業而傳之無窮感當奚如焉感所以能孝也慮其所後者以我為不親而勉以承之焉勉所以能孝也前者英宗之為人後未盡道君子病之今豈無懲焉懲所以能孝也非其心出於自然也噫是何言與君子之取人也取其歸於善而已率天下之子而羣然於不善者必此之言矣抑髙宗未甚衰耄而遽倦於勤付諸孝宗非惟知子亦知天意焉天之意逺矣吾觀於漢與宋而知漢之徳澤盛於文景若武宣少仁恩者也哀平短世新都簒竊而武宣苖裔陵替矣於是景帝一子長沙定王之後起而為東漢傳二百年一子中山靖王之後起而為蜀漢傳五十年復漢舊物於再失之後宋之基業本於藝祖若太宗有慙徳者也北狩舉族南渡乏嗣而太宗血屬澌燼矣於是藝祖一子徳芳之後為孝宗傳三帝一子徳昭之後為理宗傳五帝續宋帝系於再絶之餘夫善積餘慶惡積餘殃理之常也聖人謂有家者然則夫有天下者其善惡之積亦大矣而其慶殃之餘宜乎逺矣必有然而非誣矣可不信哉臣良勝曰天下者天下之天下非一人之天下也天之天下非人之天下也故不得容一毫有意於其間也故謂之神器其與其受皆天也髙宗元懿太子薨時才二十三歲布衣李時雨已有建儲之議其後以羣臣建請而定議才二十五歲又歸之太祖之後享有上夀備隆孝養天之報也仁宗四十四年已有三王短世後宫且就館宫中復養二子而廷臣建請如不待晷漏皆視天下為公器不必私於子也或者謂英宗贊成多出曹后以其姊女配意示親恩其後仁宗喪制未終而濮議起事多違忤遷孤女於别宫曹后乃泣告宰相曰為無夫婦人作主則疇昔預圖其效安在至若漢成以飛燕為后以女弟合德為昭儀誓必娣有子他嬪御子殺之成帝卒以無子定陶王欣亦以趙氏娣弟延譽乃得在選哀平之世趙氏無以令終是故人君而得其常則有子而早建不得其常而擇嗣必付之天下之公合天之意不容一毫人意於其間而後可否則未有不遺他日之憂者黄鳥詩曰交交黄鳥止于桑誰從穆公子車仲行維此仲行百夫之防臨其穴惴惴其慄彼蒼者天殱我良人如可贖兮人百其身朱熹曰秦穆公卒以子車氏之三子為殉皆秦之良也國人哀之為之賦黄鳥秦穆于此其罪不可逃矣但或以為穆公遺命如此而三子自殺以從則三子亦不得無罪今觀臨穴惴慄之言則是康公從亂命廹而納之於壙其罪有所歸矣臣良勝曰人子事親𦵏之以禮也用殉非禮也康公雖有父命而君子蔽之罪也然臣子於君親其義一也子之事親無犯無隱也臣之事君有犯無隠也子於親之亂命猶所當權則臣之於君其可權也必矣黄鳥之刺三良亦有不能自免者如穆公之命義也三良死生以之而不可渝也非義也三良死生爭之而不可狥也當穆公既殯之後康公議塟之時反覆陳義以西秦殉塟之俗有可變先君疾革之命不足從則穆公不失為賢君康公不失為孝子三良不失為忠賢先殉武公六十六人之寃可雪今從穆公百七十人可免後之始皇妃嬪工匠生閉墓中之事無再見矣古今論三良者最多曹植云誰言捐軀易殺身良獨難王粲云臨没要之死焉得不相隨陶潛云厚恩固難忘君命安可違是皆許之死者也李徳裕則云不可許以死與梁丘據同議栁宗元云疾病命固亂魏氏言有章蘇軾云顧命有治亂臣子得從違是皆不許以死者也然則臣也何所取𠂻哉昔陳乾昔寢疾命子尊己大為棺曰使二婢子夾我既死尊己曰殉塟非禮也况又同棺乎弗果殺事載禮經君子不以為非也則知康公三良之不為是明矣漢文帝遺詔曰朕聞之蓋天地萬物之萌生靡不有死死者天地之理物之自然奚可甚哀當今之世咸嘉生而惡死厚𦵏以破業重服以傷生吾甚不取覇陵山川因其故無有所改光武作夀陵詔曰古者帝王之𦵏皆陶人瓦器木車茅馬使後世之人不知其處太宗識終始之義景帝能述遵孝道遭天下反覆而覇陵獨完受其福豈不羙哉今所制地不過二三頃無為山陵陂池裁令流水而已臣良勝曰君子不以天下儉其親固以厚為道也而漢文帝方戒厚𦵏光武取以為法君子韙之何也嘗聞宋文公之𦵏矣始用蜃炭益車馬重器備槨有四阿棺有翰檜君子謂華元樂舉於是乎不臣此非有所不忍於死者特欲誇耀淫侈無知之人爾其後宋之桓魋為石槨三年不成孔子曰喪不如速朽之為貴也至秦驪山之陵以水銀為百川江河竒玩悉致文帝有戒於斯制從簡儉故獲全安以此為法而成帝作昌陵攻治五年司馬殿門内尚未加功天下虚耗百姓罷勞客土䟽惡終不可成尋詔罷之光武之詔又將有戒於成帝者流及後世僣侈相承若宋朝諸陵為元僧楊伽真所發悉取寳玩至斷頭顱為飲器此厚𦵏為累豈臣子所忍言哉雖然亦有不可不慎者王曾謂丁謂曰故移皇堂於絶地朱熹議孝宗山陵曰夀皇聖德衣冠之藏當博求名山不宜偏信臺史委之水泉沙礫之中然則臣子之欲厚其君親蓋有在此而不在彼者明逹之主必有所决擇焉髙宗肜日曰嗚呼王司敬民罔非天𦙍典祀無豐于昵蔡沈曰王之職主於敬民而已徼福於神非王之事也况祖宗莫非天之嗣主祀其可獨豐于昵廟乎臣良勝曰𦵏親以禮也祭親亦以禮也禮則有中以其意而有所厚薄焉者皆非禮也故人君事親如事天人臣事君如事親無非禮也君而以非禮事天必非聖人也其能享帝也乎臣而以非禮事君必非正臣也其能格君也乎子而以非禮事親必非孝子也其能悦親也乎子之視父固為至親也父之視祖猶吾也祖之視髙曾猶吾也自天視之則祖宗莫非天之𦙍也以髙宗之賢而有祀昵獨豐之咎遂致鼎雉之祥祖已深以為戒而克正其事自兹以始是以嘉靖殷邦享國長乆有由然也然則髙宗之過亦人之同情也而其改過則人之難能也是亦變而反之正也斯尚之哉衛人殺州吁于濮左氏傳曰厚從州吁如陳石碏使告於陳曰衛國􅄶小老夫耄矣無能為也此二人者實弑寡君敢即圖之陳人執之而請蒞于衛衛人使右宰醜蒞殺州吁於濮石碏使其宰獳羊肩蒞殺石厚于陳君子曰石碏純臣也惡州吁而厚與焉大義滅親其是之謂乎楚殺其大夫公子追舒左氏傳曰子南之子棄疾為王御士王每見之必泣棄疾曰君三泣臣矣敢問誰之罪也王曰令尹之不能爾所知也國將討焉爾其居乎對曰父戮子居君焉用之洩命重刑臣亦不為王遂殺子南于朝轅觀起于四境子南之臣謂棄疾請徙屍于朝曰君臣有禮惟二三子三日棄疾請尸王許之既𦵏其徒曰行乎曰吾與殺吾父行將焉如曰然則臣王乎曰棄父事仇吾弗忍也遂縊而死臣良勝曰君子謂棄疾處父子之變幾於道矣臣則獨矜其不能爾若父有逆志則當預諌於其始若非大惡亦可曲全於其終如王欲致討詞浮于罪則號泣哀訴以死明其不然可也非大不諱則請以君命諭使圖改焉可也何至隠黙必成其君有誅父之慘哉考左氏所載以觀起之寵故非可必殺之罪也春秋書殺亦存子南之官則子南何致必誅而不以聽者君子於棄疾矜其不幸可也矜其不能可也嗚呼父子天性也石碏之殺子棄疾之殺父又變之變者故以是終焉右衍父子之變幽王嬖愛褒姒生子伯服褒姒與虢石父比而譛申后太子王竟以虢石父褒姒之譖廢申后及太子宜臼以褒姒為后以伯服為太子宜臼出奔申太史伯陽曰禍成矣王欲殺宜臼求之於申申侯弗與王伐之申侯與鄫人召西夷犬戎伐王殺王於驪山下虜褒姒盡取周室寳賂而去王室亂胡安國曰何言乎王室亂王者以天下為家則以京師為室京師者本也周公作立政曰迪惟有夏乃有室大競其作䲭鴞詩以遺成王亦曰既取我子無毁我室皆指京師而言也以京師為室王畿為堂諸夏為庭户四夷為藩籬治外者先自内治逺者先自近本亂而末治者否矣景王寵愛子朝使孽子配嫡以本亂者其言王室亂譏國本之不正也本正而天下定矣又曰是非有出於人心者不可以私愛是亦不可以私惡非卒歸於公而止矣景王寵愛子朝將蘄以見是而天下不以為是踈薄子猛將蘄以見非而天下卒不以為非徒設此心兩棄之也庶孽慿寵為羣小所宗而人心不附嫡子恃正人心之所向而羣小不從故伯服雖殺而平王亦不能復宗周之盛申生已死而奚齊卓子亦不能勝里克之兵是兩棄也景王不鑒覆車王猛子朝之際危亦甚矣臣良勝曰三代以先配嫡奪嗣以致禍者不可勝紀舉幽王者西周之所以亡也舉景王者東周之所以亂也秦始皇出遊左丞相斯從少子胡亥最愛請從上許之西至平原津病崩于沙丘斯為上崩在外恐諸公子及天下有變秘之不發喪獨胡亥趙髙宦者五六人知之髙與斯謀詐為受始皇詔立胡亥為太子更為書賜扶蘓數以不能闢地立功上書誹謗將軍䝉恬不矯正知其謀皆賜死扶蘓自殺亥至咸陽發喪襲位蘓軾曰古者公族有罪三宥然後制刑今至使人矯殺其太子而不忌太子亦不敢請則威信之過也夫以法毒天下者未有不反中其身及其子孫者也隋文帝立晉王廣為皇太子天下地震帝囚故太子勇於東宫付太子廣掌之勇自以廢非其罪頻請見上申寃而廣遏之勇於是升樹大呌聲聞帝所冀得引見楊素因言勇情志昏亂為癲鬼所着不可復收帝以為然真徳秀曰隋文帝以術數取天下其操制羣下亦以術數至是如聾如瞶不復能自辨是非而一廢一立祇以為揚素等鬻賣之地耳不知平時所謂術數者果焉在耶廣既升儲又以勇付於其手迨其垂没乃始知廣之不足付而出召勇之言則徒以殺其身而已矣臣良勝曰三代而下惑於䜛邪蠱於宫闈而廢長立少如漢髙光唐太宗明皇賢者亦復蹈禍罔有懲戒以其幸而保首領以没或以致亂而未底於亡也惟秦之取天下以威暴隋之取天下以術數扶蘓之死勇之廢出於斯髙楊素之奸始皇路殯文帝弑胡亥與廣皆以二世而亡若出一轍此尤足為萬世永鑒者漢武帝為太子據立博望苑使通賓客從其所好故賓客多以異端進者司馬光曰古之明王教養太子為之擇方正端良之士以為保傅師友使朝夕與之游處左右前後無非正人然猶有淫放邪僻而陷於禍敗者焉今乃使太子自通賓客從其所好夫正直難親諂諛易合此固中人之情宜太子之不終也唐德宗立宣王誦為皇太子翰林待詔王伾善書山隂王叔文善棋俱出入東宫娱侍太子叔文詭譎多計王伾相依附為太子言某可為相某可為將幸異日用之翰林學士韋執誼陸淳吕温李景儉韓華韓泰陳諫柳宗元劉禹錫等定為必死友臣良勝曰武帝居太子非其所德宗輔太子非其人均於不善而已夫乾稱父也坤稱母也故父母於子猶天地之覆幬也則風雨霜露無非所以成之者如其有所偏倚則若天之所廢人固莫能興之者矣臣觀戾太子非悻戾人也迹其所為非為異端惑者也特以性寛厚武帝以其不類已而後用法大臣皆不悦鈎弋宫生子而名以堯母畫周公負成王圖以賜霍光則立少之意明甚嘗諫征伐而帝笑曰吾當其勞以逸遺爾后寵既衰雖大將軍諭意而太子乆不自安固知雖無失德而巫蠱之禍亦無以自免者太子誦雖立而以公主女為妃主以厭禱囚責及太子願與離婚尋亦議廢非李泌懇切之言不愛身族則舒王之立乆矣當是時太子欲飲藥求死自是謂風疾不能言未必非此故也及嗣立不能决事而叔文輩輕佻預政以致永貞之禍是故人子有失於其親之心得罪於天也何所逃哉親之於子亦容之如天也何使其子至於是哉漢宣帝甘露三年太子所幸司馬良娣死太子悲恚不樂帝乃令皇后擇後宫家人子可以娱侍太子者得元城王政君是歲生成帝于甲舘畫室為世嫡皇孫元帝初元元年立為皇太子即位以元舅侍中衛尉陽平侯王鳯為大司馬大將軍領尚書事臣良勝曰宣帝親更巫蠱之禍又繼昌邑之廢而所以養太子者若此其去武帝徳宗所失益逺矣政君之幸生成帝飛燕合德繼進以無子而大權盡歸王氏以移漢祚政君親付之璽誰之罪哉宣仁皇后時哲宗在禁中聞有覔乳媪者范祖禹劉安世切諫進德愛身又乞太后保䕶聖躬太后曰外間虚傳也祖禹等對曰外議雖虚亦足為先事之戒噫是䟽也亦有監於政君之事者乎唐肅宗上元二年五月端午山人李唐見上上方抱㓜女謂唐曰朕念之卿勿怪也對曰太上皇思見陛下計亦如陛下之念公主也上泫然泣下然畏張后尚不敢詣西内明年上皇崩范祖禹曰肅宗以太子討賊遂自稱帝此乃太子叛父何以討禄山也唐有天下幾三百年由漢以來享國最為長乆然三綱不立無父子君臣之義見利而動不顧其親是以上無教化下無㢘恥古之王者必正身齊家以率天下其身不正未有能正人者也真徳秀曰肅宗之平長安也上皇自蜀還都曰朕為五十年太平天子不為貴今為天子父乃貴耳此元結之頌所謂宗廟重安二聖重歡者也豈不盛哉徒以内侍握兵妄為䜛間而廹遷之謀出焉其所以然者肅宗柔懦無斷故張后輔國得以刼之以天子之尊而不能庇其父使抑鬰無􅂓遂以致疾肅宗之罪於是通天矣宋光宗與皇后幸玉津園羣臣請帝問疾重華宫不從夀皇疾大漸羣臣請帝問疾重華宫不從陳傅良乃繳上誥敕出城待罪丞相留正率宰執進諫帝拂衣起正引帝裾泣諫羅㸃進曰夀皇疾勢已危不及今一見後悔何及夀皇崩帝稱疾留正等奏云臣等連日造南山請對不獲屡上䟽不得報今當率百官恭請若皇帝不出百官相與慟哭於宫門恐人情騷動為社稷憂乞太皇太后降㫖以皇帝有疾暫就宫中成服臣良勝曰肅宗不得終愛於父者以張后制之也光宗不得終禮於父者以李后制之也夫男子陽剛也以陽而制於隂以剛而制於柔已失其所以為人之理不可謂之人矣尚何以為天下主乎但肅宗感山人之言尚有垂涕視光宗不問疾成喪雖宰臣不得請者猶為有人心也孝宗純孝以終繼父髙宗之喪乃得逆子之報若此非若𤣥宗遺憂於子者可論也然則天道亦有僭乎許世子止弑其君買胡安國曰按左氏許悼公瘧戊辰飲世子止之藥卒書曰弑其君者止不嘗藥也古者醫不三世不服其藥夫子所慎者三疾居其一季康子饋藥曰丘未逹不敢嘗敬慎其身如此也而於君父可忽乎君有疾飲藥臣先嘗之父有疾飲藥子先嘗之蓋言慎也止不擇醫而輕用其藥藥不先嘗而誤進於君是有忽君父之心而不慎矣自小人之心度之世子弑君欲速得其位而止無此心故曰我與夫弑者不立乎其位矣哭泣歠飦粥嗌不容粒未逾年而卒無此心故被以大惡而不受自君子聽之止不嘗藥是忽君父之尊而不慎此簒弑之萌堅氷之漸而春秋之所謹也有此心故加以大惡而不得辭書許世子弑君乃除惡於微之意也而或者顧以操刄而殺與不躬進藥及進藥而不嘗三者罪當殊科疑於三傳之説則誤矣必若此言夫人而能為春秋奚待於聖筆乎墨翟兼愛豈其無父楊朱為我豈其無君孟軻氏辭而闢之以為禽獸逼人人將相食後世推明其功以為不在禹下未有譏其過者知此説則知止不嘗藥春秋以為弑君之罪矣臣良勝曰臣弑君子弑父非一朝一夕之故也其所由来漸矣止以不嘗藥而書弑謹其漸也履霜而有堅氷之戒春秋之微義也亦當時之大公也止之言曰我與夫弑君者則許之赴告魯史書之皆曰弑矣以此防民猶有刼遷其父及不問疾成喪如肅宗光宗者夫止以不嘗父藥猶謂之弑𤣥宗孝宗由憤鬰以疾而崩則謂肅宗光宗弑父也亦宜臣故并附為戒以竊取於春秋之義右衍父子之戒中庸衍義卷六
