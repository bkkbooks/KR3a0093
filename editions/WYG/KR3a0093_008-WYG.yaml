body:
  text: 中庸衍義卷八明夏良勝撰達道之義兄弟之法朋友之法兄弟之戒朋友之戒君陳曰惟爾令德孝恭惟孝友于兄弟克施有政蘇洵曰吾父之子今為兄弟吾疾在身兄即不寧數世之後不知何人彼死而生不為戚欣兄弟之親如手如足其能幾何彼不相能彼獨何心臣良勝曰父子兄弟一氣也孝友一理也彼其孝者乃友其不友者未有能孝者也故人子於父母愛者愛之敬者敬之至於犬馬且然而况父母之子與吾身一體而分者乎孔子謂伐一木殺一獸非時者非孝也推是心則天下無一物不得其所而後為充類至義之盡施之政者豈外是乎五子之歌曰太康尸位以逸豫滅厥德黎民咸貳乃盤遊無度畋于有洛之表十旬弗反有窮后羿因民弗忍距于河厥弟五人御其母以從徯于洛之汭五子咸怨述大禹之戒以作歌蔡沉曰小弁之詩父子之怨五子之歌兄弟之怨親之過大而不怨是愈疎也五子知宗廟社稷危亡之不可救母子兄弟離散之不可保憂愁欝悒慷慨感厲情不自己發為詩歌推其亡國敗家之由皆原於荒棄皇祖之訓雖其五章之間非盡述皇祖之戒然其先後終始互相發明史臣以其作歌之意敘于五章之首象曰鬱陶思君爾忸怩舜曰惟茲臣庶汝其于予治不識舜不知象之將殺已與曰奚而不知也象憂亦憂象喜亦喜程頥曰象憂亦憂象喜亦喜人情天理於是為至真德秀曰象欲殺舜之迹明甚舜豈不知之然見其憂則憂見其喜則喜畧無一毫芥蔕於其中後世骨肉之間稍有疑隙則猜防萬端惟恐殺之不早除之不亟至此然後知聖人之心與天地同量也敢問或曰放者何謂也曰象不得有為於其國天子使吏治其國而納其貢税焉故謂之放豈得暴彼民哉真德秀曰聖人不以公義廢私恩故不以象之惡而不與之以富貴亦不以私恩廢公義故使之不得有為於其國以暴其民仁之至義之盡也皇矣詩曰維此王季因心則友則友其兄則篤其慶載錫之光受禄無䘮奄有四方真德秀曰王季之友泰伯也葢其因心之本然非以其遜已而後友之也昆弟至情出於天性豈有所為而為之乎使泰伯未嘗有遜國之事王季之所以友之者亦若是而已夫王季之友不過盡其事兄之道耳豈有心於求福哉閨門之内敬順休洽固産祥隤祉之基也故厚其慶而錫之光受天之禄而有天下天之報施其亦明矣臣良勝曰周之興也其本於泰伯之讓乎周公盛言王季之友而孔子曰泰伯其可謂至德也矣葢其友愛之相成也夫立子以嫡以長三代以來未之有改也泰伯長而賢其當立無疑然而天眷太王之德既作之邦而得岐周之地又賢其後而有文王之賢文王王季子也使非泰伯之讓王季不立傳位無由以及文王則天眷於太王者亦虛矣故泰伯不待太王傳位及已而後讓先適吳而不反使若莫知所之則太王傳位自歸王季而及文王矣使太王没時泰伯在國則廢長之令不宜出於太王擇賢之令不宜施於泰伯王季當太王受終之際而泰伯近亦難於安其位而不辭也此泰伯所以讓而無稱為至德也若非先適不反當立而讓則民顯有所稱而王季之立亦難於言因心之友矣是故㣲子不得先紂目夷不得並襄公子臧季札終身不敢即乎其位以無泰伯之讓亦無文王之聖也然則天之所以眷太王以生文王也泰伯之所以可讓者以文王也王季之所以可立者以文王也皆所謂順天者也然為王季則易為泰伯則難此所以為至德也常棣詩曰脊令在原兄弟急難每有良朋况也永嘆吕祖謙曰疎其所親而親其所疎此失其本心者也故此詩反覆言朋友之不如兄弟葢視之以親疎之分使之反循其本也本心既得則由親及疎秩然有序兄弟之親既篤朋友之義亦敦矣初非薄於朋友也茍雜施而不遜雖曰厚於朋友如無源之水朝滿夕除胡可保哉或曰人之在難朋友亦可坐視與曰每有良朋况也永嘆則非不憂憫但視兄弟急難為有差等爾臣良勝曰周公之為此詩必三叔流言之際反覆喻之如作鴟鶚之詩以告成王者也故首言兄弟至親啟其天性之善繼言急難禦侮終非朋友可比葢三叔方比武庚作亂致難于兄抑揚其詞葢以破其惑也末言安寧之後和樂之至死生苦樂相與共之故欲其是究是圖信其然而思以改也周公於是葢無所不用其心亦無所不用其言也如是而不知改悟是以有東山之役但云罪人斯得終不以討三叔為詞致辟者管叔一人而已蔡叔雖囚而猶以從車七乗歸之霍叔降庶人三年之後復齒即國蔡叔子仲克庸祗德周公以為卿士叔卒仲封復侯于故蔡矣嗚呼周公處兄弟之變誠不幸也而所以委曲保全之者無所不至此所以為天理人情之至也若使三叔之難止於周公之一身必有以容而受之終不忍以言誅者方主少國疑乗商之不靖而惑以非義流言倡亂以揺之是豈周公一身之利害哉乃欲傾危社稷塗炭生靈借使文武在御必誅不聽周公亦有不能自已者至如後世蹀血禁門實欲自利其國更以周公藉口可乎哉破斧詩曰既破我斧又缺我斨周公東征四國是皇哀我人斯亦孔之將朱熹曰夫管蔡流言以謗周公而公以六軍之衆往而征之使其心一有出於自私而不在天下則撫之雖勤勞之雖至而從役之士豈能不怨也哉今觀此詩固足以見周公之心大公至正天下信其無有一毫自愛之私抑又以見當是之時雖披堅執鋭之人亦皆能以周公之心為心而不自為一身一家之計葢亦莫非聖人之徒也伯夷叔齊孤竹君之二子其父將死遺命立叔齊父卒叔齊遜伯夷伯夷曰父命也遂逃去叔齊亦不立而逃之朱熹曰伯夷以父命為尊叔齊以天倫為重其遜國也皆求所以合乎天理之正而即乎人心之安既而各得其志焉則視棄其國猶敝蹝爾何怨之有宋桓公疾太子茲父固請曰目夷長且仁君其立之公命子魚子魚辭曰能以國讓仁孰大焉臣不及也且又不順遂走而退臣良勝曰春秋之世兄弟始終相成如宋襄子魚者葢亦鮮矣立子魚者桓公之始謀也先是兹父嘗請於公曰使目夷立臣為之相公曰何故對曰臣之舅在衞愛臣若臣立則不可以往絶迹於衞是背母也且臣自知不足以處目夷之上不許强請之將立目夷目夷辭曰兄立而弟在下是義也今弟立而兄在下不義也不義而使目夷為之遂逃之衞茲父從之及公之疾乃召兹父曰若不來是使我以憂死也是襄公之讓子魚之辭皆由衷者也且襄公母出于衞以不得迎而賦河廣之詩其欲避位以寧母葢素志也子魚以後妻之子而為桓公所愛皆能不失其天性之常是難能也其後子魚卒相襄公了無嫌猜及襄乗車㑹楚而遭執則謂子魚曰子歸守國矣國子之國也子魚曰君雖不言國國固臣之國也歸設守械而守國楚謂宋曰子不與我國吾將殺子君矣曰吾賴社稷之靈國已有君矣楚知殺公猶不得國於是釋公公走之衞子魚復請曰國為君守之君何遂不入遂迎公歸原始要終而襄公子魚皆不取乎為諸侯者是難能也衞侯之弟鱄出奔晉胡安國曰衞侯之入使鱄與寗喜約言既殺寗喜鱄病失言遂出奔晉託於木門不向衞國而坐木門大夫勸之仕不可曰仕而廢其事罪也從之昭吾所以出也吾不可以立人之朝矣終身不仕其稱弟罪衞侯也榖梁子曰鱄之去合乎春秋臣良勝曰春秋者通乎權變而止乎禮義者也鱄信賢矣其去也果合春秋乎哉衞獻公殺寗喜喜嘗弑君剽也剽不宜君而君之者寗氏則弑君之罪必歸獄者也弑隱者翬而國歸桓公弑子赤者仲遂而國歸宣公君子以弑逆之罪歸之桓宣者謂受國而不討賊也獻公出而剽立剽亦賊也喜承父命要君約弑剽而納獻公喜亦賊也獻公殺喜雖背惠也亦討賊也鱄以失言而必去賢者之過也君子於善若農夫之有畔朝夕行之思其始而成其終可也鱄初以獻公之命而約喜曰政由寗氏祭則寡人夫國政也而曰必由寗氏此言可必守乎哉鱄也始焉不圖為可守之約而終焉為必絶之行賢則賢已未可云合于春秋也春秋以重信言而見取者二鱄與荀息是也當晉獻公屬奚齊卓子之時荀息不虞可輔與否而一言承之曰其濟君之靈也不濟繼之以死鱄之失言而必信者亦尾生白公之行也公弟叔肹卒榖梁氏曰其曰公弟叔肹賢之也其賢之何也宣弑而非之也非之則胡為不去也曰兄弟何去如之與之財則曰我足矣織屨而食終身不食宣公之食君子以是為通恩也是以取貴于春秋漢光武詔曰春秋之義立子為貴東海王陽皇后之子宜承大綂皇太子疆崇執謙退願備藩國父子之情重久違之其以疆為東海王立陽為皇太子袁宏曰世祖中興漢業宜遵正道以為後法今太子之德未虧於外内寵既多嫡子遷位可謂失矣然東海歸藩謙恭之心彌諒明帝承綂友于之情彌篤雖長幼易位興廢不同父子兄弟至性無間夫以三代之道處之亦何以過乎唐睿宗將立太子以宋王成器嫡長而平王隆基有大功疑不能决成器辭曰國家安則先嫡長國家危則先有功茍違其宜四海失望臣死不敢居平王之上固請者屢日上從之立隆基為皇太子後立為𤣥宗成器獻興慶宅為離宫制許之作興慶宫仍賜成器宅環於宫側又於宫西南置樓題曰花蕚相輝之樓𤣥宗友愛為長枕大被與兄弟同寢殿中設五王帳成器尤恭謹未嘗議及時政愈信重之范祖禹曰明皇以藩王有功成器以嫡長而能辭位以授之故明皇之心篤於兄弟葢成器之行有以養其友愛之心是以能全其天性而讒間之言無自入焉嗚呼茍能充是心則仁不可勝用也至於為人父則讒殺其子為人夫則以嬖黜其妻為人君則以非罪殄戮其臣下是皆不能充其類也茍不能充其類則為善豈不出於利心哉真德秀曰漢顯宗以東海王疆遜已而友之唐明皇以宋王成器遜已而友之其友雖同而所以友之則異王季之友無所為而然者也顯宗明皇之友有所為而然者也此天理人欲之分而漢唐之盛不若周之盛與臣良勝曰兄弟俱賢能成乎讓而友以終者泰伯王季是也不成乎讓而友者夷齊襄公子魚也弟之不善而大舜周公之聖處之或封或誅其心一也兄之不善而鱄之去肹之不去雖未敢言五子之戒其義均也顯宗明皇勉於成義雖不可方王季之賢其性存也臣於此亦重有感焉古者天下為公本支敦厚何有疑間猜忌之心至於末世擇利自私薄恩崇怨嫌隙之生讒邪之間至有網羅誅殺無以庇其本根卒不師大舜王季之友而動以周公藉口是故君子有不得已而予顯宗明皇者也永樂元年六月文皇以盛暑賜書在京諸王曰吾與諸弟皆先帝子往者各在一方有一歲得一見者數歲得一見者手足之情不能自己今吾承繼大綂諸弟早暮來聚豈不甚愜于心炎暑方盛舉動煩勞可三日一朝用稱友于之意永樂三年文皇賜諸王皇明聖訓且諭之曰皇考所以垂訓子孫至要之道具在此書朝廷常守之可以永安宗社藩王常守之可以長保富貴朝廷與藩王本同祖宗所出但能皆以祖宗之心為心則自然各盡其道前代有帝王不能保全宗室者如宋太宗亦有宗室不能自保全如周三監漢七國皆是不能以祖宗之心為心朕與諸弟各勉之秦王尚炳將歸文皇諭其從臣曰王前在國中言動時有錯謬朕遣書戒之頗聞克自省改今日見王應對進退循循合度甚適朕意此皆爾等輔導之力長史以下皆叩頭曰此由王天資之美克奉陛下聖訓臣等庸愚實無所效力文皇復諭之曰美玉非資良工不適為器嘉木非得良匠不適為材人之成德亦然爾等宜益盡心輔王雖小過必規正之雖小德必助成之謂小過無害馴至於大過謂小德無益馴致於無德不可因循但和平以導之從容以入之積以誠意未有不相信者王能脩善行爾曹亦有令名其往勉之命賜紗衣一襲及道里費臣良勝曰嘗聞聖祖在御時建大本堂命太子諸王講學于中命選名儒訓廸一體葢欲同歸于善也文皇仰體此心友于備至見之書劄復有祖訓之賜交相戒勉期以萬世與宗社咸休友愛之義藹然詞㫖至於奬諭從官申錫贊導極其委曲諸藩奉職遠過前代有由然也昔漢文帝於淮南王固非自處以薄者以王驕蹇丞相御史屢請論如法文帝不忍但廢王遷之蜀竟以道死後聞斗粟尺帛之謡為之賜諡置園分惠其三子皆王若無愧於天下議者猶謂當淮南擅殺辟陽侯時帝使吏治其國留之長安使名儒朝夕輔導之而威以漢家之明刑必有所懲艾而改也易曰童牛之牿元吉彼欲禁於已然者猶將以為善也况我文皇成之於未然其善為何如哉右衍兄弟之法康誥曰于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟惟弔茲不于我政人得罪天惟與我民彛大冺亂蔡沉曰天顯猶孝經所謂天明尊卑顯然之序也弟不念尊卑之序而不能敬其兄兄亦不念父母鞠養之勞而不友于弟是兄弟相賊也父子兄弟至於如此茍不於我為政之人而得罪焉則天之與我民彛必大冺滅而紊亂矣角弓詩曰騂騂角弓翩其反矣兄弟婚姻無胥遠矣爾之遠矣民胥然矣爾之教矣民胥傚矣此令兄弟綽綽有裕不令兄弟交相為瘉民之無良相怨一方受爵不讓至于已斯亡真德秀曰弓之為物其體往來張之則内向而來弛之則外反而去骨肉之親親之則附疎之則離亦如角弓翩然而反也然則兄弟婚姻其可使疎遠乎夫人君風化之本爾遠其親則民亦皆然矣爾之教如此則民亦皆傚之矣爾指幽王而言也人之性固有篤於善而不為風化所移者然不移者寡而移之者多故必令善兄弟而後能寛裕而不變若不善之兄弟本自薄惡上又教之則交相為病當愈深矣於是民之失其良心者雖細微之故亦相怨憾一方猶一事也專利欲得其受爵者無復遜讓之意至爭奪以取亡皆由上之化故也人主誠懲角弓之刺則於兄弟之親可不厚其恩意乎春王正月榖梁傳曰公何以不書即位成公志也焉成之言君之不取乎為公也君之不取乎為公何也將以讓桓也讓桓正乎曰不正春秋成人之美不成人之惡隱不正而成之何也將以惡桓也其惡桓何也隱將讓而桓弑之則桓惡矣桓弑而隱讓則隱善矣讓則其不正焉何也春秋貴義不貴惠信道不信邪孝子揚父之美不揚父之惡先君之欲與桓邪也則是成父之惡也兄弟天倫也為子受之父為諸侯受之王廢天倫而忘君父以行小惠曰小道也葢隱者可謂輕千乗之國蹈道則未也齊人取子糾殺之胡安國曰取者不義之詞前書納糾不稱子者明不當立也後書殺糾復稱子者明不當殺也或奪或予於義各安春秋精意也仁人之於兄弟不藏怒焉不宿怨焉親愛之而已糾雖爭立越在他國置而弗問可也必請於魯殺之然後快于心其不仁亦甚矣後世以傳讓為名而取國者必殺其主以為一人心防後患意與此同流毒豈不遠哉故孟子曰五伯三王之罪人也仲尼之徒無道桓文之事者漢景帝二年梁孝王來朝時上未置太子與王宴飲從容言曰千秋萬歲後傳於王王辭謝雖知非至言然心内喜太后亦然之詹事竇嬰引巵進酒曰天下者髙祖之天下父子相傳漢之約也上何以得傳梁王太后以此憎嬰王以此益驕臣良勝曰景帝刻薄任數人也何能致厚于梁王葢其任數之深也梁王本竇太后幼子甚愛之列土而王四十餘城居膏腴地帝本忌之其為此言聊以愚弄其母與弟云爾為太子時吳太子以侍博爭道即提殺之親子榮既立為太子以無罪而廢何獨愛於梁哉故七國反時亞夫曰楚兵剽輕難與爭鋒願以梁委之乃可制也帝無所難而許之其志可知吳攻梁急亞夫堅壁不出梁與吳楚俱斃矣昔卞莊欲刺虎館豎子止之曰兩虎方且食牛食甘必鬬鬬則大者傷小者死從傷而刺之一舉必有雙虎之名莊子從之得雙虎然則景帝於梁與吳楚正卞莊子之術也豈曰友愛之哉唐武德九年太史令傅奕密奏太白見秦分秦王當有天下上以其狀授世民於是世民密奏建成元吉淫亂後宫且曰臣於兄弟無絲毫負今欲殺臣似為世充建德報讎上省之愕然曰明當鞫問爾宜早㕘世民遂帥長孫無忌等入伏兵於𤣥武門世民射建成殺之尉遲敬德將七十騎既至左右射元吉墜馬世民馬逸入林下為木枝所絓墜不能起元吉遽至奪弓將扼之敬德躍馬叱之元吉步欲趨武德殿敬德追射殺之蘇軾曰唐髙祖起兵汾晉間時子建成元吉智雲皆留河東䕶家髙祖起兵乃密召之隋購之急建成元吉能間道赴太原智雲幼不能逃為吏所誅髙祖以父子之故不能少緩義師數日以須建成等至乎以此知為秦王所逼髙祖逼於裴寂亂宫之事不暇復為三子性命計矣太宗本謀於是時借隋吏以殺兄弟其意甚明新舊史皆曲為太宗潤飾然難以欺後世矣臣良勝曰甚哉太宗之行詐也舉兵之時坐策必成計殺兄弟而已當元嗣以傳位及其既成又何有於建成元吉者哉司馬光謂始欲俟其先發然後應之又云為羣下所迫逐孫甫則歸罪於髙祖不能舍長而立功丘濬又謂承高祖見命之意不必為虛詞偽讓而恬然居之是皆為之釋言為史之所欺者也葢唐史太宗貞觀又以𤣥齡首謀者當局又經許敬宗邪人粉飾凡所以為太宗謀者無不至矣今如蘇軾之論則有以知其欲葢而彌彰者雖然太宗之故智亦六朝之餘習也晉之末也翦除宗室宋廢帝殺江夏王義恭南陽王敬猷明帝殺安陸王等十三人又殺廬江王禕齊明帝殺鄱陽公鏘等七人衡陽王鈞等四人西陽王子明等三人河東王竑等十人梁元帝殺桂陽王楚豫章王棟武陵王紀北齊後主殺趙郡王叡瑯琊王儼蘭陵王長恭南陽王綽忮害心淫誅殺横及始以自保尋亦滅亡太宗不知懲創而忍效其尤傳及其子而才人女主易姓改命芟刈子孫亦幾於盡可不戒哉可不戒哉宋太祖弟晉王病亟親往視之自為灼艾晉王覺痛帝亦取艾自灸以分其痛每對近臣言晉王龍行虎步他日必為太平天子福德非吾所及也及帝不豫壬子夜大雪帝召晉王光義延入大寢屬以後事宦官宫妾悉屏之左右皆不得聞但遥見燭影下晉王時或避席若有遜避之狀既而帝引柱斧戳地大聲謂晉王曰好為之俄而帝崩時漏下四鼔矣宋后見晉王愕然遽呼曰吾母子之命皆託於官家晉王泣曰共保富貴無憂也臣劉定之曰噫古者帝王兄弟若漢景帝之於梁孝王武宋文帝之於彭城王義康其初也亦未嘗不相友愛其後也弟有次及之望兄無付託之誠因循積久間隙生焉大利誘之於前羣小推擁於後而兄弟遂不相容矣豈特太宗哉史謂是夕宋后遣王繼恩召其子德芳繼恩徑召晉王王曰吾當與家人議之入久不出繼恩促之曰事久將為他人有矣時大雪遂與王步至宫繼恩使王止其直廬曰且待于此繼恩當先入言之王從者德𤣥曰便當直前何待之有乃與王俱進至寢殿以此證之亦可見其挾詐乗機之舉未為無心未為無黨内外布置有自來焉豈一日之積哉臣良勝曰弑逆之惡一也於惡之中又有惡焉宋太宗之謂也唐太宗之致難於建成也建成與元吉比謀欲害之者累矣雖太宗之不恭建成之不友有以來之也宋太祖友愛天至其傳位之言出於本意故直語近臣以為太平天子得張齊賢留爾作相何有係吝之私也太宗欲速之心機械必有先露其萌者故太祖嘗遣王祐體治符彦卿事曰歸與王􅄎官職彦卿太宗之婦翁也必有隱謀飛語聞于上矣祐往辭太宗欲與私竟趨而出既全之矣故祐植三槐曰吾子二郎必相葢有陰造於太宗也然則太宗弑逆之罪誠有不可逭者况唐太宗雖蹈是惡猶欲掩葢不敢以薄自居嘗遣諸王歸藩至於流涕曰兒子尚或可求兄弟更不可得又曰前代帝王莫不疎弟而愛子惟漢明帝賜諸王不令子多於弟我罔極之恩情鍾諸弟於是内外諸王同有班賜雖其緣飾之詞亦若有感愴之恨宋太宗既弑其兄復殺其弟廷美又殺德昭德芳若薙獮之惟恐不盡者此豈復有人心哉昔劉裕代晉則殺恭帝蕭道成代宋則殺順帝蕭衍代齊則殺和帝陳覇先代梁則殺敬帝楊堅代周則殺靜帝朱晃代唐則殺昭宣帝奸雄故態則然而太宗并及其弟與子又皆骨肉賢厚非若彼異姓相代者此太宗之罪通于天也所謂於惡之中而惡焉者也異時舉族連宫北狩不返南渡不嗣天下重器終歸德昭德芳之後天道好還有如是哉宋理宗封兄濟陽郡王竑為濟王出居湖州史彌遠忌竑謀殺之乃詐言竑有疾令客秦天錫召醫如湖州視之天錫至諭㫖逼竑縊于州治以疾薨聞于朝後真德秀入對曰陛下初膺大寶不幸處人倫之變有所未盡流聞四方所損非淺霅川之變非濟邸本志前有避匿之迹後聞捕討之謀情狀本末灼然可考願詔有司討論雍熈追封秦邸舍罪卹孤故事斟酌行之雖濟王未有子息興滅繼絶在陛下耳宋史斷曰天不欲延宗祚邪何於理宗即位之初而遭人倫若是之大變也自三代以降家法最正諸后最賢傳授最明惟宋一代而已四夷之所以率服者此也賢才之所以軰出者此也伏節死難之士所以衆多者此也中原陷溺之民不忘宋德者亦此也今一旦遇楊后之虧恩史彌遠之弑逆遂使理宗立不由正濟邸不得其死其與邉鄙之亂何殊焉禽獸之行何異焉於是宋之家法國之元氣蕩然而無遺矣然而理宗之立實出於楊后史彌遠之計非若隋之楊廣必欲廢兄而奪其位也天命不爽尚監厥緒故復理度二君有天下五十年而後亡噫天之為德其明矣乎臣良勝曰由魯隱厚非其道而桓之自處以薄也景帝宋祖皆欲自居于隱之厚而宋太宗之薄則甚於桓矣由桓公子糾各用其薄而建成與唐太宗似之理宗厚薄之情人固有諒之者但從古弟兄搆隙必有奸邪交鬬其間然彼自為主也惟濟王竑理宗之事則營謀廢置皆出彌遠之手而其弟兄不預知焉此又變之變者也初竑為皇子時以憤彌遠專横嘗指宫壁輿地圖之瓊崖曰他日置彌遠於此又呼以新恩彌遠銜之故於慧日閣語鄭清之廢立之議决矣及寧宗崩彌遠遣楊后兄子谷石以廢立白后后不可曰竑先帝所立豈敢擅變一夜七往返后終不許則后之罪猶有貸者谷等以楊氏無噍類挾之而后勉從之彌遠之罪貫古今而一人也以真德秀之正直舊兼宫教預言於竑矣及入對亦不敢正言其罪理宗雖賢視叔孫昭子不賞私勞君子亦將有遺憾也臣特附之終篇若曰寧忤天子不忤權臣盍思所以致是者何哉右衍兄弟之戒兌象曰麗澤兌君子以朋友講習程頥曰麗澤二澤相附麗也兩澤相麗交相浸潤互有滋益之象故君子觀其象而以朋友講習互相益也先儒謂天下之可説莫如朋友講習朋友講習可説之大者然當明相益之象臣良勝曰澤以鍾水潤物者也使依於山比于地以此之潤益彼之涸其滋有限若兩澤相麗交相為潤其益廣矣即如有君無臣有臣無君雖亦有所建立禆補終於治化為淺若聖主賢臣同心同德欲舉斯世於二帝三王之治宜無難者豈獨君之益哉為之臣者亦將與之匹休矣故曰是天子而友匹夫也繫詞曰君子之道或出或處或黙或語二人同心其利斷金同心之言其臭如蘭朱熹曰君子之道初若不同而後實無間斷金如蘭物莫能間而其言之有味也臣良勝曰君子之同人者心也不以迹為疑也故禹顯顔晦同一出處之心也史直蘧懐同一語黙之心也惟心之同可以斷金故發而為言如蘭之臭或産崇岡或蒙深谷或植臺榭或委榛荆而幽香氣味則一而已然君子之心非不能為盡同也天下事物理一分殊萬有不齊自有不能以皆同者故四時不齊雖天地化育亦然而况人乎如君臣相得本如魚水何所不同然君以為可臣以其否替之君以為否臣以其可獻之豈不枘鑿而所以求治之心同也若無所可否而一於從君是謂上下雷同豈世道之幸哉又曰知幾其神乎君子上交不諂下交不凟其知幾乎吳澄曰此一節釋豫六二爻詞知幾謂知之於其事未顯著之先所以為神也君子謂六二有中正之德也上謂六三下謂初六六二上比三下比初然六二中正初三柔邪雖比追而不同情交而不諂不凟者也葢九四以不中不正為豫樂之主而三比之初應之初三者四之黨與也二中正自守不肯阿附四之權勢故雖四之黨與亦不與之深交者杜絶阿附之事於幾微之時也故曰其知幾乎程頥曰見事之幾微者其神妙矣乎交於上以恭巽過則為諂交於下以和易過則為凟君子見於幾微故不至於過也説命曰爾惟訓于朕志若作酒醴爾惟麯蘖若作和羮爾惟鹽梅爾交脩予㒺予棄予惟克邁乃訓范祖禹曰酒非麯蘖不成羮非鹽梅不和人君雖有美質必有賢人輔導乃能成德作酒者麯多則太苦蘖多則太甘麯蘖得中然後成酒作羮者鹽過則鹹梅過則酸鹽梅得中然後成羮臣之於君當以柔濟剛可濟否左右規正以成其德故曰爾交脩予爾無我棄我能行爾之言也臣良勝曰君之臨臣主不登阼謂君無敵弗敢賔也是則君不可以友言也然友也者友其德也交脩于德是亦友道焉耳髙宗舊學于甘盤既而荒遯旁求得傅説使繼甘盤而卒業是師之也故曰古者明王有不賔之臣是君於臣當其為師而弗臣也當其為賔而弗臣也惟資其德以相成是皆可以友言也謂之友則切磋琢磨如麯蘖于酒鹽梅於羮固非一於順從若妾婦者君奭公曰嗚呼君肆其監于茲我受命無疆惟休亦大惟艱告君乃猷裕我不以後人迷吕大臨曰大臣之位百責攸萃震撼擊撞欲其鎮定辛甘燥濕欲其調濟盤錯棼結欲其解紓黯闇汚濁欲其茹納自非曠度洪量與夫患失乾没者未嘗無翻然舍去之意况召公親遭大變破斧缺斨之時屈折調䕶心勞力瘁又非平時大臣之比顧以成王未親政不敢乞身爾一旦政柄有歸浩然去志固人情之所必至然思文武王業之艱難念成王守成之無助則召公義未可去也今乃汲汲然求去之不暇其迫切已甚矣盍謀所以寛裕之道圖功攸終展布四體為久大規模使君德開明未可捨去而聽後人之迷惑也臣良勝曰武王既一天下分陜以東周公主之陜以西召公主之及夾輔成王同功一體人也方周公遭疑謗居東召公在位紛解鎮定以全周公者無所不至故金縢啟冊以迎反之者召公為之也今成王即政召公欲避權告老周公諭留亦無所不至葢欲其圖終以輔成王之德以保文武之業皆天理人情之至也或謂召公有疑於周公踐阼以爵位介意此殆以小人之心窺君子之際也蘇子謂召公亦欲周公告老而歸恐亦未然人臣之義無以有已當主少國疑而夙望大臣相率以去自便其私豈聖賢以天下為已任意哉但當時成王即政齒既長矣輔導之責有周公而足矣召公可以盛滿知止而求去周公自當以君臣大義而懇留各盡其道焉耳召公亦何疑於周公者當夫營洛之時周公告成王曰茲予其明農哉是周公於此亦有歸老之志其所以未去以成王之留以殷民未靖淮夷徐戎與奄繼叛國事有未可以言去召公嘗告王曰今冲子嗣則無遺壽耉當時在王左右者復有誰哉召公亦知周公未可以去矣周公曰小子旦若游大川予往暨爾奭其濟周公自知不可以去召公矣然則召公何以欲去㒺以寵利居成功大臣之常也在伊尹而已然太甲怨艾成德而尹之去猶陳咸有一德以戒之是周公不得為伊尹召公不必為周公其道一也召公既留相成王康王未釋于政其心同也此同官為僚友道之極致也後世有以勢均權敵相傾忌而不能並立于朝者真周召之罪人也哉伐木詩曰伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲相彼鳥矣猶求友聲矧伊人矣不求友生神之聽之終和且平朱熹曰此燕朋友故舊之樂歌故以伐木之丁丁興鳥鳴之嚶嚶而言鳥之求友遂以鳥之求友喻人之不可無友也人能篤朋友之好則神之聽之終和且平矣臣良勝曰小雅之詩為天子燕饗之樂周公制作所定也然亦有此燕友之歌則三代而上天子之友其臣下者葢亦其常也自天子至于庶人未有不須友而成者故士庶人而得友則有以和平其身矣大夫而得友則和平其家矣諸侯而得友則和平其國矣天子而得友則和平其天下矣友道所繫於人其大如此假樂詩曰之綱之紀燕及朋友百辟卿士媚于天子不解于位民之攸塈吕祖謙曰君燕其臣臣媚其君此上下交而為泰之時也泰之時所憂者怠荒而已此詩所以終於不解于位民之攸塈也臣良勝曰此西周㑹朝之樂故謂之大雅則在當時百辟卿士於天子亦以朋友稱也伐木之和平下之有益於上假樂之燕安上之有益於下交相為益亦友道也然其和平而安者亦惟民之有攸塈也葢天之所以樹后王君公建邦設都以亂民也豈以逸豫為哉故不解位以安民益之大者也抑詩曰無易由言無曰茍矣莫捫朕舌言不可逝矣無言不讐無德不報惠于朋友庶民小子子孫繩繩萬民靡不承朱熹曰言不可輕易其言葢無人為我執持其舌者故言語由已易至差失常當執持不可放去也且天下之理無有言而不讐無有德而不報者若爾能惠于朋友庶民小子則子孫繩繩萬民靡不承矣臣良勝曰朋友攸攝攝以威儀言則威儀之表著是謂德之隅也故必藴之為德行而後發之為德言充之為德容言本乎德慎乎容而後無易言之失矣夫一言之善而千里之外應之一言不善而千里之外違之况其邇若朋友者乎朋友之義德業相勸過失相規其情易宻其迹易親故其言亦易發發而中節而朋友以惠焉則無擇言而非易矣夫以朋友易狎之地而謹言若此則在朝㑹矜持之地可知言所以動天地感鬼神則子孫萬民之承有不期然而然者夫衞武公年九十有五猶箴儆于國欲自卿以下以相交戒乃作抑詩而慎言以為威儀之飾葢亦以友道望其臣也六月詩曰吉甫燕喜既多受祉來歸自鎬我行永久飲御諸友炰鱉膾鯉侯誰在矣張仲孝友朱熹曰此言吉甫燕飲喜樂多受福祉葢以其歸自鎬而行永久也是以飲食進饌於朋友而孝友之張仲在焉言其所與燕者之賢所以賢吉甫而善是宴也臣良勝曰天下之善未有不須友而成者也至於朝政國事同官為僚寅恭和衷所繫尤重𢎞濟艱難同聲相應如左右手况其素友善者乎故吉甫禦侮于外而張仲居中無所阻撓是以疏附先後奔奏禦侮各宣乃猷吉甫之功亦張仲之善也功成宴樂而詩人以張仲在焉為美婉而則矣是故人臣戮力王室或内或外或行或居所事不同其所以靖安天下之善一也禮曰五行四時十二月還相為本也五音六律十二音還相為宫也五齊六和十二食還相為用也五色六章十二衣還相為質也審乎此而後可以達詩人之意可以識吉甫張仲之心可以盡朋友之義矣鶴鳴詩曰鶴鳴于九臯聲聞于野魚潛在淵或在于渚樂彼之園爰有樹檀其下維蘀他山之石可以為錯鶴鳴于九臯聲聞于天魚在于渚或潛在淵樂彼之園爰有樹檀其下惟榖他山之石可以攻玉朱熹曰此詩之作不可知其所由然必陳善納誨之詞也葢鶴鳴于九臯而聲聞于野言誠之不可掩也魚潛在淵而或在于渚言理之無定在也爰有樹檀而其下維蘀言愛當知其惡他山之石而可以為錯言憎當知其善也由是四者引而伸之觸類而長之天下之理其庶幾乎程顥曰玉之温潤天下之至美也石之麤厲天下之至惡也然兩玉相磨不可以成器以石磨之然後玉之為器得以成焉君子之與小人處也横逆侵加然後脩省畏避動心忍性増益預防而義理生焉道德成焉吾聞諸邵子臣良勝曰由朱子之言釋之以上交焉得也由程子之言釋之以下交焉得也然君子擇友而後交豈得近惡友哉人主擇賢而後任豈得近小人哉藉惡以成善計亦晩矣不幸而處乎是亦有自成之道焉爾宋大水左氏曰宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之罰又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪已其興也勃焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮其庶乎既而聞之曰公子御説之詞也臧孫達曰是宜為君有恤民之心臣良勝曰於是見春秋諸侯之交之禮也怨不廢義怒不廢禮古之道也魯莊十年嘗敗宋師于桑丘十一年又敗于鄑皆宋師侵軼我也夏則交惡秋則弔灾此豈以怨怒廢禮義者哉宋有御説致詞有章魯有臧孫致禮有節故曰不有君子其能國乎范宣子為政諸侯之幣重鄭人病之鄭伯如晉子産寓書於子西以告宣子曰子為晉國四鄰諸侯不聞令德而聞重幣僑也惑之僑聞君子長國家者非無賄之患而無令名之難夫諸侯之賄聚於公室則諸侯貳若吾子賴之則晉國貳諸侯貳則晉國壞晉國貳則子之家壊何没没也將焉用賄夫令名德之輿也德國家之基也有基無壊無亦是務乎有德則樂樂則能久詩云樂只君子邦家之基有令德也夫上帝臨汝無貳爾心有令名也夫恕思以明德則令名載而行之是以遠至邇安無寧使人謂子子實生我而謂子浚我以生乎象有齒以焚其身賄也宣子悦乃輕幣臣良勝曰子産之忠告宣子之受盡言可以見春秋大夫之交之義也祁奚請免叔向曰子為善孰敢不勉多殺何為宣子悦而免之宣子固可與言者也逾年趙文子為政令薄諸侯之幣而重其禮則當時同政諸卿非不知宣子之過舉竟匿弗言待自為而形若短也言之使補過者乃在既老之祁奚隣國之子産則晉卿之睦已不及先君之時而後荀范韓魏趙鞅之相惡其機亦見於此矣吳入郢左氏曰伍員與申包胥友其亡也謂申包胥曰我必覆楚國申包胥曰勉之子能覆之我必能興之及昭王在隨申包胥如秦乞師曰吳為封豕長蛇以薦食上國虐始於楚寡君失守社稷越在草莽使下臣告急曰夷德無厭若隣於君疆塲之患也迨吳之未定君其取分焉若楚之遂亡君之土也若以君靈撫之世以事君秦伯使辭焉曰寡人聞命矣子姑就館將圖而告對曰寡君越在草莽未獲所伏下臣何敢即安立依於庭墻而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出臣良勝曰友之道以信為達也友之責以善為道也若子胥包胥之友也其言踐責善之道則未也方子胥以父讐而圖覆楚國包胥如知其非義一言止之而足也如其義也則固不必遺君之憂而後圖其安也昭王初奔在鄖鄖公辛之弟懐欲殺之曰平王殺吾父我殺其子不亦可乎辛曰君討臣誰敢讐之君命天也天命將誰讎違强凌弱非勇也乗人之弱非仁也滅宗廢祀非孝也動無令名非知也必犯是余將殺汝使包胥亦若鄖辛之諭其弟子胥賢者莫逆之矣不圖其易而圖其難何居緇衣曰惟君子能好其正小人毒其正故君子之朋友有鄉其惡有方是故邇者不惑而遠者不疑也陳澔曰君子與君子以同道為朋小人與小人以同利為朋君子固好其同道之朋矣小人亦未嘗不好其同利之朋不當言毒害其匹也小人視君子如仇讎常有禍之之心此所謂毒其正也君子所好不可以非其人故曰朋友有鄉所惡不可以及善人故曰其惡有方前章言彰善癉惡以示民厚則民情不惑今好惡既明民情歸一故邇者遠者不惑不疑也儒行曰儒有合志同方營道同術並立則樂相下不厭久不相見聞流言不信其行本方立義同而進不同而退其交友有如此者陳澔曰合志以所向言營道以所習言方即術也並立爵位相等也相下以尊位相讓而已處其下也流言惡聲之傳播也聞之不信不以為實也其行本方立義謂所本者必方正所立者必得其宜也同於為義則進而從之不同則退而避之故曰同而進不同而退表記曰君子之接也如水小人之接也如醴君子淡以成小人甘以壊小雅曰盜言孔甘亂是用餤臣良勝曰王通有云君子先擇而後交小人先交而後擇故君子寡尤然則君子貴擇交也擇之道最先於言言者心之聲也如水之淡如醴之甘君子小人於是辨矣然而溺於甘厭於淡恒人情也故君子之交正以異乎恒情也人君之擇乎臣要亦無出乎此其言雖未免有拂而意在匡君必正人也其言不敢有違而志於狥主必邪人也然樂其狥已而疎其拂已亦恒情也英傑之士自有異乎是者子貢問友子曰忠告而善道之不可則止朱熹曰友所以輔仁故盡其心以告之善其説以道之然以義合者也故不可則止若以數而見疏則自辱矣臣良勝曰君臣朋友均以義合者也而君臣之分則尊矣故人臣而欲進主於三代之隆豈但責善於友以相成而已哉然以數而見疏見辱則進退之權度亦在我矣子曰益者三友損者三友友直友諒友多聞益矣友便辟友善柔友便佞損矣朱熹曰友直則聞其過友諒則進於誠友多聞則進於明便辟謂習於威儀而不直善柔謂工於媚説而不諒便佞謂習於口語而無聞見之實三者損益正相反也臣良勝曰友之損益固如是也若人君所任之臣其所損益又有大於是者可不謹乎子夏之門人問交於子張子張曰子夏云何對曰子夏曰可者與之其不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜不能我之大賢與於人何所不容我之不賢與人將拒我如之何其拒人也朱熹曰子夏之言迫狹子張譏之是矣但其所言亦有過髙之病葢大賢雖無所不容然大故亦所當絶不賢固不可拒人然損友亦所當遠學者不可不察臣良勝曰斯友道也推之君道無遺善無棄材矣孟子曰以友天下之善士為未足又尚論古之人誦其詩讀其書不知其人可乎是以論其世也是尚友也朱熹曰論其世論其當世行事之迹也言既觀其言而不可不知其為人之實是以又考其行也夫能友天下之善士其所友衆矣猶以為未足又進而取之古之人是能盡其取友之道而非止一世之士矣臣良勝曰昔傅説告于髙宗曰學于古訓乃有獲事不師古匪説攸聞則人君尚友正以師于古也若論夫覇者之世則霸而已矣進而論三王之世則禹湯文武固今日之友也又進而論二帝之世則堯舜固今日之友也友也者友其德也不徒以外慕其名者也至如陰盜神器便藉口於唐虞簒逆誅夷欲比迹於湯武今之賊也古之罪人也又何以尚友為哉孟子曰古之賢王好善而忘勢古之賢士何獨不然樂其道而忘人之勢故王公不致敬盡禮則不得亟見之見且猶不得亟而况得而臣之乎朱熹曰言君當屈已以下賢士不枉道而求利二者勢若相反而實則相成葢亦各盡其道而已孟子曰故湯之於伊尹學焉而後臣之故不勞而王桓公之於管仲學焉而後臣之故不勞而霸朱熹曰先從受學師之也後以為臣任之也臣良勝曰師臣者王賔臣者霸有必然者也伊尹於湯曰惟尹暨湯咸有一德以德行仁是以王也管仲既囚桓公舉以相國一曰仲父二曰仲父有司致請曰若是乎君之易也桓公曰吾難於得仲父既得之故其易也九合諸侯一匡天下其霸者仲之刀也嗚呼湯與伊尹不得而見之矣得見如桓公管仲者臣亦曰民到于今受其賜矣魯哀公問子夏曰必學而後可以安國保民乎子夏曰不學而能安國保民者未嘗聞也哀公曰然則五帝三王有師乎子夏曰有臣聞黄帝學于太貞顓頊學乎緣圖帝嚳學乎赤松子堯學乎尹壽舜學乎務成跗禹學乎西王國湯學乎威子伯文王學乎鮫時子斯武王學乎郭叔此數聖人未遭此師則功業不著乎天下名號不傳乎千古夫不學不明古道而能安國家者未之有也臣良勝曰魯哀公有為善之資有去惡之志惟强臣有以制其勢而聖賢無所用其心也觀公問政禮於孔子矣問馭民於顔子矣問社於宰我矣問徹於有若矣與茲問學於子夏皆切問也亦其志之所欲為也三家之專陪臣之叛公亦無所於治有求於越而竟以為辱其志亦可悲矣慕若聖賢莫效于用故曰雖有粟吾得而食諸文侯以卜子夏田子方為師每過叚干木之廬必式四方賢士多歸之胡寅曰常主於其臣愛順已而已賢主於其臣欲其諌已焉始乎求諌中而勉從終而惡聞者多矣况於師乎諌爭之臣則有朋友之義逆耳拂意之言至悻然發於心勃然變乎色者賢君所未免也然爭臣之位卑其勢可以進退而制指則其憚之尚淺也一成乎為師其位尊其道嚴其教詔輔拂必一于聽從而莫得違拒其威儀體貌必與之終始而不敢廢故君於得師為難非世之人無可師也以人主無求師之志事師之道也不自得師而臣其所受教雖有願治之意其成就亦卑近蹇淺而止矣文侯非自得師者也而三人又非一世之士也雖然不既與庸主遠矣乎敦信以治國則不失信於虞人脩睦以善隣則不失交于韓趙聞翟璜之對則悟任座之意直聽田子之論則知鍾聲之問非將相大任也謀諸李克而皆得其人其去六國之庸主誠遠矣雖然文侯與子思同世不知師也而子思亦非文侯所得師也文侯聽鼓樂則惟恐卧聽鄭衞之音則不知倦是以不能師子思也漢髙祖還過沛宫置酒召故人父老酒酣自為歌起舞謂沛父兄曰遊子悲故鄉朕自沛公以誅暴逆遂有天下其以沛為朕湯沐邑臣良勝曰富而能貧貴而能賤在士人已為髙致矧貴為天子而戀戀鄉曲父老是謂親者不失其為親故者不失其為故雖周公未有改也是時髙祖酣歌所謂大風歌者是也王通謂安不忘危其有覇心者乎覇固能假仁義者也故齊桓之存紀季似義葬伯姬似仁晉文避三舍以報楚亦將以為禮也嚴光與光武同遊學及光武即位光乃變姓名隱身不見帝思其賢乃令以物色訪之後齊國上言有一男子披羊裘釣澤中帝疑其光乃備安車𤣥纁遣使聘之三反而後至車駕即日幸其館光卧不起帝即其卧所撫光腹曰咄咄子陵不可相助為理邪光乃張目熟視曰昔唐虞著德巢父洗耳士固有志何至相迫乎帝曰子陵我竟不能下爾邪於是升輿嘆息而去復引光入道故舊相對屢日因共偃卧光以足加帝腹上明日太史奏客星犯帝座甚急帝笑曰朕故人嚴子陵共卧爾范仲淹曰在易屯之初九陽剛方亨而能以貴下賤光武以之蠱之上九衆方有為而能不事王侯髙尚其事子陵以之非子陵不能成光武之大非光武豈能遂先生之髙哉而使頑夫亷懦夫立是大有功於名教也臣方正學曰敬賢當遠色治國在齊家何如廢郭后寵此陰麗華糟糠之妻尚如此貧賤之交安足擬羊裘老子早見幾獨向桐江釣煙水漢明帝自為太子時師事博士桓榮學通尚書及即位尊以師禮乗輿嘗幸太常府令榮坐東面設几杖㑹百官及榮門生數百人天子親自執業每言輙曰太師在是悉以大官供具賜之章帝為太子受學於張酺酺為東郡太守帝幸東郡引酺及門生掾吏㑹庭中先備弟子之儀講尚書一篇然後脩君臣之禮臣良勝曰明章尊學事師誠為帝王髙致盛節也然而德業所就竟亦未有大異乎漢季之主炎劉之澤于是息焉知所事而未知擇所事之人也桓榮張酺章句之學也未論格心至於變化氣質未之能焉故傳稱明帝性􅄶急好以耳目隱發為明章帝雖云長者而優柔不斷其過益繁於尚書所謂髙明柔克沉潛剛克未知有以動其中否程頥曰未讀是書猶是人也既讀是書亦猶是人也則為不善讀矣陳平患諸吕力不能制恐禍及已嘗燕居深念陸賈往直入坐曰天下安注意相天下危注意將將相和調則士豫附士豫附則天下雖有變權不分何不交驩大尉平用其計兩人深相結吕氏謀益衰胡寅曰陸生為平勃一時計可耳非所以為訓也將相不和固非國家之福將相深相結亦非國家之利使其皆賢皆為社稷計相舉相職進賢退不肖將舉將職詰暴而禁奸何患惡之不除功之不就何必私交締結類非公道者乎平與勃同心謀慮則是也而進幣施報則非矣一有傳之失者身尚不自保而何國之安故曰陸生為一時之計可耳非所以為訓也杜如晦房𤣥齡共筦朝政天下新定臺閣制度獻物容典率二人討裁每議事帝所𤣥齡必曰非如晦莫籌之如晦至率用𤣥齡䇿葢如晦長於斷而𤣥齡善謀兩人深相知故能用心濟謀以左右帝治當世語良相必曰房杜云臣良勝曰凡物之相反者莫如水火陰陽異氣也燥濕異宜也南北異位也上下異性也然而有相濟焉水火交而物以化於易之鼎之革可以識其用也而執其機要有存乎人者故蕭之規曹之隨魏之嚴丙之寛其相濟以成務君用之也矧夫國之大事匪謀胡獲匪斷胡成二者本以相資又非規隨寛嚴若水火之異者其輔成唐宗致治之美幾于成康豈偶然哉韓𤦺言慶厯中與希文彦國同在西府上前爭事議論各别下殿不失和氣如未嘗爭也當時相善三人正如推車子葢其心主于車可行而已𤦺務容小人善惡黒白不大分故小人忌之亦少如范富歐尹嘗欲分君子小人故小人忌怨日至朋黨亦起方諸公斥逐獨𤦺安焉扶持復起皆琦力也臣良勝曰君子和而不同韓范富杜歐尹是也尚豈有黨同伐異之為哉然亦不能久安于位故歐陽脩疏曰杜衍范仲淹韓𤦺富弼天下皆知其有可用之賢而不聞有可罷之罪正士在朝羣邪所忌謀臣不用敵國之福也韓𤦺疏曰陛下用杜衍為相方及一百二十日而罷范仲淹以夏人初附自乞保邊至於富弼之出則所損甚大𤦺由是出知揚州而修亦左遷滁州夫君子好正小人毒正君子之好尤不足以勝小人之毒况君子而自醜其正又何以語小人哉聖祖手詔叙劉伯温功伐召赴京累欲進公爵伯温曰陛下乃天授臣何敢貪天之力上欲相楊憲伯温與憲素厚以為不可曰憲有相才無相器夫宰相者持心如水以義理為權衡而已無與焉者也今憲不然能無敗乎上曰吾之相無踰於先生伯温曰臣非不自知但臣疾惡大深又不耐煩為之且負大恩進封誠意伯歸老鄉里臣良勝曰嘗聞管仲用鮑叔牙之薦相齊國及病桓公問可以屬國者仲曰公誰欲與公曰鮑叔牙可仲曰不可其為人也亷潔善士也其為不已若者不比之一聞人之過終身不忘使之理國上且鈞乎君下且逆乎民自恒情言仲若大負于叔牙者而古今稱交道必曰管鮑其所以交而知者皆以為國而非為其私也然以亷潔善士為不可相則伯説已臣觀伯温不私於憲大類乎仲其曰宰相持心如水以義理為權衡而已無與焉則恢恢乎王者之佐矣且自謂疾惡過嚴而不耐煩是亦有叔牙之病而不自隱則伯温者上不負君下不負友亦不自負其心矣聖祖往濠州省陵墓父老經濟等來見上與之宴謂濟等曰吾與諸父老不相見久矣今還故鄉念父老鄉人遭罹兵難以來未遂生息吾甚閔焉濟等對曰久苦兵爭莫獲寧居今賴主上威德各得安息勞主上憂念上曰濠吾故鄉父母墳墓所在豈得忘之諸父老宴飲極歡上又謂曰諸父老皆吾故人豈不欲朝夕相見然吾不得久留此父老歸宜教導子弟為善孝弟勤儉鄉有善人由家有賢父兄也濟等頓首謝上又曰鄉人耕作交易且令無遠出濵淮諸郡尚有宼兵恐為所抄掠父老等亦宜厚自愛以樂髙年於是濟等歡醉而去臣良勝曰貴為天子富有四海而視鄉曲故人皆韋布殷勤休戚一體聖祖之於濠梁與漢髙之於豐沛其揆一也詩曰維桑與梓必恭敬只禮曰樂其所自生禮不忘其本聖心淵微一舉而孝弟禮樂之道皆於是乎在不特香火之情而已彼曰富貴不歸故鄉如衣錦夜行是薄夫淺人之論豈足以語帝王之度哉桂彦良被薦至京師聖祖見而偉之授太子正字切磨治道必稱孔孟不下千餘言無一不當帝心者其要以明聖學格君心為務在春坊久每侍講必以二帝三王心法為本至於厯代治忽諄諄啟廸不倦誠意懇至東宫每動容稱敬聖祖嘗顧問曰爾何官彦良對曰正字聖祖曰否爾帝師也臣良勝曰聖祖於宋濓章溢等薦至則曰為天下屈四先生於彦良薦至則曰爾帝者師嗚呼師臣者王賔臣者覇三代而下何多見哉臣竊思之元之末季政教陵夷乃有豪傑之才聖賢之學經濟之畧如濓如基如琛如溢如彦良者一時並赴薦召即所居創禮賢館處之朱文忠復薦王禕王天錫而婺州儒士許元葉瓚胡翰汪仲山金信童冀吳履張啟敬孫履軰又皆㑹食省中敷陳治道真所謂聖人作而萬物覩雲從龍而風從虎也然則賢人隱而天地閉世道升降斷可識矣天生賢才而故遺之以待真主豈偶然哉右衍朋友之法仲虺之誥曰簡賢附勢實繁有徒肇我邦于有夏若苗之有莠若粟之有粃小大戰戰罔不懼于非辜蔡沉曰言簡賢附勢之徒同惡相濟實多徒衆肇我邦於有夏為桀所惡欲見剪除如苗之有莠如粟之有粃湯特言其不容於桀而迹之危如此臣良勝曰正人以邪人為邪邪人亦以正人為邪是故朋友之弗善有變而黨者矣十畆之間詩曰十畆之間兮桑者閑閑兮行與子還兮朱熹曰政亂國危賢者不樂仕於朝而思與其友歸於農圃故其詞如此臣良勝曰天下有道㧞茅彚征賢人君子皆榮仕進以行其所學上焉為德下焉為民同道相濟此則所謂君子之朋也至如北風之詩則朋友同車以去國此則相與並耕於田野方以類聚物以羣分驅之不可使之合析之不可使之離是亦根於人心之同然而不可易者也然在衰周之世尚不為怪降及後世將以背君死黨目之矣民勞詩曰民亦勞止汔可小康惠此中國以綏四方無縱詭隨以謹無良式遏寇虐憯不畏明柔遠能邇以定我王蘓氏曰人未有無故而妄從人者惟無良之人將説其君而竊其權以為寇虐則為之故無縱詭隨則無良之人肅而寇虐無畏之人止然後柔遠能邇而王室定矣臣良勝曰戮力王室共濟時艱而所以相戒必重於詭隨禍之始自此起也大叚人心自有是非天下自有公議靜思審顧孰不自明惟其利害之心勝趨避之機熟貪權懐禄之術行而欺上㒺下之心昧冒然當之而不顧只是詭隨為之害也然則君子無所隨乎曰有易於隨卦取象於雷之澤動萬物者莫疾乎雷雷之行天是曰無妄無妄天下之至誠亦天下之至公也誠則公公則同同則必有以應之如澤之説以應雷莫隨之善也故曰隨元亨利貞無咎穆姜曰有是四德而隨之是以無咎我皆無之豈隨也哉祭伯來胡安國曰人臣義無私交大夫非君命不越境所以然者杜朋黨之原為後世事君而有貳心之明戒也惟此義不行然後有藉外權如繆留之語韓宣惠者交私議論如莊助之結淮南者倚强藩為援以脅制朝廷如唐盧携之於髙駢崔允之於宣武崔昭緯之於邠岐者矣竇武疏曰陛下即位以來未聞善政近者奸臣牢脩造設黨議遂收前司隷校尉李膺等逮拷連及數百人曠年拘録事無數驗膺等誠陛下稷卨伊吕之佐而虛為奸臣賊子之所誣惟陛下留神澄省書奏霍諝亦為表請帝意稍解趙弼曰一時黨人互相標榜以髙玩一世議論激切固未合於中道皆懐嫉惡之心不忍小人之朋奸蠧政以顛覆國家相與肆為髙論以扶持世道原其本心非盡私邪也人君聞其言而反之已吾有是邪從而改之吾無是邪因而豫為之戒其於君身國政未必無補也奈何信任小人之言一切以為誹謗置之於法而又禁錮其終身真氏所謂禁錮終身自古大無道之世所未有也嗚呼古之相臣一夫不獲以為已辜况人君為天地民物之主乃禁錮人於平世使人鬱結而不得自申是豈有道之世哉况所禁錮者又皆世所謂賢人君子者哉唐憲宗問宰相曰人言外間朋黨大盛何也李絳對曰自古人君所甚惡者莫若人臣為朋黨故小人譖君子者必曰朋黨何則朋黨言之則可惡尋之則無迹故也東漢之末凡天下賢人君子宦官皆謂之黨人而禁錮之遂以亡國此皆羣小欲害君子之言願陛下深察之夫君子與君子合豈可必使之與小人合然後謂之非黨邪胡寅曰嘗考古而申其説君子之類或以道德或以學行以氣節以議論窮則相益達則相推可以名之曰朋而不可謂之黨小人之類或以才知以邪慝以恩私以勢利窮則相疎達則相親可以名之曰黨而不可謂之朋然小人欲害君子者并二名而一以目之于其時臨其事者惑於真偽賢不肖之辨而聽夫牽合羅織疑似之言謂所治者小人而治之者君子也自後世觀之乃大相謬戾故前漢之黨指蕭望之劉向張猛周堪而治之者元帝與𢎞恭石顯也後漢之黨指李膺范滂二百餘人而治之者桓靈與中常侍也唐之黨指獨孤損翟遠等三十餘人而治之者朱全忠與柳燦李振也此三黨者係宗社存亡使天下振動者也其果小人邪抑君子邪而髙祖之臣皆自豐沛光武諸將悉出南陽宣帝圖形於麒麟太宗延士于瀛洲于以興起治功計安天下又安可以其衆多而指為朋黨邪宋崇寧元年蔡京籍元祐及元符末宰執司馬光等侍從蘇軾等文臣程頥等武臣王獻可等官者𢎞士良共百二十人為奸黨請書之遂刻石于端禮門臣丘濬曰小人欲空人之國則肆為朋黨之説君子指小人為黨小人亦指君子為黨甚至君子亦指君子以為黨而小人亦然始以黨敗人終以黨敗國宋自元祐以來黨論滋起互相指斥不復能辨衣冠塗炭垂之十年至於崇寧其禍極矣嗚呼有國者其尚公以存心恕以待物無偏無黨一惟理之是凖庶幾消朋黨之禍於未然哉唐順宗即位失音不能决事常居深宫施帷簾獨宦官李忠言昭容牛氏侍左右以王伾為散騎常侍王叔文為起居舍人大抵計事叔文依伾伾依忠言忠言依牛昭容轉相交結每事先下翰林叔文可否然後宣于中書韋執誼承而行之外黨則韓泰柳宗元劉禹錫等主采聽外事謀議倡和日夜汲汲如狂互相推奬曰伊曰周曰管曰葛僴然自得謂天下無人士大夫畏之道路以目穆宗時李逢吉用事所親厚者張文新李仲言李續之李虞劉栖楚姜治及張權輿程昔範又有從而附麗之者時人目之為八闗十六子王氏曰按逢吉傳鄭注得幸於王守澄逢吉遣子訓賂注結守澄為奥援自是肆志無所憚其黨有張又新李績張權輿劉栖楚程昔範李虞姜治及訓八人而傅㑹者又八人皆任要害故號八闗十六子者所求請先賂闗子後達逢吉無不得其所欲也宋仁宗謂輔臣曰王欽若久在政府觀其所為真奸邪也王曽對曰欽若與丁謂林特陳彭年劉承珪同惡時稱五鬼姦邪憸偽誠如聖諭臣良勝曰朋友之變也其賢者則有朋黨之名其不賢者則有阿黨之名賢之為黨其成在上而責備于下者有也不賢之為黨其成在下而責歸于上者有也是故君子并以戒也王安石罷相知江寧因薦韓絳吕惠卿以自代時號絳為傳法沙門惠卿為䕶法善神唐坰疏曰安石專作威福曽布表裏擅權文彦博馮京知而不敢言王珪曲事無異厮僕元絳薛向陳繹頥指氣使無異家奴張璪李定為安石牙爪張商英乃安石鷹犬逆言者雖賢為不肖附已者雖不肖為賢臣良勝曰從古朋黨之説皆小人借此名以誣君子而安石之黨則不可謂之誣也司馬光嘗謂之曰介甫行新法乃引用一副當小人何也安石曰方法行之初舊時人不肯向前候法行已成即避之用老成者守之光曰誤矣小人得路豈可去也若欲去必成讎敵他日王門十哲惠卿首叛以無使上知退居而書福建子悔之晩矣右衍朋友之戒中庸衍義卷八
