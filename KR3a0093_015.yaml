body:
  text: 中庸衍義卷十五明夏良勝撰三重之義命官之制兵戎之制審刑之制崇勲之制田賦之制舜典帝曰咨汝二十有二人欽哉惟時亮天工三載考績三考黜陟幽明庻績咸熈分北三苖蔡沉曰二十二人四岳九官十二牧也周官言内有百揆四岳外有州牧侯伯盖百揆者所以統庶官而四岳者所以統十二牧也既分命之又總告之使之各敬其職以相天事也考核實也三考九載也九載則人之賢否事之得失可見於是陟其明而黜其幽賞罰明信人人力於事功此所以庶績咸熈也北猶背也其善者留其不善者竄徙之使分背而去也命二十二人之後立此考績黜陟之法以時舉行而卒言其效如此也王制曰天子使其大夫為三監監於方伯之國國三人陳澔曰監者監臨而督察之也自王朝出權亦尊矣一州三人則二十四人也臣良勝曰君人者如天運於上若無所為也然而代之以有為者若星垣日月度次分抄不能差忒而後運化行焉故内有公卿外有列侯州長可謂専矣而方伯領之方伯帥州可謂尊矣而三監制之職上於大夫所謂王人雖微列於諸侯上也天子命一大夫猶足以制方伯逆邪心窒亂源體統益嚴而天子之尊為何如哉漢制萬户以上令秩千石郡守二千石刺史十三州行部才六百石而六條檢察一治强宗豪右其五皆治二千石不法秩卑以期於進權重以責其成此王制三監之遺也唐置觀察則尊官矣而養尊自愛卒與藩鎮比而為禍宋以前宰相典郡置帥而以清望為監司不過臺省寺監官藩臣一事不法即按劾以行猶漢制也聖朝守令統之於方伯周制也監司按察唐制也重臣撫治宋制也又以御史代巡守而監察之亦七品官爾則漢制之本於三監者也是所謂斟酌歴代之善而取其尤者真萬世常行之法也漢文帝問右丞相周勃曰天下一嵗决獄幾何勃謝不知又問一嵗錢榖出入幾何又謝不知汗出沾背上問左丞相平平曰有主者陛下即問决獄責廷尉問錢糓責治粟内史上曰君所主者何事也平謝曰宰相上佐天子理隂陽順四時下遂萬物之宜外鎮撫四夷諸侯内親附百姓使卿大夫各得任其職焉帝稱善於是勃自知其能不如平乃謝病請歸相印上許之平専為丞相臣良勝曰自成湯之時伊尹仲虺為左右相至周則設三公如周公為師召公為保無獨任也至是以勃之謝病止置一相權専位重其禍滋深至宋太祖始置參知政事以分其權而専决之政卒難改於其舊故有如檜如似道者卒以殃人禍國如是也大端宰相須用讀書人綘侯勃織畚人爾宜其出陳平下也而貽之𨼆憂亦至於此其後董贒治哀帝喪一無所知太后乃召王莽謂明習故事遂信向之代漢之事成於賢矣人君置相亦慎之於始哉漢宣帝詔曰有功不賞有罪不誅雖唐虞不能以化天下今膠東相王成勞來不怠流民自占八萬餘口治有異等之效其賜成爵闗内侯秩中二千石未及徴用會病卒官後詔使丞相御史問郡國上計長史守丞以政令得失或對言前膠東相成偽自増加以蒙顯賞其後俗吏多為虚名云胡寅曰甚哉事之難乎核實也史稱宣帝拜刺史守相考所行以質其言有名實不相應者必知其所以然而王成以偽増流民占田之口遂蒙顯賞後帝因問上計長史既知其妄而不追改王成詔書自是俗吏多為虚名而棕核名實之政其疵多矣夫所謂虚名者乃人臣聾瞽君上之奸術也為君者深居九重堂下之事逺於千里而況四海九州之大乎故寄心腹於一相而託耳目於臣隣欲其莫我欺也人君不好名而篤實則宰相務實而去華在下者皆盡忠赤莫敢誕謾朝廷内外歸於一實而天下之理得矣惟人君不篤實而好名也於是宰相尚華而廢實在下者靡然成風為欺為㒺如幻如戯朝廷内外歸於一虚而天下之理亂矣實則聚歛而名曰理財用實則掊尅而名曰抑兼并實則開邊而名曰討不庭實則尚同而名曰一衆志移囚於外舍而奏囹圄空水旱不以聞而稱大有年諫諍路絶則曰無事可言賢才盡廢則曰小人退聽人君樂其名良是也使之誇頌太平玩心宴安而不知天變實章地變實著人心實離雖禍亂自此而起則雖家置一喙汗竹南山亦不足以掩蔽矣故為天下國家者貴實則益隆虚則損自古不易之道也章帝詔曰夫俗吏矯餙外貌似是而非朕甚厭之甚苦之安靜之吏悃愊無華日計不足月計有餘如襄城令劉芳吏民同聲謂之不煩雖未有他異斯亦殆近之矣夫以苛為察以刻為明以輕為徳以重為威四者或興則下有怨心吾詔書數下冠盖接道而吏不加治民或失職其咎安在勉思舊令稱朕意焉戴溪曰甚矣俗吏之為民患也以辦事為功以稱職為能以刻為威以察為明以政化為髙論以風俗為迂濶當其初也百姓畏其威令行禁止所求者遂所欲者得有所任使不避劇易皆能成功故朝廷之上翕然以為能以此馴致大位典領方面徃徃如是天下之士争慕效之翕然成風離散民心破壊國體斵喪元氣而風俗自此耗矣古之君子深嫉俗吏如仇者惡其為民患也夫天下善人君子安静不擾悃愊無華其政悶悶若不足以快人意而愷悌慈祥寛洪廣大將以感動民心扶持教化薫烝和氣與一世共躋於仁夀之域舍斯人其誰與共治哉唐太宗謂魏徴曰為官擇人不可造次用一君子則君子皆至用一小人則小人競進矣對曰然天下未定則専取其才不取其行喪亂既平則非才行兼備不可用也范祖禹曰太宗以治亂在庶官欲進君子退小人此王者之言也而魏徴之所為才行者不亦異乎夫才有君子之才有小人之才古之所謂才者君子之才也後世之所謂才者小人之才也髙陽氏有子八人天下以為才其所以為才者曰忠肅恭懿宣慈恵和周公制禮作樂孔子以為才然則古之所謂才者兼徳行而言也後世之所謂才辯給以禦人詭詐以用兵邪僻險陂趨利就事是以天下多亂職斯人之用於世也在易師之上六曰開國承家小人勿用象曰小人勿用必亂邦也未濟曰髙宗伐鬼方三年克之小人勿用王者創業垂統敷求哲人以遺後嗣故能長世也豈其以天下未定而専用小人之才乎夫有才無行之小人無時而可用退之猶懼其或進也豈可先用而後廢乃取才行兼備之人乎徴之學駁而不純故所以輔導其君者卒不至於三代之治也唐𤣥宗時姚元之嘗奏請序進郎吏上仰視殿屋元之再三言之終不應元之懼趨出罷朝髙力士諫曰陛下新總萬幾宰相奏事當面加可否奈何一不省察上曰朕任元之以庶政大事當奏聞共議之郎吏卑秩乃一一以煩朕耶會力士宣事至省中為元之道上語元之乃喜聞者皆服上識人君之體臣良勝曰𤣥宗以専任宰相不預除吏固為得體然不自言於宰相而與宦官言之為大失體矣使力士變換其言元之何所從質方懐疑震懼之際非去則死而已此奸臣欲固權寵必預結左右以刺人主意好惡喜怒無不知之而先意承迎如李林甫盧杞元載之儔皆𤣥宗有以啓之也唐髙宗時少常伯裴行儉有知人之鑒與貟外張仁禕設長名姓歴榜行銓注之法又定升降官資髙下其後遂為永制無能革之者大抵唐之選法取人以身言書判計資量勞而擬官始集而試觀其書判已試而銓察其身言己銓而注詢其便利已注而唱集衆告之各給以符謂之告身宋真宗時冦凖為相用人不以次同類頗不悦目吏持例簿以進準曰宰相所以進賢退不肖也若用例一吏職爾臣良勝曰冦凖之郤例簿真宰相事也而積日取貴自漢以來便之以為茍禄聖書崔亮始立年格専以倚解日月為斷而薛琡上書曰選曹惟取年勞不簡賢否義均行雁次若貫魚執簿呼名一吏足矣同列欲進例簿者崔亮之格也凖之意薛琡之議也雖然惟凖行之則可以其無所私也是以上信之下服之也其後王安石變法吕恵卿軰以為不取衆不悦者驟用之無以震動人心一時少年新進倖門大張而作福作威之術隨地而布故有不須用人特㫖御前處分金字牌指揮紛然並出而賞罰紀綱於是大壊是又不可不慮也故曰資格以畜常調聞望以待異才二者並行而不相悖此叙官之大要也仁宗時范仲淹上百官圖指其次第曰如此為序遷如此為不次如此則公如此則私况進退近臣凡超格者不宜全委之宰相吕夷簡不悦臣良勝曰人主之職在論一相相擇十使十使擇其刺史縣令之賢此姚崇之論官人之最簡而易者也以漢宣之核於名實未免王成之欺至章帝而厭苦之吏治之得人亦難矣哉必若唐太宗𤣥宗為命官之主裴行儉冦凖當審官之局又必有主張公議如仲淹者以正其後如是而有官不得人民受其弊未之有也漢靈帝時開西邸賣官入錢各有差二千石二千萬四百石四百萬其以徳次應選者半之或三分之一於西園立庫以貯之或詣闕上書估令長郡縣好醜豐約有賈富者則先入錢貧者到官然後倍輸又私令左右賣公卿公千萬卿五百萬初帝為侯時常苦貧及即位每嘆桓帝不能作家居曽無私錢故賣官聚錢以為私藏武后時引見存撫使所舉人無問賢愚悉加擢用髙者試鳳閣舍人給事中次試貟外郎侍御史補闕拾遺校書郎試官自此始時人為之語曰補闕連車載拾遺平斗量欋槌侍御史盌脱校書郎有舉人沈全交續之曰􅭢心存撫使眯目聖神皇臣良勝曰先是官爵之濫故有曰爛羊頭闗内侯竈下飬中郎將又曰貂不足狗尾續然未有拾遺補闕御史校書清要之秩亦濫至此盖武曌以匪人竊位惟恐人不已附以兹清秩為餂人之具也中宗時安樂長寜公主及皇后妹郕國夫人上官婕妤等皆依勢用事請謁受賕雖屠沽臧獲用錢二十萬則别降墨勅除官斜封付中書時人謂之斜封官肅宗時府庫無畜積朝廷以官爵賞功諸將出征皆給空名告身自開府特進列卿大將軍下至中郎將聽臨事注名其後又聽以信牒授人官爵有至異姓王者諸軍但以職任相統攝不復計官爵髙下及清渠之敗復以官爵收散卒由是官爵輕而貨重大將軍告身一通纔易一醉凡應募入軍者一切衣金紫至於朝士衣金紫稱大官而執賤役者名器之濫至是而極焉范祖禹曰官爵者人君所以馭天下不可以虚名而輕用也君以為貴而加於君子則人貴之矣君以為賤而加於小人則人賤之矣肅宗欲以茍簡成功而濫假名器輕於糞土此亂政之極也臣良勝曰物之敝以漸而至也官制亦然始若漢靈君自壊之次而后壊之又次而近習壊之其初猶官貴而貨賤有一官而至千萬至肅宗大將軍告身才易一醉則官輕而貨重矣皇明祖訓曰自古三公論道六卿分職並不曽設立丞相秦始皇置丞相不旋踵而亡漢唐宋因之雖有賢相所用多有小人専權亂政今我朝罷丞相設五府六部都察院大理寺等衙門分理天下庶務彼此頡頏不敢相壓事皆朝廷處之所以稳當以後子孫做皇帝時並不許立丞相臣下敢有奏請設立者文武群臣劾奏將犯人凌遲全家處死臣良勝曰聖祖此訓所謂洞視千古貽謀萬世者也但洪武六年命編修張淮等十人入文華堂肄業宋濂為之師聽政之暇輙幸堂中取其文親評優劣光禄給酒饌皇太子親王迭為之主給冬夏衣時賜鞍馬盖有微意在也文皇縁此遂簡解縉等七人入内閣掌制誥備顧問參預機務秩上五品仁皇以後加師保殿閣隆名先臣丘濬謂不與以相之名而與以相之實也臣又嘗聞宋儒胡安國曰古者三公無其人則以六卿之有道者上兼師保之任禹自司空進宅百揆是也宰臣或闕亦以三公下行端揆之職周公為師而位冢宰正百工是也然則聖制宏逺盖將追復乎有虞成周之盛而秦漢以下不足法也洪武四年以李守道詹同為吏部尚書聖祖諭之曰吏部者衡鑑之司鑑明則物之妍媸無所遁衡平則物之輕重得其當盖政事之得失在庶民任官之賢否由吏部任得其人則政理民安任非其人則瘝官曠職卿等居持衡秉鑑之任宜在公平以别賢否毋但庸庸碌碌充位而已永樂元年四月吏部尚書蹇義奏請明選官上諭之曰爾等職専銓部辨别邪正但當揆理不當任情揆理則以是非為進退任情則以從違為取舍慎之慎之又曰用人之道各隨所長才優者使治事徳厚者令牧民盖有才者未必皆君子有徳者必不同小人文皇又諭吏部尚書蹇義左都御史陳瑛等曰為國牧民莫切於守令守令賢則一郡一邑之民有所恃而不得其所者寡矣如其不賢當速去之盖吏部選授出一時倉卒未能悉其才行必者察所行乃見賢否其令巡按監察御史及按察司凡府州縣官到任半嵗之上者察其能否亷貪之實具奏永樂二年九月上謂蹇義等曰徃者慮各處守令未必皆得人故命御史分巡考察比聞御史至郡邑但坐公館召諸生及庶人役於官者詢之輙以為信如此何由得實如入其境田野闢人民安禮讓興風俗厚境無盜賊吏無奸欺則守令賢能可知無是數者則守令無所可取矣且詢言之弊非一端好惡不同則毁譽亦異若只憑在官數人之言以定賢否其君子中正自立小人賂遺求譽而即墨與阿之毁譽出矣故孟子論取舍必徴諸國人自今御史及按察司考察有司賢否皆令具實以聞永樂十三年正月遣御史吳文等分行天下陛辭上論之曰百姓艱難有司蔽不以聞爾等受朕耳目之寄宜悉咨訪凡朝廷所差人及郡縣有貪刻不律者執之闒茸不職及老病者悉送京師惟布政司按察司堂上官以狀來聞毋枉毋縱必合公道軍民利病宜一一奏來爾不恭命爾則有罪臣良勝曰守聖祖之諭則選舉之法無弗公明者也守文皇之諭則考課之法無弗精核者也上下各盡所長内外交修其職如此而吏有弗稱民有弗安太平之治弗能逺紹於唐虞三代之隆者皆臣下守法弗䖍之過也若我祖宗立法之意無以復加者從古人君諭下固亦多端惟我祖宗獨舉其要而唐太宗克舉其詳然有互相發者臣敢附録之以備考焉其諭左僕射房𤣥齡曰卿為百司之首佐理隂陽朕有不逮宜矯其失吏部尚書侯君集曰職在選舉發言朕聽宜屛黜不肖進用賢才户部唐儉曰朕情存兆庶誠不懈怠宜知其疾苦體其虚實工部杜楚客曰人君欲竒服異器以散府藏當諫而勿為也鴻臚卿劉善固曰今逺方之人朝貢不絶來數則煩迎送拒之便絶通和宜處之以道令懐而不怨嗚呼由唐宗之詳而執我祖宗之要審官之道幾於舜典周官矣右衍命官之制舜典曰象以典刑流宥五刑鞭作官刑朴作教刑金作贖刑𤯝灾肆赦怙終賊刑欽哉欽哉惟刑之恤哉蔡沉曰象如天之垂象以示人也典常也示人以常刑所謂墨劓剕宫大辟五刑之正也所以待夫元惡大憝殺人傷人穿窬滛放凡罪之不可宥者也流宥五刑者流遣之使逺去如下文流放竄殛之類也宥寛也所以待夫罪之稍輕雖入於五刑而情可矜法可疑與夫親貴勲勞而不可加以刑者則以此而寛之也鞭作官刑者木末垂革官府之刑也朴作教刑者夏楚二物學校之刑也皆以待夫罪之輕者金作贖刑者金黄金贖贖其罪也盖罪之極輕雖入於鞭朴之刑而情法猶有可議者也此五句者從重入輕各有條理法之正也肆縱也𤯝災肆赦者𤯝謂過誤灾謂不幸若人有如此而入於刑則又不待流宥金贖而直赦之也賊殺也怙終賊刑者怙謂有恃終謂再犯若人有如此而入於刑則雖當宥當贖亦不許其宥不聽其贖而必刑之也此二句者或由重而即輕或由輕而即重盖用法之權衡所謂法外意也聖人立法制刑之本末此七言者大畧盡之矣雖其輕重取舍陽舒隂慘之不同然欽哉欽哉惟刑之恤之意則未始不行乎其間也盖其輕重毫釐之間各有攸當者乃天討不易之定理而欽恤之意行乎其間則可以見聖人好生之本心也㨿此經文則五刑有流宥而無金贖周禮秋官亦無其文至吕刑乃有五等之罰疑穆王始制之非法之正也盖當刑而贖則失之輕宜赦而贖則失之重且使富者幸免貧者受刑又非所以為平也噬嗑亨利用獄朱熹曰物有間者齧而合之也為卦上下兩陽而中虚頥口之象九四一陽間於其中必齧之而後合故為噬嗑其占當得亨通者有間故不通齧之而合則亨通矣又三隂三陽剛柔中半下動上明下雷上電本自益卦六四之柔上行以至於五而得其中是知以隂居陽雖不當位而利用獄盖治獄之道惟威與明而得其中之為貴故筮得之者有其徳則應其占也臣良勝曰天下之患皆自間而生之也近莫若夫婦以妾媵間之而失其夫婦者多矣親莫若父子以嬖倖間之而失其父子者多矣至於君臣其勢既逺而所以間之者日有至也則君臣之保全能幾何哉故噬嗑之象取於治間治間用獄之大者也若幽王之褒姒晉獻之驪姬不特附喉之癭其何能治平勃之於産禄五王之於諸張太子重俊之於三思其成也亦大幸矣必如是而後明威之用為廣豈但勅罰議獄之足云哉漢文帝除肉刑詔曰盖聞有虞氏之時畫衣冠異章服以為戮而民弗犯何治之至也今法有肉刑三而奸不止其咎安在非乃朕徳之薄而教不明與吾甚自愧故夫訓導不純而愚民䧟焉詩曰愷悌君子民之父母今人有過教未施而刑已加焉或欲改行為善而道亡繇至朕甚憐之夫刑至斷支體刻肌膚終身不息何其刑之痛而不徳也豈稱為民父母之意哉其除肉刑有以易之及令罪人各以輕重不亡逃有年而免具為令陳季雅曰古人肉刑之法所以使民易避而難犯也故人人自愛而重犯法夫以古人用法之意若此而文帝乃以為可畏易之以笞法殊不知此法一立上之人輕用之下之人輕犯之按刑法志文帝肉刑之除乃在於刑措之後自是而下以至人輕冒法而文書盈於几閣不足以勝奸矣臣丘濬曰三代以前所謂肉刑者墨劓剕宫大辟五者是也至漢時僅有三焉黥劓斬趾而已文帝感淳于少女緹縈之言始下詔除之遂以髠鉗代黥笞三百代劓笞五百代斬趾自是以來天下之人犯法者始免斷肢體刻膚肌萬世之下人得以全其身文帝之徳大矣景帝减笞法詔曰加笞重罪無異幸而不死不可為人其定律笞五百曰三百笞三百曰二百既减笞法笞者猶不全乃更减笞三百曰二百笞二百曰一百又定箠令自是笞者得全然死刑既重而生刑又輕民易犯之讞獄詔曰獄重事也人有知愚官有上下獄疑者讞有司有司所不能決移廷尉有令讞而後不當讞者不為失欲令治獄者務先寛臣良勝曰史稱景帝刻薄任數得於晁錯為多今觀其減笞法定箠令下讞獄詔務先從寛其本心之仁者文帝之遺也其用刑之刻者晁錯之過也君子謂秦用商鞅法以毒天下而子孫自受其斃則朝服東市之誅亦錯自服其辜也與宣帝時廷尉史路温舒上書曰秦有十失其一尚存治獄之吏是也夫獄者天下之大命也死者不可復生絶者不可復屬書曰與其殺不辜寧失不經今治獄吏則不然上下相敺以刻為明深者獲公名平者多後患故治獄之吏皆欲人死非憎人也自安之道在人之死太平之未致凡以此也俗語曰畫地為獄議不入刻木為吏期不對此皆疾吏之風悲痛之詞也惟陛下省法制寛刑罰則太平之風可興於世上善其言臣良勝曰獄吏之苛固然也所以使之至是者宣帝明察之過也不然趙盖韓楊之獄亦吏之為哉善乎劉徳威告唐太宗曰人主好寛則寛好急則急吏各自愛競執深文非有教使之然畏罪之所致爾噫吏之弊也久矣獨漢唐為然乎唐髙祖入京師約法十二條及受禪命劉文靜等損益律令武徳三年頒新格伍十三條太宗詔房𤣥齡復定舊令𤣥齡以為肉刑既廢今以笞杖徒流死為五刑而又刖足是六刑也於是除斷趾法唐太宗謂侍臣曰死者不可再生用法必從寛恕有司覆一獄必求深刻作何道理今得平允侍中王珪曰但用公正善人為法官則奸偽自息帝曰古者斷獄必訊於三槐九棘之官今三公九卿是也今後大辟罪結正更取公卿議之帝嘗覽明堂鍼炙圖見人五臟皆近背針炙失所其害致死嘆曰箠者五刑之輕死者人之所重安得犯至輕之刑而或致死詔曰罪人無得鞭背胡氏曰太宗誠有意於養民者也故耳目所接其心必在於民禁笞囚背亦可謂善推其所為矣宋太祖嘗讀二典嘆曰堯舜之罪四㓙止投竄何近代法網之宻乎謂宰相曰五代諸侯跋扈有枉法殺人者朝廷置而不問人命至重姑息藩鎮當如是耶自今諸州決大辟録狀聞奏付刑部覆視之著為令仁宗詔曰獄者人命之至重也故刑罰不中則民無所措手足方盛夏長養之時有司其蠲煩獄出輕繫以奉天時夫以苛為察以刻為明豈所以稱哀矜之意孝宗詔曰比年以來治獄之吏大率巧持多端隨意援引而重輕之卿等其革巧習之弊明審克之公使奸不隱情罰必當罪聖祖吳元年命中書省定律令初以唐宋皆有成律惟元不訪古制取一時所行之事為條格胥吏易為奸弊自平武昌以來即議定律至是臺諫已立各道按察司將巡歴郡縣欲頒成法俾内外遵守乃命丞相李善長詳定諭之曰立法貴在簡當使言直理明人人易曉若條緒繁多或一事而兩端可輕可重使奸貪之吏得以夤縁為奸則所以禁殘暴者反以賊良善非良法也務求適中以去煩弊卿等宜盡心叅究凡刑名條目逐日來上吾與卿等面議斟酌之庶可以為久逺之法聖祖諭臺官劉基章溢周禎等曰紀綱法度為治之本所以振紀綱法度則在臺憲爾等執法上應天象少有偏曲則紀綱廢弛而民不得其安況或深文以為能苛察以為知若寗成郅都周興來俊臣之徒巧詆深文恣為酷虐終亦不免若于公隂徳子孫乃至貴顯天道昭然深可畏也臣良勝曰道有升降政由俗革三代之政因時損益有不可泥焉者也昔鄭鑄刑書而叔向貽書子産曰先王議事以制不為刑辟懼民之有爭心也夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也臣竊謂叔向子産皆春秋之季人也議或如是若盛王之世創制立法以酌乎前而垂於後刑典有可廢乎虞舜之時象以典刑固亦明示之也周禮懸法象魏安得謂獨無刑章也況世衰道微吏守於令民徴於法而髙下其手其害滋深自漢髙入闗蕭何定律令張蒼定章程歴代因之但通變宜人固有隨世而更者聖祖受命之初首事乎此頻經更定一恊于中又以繼元紊法之後不能一日安于煩苛之政故也是謂法天立道孰大於此者至於諭臺臣者明舉善惡之應以為勸戒嗚呼好生之徳洽于民心其在斯乎刑部奏決重刑聖祖諭之曰朕嘗命爾等凡有重獄必三覆奏以人命至重恐不得其情則刑法濫及而死者不可復生也故必欲詳審今爾等槩以重刑來奏其間固有瀆倫亂法罪不可原者亦有一時過悮情可矜者必當分别若一槩言之則輕重不分矣自今凡十惡非常赦所原者則云重刑其餘雜犯死罪許聽收贖毋槩言也淮安府山陽縣民有父得罪當杖請以身代聖祖謂刑部曰父子之親天性也然不親不遜之徒親遭患難有坐視而不顧者今此人以身代父出於至情朕為孝子屈法以勸厲天下其釋之永樂六年三法司言大辟囚三百餘人已覆訊皆實請決文皇令行人持節諭之有寃抑者許自陳又召五府六部六科官諭之曰三百餘人未必人人皆得其情實有一不實則死啣寃爾等更從容審之一日不盡則二日三日十日亦何害必使其無寃大抵人之實情難得有言語便捷輙駕虚辭掩實者有訥於言語懐實情而口不能發者須詳悉以聽亦不可以刑迫之都督程逹有罪文皇特宥之命隨西平侯沐晟立功自贖遂勅晟曰都督程逹犯死罪今惜其才特宥之使從爾立功盖其才足當一面其餘文武官有罪發立功者各量罪之輕重察才之髙下而用之用當其才成功可必既而顧侍臣曰君人之道犯極惡則不宥有小善亦不棄人孰無過論小過而棄大善則為善者怠亦孰無才若録小才而免大惡則為惡者肆故惡之難容者乃不論其才才有可用者乃畧其小過如此則善善惡惡皆不失矣臣良勝曰繄我祖宗之祥刑也其立法也明慎若此其用法也平恕若此而矜疑弼教審訊惜才徃徃行乎其間無俾大舜専美有虞為法吏者能守立法之常而推廣用法之意信乎天下無寃民矣皇明祖訓曰朕自起兵至今日十餘年人情善惡真偽無不歴涉其中奸頑刁詐之徒情犯深重灼然無疑特令法外加刑使人知所警懼不敢輕易犯法然此等權時處置頓挫奸頑非守成之君所當用以後子孫做皇帝時並不許用黥刺剕劓閹割之刑敢有請用此刑者將犯人凌遲全家處死臣良勝曰制法有經用法有權故虞書象以典刑經之謂也周官治亂國用重典權之謂也聖祖承前元之亂權以用法撥亂反正之義也而經常示後有如此訓創業垂統之仁也是以聖子神孫休平翔洽至我孝皇又刪定明例以輔律令率用平國中典之意所以衍宗社靈長之慶者端在於此臣故結言之以申重祖宗好生之徳因以警夫興事之臣輙請嚴刑以濟督責之術者右衍審刑之制繫辭曰包犧氏沒神農氏作斵木為耜楺木為耒耒耜之利以教天下盖取諸益朱熹曰天下之益莫大於此臣良勝曰耕穫之益益在下也貢賦之益益在上也惟下之益上乃益矣禹貢曰五百里甸服百里賦納總二百里納銍三百里納秸服四百里粟五百里米蔡沉曰甸服畿内之地也甸田服事也以皆田賦之事故謂之甸服五百里者王城之外四面皆五百里也禾本全曰總刈禾曰銍半藁也半藁去皮曰秸謂之服者三百里内去王城為近非惟納總銍秸而又使之服輸將之事也獨於秸言之者總前二者而言也粟榖也内百里為最近故并禾本總賦之外百里次之只刈禾半藁納也外百里又次之去藁粗皮納也外百里為逺去其種而納糓外百里為尤逺去其榖而納米盖量其地之逺近而為納賦之輕重精粗也此分甸服五百里而為五等者也臣良勝曰此貢法田賦之制止於王畿五百里則逺於五百里有土貢無田賦矣至後秦漢漕粟闗中率二十鍾而致一鍾盖有賦之於千萬里之逺者無復以五百里為限矣公劉詩曰篤公劉既溥既長既景迺岡相其隂陽觀其流泉其軍三單度其隰原徹田為糧度其夕陽豳居允荒臣良勝曰周之興也自豳始也易於剥象曰君子以厚下安宅於益爻曰利用為依遷國然則非剥不遷也非益不遷也公劉居邠迫西狄之禍匪居匪康其剥甚矣今而遷豳相土地之宜為田宅之利為益大矣若其測景以正位相岡以候氣就灌溉之源立井田之法三軍之賦於是焉定百畆之徹於是焉立雖遷國邑而居然經制有天下之畧有萬世之規在故後文王作豐曰豐水東注四方攸同武王遷鎬曰自東自西自南自北無思不服周公體國經野田以是食賦以是兵徹法之行率循公劉之舊至於相度之宜亦遵用而不能廢其卜洛則曰澗水東瀍水西惟洛食大司空土圭測騐則天地之所合也四時之所交也風雨之所㑹也隂陽之所和也是故相其隂陽觀其流泉之遺也若衛文望楚與堂降觀于桑韓獻子謂郇瑕土薄水淺有沉溺重膇之疾新田土厚水深居之不疾又周公卜洛之遺也惟我聖祖龍飛淮甸而劉基曰鳳陽雖帝鄉然非置都之地乃卜金陵則郭璞所云江東分王三百年之應也文皇遷于北都雖因潛邸適當朱熹所謂冀州風水之域盖山脉自雲中發脊為祖脊以西水西流入于河脊以東水東流入于海華山聳右泰山聳左嵩山居中而前又前列淮南諸山又前列江南諸山又前列五嶺按圖審勢今所都為最協或曰熹所云盖古冀州則又曰河東地形極好乃堯舜禹之故都今河中府是也嗚呼聖王繼統立極固有先天而天弗違後天而奉天時者南都之建先天者也北都之遷後天者也相度之宜亦公劉周公之遺法也臣叙田賦而牽比及於遷都者貢法甸服皆以王畿為中而禹都朔南暨聲教訖則五百里亦存其法制之常非必四方均正如是今所都猶禹制也商制無所考見而公劉度田本乎商助又為周制徹法之始故牽連書之以存其故焉爾初税畆公羊氏曰初者何始也税畆者何履畆而税也初税畆何以書譏何譏爾譏始履畆而税也何譏乎履畆而税古者十一而藉什一者天下之中正也多乎十一大桀小桀寡乎十一大貊小貊十一者天下之中正也什一行而頌聲作矣用田賦左氏曰季孫欲以田賦使冉有訪諸仲尼仲尼曰丘不識也三發卒曰子為國老待子而行若之何子之不言也仲尼不對而私於冉有曰君子之行也度於禮施取於厚事舉其中歛從其薄如是則以丘亦足矣若不度於禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲茍而行又何訪焉哀公問於有若曰年飢用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也對曰百姓足君孰與不足百姓不足君孰與足朱熹曰民富則君不至獨貧民貧則君不能獨富有若深言君民一體以止公之厚歛為人上者所宜深念也孟子曰夏后氏五十而貢殷人七十而助周人百畆而徹其實皆什一也徹者徹也助者藉也朱熹曰夏時一夫受田五十畆而每夫計其五畆之入以為貢商人始為井田之制以六百三十畆之地畫為九區區七十畆中為公田其外八家各受一區但藉其力助耕公田而不復税其私田周時一夫受田百畆鄉遂用貢法十夫有溝都鄙用助法八家同井耕則通力合作收則計畆均分故謂之徹其實皆什一者貢法固以十分之一為常數助法乃是九一而商制不可考周制則公田百畆中以二十畆為廬舍一夫所耕公田實計十畆通私田百畆為十一分而取其一則又輕於十一矣竊料商制亦當類此而以十四畆為廬舍一夫實耕公田七畆是亦不過十一也臣良勝曰三代之制足民以田足國以賦中正之道此其大較也然自宣公税畆而十取其二哀公用賦而軍足於農賦民之政壊矣至戰國時諸侯兼并惡經界之病已有去其籍則受田之制壊矣由賦政之壊而有鄭子産之丘賦魏文侯之増租田制之壊而有李悝之盡地力商鞅之開阡陌天下後世無復先王之舊矣臣於冉求有追責焉魯國之政惟在季氏桓子之卒遺言必召仲尼康子乃召冉求今而加賦必命以訪仲尼則其心有慕而不安於所為也哀公又問於若亦心有所疑而不安於所為也使求於季氏能申仲尼之意而善道之則田賦之用已矣且哀公之謂用不足者非直以年飢也以是為名爾魯國分於三家季氏盡征其二叔孫臣其子孟氏臣其子弟之半而貢於公固宜公之有不足也有若對以盍徹則正賦治徹於是焉一舉而正私家張公室乃仲尼所謂周公之典在則宣公之失可救而後之效尤者亦或省矣知不及此而徒以加賦附益為能此仲尼所以曰非吾徒也臣故曰於求有追責焉漢光武詔曰頃者師旅未解用度不足故行十一之税今軍士屯田粮儲稍積其令郡國收見田租三十税一如舊制臣良勝曰賦民之薄未有甚於漢制者也然自漢文恭儉國用以饒故或賜民田租之半或通賜焉而當時家給人足都鄙京師粟陳貫朽塞下積貯人行晁錯之策而邊食足支五嵗率以受爵免罪取充於田賦無與至景帝而三十税一以為常議者或謂非中正之道不可以常然而君子之取民也與其失之厚也寧薄光武時以天下墾田多不以實自占又戶口年紀互有増减乃詔下州郡檢覈於是刺史太守多為詐巧茍以度田為名聚民田中并度廬屋里落民遮道啼呼或優饒豪右侵刻羸弱時諸郡各遣使奏事見陳留吏牘上有書視之云頴川𢎞農可問河南南陽不可問帝詰吏由吏不肯服祇言於長夀街上得之帝怒時皇子東海公陽年十二在幄後言曰吏受郡敕當欲以墾田相方爾帝曰即如此何故言河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親田宅逾制不可為凖帝令虎賁將詰問吏吏乃首服如東海公對臣良勝曰以光武起自民間周知物情而覈田之令吏恣欺㒺有如此者則在其極闇弱聽人所為如方田保甲之令祇擾民爾但當時究心民隱故王成偽増户口興此弊端皆於奏使得之庶幾幽隱必逹後世髙拱穆清而曰所貴乎人主者人不識其面乂當何如董仲舒䟽曰古者税民不過十一其求易供使民不過三日其力易足民財内足以養老盡孝外足以事上供税下足以畜妻子極愛故民説從上至秦則不然用商鞅之法改帝王之制除井田民得買賣富者田連阡陌貧者無立錐之地又専川澤之利管山林之饒荒滛越制踰侈以相髙邑有人君之尊里有公侯之富小民安得不困又加月為更卒已復為正一嵗屯戍一嵗力役三十倍於古田租口賦鹽鐵之利二十倍於古或耕豪民之田見税十五故貧民常衣牛馬之衣而食犬彘之食重以貪暴之吏刑戮妄加民愁無聊亡逃山林轉為盜賊赭衣半道斷獄嵗以千萬數漢興循而未改古井田法雖難卒行宜少近古限民名田以贍不足塞兼并之路鹽鐵皆歸於民去奴婢除専殺之威薄賦歛省徭役以寛民力然後可善治也師丹䟽曰古之聖王莫不設井田然後治乃可平孝文皇帝承亡周亂秦兵革之後天下空虚故務勸農桑帥以節儉民始充實未有并兼之害故不為民田及奴婢之限今累世承平豪富吏民貲類鉅萬而貧弱愈困盖君子為政貴因循而重改作然所以有改者將以救急也亦未可詳宜畧為限天子下其議丞相孔光大司空何武奏請諸侯王列侯公主名田各有限闗内侯吏民名田皆無過三十頃奴婢無過三十人期盡三年犯者沒入官時田宅奴婢賈為減賤貴戚近習不便也臣良勝曰觀二䟽則漢之民田無幾而民之困賦亦甚文景寛征之後厄於武帝之虚耗賊莽紛更之後宜有光武之復初也嗟夫一治一亂理數之常然必極而後變變而通之存乎其人以莽奸雄竊㨿狹小漢制更為踈濶更名天下田曰王田奴婢曰私屬不得買賣男口不盈八而田過一井者分餘田予隣族君子謂不可以莽所嘗為而指以為非固也然臣以為莽實未嘗為假虚器以飾名爾其號阿衡啓金縢作大誥更王田無非託周公故迹以文奸豈其實有是政而可非哉信有之必無光武復漢制之詔也唐髙祖初定均田租庸調云丁中之民給田一頃篤疾減十之六寡妻妾減七皆以十之三為世業八為口分每丁嵗入租粟二石調隨土地所宜綾絹絁布嵗役二旬不役則收其傭日三尺有事而加役者旬有五日免其調三旬租傭俱免水旱蟲霜為灾十損四以上免租損六以上免調損七以上課役俱免唐太宗嘗讀周官書辨方正位體國經野設官分職以為民極之言慨然嘆曰不井田不封建不足以法三代之治臣良勝曰太宗亦有志於井田封建之治者封建沮於羣臣之議而井田遂不復有所施張惜也但其言曰君依於國國依於民刻民以奉君猶割肉以充腹飽而身斃君富而國亡矣故其致治斗米三四錢行旅無賫粮外户不閉裕民之政固亦效矣李翺平賦書曰人皆知重歛之為可以得財而不知輕歛之得財愈多也何也重歛則人貧人貧則流者不歸而天下之人不來由是土地雖大有荒而不耕者雖耕之而地力有所遺人日益困則日益匱是謂棄天之時遺地之利竭人之財如此者雖欲為社稷之事建不朽之功誅暴逆而威敵國徒有其心豈可得耶故輕歛則人樂其生人樂其生則居者不流而流者日來居者不流而流者日來則土地無荒桑柘日繁盡力耕之地有餘利人日益富兵日益强四鄰之人歸之如父母雖欲驅而去之豈可得耶是以與之安而居則富而可教危而守則人皆自固孟軻所謂率其子弟攻其父母自有生民以來未有能濟者也秦滅古法隳井田而夏殷周之道廢相承滋久不可卒復翺是以取可行於當時者為平賦書而什一之法存焉凡為天下者視千里之都為千里之都者視百里之州為百里之州者起於一畆之田六尺謂之步二百有四十步謂之畆三百有六十步謂之里方里之田五百有四十畆十里之田百萬四千畆百里之州五十有四億畆千里之都五十有四百億畆方里之内以十畆為之屋室徑路牛豚之所息葱韮蔬菜之所生植里之家給焉一畆之田以彊并弱水旱之不時雖不能盡地力者嵗不下粟一石公索其十之一凡百里之州有田五十有四億畆以一十九億四萬有四千畆為之州縣城郭通川大塗畎遂溝澮丘莽郷井屋室徑路牛豚之所息䓤韮蔬菜之所生植餘田三十四億五萬有六千畆畆率十取粟一石三十四萬六千有六石以貢于天子以給州縣凡執事之禄以供賔客以輸四方以禦水旱之灾皆足于是矣劉晏以户口滋多則税賦日廣其理財常以養民為本先是運闗東糓入長安者以河流湍悍率一斛得八斗至者則為成勞受優賞晏以為江汴河渭水力不同各隨便宜造運船教漕卒江船逹揚州汴船達河隂河船逹渭口渭船逹太倉其間縁水置倉轉相受給自是每嵗運糓或至百餘萬斛無斗升沉覆者船十艘為一綱使軍將領之十運無失授優勞官歐陽修賛曰人生之本食與貨而已知所以取人不怨知所以予人不乏道御之而王權用之而霸古今一也劉晏因平準法幹山海排商賈制萬物低昻操天下贏貲以佐軍興雖治兵數十年歛不及民而用足唐中僨而復振晏有勞焉可謂知取與矣胡寅曰劉晏言利之臣君子所不道也而其言有不可廢者一曰集衆務在得人勾檢簿書出納錢糓必委之士類吏惟書符牒而已此不可獨施之轉運事也二曰户口多則貢賦廣故其理財以養民為先此雖為守為令皆當力行者也三曰官多則民擾但於出鹽之郷置監官自餘州縣不復置故雖天下吏員皆當減省不貴多也四曰論大事不計小費凡事必為永久之慮此又合孔子所謂見小利則大事不成無逺慮則必有近憂也五曰事無閑劇必于一日中決之凡獄訟文移自上行下未有不以決遣為利滯淹為害者也此晏可法之五事也後周世宗嘗夜讀書見唐元禎均田圖慨然嘆曰此致治之本也王者之政自此始乃詔頒其圖法使吏民先習知之期以一嵗大均天下之田臣良勝曰世宗有志於復均田之制似非五代主也且其延儒學考制度修禮樂正刑統皆存逺畧毁佛寺三千三百三十陸所即儀鑄錢斷識不疑王環以不降賞劉仁瞻以堅守録棄馮道疎張美好惡予奪皆非衰世之所宜有司馬光以為近於王道之無偏無黨則似過矣世宗以明察威世用法過嚴羣臣職事小有不舉必寘之刑是以七齡嗣帝而託孤寄命更無其人終歸於亡而已宋真宗時陳恕久領三司使帝命條具中外錢榖以聞恕久不進屢詔促之恕對曰陛下富於春秋若知府庫充實恐生侈心是以不敢進也帝嘉之至是以疾辭帝曰卿求一人可代者聽卿去爾恕薦冦凖凖檢恕前後改革興立之事類以為册及其所出榜别用新板躬至恕第請判押恕亦不讓一一押之自是計使無不循其舊貫龜鑑曰陳晉公不答錢穀之問而曰天子富於春秋若知府庫充實恐生侈心仁人之言其利溥哉何其簡而切婉而直邪嗚呼丁謂上景徳會計録而封禪定林時上祥符會計録而天書成陳公之為慮逺也臣良勝曰宋興田制無改於舊故太祖受命但聞賑貸諸州勸課農桑而已積三世至真宗而恕之所掌必甚殷富是以不上恐生侈也大端太祖立國之初恒任義理而諸臣亦多以儒學進率恥言利故恕不具聞準亦循其故案無所興革但循其故而足非惟恕之事君可法而凖之繼恕亦可法也丁謂林時已不足言安石用於神宗方欲以經術為經世務而首事青苗錢大變舊章而祖宗之法幾於大廢非特恕凖之罪人又謂時之罪人也蘇洵田制論曰今雖使富民皆奉其田而歸諸公乞為井田其勢亦不可得何則井田之制九夫為井井間有溝四井為邑四邑為丘四丘為甸甸方八里旁加一里為一成成間有洫其地百井而方十里四甸為縣四縣為都四都方八十里旁加十里為一同同間有澮其地萬井而方百里百里之間為澮者一為洫者百為溝者萬既為井田又必兼備溝洫溝洫之制夫間有遂遂上有經十夫有溝溝上有畛百夫有洫洫上有塗千夫有澮澮上有道萬夫有川川上有路萬夫之地盖三十二里有半其間為川為路者一為澮為道者九為洫為塗者百為溝為畛者千為遂為經者萬此二者非塞溪壑平澗谷夷丘陵破墳墓壊廬舍徙城郭易疆隴不可為也縱使能盡得平原廣野而遂規畫於其中亦當驅天下之人竭天下之粮窮數百年専力於此不治他事而後可以望天下之地盡為井田盡為溝洫而又為民作屋廬於其中以安其居而後可噫亦已迂矣井田成而民之死其骨已朽矣臣良勝曰若洵之論則井田之制決不可復也臣愚以為今雖井田克復如三代之舊決不能行也古者封建諸侯世國大夫世禄不若後世郡縣吏禄之煩也兵農為一不若後世邊鄙兵衛之養也力役有數家征三人嵗不過三日不若後世征輸調發供億之浩也故臣愚以為欲行井田須自復封建始復封建則必削郡縣罷官吏省兵衛弛貢舉諸凡供億力役一切革絶而後可言也迂儒曲士恒欲法古以徼時論而不知深究以益時惑幸聖明裁察林勲本政書曰國家兵農之政宜倣井田之制使民一夫占田五十畆其有羡田之家毋得市田其無田與㳺惰未作者皆驅之使為𨽻農以耕田之羡者而雜組錢榖以為什一之税每十六夫為一井每井賦二兵馬一匹匹婦之貢絹三尺緜一兩非蠶鄉則布六尺麻二兩其後朱熹甚愛其書陳亮亦曰此書考古騐今思慮周宻世之為井田之學者無加理宗時賈似道以國計困於造楮富民困於和糴思有以變法而未得其説知臨安府劉良貴浙西轉運使吳勢獻買公田之策似道乃命侍御史陳堯道正言曹孝慶上疏言一事行而五利興帝從之詔買公田置官田以劉良貴提領陳訔為檢察副之良貴請下都省嚴立賞罰究歸併之弊帝曰求免和糴無如買逾限之田為良法然東作方興權俟秋成施行似道憤言上疏乞去何夢然陳堯道力勸帝勉留帝遂詔似道視事帝曰當始於浙西諸路視以為則似道乃條陳其制帝悉從之似道首以己田在浙西者萬畆為公田倡臣良勝曰青苖之法實亡北宋而安石主之時則有若吕恵卿為之附和李參為之倡首也公田之法實亡南宋而似道主之時則有若劉良貴吳勢為之獻策陳堯道曹孝慶為之役徒也㨿其初論猶為足軍餉省和糴停楮幣平物價安富屋有所利也其後至抑買民田大損其價假以度牒告身遂成公奪有司爭相迎合以買田多者為功皆偽増租數至有不足復取足於田主六郡之民無不失業蕩家者至似道竄逐而葉李贈言曰公田闗㑹今何處仔細思量真自誤似道俯首謝之悔何及焉人臣謀國務於變法奪民尚戒之哉聖祖謂中書省臣曰予嘗親厯田野見人民凋弊土地荒蕪失業者多盖因久困兵革生息未遂譬之觸熱者思得清凉冒寒者思就温燠為之上者固當念之且如太平應天宣城乃吾渡江開創之地供億先勞之民其有租賦宜與量免少甦民力省臣傅瓛對曰恤民王者善政主上念之及此真發政施仁之本也民之受賜如大旱之得霖雨其善當何如聖祖因嘆曰吾昔在軍中嘗乏粮空腹出戰歸得一食雖甚粗糲食之甚甘今尊居民上飲食豐美未嘗忘之況吾民居於田野所業有限而又供需百出豈不重困於是免太平府租賦二年應天宣城等租賦一年洪武三年濟南府陳修上言北方郡縣近城之地多荒蕪宜召郷民無田者墾闢户率十五畆又給二畆與之種蔬有餘力者不限頃畆皆免三年租税其馬驛巡檢司急逓舖應役者各於本處開墾無牛者官給之守禦軍中逺者亦移近城若王國所在近城存留五里以備練兵牧馬聖祖從之臣良勝曰元政不綱賦政無藝聖祖繼治視之先代革命可以因其故習者萬倍其難也然觀其賜大平諸郡之租則所以寛南方之民可占也觀其從濟南之議則所以來北方之民可占也聖人之心真天地之覆幬也然以輿圖既廣户厯為難而當時奉行之吏寛嚴異志其間貢賦厚薄庸有未盡當於聖心者即如處州之賦舊額一萬三千石及軍興而加至十倍御史中丞章溢言之聖祖曰吾勞處民久矣遂從其舊尚書周忱撫治江南亦奏減官田額八十餘萬石宣廟可之故天下之賦因時損益如是類者甚衆然終不敢損上供之數吾民得遂生養於今百七十年誠不知帝力何有於我也右衍田賦之制師貞丈人吉无咎朱熹曰師兵衆也下坎上坤坎險坤順坎水坤地古者寓兵于農伏至險於大順藏不測於至静之中又卦惟九二一陽居下卦之中為將之象上下五隂順而從之為衆之象九二以剛居下而用事六五以柔居上而任之為人君命將出師之象故其卦之名曰師丈人長老之稱用師之道利於得正而任老成之人乃得吉而旡咎戒占者必如是也六月詩曰六月棲棲戎車既飾四牡騤騤載是常服玁狁孔熾我是用急王于出征以匡王國朱熹曰成康既沒周室寢衰八世而厲王胡暴虐周人逐之出居于彘玁狁内侵逼近京邑王崩子宣王靖即位命尹吉甫帥師伐之有功而歸詩人作歌以叙其事如此司馬法冬夏不興師今乃六月而出師者以玁狁甚熾其事危急故不得已而王命於是出征以正王國也臣良勝曰師者聖人之所甚重也故師出以喪禮行命下之日三軍涕泣無非以哀敬為本也宣王興衰撥亂之主而六月出師豈其所得已哉當玁狁内侵宗社安危所係疆宇之大變生民之大患有不能以一息以自安者是以寧冒出師之戒而不忌也禮稱墨衰絰而即戎伯禽有為為之也是門庭之冦雖視䘮而金革之事無避也李晉王薨梁兵壓境而莊宗有夾寨之師周太祖殂契丹入冦而世宗決髙平之戰君子曰君行為顯親臣行為愛君況宣王之師宗社安危所繫又何以時月之制為限哉然曰以正王國非正王國則古制固有不可違者亦詩人之微意也周官司馬掌邦政統六師平邦國蔡沉曰夏官卿主戎馬之事掌國征伐統御六軍平治邦國平謂强不得凌弱衆不得暴寡而人皆得其平也軍政莫急於馬故以司馬名官何莫非政獨戎政謂之政者用以征伐而正彼之不正王政之大者也臣良勝曰玩易之占則知用兵之常也考詩之故則知用兵之變也守周官之職則知兵務之重而不可輕也周禮司馬法曰井十為通通為匹馬三十家士一人徒二人通十為成成百井三百家革車一乗士十人徒二十人天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹故稱萬乗之主春振旅以蒐夏茇舍以苖秋治兵以獮冬大閲以狩講武事焉齊桓公用管仲作内政而寓軍令五家為軌軌為之長十軌為里里有司四里為連連為之長十連為郷郷有良人以為軍令是故五家為軌故五人為五軌長率之十軌為里故五十人為小戎里有司帥之四里為連故二百人為卒連長帥之十連為郷故二千人為旅郷良人帥之五郷一帥故萬人為一軍五郷之帥帥之成公元年三月作丘甲胡安國曰作丘甲益兵也古者九夫為井四井為邑四邑為丘四丘為甸甸地方八里旁加一里為成所取於民者出長轂一乗此司馬法一成之賦也為齊難作丘甲益兵偹敵重困農民非為國之道其曰作者不宜作也唐太宗問李靖楚廣與周制何如靖曰周制一乗步卒七十二人甲士三人以二十五人為一甲凡三甲共七十五人然則一丘所出十有八人積四丘而具一乗爾今作丘甲者即丘出一甲是一甸之中共百人為兵矣汪克寛曰兵制之變始壊於齊之内政而家一人焉繼壊於晉之州兵而家五人焉長勺之戰桓公自謂帶甲十萬車五千乗楚薳啓疆有晉十家九縣長轂九百其餘四十餘守四千叔向亦謂寡君有甲車四千乗則兵制之増益於古可知矣厥後楚之乗廣魏之武士秦之戍卒窮兵極詐以快貪殘而孫吳商白之徒皆身誅戮於前而國滅亡於後然兵農既分更歴千載雖有明君賢臣不能復古亦可嘆哉春秋作丘甲之書垂戒深矣漢髙祖踵秦置材官於郡國京師有南北軍南軍為宫城兵衛尉主之北軍為京城兵中尉主之南北二軍不出民兵散在郡國有事以羽檄召之以偹軍旅有輕車騎士材官樓船之别平地用車騎山陵用材官水泉用樓船以秋後講肄課試之文帝躬戎服親御鞍馬從六郡良家材官之士騎射上林講習戰陣聚天下精兵於壩上棘門細栁武帝平百粤内増中壘屯騎步兵越騎長水胡騎射聲虎賁八校外有樓船皆嵗時講肄光武以幽兾并兵定天下始於黎陽立營領兵騎常千人以謁者監之號黎陽兵而京師南北軍如故唐髙祖置府兵其制始於西魏後周而備於隋為十二衛帝因之置驃騎車騎兩將軍領之析闗中為十二道皆制府兵以𨽻後改道為軍其法一寓於農每軍置將副各一人以督耕戰以車騎府統之及天下既定廢十二道改驃騎為統軍車騎為别將唐太宗更號統軍為折衝都尉别將為果毅都尉諸府總曰折衝府兵天下十道置府六百二十四而闗内二百六十有一皆以𨽻諸衛凡府三等兵千二百為上千人為中八百人為下府置折衝都尉一人左右果毅都尉各一人長吏兵曹别將各一人校尉六人士以三百人為團團有校尉五十人為隊隊有正十人為火火有長每人甲兵裝粮皆自備并其介胄戎具藏於庫有所征行則視其人而出給之唐𤣥宗時宰相張説請一切募士宿衛號曰彍騎分𨽻十二衛總十二萬人為六畨唐兵志曰夫置兵所以止亂及其弊也適以為亂又其甚也至困天下以養亂而遂至於亡焉盖唐有天下三百年而兵之大勢三變其始盛時有府兵府兵後廢而為彍騎彍騎又廢而方鎮之兵盛矣及其末也强臣悍將兵布天下而天子亦自置兵于京師曰禁軍其後天子弱方鎮强而唐遂以亡矣范祖禹曰唐制諸衛府兵有為兵之利而無養兵之害田不井而兵猶藏於民後世最近古而便於國者也開元之時其法寢隳非其法不善盖人之失也張説不究其所以而輕變之兵農既分其後卒不能復古則説之為也夫三代之法出於聖人及其末流亦未嘗無弊救之者舉其偏以補其弊而已若并其法廢之而以私意為一切茍簡之制則先王之法其存者幾何天下之務常患於議臣之好改舊章此所以多亂也吕祖謙曰太宗既分天下為十道以軍鎮城戍之兵為十二道而置使處之總之以都督者此其為方鎮已成之兆特待時而張爾以天下之極邊為天下之重鎮而撫之以都督其品秩與十六衛將軍同乃在六尚書之上而與左右僕射為一流所謂五大不在邊者果若是乎天寳之際沿邊置十節度經畧使凡鎮兵四十九萬馬八萬餘匹而安禄山遂以范陽反當是時府兵之法已再壊矣其初壊也張説募兵補之謂之彍騎又其壊也折衝諸府無兵可交李林甫遂停上下魚書但有兵額存爾而六軍宿衛皆市人不復受甲更此二壊掃地無餘於是外兵盛强其反者以鎮兵討平之者亦以鎮兵而居重御輕之意不復存矣今謂唐兵三變之説者曰府兵變而為彍騎則可謂彍騎變而為藩鎮特未之考爾蘇軾曰唐太宗既平天下分四方之地盡以沿邊為節度使而范陽朔方之兵皆𢃄甲十萬上足以制邊鄙之難下足以偹匹夫之亂内足以禁大臣之變而將帥之臣常不至於叛者内有重兵之勢以預制之也貞觀之際天下之兵八百餘府而在闗中者五百舉天下之衆而後能當闗中之半然而朝廷之臣亦不能至於乗隙伺釁以邀大利外有節度之權以破其心也故外之節度有周之諸侯外重之勢而易置從命得以擇其賢不肖之才是以人君無征伐之勞而天下無世臣暴虐之患内之府兵有秦之闗中内重之勢而左右謹飾莫敢為不義之行是以上無逼奪之虞下無誅絶之禍盖周之諸侯内無府兵之威故䧟於逆亂而不能以自止秦之闗中外無節度之援故脅於大臣而不能以自立有周秦之利而無周秦之害形格勢禁内之不敢為變而外之不敢為亂未有如唐制之得者也天寳之際府兵四出而徳宗之世禁兵皆戍趙魏是以禄山朱泚得至于京師由此觀之唐之衰其弊在於外重而外重之弊起於府兵之在外非制之失乃後世之不用也肅宗以内侍魚朝恩領神策軍悉以其半歸禁中然尚未得與北軍齒至是魚朝恩以神策軍從上屯苑中其勢寢盛分為左右廂居北軍之右朝恩既典禁兵寵任無比勢傾朝野上令元載為方畧擒而縊殺之胡寅曰古今皆謂宦官難去者以其掌兵也是則然矣而或不然輔國元振朝恩相繼掌兵氣勢隆重然代宗去之而無肘腋反噬之變是知宦官非難去顧人主之喜怒何如耳其至於無可奈何者以人主無意於可為之時及不可為然後為之故也宋太祖監五代方鎮之弊聚勁兵於京師定軍制紀律詳盡其軍制親衛殿禁之名其營立龍虎日月之號分領於殿前侍衛二司尋詔二司揀其驍勇者升為上軍瘦弱者退為剰貟令諸路選所部兵送至闕下以補其缺後復簡强壯者為之兵様散降諸道令依様招收長吏部送詣闕分𨽻諸軍帝御講武殿親臨試之其法刻木為箭鏃褁以氊罽命引强者兩兩相射又以木挺為馬撾施韋鞘俾馳騎相擊皆取其不避者分等級以遷𨽻之又出内庫錢募諸軍子弟數千人鑿大池於京城之南引蔡水注之造樓船選精卒號水虎㨗習戰池中又詔諸道選材力技藝過人者收𨽻禁軍以備宿衛厚其粮賜常躬自較閲訓練皆以一當百太宗親閲諸軍叅考勞績升詘之曰兵雖衆茍不簡閲與無兵同先帝訓練之方咸盡其要朕因講習漸至精鋭倘統帥得人何敵不克又幸金明池觀習水戰曰示不敢忘戰爾臣良勝曰漢武帝時征越嶲欲通身毒國而為昆明所蔽昆明有滇池方三百里故武帝鑿池象之以習水戰期必取之也太祖之鑿金明池以習戰者為取江南猶武帝意也太宗相承以為習練之常其後真宗復選江淮水軍習之而淮南諸州亦選教習欲何為哉是乃為南渡之兆爾神宗以唐李靖兵法無全書而見之通典命王震解釋又令内侍李憲以馬步教習之謂憲曰黄帝制八陣武侯造圖桓温以為常山蛇勢盖即九軍陣法韓擒虎以授靖時知者多故作六花陳八陳即九軍九軍方陳也六花陳即七軍七軍圓陳也陳以圓為體方陳者内圓外方圓陳者内外俱圓六軍者左右虞候各一軍為二虞候左右廂各二軍為四廂軍與中軍為七軍八陳者加前後二軍共為九軍朕采古酌今營陳同一法止曰營行曰陳營為正陳為竒也臣良勝曰神宗垂情兵事亦已久矣思欲試而用之故王韶上平虜策即以為竒謀而安石揣知其意青苖保甲無非假足食足兵以為熈河之役之費也故韓琦曰始為陛下謀者必曰祖宗以來因循茍且治國之本當先富强則可以拓土宇収復唐之故疆可謂得其心矣然當時文武重望不乏其人而制法典兵一付之内侍李憲此其不足以有為即是可占至契丹使至剖地畀之而不知有所制馭則平時坐談兵陳何為也哉聖祖經理淮甸親閲將士命鎮撫居明率軍士分隊習戰勝者賞銀十兩其傷而不退者亦勇敢士賞銀有差且徧給酒饌勞之仍賜傷者醫藥因諭之曰刃不素持必致血指舟不素操必致傾溺弓馬不素習而欲攻戰未有不敗者吾故擇爾等練之今爾等勇徤若此臨敵何憂不克爵賞富貴惟有功者得之顧謂起居注詹同等曰兵不貴多而貴精多而不精徒累行陳近聞軍中募兵多冗濫者吾特為戒之兾得精鋭庶幾有用也臣良勝曰立法彷古也而議法有不必泥於古者也守法從古也而行法有不必泥於古者也古以井田具賦農夫為兵時有車戰之法也約日交綏曲直勝負兵用而不用將戰而不戰以農為兵而可也自荀吳敗狄毁車崇卒乗為參伍後世變詐相尚若復籍農以兵是驅犬羊以填飢虎之喙也古無重鎮置大帥不在邊時有封建之制也秦當西戎晉當北燕趙當東夷吳楚當南粤周室居中無重鎮而可也自秦罷侯置守無所専統疆場之患王室當之若無専使是土崩而瓦裂之也古者兵無用養器具自偹至張説募兵宿衛而唐始困民以養兵京師旬日募十三萬而鎮兵四十九萬開元之前嵗供衣粮費不過二十萬天寳以後嵗用衣千二十萬匹粮百九十萬斛公私勞費已不克堪至宋蘇軾又曰自唐以來民不知兵兵不知農農出糓帛以養兵兵出性命以衛農天下便之雖聖人復起不能易也酌之古今參之論議則兵戎之制固有權度於胷中如聖朝之制參伍錯綜皆擇善而從之者也若京營禁兵𨽻十二萬即宋集勁兵于京師之制也而别有親軍宿衛捕卒班操又漢南北軍之制也薊州保宣定府三鎮連十萬衆並實畿甸呼吸可應即秦闗中重内之制也遼東鎮兵七萬有畸以制東徼大同延綏寧夏甘肅四鎮聨絡一十八萬以禦西北五鎮分𨽻僅足以當京營畿甸之數雖建帥府而兼以文吏統之即唐藩鎮之兵而非藩鎮之帥也南郡中都留守𨽻衛兵八萬有畸山東入衛京班餘三千三百有畸山西一萬九千五百有畸陜西二萬三千九百有畸河南入衛京班餘一萬五千九百有畸浙江三萬九千九百有畸江西一萬二千七百有畸湖廣七萬一千六百有畸四川九千六百有畸福建四萬八千二百有畸廣東三萬九千四百有畸廣西一萬二百有畸雲南八萬一千四百有畸貴州三萬二千九百有畸卒𨽻衛所即唐府兵之制而都司所掌猶折衝府之遺也宣調應時如身之使臂臂之使指萬無尾大不掉之患所養之費皆出於民而邊鎮之儲又兼之以鹽𣙜飛輓則亦不専於民也北衛之有班操南衛之有漕卒習勞居守水陸應援率有長慮深識行乎其間叅之既徃殆無遺慮矣祖宗貽謀真萬世之長策也法久而弊雖三代亦所不免要之用法之弊非立法之弊也凡今言弊者必曰京軍不可用邊軍不可缺二者而已盖以京軍習於晏安掌於貴將一旦驅以從事更須邊卒䕶持萬有成功攘奪稱首邊伍時發清勾多是南方孱弱不耐寒勞尋復逃散屢補屢逃逓年幇解誠為無益於軍有損於民者也然而法不能以盡廢伍不可以長虚若在邊用曹瑋以廢地募軍之法則舍餘軍餘補其正伍全粮全賞足以養生餘力餘地可致殷盛人或樂從原額可足其驍騰慣戰視新補罷卒一人而當十矣何患邊卒之多缺乎京營之將必選久厯戰陣之人或用种師道銀的教射之法處以優任免其輕罰日久人慕技業専精宋初禁軍一以當百何今日京軍獨不可用乎二弊之除正煩方尺之令爾但臣嘗聞范祖禹曰天下之患每生議臣之好亂舊章是則又有可憂者御史中丞章溢子存道部郷兵萬五千人從李文忠入閩閩平詔存道以兵從海道北征溢持不可曰鄉兵農人爾許以事平歸農今復調之是爽信也繼論曰兵已入閩者俾還鄉里昔嘗叛之民宜籍為軍使北征一舉而恩威著矣上喜曰孰謂儒者果迂闊哉非先生為朕一行無能成此事者永樂十八年將西征親藩奏江西所垜集民兵可徴出奏示學士楊榮對曰陛下已命罷之今復徴非信遂寢臣良勝曰孔子有云足食足兵民信之矣自古皆有死民無信不立信之重於兵也審矣國初君臣當戎馬急遽中而論議施罷必主於信真得孔子之心也洪武四年春正月聖祖謂中書省臣曰今日天寒有甚於冬京師尚爾況北邊荒漠之地氷厚雪深吾守邊將士甚艱苦中書其以府庫所儲布帛製緜襖運赴蔚朔寧夏等處以給將士省臣對曰守邊將士衣襖嵗有常供無庸再運聖祖曰將士雖有常供朕固知之特以今天寒異於常時故命加給爾古人一夫不獲引咎在躬況守邊將士尤朕所深念者其給之勿緩臣良勝曰天下之兵一也聖祖獨優厚於守邊者盖有深意存也自封建制廢而天下之禍每起於外自漢以後募民徙塞至於遣戍雖宰相子弟亦必應行唐時衣襖皆自宫中製之人君雖深居九重之中而憂念及萬里之外此邊士所以㤀死也我朝邊士皆有定籍無更畨之擾有衣粮之厚而聖祖推念又復加賜若是昔楚莊巡撫三軍有如挾纊矧兹實賞其感激效死當何如哉文皇謂忠誠伯茹瑺兵部尚書劉㒞曰太祖髙皇帝嘗戒飾諸將校曰軍士家屬既衆月粮有限衣食不足不免飢寒加以爾等無惻隱之心侵漁私役徃徃逃亡缺伍故當時私役者一日追工錢一貫仍論其罪今切慮内外將校不能撫恤軍士比昔有加所以逃亡者衆自今計其逃亡之數以論罰如百戶有逃一人者減其俸之半十人者全不給降充總旗四十人降充小旗五十人發充軍其千戶逃軍十倍於百户指揮逃軍五倍於千戸者減俸逓降一如百戸之例臣良勝曰方今負經世之畧者必曰軍伍日寡法不能以追補軍官日濫勢不能以裁革故清查條例日以繁多責數勾解重貽民累一言裁損怨議沸騰宣廟嘗諭兵部尚書張本曰近年有訴妄解充軍乃有司之過彼意謂朝廷所重在軍不知民乃國家根本則清補之弊在昔巳然不知今日又何如也英廟時軍官俸一季支銀一十四萬餘兩大學士李賢言曰軍官有増無減如人有生不死無處著矣自古軍功者雖以金書鐵劵誓以永存然其子孫不一再犯法即除其國豈有累犯惡罪而不革者今若因循久逺天下官軍多民少供其賦必至困窮而邦本弱矣上曰此事誠可慮當徐圖之則軍官之濫在京既然不知在邊境在天下又何如也臣愚以為存聖祖優厚邊士之心而舉文皇督責軍職之例又何軍伍日寡軍官日濫之足憂哉清查之例可以日省俸粮之給可以日裕所謂足食足兵民信之矣盖不必别創新法過為危論一取𠂻祖宗之法而自足也周官校人掌王馬之政辨六馬之屬曰種馬戎馬齊馬道馬田馬駑馬天子十有二閑馬六種邦國六閑馬四種家四閑馬二種漢文帝初年廐馬止百餘疋下取給於邊郡班氏居塞則致馬數千羣橋桃居塞則致馬千疋其後邊郡之盛則三十六苑分置西北邊其良者以給乗輿武帝征伐繁興益盛養馬以西河上郡為萬騎太守而馬政始掌於郡二千石矣蓄積廐馬至四十萬自遣衛霍之師頻出塞馬大耗焉唐髙祖得牝馬三千疋於赤岸澤徙之隴右命太僕張萬嵗掌之萬嵗善於其職自貞觀至麟徳馬蕃息至七十萬疋分八坊四十八監置使以領之𤣥宗時牧馬二十四萬匹以太僕卿王毛仲為内外閑廐使少卿張景順副之至四十二萬匹帝東封以牧馬數萬匹從色别為群望之如雲錦焉徳宗建中元年市闗輔馬三萬實内廐元和中命中使以絹一萬市馬河曲始置四十八監㨿隴西金城平凉天水員廣千里繇京度隴置八坊為會計都領其間善水草腴田以給貧民及軍吏宋太祖以五代時監牧多廢官失其守國馬不蕃息時但有左右飛龍院帝始置養馬二務嵗遣中使詣邊州市馬自是閑廐始充太宗時内廐馬既充牣始分置諸州牧養雍熈初禁邊臣於邊外市蕃馬勿得虧其直自河北洛陽至許州鎮凡十八監通利軍十牧草地圖慮多侵民田乃遣中使檢視畫其疆界又於諸州畜牝馬萬五千匹逐水草放牧不費芻秣所生駒可資軍用真宗羣牧司總内外馬政嵗遣判官一人巡行諸監取孶生駒二嵗以上者㸃印之仁宗時丁度謂羣牧吏上言天聖中牧馬至十餘萬其後言者以天下無事遂廢八監陜西河東嵗市馬一萬二百猶能補京畿塞下之闕自用兵數年所市馬比常嵗特三之一請下令河東京東京西淮南籍丁壯為兵處有能畜一戰馬者與免二丁仍不升戶以偹緩急神宗留意馬政樞宻使郤亢以牧馬餘田修稼政以資牧養之利而羣牧司言馬監草地四萬餘頃今以五萬為率一馬占地五十畆大名廣平四監餘田無幾宜且仍舊而原武軍鎮洛陽沙苑淇水安陽東平等監萬七千頃可賦民以芻豆從之臣良勝曰兵政以馬為先周官以命夏官之名可知也厯代修令其法備矣國家法古為治集其善者在内設太僕寺以總天下馬政率用士人而在外苑寺長貳亦然時有異擢特用以勵之周命伯冏為大正其不輕而重可知也市馬於河西猶昔也嵗遣巡行猶昔也攷駒㸃印猶昔也牧地畫疆猶昔也占畆之數猶昔也芻豆之賦猶昔也分養諸州猶昔也然而征行大耗亦猶昔也以為無事而廢監亦猶昔也考其故而今之利病從可知也臣嘗聞仁廟時兵部尚書李慶言民間畜馬蕃息請令朝覲正佐官領馬嵗課其駒學士楊士竒奏言非貴賢賤畜之意此令之失非小遂止已領者准官貟乗馬例不責生息由此觀之則當時馬之充牣將無所容近年以来内廐所畜損價發賣以省芻秣國馬大耗卒有軍興増價市補而不得矣諸省之備用畿輔之寄養其弊滋深將至民逃地廢而莫之為所是不能不煩經國之議以厪聖明之決也臣敢牽連附議于末曰大叚今之馬政襲用宋人保馬之法而弊或甚焉宋人聽民願領今則計戶論丁而配與之宋人免其體量錢及他征役今則征輸如故也使其有損於民而有益於官猶或可也今所養馬多不堪乗朋戶輪餵芻秣不時外瘦中乾馳驟中土已為不任況驅以馳騁於邊塞乎且養馬著令生必報數死必責償死者未償而生者揑報嵗嵗増陪家家困敝朋錢買補公私費耗殆數十金及領給官軍月支芻豆那移剋減馬随瘦傷展轉相仍均為虐政故諺云馬領於官者有名而無實馬養於民者無益而有損或者建議清出原額牧塲水草必為兩便太僕等官誠得如王毛仲張景順者考其遺法通以時宜昔在民者官牧而給之今在官者比伍而養之在民粮草照地起科以為買給之費在軍倒死同伍買償以防剋料之奸縱使未獲其利亦或可省其􅊣矣臣嘗聞宋臣文彦愽曰議者欲賦牧地於農民歛其租課散國馬於編戶責其孳息即不知所賦之地肥瘠皆可耕乎所歛征賦豐㓙皆可得乎復不知戶配一馬縶之維之皆可蕃息乎既不蕃息後將何繼乎此皆老成長慮若為今日預言之者臣故敢并録以為聖明獻右衍兵戎之制盤庚曰兹予大享于先王爾祖其從與享之作福作災余亦不敢動用非徳蔡沉曰兹我大享于先王爾祖父亦以功而配食于廟先王與爾祖父臨之在上質之在旁作福作災皆簡在先王與爾祖父之心我亦豈敢動用非徳以加爾乎臣良勝曰人臣而配食于先王之廟此崇徳報功之盛典也盤庚推言及其後人亦不敢動用於非徳況當其身乎洛誥曰伻来毖殷乃命寧予以秬鬯二卣曰明禋拜手稽首休享蘇氏曰以黒黍為酒合以鬱鬯所以祼也宗廟之禮莫盛於祼王使人來戒勅庶殷且以秬鬯二卣綏寧周公曰明禋曰休享者何也事周公如事神明也明堂位曰成王以周公為有勲勞於天下是以封周公於曲阜地方七百里革車千乗命魯公世世祀周公以天子之禮樂王安石曰周公能為人臣所不能為之功故可用人臣所不可用之禮樂程顥曰是不知人臣之道也夫居周公之位則為周公之事由其位而能為者皆所當為也周公乃盡其為臣之職耳豈得獨用天子之禮樂哉成王之賜伯禽之受皆非也臣良勝曰成王昔命微子於宋以賔王家必曰慎乃服命以率由典常其慮至深逺也盖偪生於僣僣生於疑宋爵上公又王者之後尤易於僣偪而可疑者故所以命之必慎服命以守典常庶免於僣偪之患豈其於魯而命其僣越至是哉故先儒有曰成王於宋謹慎如此必無賜周公以天子禮樂之事豈周室既衰魯竊僣用託為成王之賜伯禽之受乎漢髙祖封功臣爵誓曰黄河如帶泰山若礪國以永存爰及苖裔臣良勝曰髙祖定天下列元功十八侯位次而譬之於獵曰諸將狗也蕭何發縱指示人也可謂明而公矣沙中偶語張良猶曰所封皆故人所誅皆仇怨是以其後異姓王者八人侯者一百四十四人其封誓之詞若此盖欲其傳之永永與國咸休也終髙祖世七王皆絶惟吳芮尚存至武帝時列侯存者止四人則山河帶礪之誓亦安足恃哉縱曰世禄之家鮮克由禮多自取敗然在武帝時以酎金爵奪者一百六人意有不樂而文致之者亦多以蕭何首功至景帝時以祀絶乃封其孫嘉為後庶幾存一綫之緒足盖前人之愆爾宣帝思股肱之美乃圖其人於麒麟閣凡十一人法其形貌署其官爵姓名惟霍光不名曰大司馬大將軍博陸侯姓霍氏次曰衛將軍富平侯張安世車騎將軍龍額侯韓増後將軍營平侯趙充國丞相髙平侯魏相博陽侯丙吉御史大夫建平侯杜延年宗正陽城侯劉徳少府梁丘賀太子太傅蕭望之典屬國蘇武皆有功徳知名當世是以表而揚之吳養心曰定策如博陸濟治如丙魏靖邊如充國寘之前列夫誰曰不然安世以謹厚聞延年以安和著蕭望之梁丘賀以文學顯其他如韓如劉不過一藝一能之士未見有卓然之功也而蘇武大節凛然乃寘之於羣臣之後帝豈無見於此哉盖麒麟之圖繪正逺人觀聽之所係彼其平日之所畏慕者知有武而已一旦顧瞻傑閣厯數元勲而疇昔敬畏之人乃居羣臣之後必相顧駭愕私相告語以中郎之大節如此且居羣臣之下則凡偃然其右者功徳顧可量與將益信中國人才之盛而隱然有虎豹在山之勢矣臣良勝曰是非優劣每公於無所弊而已而好惡不可以有所欺也宣帝寘蘇武於末謂足以誇示外藩而重中國也彼博陸之尊崇若此獨不知乎赤族之慘夫誰不知崇虚禮以掩之將無起刻薄少恩之議乎是近於欲盖而張之也且夫長吏賢否於府史市卒或不能得而深山窮谷耕樵之夫乃稱量銖兩而不失以其無所蔽也外藩於中國人才無所忌也無所爭也何所蔽乎耶律防至王徳用與射玉津園防曰天子以公典樞宻而用富公為相將相得人矣及司馬入相則曰中國相司馬慎無生事朱熹在潭州曰朱先生安在是諸賢之在中國時或毁譽失真而外藩定論乃萬世之不可易則凡是非優劣豈得而欺之也哉故曰中國之待外藩亦推其至誠可也明帝思中興功臣乃圖畫二十八將於南宫雲臺以鄧禹為首次馬成吳漢王梁賈復陳俊耿弇杜茂冦恂傅俊岑彭堅譚馮異王霸朱祐任光祭遵李忠景丹萬修盖延邳肜姚期劉植耿純臧宫馬武劉隆又益以王常李通竇融卓茂合三十二人馬援以椒房之親獨不與焉臣良勝曰君臣之際相成之難而相保之尤難也榮於當世為難而榮於嗣世尤難也晉文從亡在外十有九年介子推不及禄而竟灰於緜上勾踐范蠡﨑嶇戰鬭而五湖扁舟未免弓藏狗烹之慮也豈獨白馬之盟血未乾而爼醢繼之哉光武功臣終身保全而明帝繼治復追崇之斯功臣之大遇也是以鄧景之後與漢始終視麒麟閣之繪不克全於霍氏者亦為優矣獨馬援以椒房之親不與是避嫌之過也使其功之足崇雖途人而可也如諸將是也如其不足崇雖貴戚而不可也唐太崇以長孫無忌為司空無忌固辭曰臣忝外戚恐天下謂陛下為私太宗曰吾為官擇人惟才是與茍或不才雖親不用今日之舉非私親也後世不以太宗為私則固知明帝之過也雖然臣又有以發帝之微者帝隂后子也隂識其舅也亦有賢名於光武時而非功臣列也馬后明帝后也圖援而不及識將無有厚薄之疑因援而及識懼無以服功臣之心矣然則帝之是舉非不私馬后之過也乃私隂后之過也終歸於私而已矣安帝詔曰建武元功二十八將至此未逺而或至乏祀朕甚閔之其條二十八將無嗣絶世若犯罪奪國其子孫應當繼後者分别置狀以上明年二十八將絶國者皆紹封焉臣良勝曰君子創業垂統為可繼也髙祖裂土侯王連城兼郡皆所不惜盖攫取他人之有而棄之不甚惜侯王驕侈自敗故誅除削奪亦不甚惜光武有徴於此以髙宻首功而分土不過四縣與朝請叅決政事者不一二人是以保全髙帝之後克紹髙帝雖文景亦不甚矜容至武帝而國除者若棄孤雛腐鼠皆髙帝之流禍也光武之後恒思光武明帝追崇至安帝復繼其絶世皆光武之遺澤也故曰作法於仁其後猶忍作法於忍其將若之何唐太宗圖功臣於凌煙閣長孫無忌趙郡元王孝恭杜如晦魏徴房𤣥齡髙士廉尉遲敬徳李靖蕭瑀叚志𤣥劉𢎞基屈突通殷開山柴紹長孫順徳張亮侯君集張公謹程知節虞世南劉政會唐儉李世勣秦叔寳凡二十四人唐𤣥宗天寳六載南郊禮畢詔太廟配享功臣髙祖室宜加裴寂劉文靜太宗室加長孫無忌李靖杜如晦髙宗室加禇遂良髙季雅劉仁軌中宗室加狄仁傑魏元忠王用侯文武之道既惟並用宗敬之儀不可獨闕宋髙宗詔圖像功臣趙普曹彬薛居正石希載潘美李沆王旦王曽李繼隆吕夷簡曹瑋韓𤦺富弼曽公亮司馬光韓忠彦十六人配享景靈宫理宗詔太常寺繪配享景靈宫功臣趙普以下十六人増趙鼎吕頥浩韓世忠張浚陳康伯史浩葛邲益以趙汝愚二十四人于昭勲崇徳閣臣良勝曰朱熹嘗謂九廟之制既廢惟景靈都宫别殿門制亢嚴猶存古廟之制臣謂配享之臣若唐𤣥宗之文武並列宋髙宗理宗之創業守成並存最為得體視専祀武功創業之制為大偹矣臣嘗具疏請建廟如文武世室之制與増祀守成輔相功徳之顯者以集先代之成且足以厲守成君臣之志時為當事所抑遂寢議焉臣之志未巳也俟别陳之洪武二年聖祖勅中書省臣曰元末政亂禍及生靈朕倡義臨濠以全郷曲繼率英賢度大江遂西取武昌東定姑蘇北下中原南平閩廣越十有六載始克混一每念諸將相從損軀戮力開拓疆宇有共事而不覩其成建功而未食其報追思前勞痛切朕懐人孰無死死而不朽乃為可貴若諸將者生建忠勇之節死有無窮之榮身雖沒而名永不磨矣其命有司立功臣廟于雞鳴山序其封爵為像以配之文皇即位之初享太廟畢遣官祭功臣于雞鳴山廟先是禮部侍郎宋禮言功臣自有廟請罷太廟配享但於本廟祭之文皇曰先帝所定配享不可罷此皆佐命開國之臣既自有廟俟太廟享畢亦别遣官即其廟祭之於義可也著為令臣良勝曰在易有曰雲從龍風従虎聖人作而萬物覩文王之興而思皇多士生此王國漢髙受命而一時佐命皆豐沛故人聖祖飛龍濠梁勲舊𢎞名義烈輝映山川廟祀報功後先隆稱慰精靈於九京啓忠魂於萬世視韓彭不保其終房杜不恤其後度量相越豈不逺哉右衍崇勲之制中庸衍義卷十五
