body:
  text: 中庸衍義卷二明夏良勝撰率性之道之義傳道之統之體道之要之衍道之實明道功害道防雜道之辨堯曰咨爾舜天之厯數在爾躬允執其中朱熹曰厯數帝王相傳之次第猶四時氣節之先後也允信也中者無過不及之名胡一桂曰中者天下之大本事事物物莫不有一中道舉天下與人大事也而授受之際不過曰允執厥中聖經中之為義亦自堯發之然則開萬世聖學之源者堯之功顧不巨乎臣良勝曰道者率性而已性中只有仁義禮智信未有所謂中也但人之有性皆稟天地隂陽五行之理隂陽愆伏而五行自有偏勝則人於性分豈得皆中故偏於陽而過剛偏於隂而過柔得木氣多者偏於仁火氣多者偏於禮金氣多者偏於義水氣多者偏於智土氣多者偏於信一屬於偏雖不可不謂之性而不足以言道矣故於性分之理各得中而允執不移藴之為德行發之為事葉道之大全也堯禪舜以天下示以膺厯數保天祿之要一中之外無餘道矣大禹謨曰人心惟危道心惟微惟精惟一允執厥中蔡沈曰心者人之知覺主於中而應於外者也指其發於形氣者而言則謂之人心指其發於義理者而言則謂之道心人心易私而難公故危道心難明而易昧故微惟能精以察之而不雜以形氣之私一以守之而純乎禮義之正道心常為之主而人心聽命焉則危者安微者著動靜云為自無過不及之差而信能執其中矣堯之告舜但曰允執厥中今舜命禹又推其所以而詳言之蓋古之聖賢將以天下與人未嘗不以其治之之法并而傳之其見於經者如此後之人君其可不深思而敬守之哉臣良勝曰道至堯舜而極本之為聖賢之學用之為帝王之治而三聖相傳守此一中而已矣蓋天之生人一本也所以為堯舜者此心其為途人者亦此心存乎理則為道心交於欲則為人心其實只是一心也堯舜亦有人心而理勝乎欲途人亦有道心而欲奪乎理理欲之别天地之隔也自堯執中之訓而後有建中建極之論自堯舜精一之傳而後有協一純一一貫之統皆不外乎一心故曰道學也者心學之謂也洪範曰禹乃嗣興天乃錫禹洪範九疇彛倫攸敘蔡沈曰洪範九疇原出於天禹能順水之性地平天成故天出書於洛禹則之以為洪範九疇此彛倫所以敘也彛倫之敘即九疇之所敘者也臣良勝曰帝王興道致治至簡至易者也堯曰執中舜曰精一皆不外乎一心禹之彛倫攸敘則日用常行之道也九疇之列以建用皇極為主次居於五又在九數之中以一御八居中制外是亦一中而已易曰乾以易知坤以簡能易簡而天下之理得矣帝王之道之治豈在於髙逺難行之為哉仲虺之誥曰王懋昭大德建中于民以義制事以禮制心垂裕後昆蔡沈曰中者天下之所同有也然非君建之則民不能以自中而禮義者所以建中者也義者心之裁制禮者理之節文以義制事則事得其宜以禮制心則心得其宜內外合德而中道立如此則非特有以建中于民而垂之後世亦綽綽乎有餘裕矣周頌曰維天之命於穆不已於乎不顯文王之德之純子思子曰維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之德之純蓋曰文王之所以為文也程頥曰天道不已文王純於天道亦不已純則無二無雜不已則無間斷先後泰誓曰惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母蔡沈曰天地生物而厚於人生人而厚於聖人其所以厚於聖人者亦惟欲其君長乎民而推天地父母斯民之心而已臣良勝曰天地父母斯民之心仁也人君父母斯民之心仁也武王誓師之詞首及于此則其順天應人以任斯道之責者亦救民之仁也洪範曰凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王蔡沈曰天子之於庶民性一而已庶民於極之敷言是訓是行則可以近天子道德之光華也曰者民之詞也謂之父母者指其恩育而言親之之意謂之王者指其君長而言尊之之意言天子恩育君長乎我者如此其至也臣良勝曰武王道德之光而民得近之建極敷極之效也孟子曰周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦朱熹曰三王者禹也湯也文武也時異勢殊故其事或有所不合思而得之則其理初不異矣臣良勝曰思者聖功之本思則睿睿則聖矣周公所以聖者兼三王施四事制禮作樂有大勳於天下皆原於心之思也子曰參乎吾道一以貫之曽子曰唯朱熹曰夫子之一理渾然而泛應曲當譬則天地之至誠無息而萬物各得其所也蓋至誠無息者道之體也萬殊之所以一本也萬物各得其所者道之用也一本之所以萬殊也以此觀之一以貫之之實可見矣孟子曰我知言我善養吾浩然之氣朱熹曰惟知言則有以明夫道義而於天下之事無所疑養氣則有以配夫道義而於天下之事無所懼此其所以當大任而不動心也臣良勝曰心者性命道德之主也氣者心之發也言者心之宣也知者以别取舍之幾而氣循所養養氣以達剛大之體而心安於正此孟子所以間先聖之道直以承三聖者自任皆由於不動心也豈特當齊卿相之任而已哉周敦頥曰無極而太極朱熹曰伏羲作易自一畫以下文王作易自乾元以下皆未嘗言太極也而孔子言之孔子贊易自太極以下未嘗言無極也而周子言之先聖後聖豈不同條而共貫哉河南程皓伯淳卒潞公文彥博題其墓曰明道先生其弟頥正叔序之曰周公沒聖人之道不行孟軻死聖人之學不傳道不行百世無善治學不傳千載無真儒無善治士猶得以明夫善治之道以淑諸人以傳諸後無真儒則天下貿貿焉莫知所之人欲肆而天理滅矣先生生乎千四百年之後得不傳之學於遺經以興起斯文為己任辨異端闢邪説使聖人之道煥然復明於世蓋自孟子之後一人而已然學者於道不知所向則孰知斯人之為功不知所至則孰知斯名之稱情也哉臣良勝曰韓愈著原道而云孟軻死不得其傳將以已有排斥佛老之言可當孟子之後故往往假借荀揚曰荀卿在軻雄之間又曰孟氏醇乎醇荀與揚大醇而小疵其意謂荀揚可以班孟氏則已可以繼孟氏無疑也然不知三品之説既不識性序學止於誠意君子謂之無頭學問而可以與道之統乎至朱熹序中庸亦曰再傳得孟氏以承先聖之統及其沒而遂失其傳焉末則云雖於道統之傳不敢妄議然初學之士或有取焉詞若自謙而隱然以道統自任故論者有謂其集諸儒之大成但其自言曰熹覺於義理不敢胡亂説而緊要為已多不得力劉定之曰周之精程之正固非有待於熹而後能全其所缺中其所偏斯定論也臣序傳道之統孟氏之後繼以周程而不及韓愈朱熹者愈止因文見道時或蔽焉熹之學出程門自楊時羅仲素李侗及熹號為閩學與張載稱關中之學其實皆周程之緒也故有孔子在焉而顔曽不可以言統臣蓋竊取於斯況學之道統治之正統其嚴一也敢易言哉聖祖命儒臣書洪範揭於御座之右朝夕觀覽親為之注既成召太子贊善劉三吾曰朕觀洪範一篇帝王為治之要道也所以敘彛倫立皇極保萬民敘四時成百穀本於王道而驗於人事箕子為武王陳之武王猶自謙曰五帝之道我未能焉朕每惕然遂疏其旨為注朝夕省覽三吾對曰陛下留心是書上明天道下福生民為萬世開太平者也臣良勝曰周公而上其道行也是為帝王傳道之統周公而下其道明也是為聖賢傳道之統然各舉其盛亦非所以能兼也惟我聖祖建用皇極斂福錫民會極歸極已見蕩蕩平平之治道大行矣又肆餘力闡明宗旨以示萬世真足以繼二帝三王之治承孔孟濓洛之學作之君作之師統宗會元亘古一見顧金匱石室之藏日星隱曜雲漢潛章草茅下士未獲莊誦宸編而諭示三吾數語鈎玄提要殆盡之矣三吾善贊字字實録愚臣何敢贊哉文皇出一書示翰林學士胡廣曰古人治天下皆有其道雖生知之聖亦資學問由唐虞至宋其間聖賢明訓具著經傳然簡帙浩繁未易遽領其要帝王之學但得其要篤信而力行之足以為治皇太子天下之本於今當進學朕欲使其知要庶幾將來太平之望秦漢以下教皇太子者多以黃老申韓刑名術數皆非正道朕間因間暇悉録聖賢之言若執中建中建極之類切於修身治國平天下者今已成書卿等試觀之有未善更為朕言廣等覽畢奏曰帝王道德之要備載此書宜與典謨訓誥並傳萬世請刋印以賜文皇曰然遂名曰聖學心法臣良勝曰文皇聖學心法一書雖云以示太子乃所以示法天下而傳後世也太子者治安天下之本也所以治安天下者道也故凡言道者皆以治安天下為至也若以執中建中建極為真傳則有以繼往聖之絶學以黃老申韓刑名術數為非道則有以闢末學之迷途道統之傳固有所歸矣右衍傳道之統繫辭傳曰成性存存道義之門程頥曰成性存存道義之門亦是萬物各有成性存存亦是生生不已之意天只是以生為道成性存存道無體義無方也臣良勝曰天地只設位上下而變化流行生育之妙行乎其間則天地本是虛位必有此人方成天地人必有性方成為人性必有存存之功不失其本成之性方謂之道既成乎道聖人所以效天法地而崇德廣業者在是矣繫辭下傳曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之臣良勝曰天之道隂陽盡之矣地之道剛柔盡之矣人之所以為人者性也率性則謂之道性中有仁義禮知而此言仁義以立人道者仁者體也義者用也仁義未足以盡性而體用則足以盡道也體用一原隱顯無間則天地之道皆在聖人故曰兼三才而兩之也文言曰君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事朱熹曰以仁為體則無一物不在所愛之中故足以長人嘉其所會則無不合禮使物各得其所利則義無不和貞固者知正之所在而固守之所謂知而弗去是也故足以為事之幹太甲曰有言逆於爾心必求諸道有言遜于爾志必求諸非道蔡沈曰鯁直之言人所難受巽順之言人所易從於其所難受者必求諸道不可遽以逆于心而拒之於其所易從者必求諸非道不可遽以遜志而聽之臣良勝曰人心之動言以宣也是君子之樞機也所以動天地感鬼神至賾而不可惡也至動而不可亂也豈惟立言以成志者必歸諸道而聽言以成己者亦歸諸道伊尹召奭告其君者不出乎此人君之言出乎身加乎民一言之道而天下之治存焉一言非道而天下之忽存焉可不慎乎旅獒曰志以道寧言以道接蔡沈曰己之志以道而寧則不至於妄發人之言以道而接則不至於妄受存乎中者所以應乎外制乎外所以養其中古昔聖賢相授之心法也子曰人能𢎞道非道𢎞人朱熹曰人外無道道外無人然人心有覺而道體無為故人能大其道道不能大其人也子曰朝聞道夕死可矣程頥曰人不可以不知道茍得聞道雖死可也臣良勝曰道者一理也一理貫乎萬事故事事有道也若朝聞道則夕以處死而可事有大於死生之際者乎此而可處則天下無難處之事矣蘇轍曰茍今日聞道雖死而不亂自是一理昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也朱熹曰君子小人以位言子遊所稱蓋夫子所嘗言言君子小人皆不可以不學道也子曰君子博學於文約之以禮亦可以弗畔矣夫程頥曰博學於文而不約之以禮必至於汗漫博學矣又能守之以禮則亦可以不畔道矣臣良勝曰禮者天理也即道也其節文儀則有載於文者故君子博學於文者乃所以約之禮也本末兼該於道何背之有故顔子聞夫子博文約禮之教即所謂克己復禮也孟子曰君子深造之以道欲其自得之也自得之則居之安居之安則資之深資之深則取之左右逢其原朱熹曰君子務於深造而必以其道者欲其有所持循以俟夫默契心通自然而得之於己也自得於己則所以處之者安固而不搖處之安固則所藉者深逺而無盡所藉者深則日用之間取之至近無所往而不值其所資之本也孟子曰夫道若大路然豈難知哉人病不求爾子歸而求之有餘師朱熹曰道不難知若歸而求之事親敬長之間則性分之內萬理皆備隨處發見無不可師真德秀曰世之言堯舜者往往失之過髙故孟子直以一言斷之曰孝弟而已矣謂其止於是也夫幼而愛親長而愛兄人性所同為堯舜者盡此性而已矣臣良勝曰堯舜之外無餘道矣孝弟之外無堯舜矣是孝弟者人之良知也人之良能也無不可為之者人君欲為堯舜又何以他求哉學記曰雖有嘉榖弗食不知其旨也雖有至道弗學不知其善也是故學然後知不足教然後知困知不足然後能自反也知困然後能自強也故曰教學相長也陳澔曰學然後知不足謂師資於人方知己所未至也教然後知困謂無以應人之求則自知困辱也自反知反求而已自強則有黽勉倍進之意教學相長謂我之教人與資人皆相為長益也樂記曰君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂陳澔曰君子之樂道猶小人之樂欲君子以道制欲故坦蕩蕩小人徇欲忘道故長戚戚臣良勝曰天理人欲同行異情而消長之幾間不容髮故天理純全人欲銷盡天君泰然百體從令何樂如之人欲日熾天理日消不火而熱不冰而寒何惑如之故學而得其道者天下之至樂也昔漢光武講論經理夜分乃寐太子見其勤勞諫曰陛下有禹湯之明而失黃老養性之福光武曰我自樂此不為疲也彼所事者章句之末耳猶樂而忘疲使有聞於大道之要其樂又當何如周敦頥曰聖可學乎曰可有要乎曰有請問焉曰一為要一者無欲也無欲則靜虛動直靜虛則明明則通動直則公公則溥明通公溥庶矣乎朱熹曰周子只説一者無欲也這話頭髙率急難湊泊常人如何便得無欲故伊川只説敬字教人只就敬上捱去庶幾執捉得定有箇下手處程皓曰昔受學於周茂叔天理二字却是自家體貼出來臣良勝曰天理存則無欲也所以無欲則心有主也有主則虛無欲則靜靜虛則動直而公明至矣聖祖謂學士詹同曰古人為文章或以明道德或以通當世之務如典謨之言皆明白易知無深怪隱辟之語至如出師表亦何嘗雕刻成文而誠意溢出至今使人誦之自然忠義感激臣良勝曰文者道之著也聖祖所論因末以求本即小以知大故示人作文之意乃入道之方也有諸中者必形諸外道積於躬然後發之於文者皆道也道者塞乎天地貫乎古今既明於道德則時務罔有不通藴為盛德發為大業皆是物也傅説告於髙宗曰人求多聞惟求建事是學道本以建事不足以建事者非學也亦非道也故為文明道以通當世之務道之備也大哉皇言愚臣佩服久矣深愧未能而願學焉文皇謂侍臣曰朕昨間暇作書愛制筆精好甚稱人意因嘆匠藝如此豈是生而能之亦由精學所致今之學者不及古人皆由自怠之過前代大儒君子皆是精誠以造其極今人鹵莽厭煩用力未至便謂求道之難譬之耕而不勤可望有獲乎臣良勝曰言近而指逺者善言也古之賢君有以建屋弓矢喻治道者皆其末也仰惟文皇因筆制精妙而悟大道之學在於精勤精則擇之審矣勤則守之固矣道豈逺乎哉右衍體道之要堯典曰粵若稽古帝堯曰放勳欽明文思安安允恭克讓光被四表格于上下蔡沈曰放勳者總言堯之德業也欽明文思安安本其德性而言也允恭克讓以其行實而言也至於被四表格上下則放勳之所極也孔子曰唯天為大唯堯則之舜典曰重華協于帝濬哲文明溫恭允塞玄德升聞乃命以位蔡沈曰堯既有光華而舜又有光華可合於堯因言其目則深沈而有知文理而光明和粹而恭敬誠信而篤實有此四者幽潛之德上聞于堯堯乃命之以職位也大禹謨曰禹曰惠迪吉從逆凶惟影響蔡沈曰惠順迪道逆反道者也惠迪從逆猶曰順善從惡也禹言天道可畏吉凶之應於善惡猶影響之出於形聲也臣良勝曰道一也在天之為吉凶者此道也在人之為順逆者此道也惟人之道與天相為流通故天之道應人捷於影響也然若禹之惠迪非以要吉其不從逆非以避凶亦惟因其本然之理而盡其當然之道爾故其所以聲為律身為度者道之順於己者其當然也菲飲食而致孝鬼神惡衣服而致美黻冕卑宫室而盡力溝洫道之順於事者其當然也地平天成六府三事允治道之行於天下者亦當然也夫豈以吉凶禍福而為之從違也哉思齊詩曰雍雍在宫肅肅在廟不顯亦臨無斁亦保肆戎疾不殄烈假不瑕不聞亦式不諫亦入朱熹曰文王在閨門之內則極其和在宗廟之中則極其敬雖居幽隱亦常若有臨之者雖無厭斁亦常有所守焉其純一不已蓋如此故其大難雖不殄絶而光大亦無玷缺雖事之無前聞者而亦無不合於法度雖無諫諍之者亦未嘗不入於善所謂性與天合是也臣良勝曰德者行道而有得之名堯之德上則于天舜之德上協于堯一本其性之自然者爾孟子所謂性之之聖也若大禹文王者其近於性之者與湯之盤銘曰茍日新日日新又日新朱熹曰盤沐浴之盤也銘銘其器以自警之詞也湯以人之洗濯其心以去惡如沐浴其身以去垢故銘其盤言誠能一日有以滌其舊染之汚而自新則當因其已新者而日日新之又日新之不可略有間斷也臣良勝曰成湯克治之功至是密矣所以為顧諟明命之則也然日新之義仲虺嘗以告湯曰德日新萬邦惟懷伊尹又述以戒太甲曰始終惟一時乃日新則湯之銘詞得於左右二相者多矣若人主自聖而廢交修之道其可乎哉武王踐祚三日召師尚父面問焉曰黃帝顓頊之道存乎曰在丹書曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶凡事不強則枉弗敬則不正枉者滅廢敬者萬世武王聞書之言惕若恐懼而戒書于席之四端為銘真德秀曰武王之克商也訪洪範于箕子其始踐祚也又訪丹書於太公可謂急於聞道者矣而太公望所告不出敬與義之二言蓋敬則萬善俱立怠則萬善俱廢義則理為之主欲則物為之主吉凶存亡之所由分上古聖人已致謹於此矣武王聞之惕若戒懼而銘之器物以自警焉蓋心斯須不存而怠與欲得乘其隙也其後孔子贊易於坤之六二曰敬以直內義以方外先儒釋之曰敬立而內直義形而外方蓋敬則此心無私邪之纍內之所以直也義則事事物物各得其分外之所以方也自黃帝而武王自武王而孔子其皆一道歟説命曰王人求多聞時惟建事學于古訓乃有獲事不師古以克永世匪説攸聞惟學遜志務時敏厥修乃來允懷于兹道積于厥躬真德秀曰王人所以求多聞者是惟立事而已學必施於事然後為有用之學不然則所聞雖多果何為哉臣良勝曰帝王之學與儒生異以之治已則積道以之治人則建事積道又建事之本也故髙宗旁求得傅説欲其交修以終甘盤之學説所告者求多聞以建事道積于厥躬而已蓋多聞具于古訓必資於學典學務於遜敏乃裕於道道之所獲則建之事者可以久安長治而監示先王成憲亦無愆矣是説於此將以成湯之道望之髙宗髙宗亦曰罔俾阿衡專美有商亦將以伊尹望説矣君臣志望若此是以上下交而德業成也詩曰昊天有成命二后受之成王不敢康夙夜基命宥密於緝熙單厥心肆其靖之朱熹曰天祚周以天下既有定命而文武受之矣成王繼之又能不敢康寧而其夙夜積德以承藉天命者又宏深而靜密是能繼續光明文武之業而盡其心故今能安靖天下而保其所受之命也臣良勝曰成王幼沖嗣位德性未成流言偶惑致周公狼跋以東當時未必終為令主及其悔悟親迎周公以歸陳無逸歌豳風作立政所以交修於成王者甚至故緝熙于學日有所就月有所將遂成文武之德有若此詩之所頌者及其顧命垂絶之際被冕服見百官諄諄告諭嗣子無冒貢于非幾皆聖賢切要之言保治經逺之略先儒謂其有得於周公者深矣信哉聖祖內殿成命博士熊鼎編類古人行事可鑒戒者書于壁間又問宋濂曰帝王之學何書最要對曰請讀真德秀大學衍義命侍臣書于兩廡壁間時睇觀之謂濂曰朕之為君上畏天地下畏兆民兢兢業業不敢自逸濂曰陛下此心古先哲王之心也慎終如始天下幸甚臣良勝曰湯武身之者也其乾乾惕若見於銘器者若此髙宗於説成王於旦交修以成亦庶幾焉惟我聖祖典則日省即湯武之銘也兢業自畏即堯舜之心也咨於宋濂而啓沃之者亦將以傅周之益望之也其殆同湯武之學而稟堯舜之性也歟昔學士解縉進呈正心講義文皇覽之至再諭縉等曰人君誠不可以有所好樂一有好樂泥而不返則欲必勝理蓋心能靜虛事來則應事去如明鏡止水自然純是天理朕每退朝默坐未嘗不以管束此心為切臣良勝曰人之所存者道道之所存者心心之所存者天理天理之存於心者而欲不得以勝之則明鏡止水遇物之來應之有餘矣文皇諭解縉謂退朝默坐以管束此心是近裏著已實際工夫體道之要舍此復何為哉孟子曰學問之道無他求其放心而已矣右衍行道之實子在川上曰逝者如斯夫不舍晝夜程頥曰此道體也天運而不已故日往則月來寒往則暑來水流而不息物生而不窮皆與道為體運乎晝夜未嘗已也是以君子法之自強不息及其至也純亦不已焉臣良勝曰道器不相離也凡物可以喻道何必於水凡水可以喻道何必於川夫子於此示人之意微矣道之在天下猶水之行地中也水或澄而為淵蓄而為渚停而為沼蕩而為湖雖皆足以見道而道體無窮之象若有遺焉故惟川水之逝可以狀之逝者去而不返之名故人死則謂之逝他水或流或返皆不可必而川水直急更無返者故指川之流曰其逝有如此夫不舍晝夜道體之無窮若是哉子曰知之者不如好之者好之者不如樂之者張栻曰譬之五穀知者知其可食也好者食而嗜之者也樂者嗜之而飽者也知而不能好則是知之未至也好之而不能樂則是好之未至也此古之學者所以自強而不息也與臣良勝曰學道一也知而後好好而後樂此入道之序有不可易也知則必好好則必樂此造道之妙有不能自已也子曰甚矣吾衰也久矣吾不復夢見周公程頥曰孔子盛時夢寐常存行周公之道及其老也志慮衰而不可以有為也蓋存道者心無老少之異而行道者身老則衰也臣良勝曰聖人之心未嘗一日忘天下故一息之存而志不懈也舜湯文武皆百嵗猶汲汲皇皇於天下孔子歸魯在哀公十一年時年六十八矣而刪述六經方所有事至七十三而卒豈謂志慮果衰遂無周公之夢耶無亦嘆當時不能用而道終有不可行爾子曰飯蔬食飲水曲肱而枕之樂亦在其中矣不義而富且貴於我如浮雲朱熹曰聖人之心渾然天理雖處困極而樂亦無不在焉其視不義之富貴如浮雲之無有漠然無所動於其中也子曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也程皓曰昔受學於周茂叔每令尋仲尼顔子樂處所樂何事又嘗作顔子所好何學論曰情既熾而益蕩其性鑿矣故學者約其情使合於中正其心養其性而已矣然必先明諸心之所往然後力行以求至焉若顔子之非禮勿視聽言動不遷怒二過則其好之之篤學之之道也臣良勝曰嘗聞程頥為講官每於言外附已意以感動人主時講此章同列問曰此則如何措意頥曰顔子大賢也其貧如此季氏不義而富於周公魯君用舍如此則政事可知然則人君觀孔顔之樂道者亦必有以槩于中矣曽子曰君子所貴乎道者三動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣朱熹曰道雖無所不在然君子所重者在此三事而已程頥曰動容貌舉一身而言也周旋中禮暴慢斯逺矣正顔色則不妄斯近信矣出辭氣正由中出斯逺鄙倍三者正身而不外求也臣良勝曰孔門之學惟曽氏之傳得其宗以其切於正身而不外求也蓋其平生用力只在於此是以全歸而免故啓手足以示門人又以斯言告之敬子也意斯時雖寢疾而未至於甚及其既革聞童子華而睆之言易其簀而卒先儒謂其不以死生之變易其所守如此便使人有行一不義殺一不辜而得天下不為之心曽子居衛捉襟肘見納履踵決曳蹤而歌聲滿天地其耕于魯魯公使人餽之邑不受曰吾聞受人之物者常畏人與人以物者常驕人縱君之賜不吾驕矣臣豈能無畏乎臣良勝曰曽子之安貧守道若此皆只是內重而見外輕也孟子曰君子所性仁義禮智根於心其生色也睟然見於面盎於背施於四體四體不言而喻朱熹曰氣質清明無物欲之纍則性之四德根本於心其積之盛則發而著見於外不待言而無不喻也孟子曰居天下之廣居立天下之正位行天下之大道得志與民由之不得志獨行其道富貴不能淫貧賤不能移威武不能屈此之謂大丈夫何叔京曰戰國之時聖賢道否天下不復見其德業之盛但見姦巧之徒得志橫行氣焰可畏遂以為大丈夫不知由君子觀之是乃妾婦之道爾何足道哉臣良勝曰景春之問蓋將以儀衍為孟子望孟子之答蓋亦薄儀衍而不為是亦內重而外輕得深而誘小故曰求觀聖人之道必自孟子始周敦頥養心亭説曰孟子曰養心莫善於寡欲其為人也寡欲雖有不存焉者寡矣其為人也多欲雖有存焉者寡矣豫謂養心不止於寡而存耳蓋寡焉以至於無無則誠立明通誠立賢也明通聖也是聖賢非性生必養心而致之養心之善有大焉如此存乎其人而已朱熹曰誠立謂實體安固明通則實用流行臣良勝曰周子平生力學只在養心養心只在無欲作聖之功莫要於此或有問於朱子曰欲字如何曰不同此寡欲則是合不當如此者如私欲之類若是飢而欲食渴而欲飲亦豈能無但亦是合當如此者然則欲不能無若能制其非所欲而欲者正是無私欲凡其所欲皆可欲之謂善也但制欲甚難在人君尤難真德秀嘗告君曰宫室之欲其安膳服之欲其美與夫妃嬪侍御之奉觀逸遊田之樂此人心之發也是心無主而無裁制則物日滋其去桀紂不逺矣知富貴之不可恃而將之以憂勤知驕侈之不可肆而節之以恭儉知旨酒厚味為迷心之鴆毒思所以御之知淫聲美色為伐性之斧斤思所以逺之此道心之發也是心為主而無以汩喪則理義日充其去堯舜不逺矣私欲者人心也制欲者道心也制而寡寡而無惟聖人為然臣故敢以德秀之言為萬一助云黃庭堅曰㫪陵周茂叔人品甚髙胸中灑落如光風霽月朱熹曰延平先生每誦此言以為善形容有道者氣象程皓言于朝曰其道必本乎人倫明乎物理其教自小學灑掃應對以往修其孝弟忠信周旋禮樂其所以誘掖激勵漸磨成就之道皆有節序其要在於擇善修身至於化成天下自鄉人而可至於聖人之道程頥撰行狀曰先生資稟既異而充養有道純粹如精金溫潤如良玉寬而有制和而不流忠誠貫於金石孝弟通於神明視其色其接人也如陽春之溫聽其言其入人也如時雨之潤胸懷洞然徹視無間測其藴則浩乎若滄溟之無際極其德美言蓋不足以形容聖祖與學士陶安等論學術曰邪説之害道猶美味之悅口美色之眩目自非豪傑之見不能決去之也戰國之時縱橫之徒肆為邪説遊説諸侯急於功利者多從其説往往事未就而國隨亡此誠何益夫邪説不去則正道不興正道不興天下烏得而治安對曰陛下所言深探其本聖祖曰仁義治天下之本也賈生論秦之亡不行仁義之道夫秦習戰國之餘弊又安得知此也臣良勝曰莠生於苗而害苗者莠也莠不除苗其病矣故農夫是蓘是藨閔閔焉望苗之長而莠之不去也邪説害道而思以去之何以異此故孟子一闢楊墨而功配於禹韓愈一闢佛老而功追於孟謂其去邪庶幾以存正也聖祖論學而深闢邪説而拔本塞源謂治必本之仁義之正道也正道明而邪説無所容入矣明道之功豈特韓孟之倫已哉永樂二年楊士竒進呈文華殿講義文皇覽之稱善因曰先儒謂堯典克明峻德一章一部大學皆具士竒對曰誠如聖諭堯舜禹湯文武數聖人凡修諸躬施於家國天下皆大學之理文皇曰孟子道性善必舉堯舜爾等於講説道理必舉前古為證庶幾明白易入又曰帝王之學貴切己實用講説之際一切浮泛無益之語勿用臣良勝曰帝王言治道者自堯典始也聖賢言治道者自大學始也二書相為表裏皆本諸身以施之天下也非聖人聰明睿知而達治道何能察識而直示宗旨若此且命講臣援古為證又命必切己實用即所謂徵而信信而從博厚髙明悠久以配天地皆是理也一時儒雅仰承道教亦何幸逢兹盛哉右衍明道之功子曰攻乎異端斯害也已范浚曰異端非聖人之道而别為一端如楊墨是也其率天下至於無父無君專治而欲精之為害甚矣臣良勝曰天下之道一則純二則雜純則同雜則異所謂異者以其異於同也大同之道若閉門造車出門合轍推之天下無所不通一有異制則通都一軌自有不可行者此其所以為害也如楊氏亦欲為義而非大同之義故卒以害義墨氏亦欲為仁而非大同之仁故卒以害仁非特自害且將蔓延天下後世而害無已也君子救世衛道之心必有以攻治之以已其害嘗聞程皓有曰道之不明異端害之也是皆正道之蓁蕪聖門之閉塞闢之而後可以入道深有得於夫子言外之意孟軻曰能言距楊墨者聖人之徒也朱熹曰邪説害正人人得而攻之不必聖賢如春秋之法亂臣賊子人人得而討之不必士師也聖人救世立法之意其切如此臣良勝曰戰國之時處士橫議若遊士鼓辨談天雕龍堅白同異炙轂過髠縱橫開闔為害亦煩而孟子獨嚴於楊墨者何也凡是非善惡相反有如黑白水火夫人能别之縱有誤者十一於千百害猶淺也若楊墨者以為學仁義也仁義夫豈不善而似是之非賢者亦且惑之故當時楊墨塞途將率天下為禽獸孟子辭而闢之自以承於三聖韓愈推其功不在禹下而著孔墨之論曰孔子必用墨子墨子必用孔子以愈之賢且有惑焉況其下乎由是觀之益見孟子之功為大矣葛玄道德經序曰老聃託神李母剖左腋而生生即皓然號曰老子老子之號因玄而出在天地之先無衰老之期大道不行西遊天下關令尹喜曰大道將隱乎願為著書作道德二篇五千文上下經焉司馬遷曰世之學老子者則黜儒學儒學亦黜老子道不同不相為謀韓愈曰老子之小仁義非毁之也其見者小也坐井而觀天曰天小者非天小也彼以煦煦為仁孑孑為義其小之也則宜其所謂道道其所道非吾所謂道也其所謂德德其所德非吾所謂德也凡吾所謂道德云者合仁與義言之也天下之公言也老子所謂道德云者去仁與義言之也一人之私言也聖祖御西廡大臣皆坐侍指大學衍義中言司馬遷論黃老事令宋濂講析俾在坐者聽之濂既如詔設言曰漢武嗜神仙之術好四夷之功民力既竭重刑罰以震服之臣以為人主能以義理養性則邪説不能侵興學校以教民則禍亂無從而作矣臣良勝曰異端之説易於惑人而最深者莫若老子蓋以仁義為説以道德為名而一以簡便從事夫誰不惑且曹參以收寧一之效漢文以成富庶之功雖史遷亦以與儒並論而莫為之上下也惟我聖祖省觀衍義則於真德秀直指其弊至於惑亂世主斫喪生民者已洞然不惑于中又令宋濂講析以諭大臣蓋不欲獨善一身而欲兼善於衆也濂又能仰承德意推及以闢神仙申韓之術有是君則有是臣矣史記曰莊子與梁惠王齊宣王同時其學無所不閲然要本歸於老子之言故其著書十餘萬言大抵率寓言也蘇軾曰莊子作漁父盜跖胠篋以詆訾孔子之徒以明老子之術此知莊子之粗者余以為莊子蓋助孔子者要不可以為法耳其論天下道術自墨翟禽滑釐彭蒙慎到田駢關尹老聃之徒以至於其身皆以為一家而孔子不與其尊之也至矣蘇轍曰聖人之道處於可不可之際遂從而實之是以其説萬變而不可窮老聃莊周從而虛之是以其説汗漫而不可語今將辨夫仲尼老莊之是非者惟能知夫虛實之可用與否而已矣蓋天下固有物者有物而相遭則固亦有事矣是故聖人從其有而制其御有之道以治其有實之事則於天下夫亦何事之不可為至區區焉求其有而納之於無則其用力不已甚勞矣哉仲尼有言曰君子之中庸也君子而時中小人之中庸也小人而無忌憚也夫老聃莊周亦近於中庸而無忌憚者哉馬遷曰申子卑卑施之於名實韓子引繩墨切事情闕漢武帝幸泰山修封禪祀明堂見羣臣乃曰朕即位以來所為狂悖使天下勞苦不可追悔自今事有害於百姓者悉罷之田千秋曰方士言神仙者甚衆而無顯功請皆罷遣之上曰大鴻臚言是也於是悉罷方士侯神人者自後上每對羣臣自嘆向時愚惑為方士所欺天下豈有神仙盡妖妄耳節食服藥差可少病而已真德秀曰神仙之説自戰國始燕齊之君嘗求之不驗矣而秦始皇復求之秦皇求之不驗矣而漢孝武復求之以孝武之髙明英爽而長生不死之欲一動於中遂為方士所愚猶玩嬰兒於股掌之上豈不異哉然迷而能復猶賢於秦皇之終不悟云漢明帝聞西域有神其名曰佛因遣使之天竺求其道得其書及沙門以來於是中國始傳其術圖其形像而王公貴人獨楚王英最先愛之後魏世祖時道士寇謙之自言遇神人李君授以圖録真經其中數編李君手筆也獻於上朝野多未信崔浩獨以師事之崔浩勸魏主盡誅天下沙門毁諸經像從之塔廟之闕受戒時宣政殿奉旨毆西僧者截其手詈之者斷其舌故毁道經以佛滅道之終事也夫其異説惑人求利益也楚王英首奉佛者乃以反逆誅崔浩首崇道者以詆訐刑所謂利益果安在哉其自為道不生不滅也魏之道勝則滅僧元之僧勝則滅道自相吞噬所謂不生滅者果安在哉審乎此其説不攻而破矣但明帝尊師講學崔浩研精經術魏世祖元世祖亦英傑之主迷惑不悟若此故先儒云異端之説何以惑人以其愚暗今之惑人因其髙明臣之舉此亦責備賢者為後世慮者深且逺也聖祖謂宋濂曰帝王當晏安之時多好神仙以朕言之使國治民安心神怡康即神仙也濂對曰漢武好神仙而方士至梁武好佛而異僧集使移此心以求賢輔天下其有不治乎臣良勝曰神仙之説其來久矣德秀謂始於戰國本漢郊祀志敘齊威燕昭求蓬萊方丈瀛洲三山而言但列禦寇著穆天子傳云周穆王乘八駿欲使天下皆有車轍馬迹焉升崑崙之丘遂賔西王母觴于瑶池之上作天子謡春秋傳亦云楚子革闕保而敬以奉天勤以守業仁以臨民使萬物得所四裔咸賔光昭祖業傳之子孫可以為孝何必事佛乃為孝乎臣良勝曰人君卓然有見不惑異道惟唐太宗與我文皇而已太宗所言雖正而堯舜周孔之道慚德為多文皇於敬以奉天勤以守業仁以臨民允蹈實踐之矣以言教者訟以身教者從則文皇有功於斯道其大矣哉自夫邪説惑人甚於洪水猛獸之災慘於夷狄相殘之禍而佛教又邪説之著者程氏謂其比之楊墨尤為近理故其害為尤甚是也老聃著道德經假之關尹之占曰紫氣浮關應有聖人應之其後莊周列禦冦從而宗之其養生之術則神仙方技宗之隂謀之術則申商韓非宗之矯厲之言而放蕩者宗之繆愆之言而清談者宗之若天書雲篆又其粗迹者爾佛經初至才二十三章緘之蘭臺石室其像繪之清涼臺而已靈帝始祠之宫中至石勒於佛圖澄苻堅於沙門道安姚興之於鳩摩羅什遂尊以師禮梁武設無遮大會捨身為厮役矣唐代宗於禁中飯僧憲宗迎佛骨至京入宫不忌元之帝師遂干大政至發宋陵以足珍玩截理宗顱為飲器不可言矣夫老氏之禍也博而廣佛氏之禍也專而深君子不知斯禍之為烈何以知文皇斯言之為功哉前輝光謝囂奏武功長孟通浚井得白石丹書著石文曰告安漢公莽為皇帝符命之起自此始矣漢光武召馮異問四方動靜異曰更始必敗宗廟之憂在於大王會儒生疆華自關中奉赤伏符來詣曰劉秀發兵捕不道四夷雲集龍鬬野四七之際火為主遂即位由是信讖多以決定嫌疑桓談上疏曰凡人之情忽於見事而貴於異聞觀先王之所記述咸以仁義正道為本非有竒怪虛誕之事今諸巧慧小才技數之人增益圖書矯稱讖記以欺惑貪邪詿誤人主可不逺抑之哉唐太宗密問李淳風祕記所云信有之乎對曰臣仰稽天象俯察厯數其人已在陛下宫中為親屬不過三十年當王天下殺唐子孫殆盡其兆既成矣曰疑似者盡殺之如何對曰天之所命人不能違也王者不死徒多殺無辜且自今已往三十年其人已老庶幾頗有慈心為禍或淺今借使得而殺之天或生壯者肆其怨毒陛下子孫無遺類矣上乃止周世宗一日於宫中篋笥得一木牌題曰檢點為天子世宗每見臣下方面大耳者必殺之而宋太祖為檢點日侍傍而不之覺臣良勝曰昔張衡以讖記之説起於漢哀平之間即指莽賊石文符命之事也然莽之作偽又祖勝廣魚帛之書實姦雄欺世之拙謀也儒生奉赤伏符者無亦西漢逸民遭亂自匿知光武以帝胄中興復漢長安故假是説以堅其志爾遂深信表章有同聖典命三公定郊祀斷封禪議靈臺率以是決桓談一言讖之非經遂大怒以為非聖無法至唐太宗以讖殺李君羡非淳風善言則喋血何止禁門已也世宗無能忌於檢點如其方面大耳之見殺者獨何辜哉推原其端則俗儒之罪也史氏文勝而誣以稷契之生有異牽合附會遂以文王之生有赤爵銜書之瑞武王之興有白魚火鳥之符馬融輩引以釋經謬妄殊甚劉歆因之致名公孫述因之僣亂啓篡奪之萌階殺戮之慘可勝痛哉歐陽修嘗乞詔儒臣悉取羣經之疏刪去識緯之文可謂憂深慮逺矣唐憲宗詔天下求方士皇甫鏄薦山人李泌能治長生藥其後服藥日加躁渴起居舍人裴鄰上言藥以愈疾非朝夕常餌之物況金石酷烈有毒又益以火氣殆非五臟所能勝也古者君飲藥臣先嘗之乞令製藥者先餌一年則真偽可辨矣上怒貶鄰江陵令上服丹多躁怒左右宦者往往獲罪有死者人人自危一日上暴崩人以為內侍陳志弒逆云永樂十五年通政司言甌寧人進金丹及方書諭之曰此妖人也秦皇漢武一生為方士所欺求長生不死之藥此又欲欺朕朕無所用金丹令自食之方書亦與毁之無令更欺人也臣良勝曰尊居人主富貴已極無求不得無欲不遂惟有不死之説足以動之若神仙鬼神道佛無有形影功效弗彰能逺之者猶或疑二至於丹砂服食旦夕著效自非至達鮮不溺之故先世惑於方士何止百十而獨舉憲宗者以皇甫鏄之姦投隙以進裴鄰之諫明切以盡憲宗立致躁暴罹弒逆之禍可為明戒故也若我文皇拒絶姦徒丹令自食正得裴鄰止惑之要而又毁方書以拔禍本真超出千古之見也蓋死生之際人所甚難程頥曰吾受氣甚薄正以偷安忍死為可愧爾朱熹曰刀圭一入口白日生羽翰但曰偷生詎能安終不以為無是理也惟真德秀乃曰春夏不能長春夏而有秋冬旦晝不能長旦晝而有暮夜闔闢之循環往來之更代此天地之性也榮必易之以瘁盛必繼之以衰有終則有始有殺則有生此萬物之情也人在天地間是亦一物爾而神仙之學者曰吾能長生而不死有是理乎嗚呼盡之矣愚復何言哉羊祜從甥王衍詣祜論事詞甚清辨祜不然之衍拂衣去祜顧謂賔客曰王夷甫方當以盛名處大位然敗俗傷化必此人也王衍為尚書令善清談宅心事外名重當世朝野之人多慕效之與弟澄好品評人物舉世以為儀凖少時山濤見之嗟嘆良久曰何物老嫗生此寧馨兒然誤天下蒼生未必非此人也桓溫自江陵北伐與僚屬登平乘樓望中原嘆曰遂使神州陸沈百郡丘墟王夷甫諸人不得不任其責蘇轍曰漢之儒者雖不聞道而能守禮故在朝廷則危言在鄉黨則危行皆不失其正至魏武好法術而天下貴刑名魏文慕通達而天下賤守節相乘不已而虛無放蕩之論盈於朝野何晏鄧揚導其源阮籍父子漲其流而王衍兄弟卒以亂天下要其終皆以濟邪佞成淫欲惡禮法之繩其姦也臣良勝曰晉亡於外裔而自亡於無禮中國之異於外裔有禮也晉之無禮清談者廢之也清談之流如庾如何如殷如阮何可勝責臣獨詳於衍者山濤識之尚在晉未平吳之先桓溫責之已在漢已遷晉之後羊祐興晉之人未死而王衍滅晉之人已生明者覩於未萌況已著乎易曰履霜堅冰至辨之早也及其流風播蕩寢已成俗雖賢者未免受變而不之覺若王導謝安江東之望導置艷姬别室悍妻窘辱自執玉麈操短轅車以往馳驅周道不以為愧謝安挾妓登山自任為達期功不廢絲竹故人之諫有不受也當時學者以老莊為宗而黜六經談者以虛蕩為辨而賤名實居身以放濁為通仕進以茍得為賢當官以地坐為最獨傅咸一糾邪正遂以俗夫譁之而懷愍昏愚其何以挽末流之弊臣謂橫議之禍交於七國清談之禍遍於六朝其歸一也衍之罪豈特亡晉已哉右衍害道之防孟子曰五霸者三王之罪人也趙岐曰五霸齊桓晉文宋襄秦穆楚莊也戊辰諸侯盟于葵丘胡安國曰會盟同地再言葵丘何也書之重詞之復其中必有大美惡焉葵丘之盟美之大者也初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育才以彰有德三命曰敬老慈幼無忘賔旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰毋曲防毋遏糴無有封而不告曰凡我同盟之人既盟之後言歸于好以是為盡禁矣諸侯咸諭乎桓公之志蓋束牲載書而不歃血也是故會盟同地再言葵丘美之也臣良勝曰五霸齊桓為盛齊桓之霸葵丘為盛觀其當宰孔賜胙而將後命曰毋下拜曰天威不違顔咫尺下拜登受雍容禮節且不敢以盟詞瀆孔何其盛也宰孔歸遇晉侯則曰可無會也齊侯不務德而勤逺略故北伐山戎南伐楚西為此會也東略之不知西則否矣未幾而叛者九國卒如所料何也王道之所以吹彈不破只是有本也故文王南國之化自刑于寡妻始桓公三王姬徐嬴祭姬皆無子內嬖如夫人者六人長衛姬生武孟少衛姬生惠公鄭姬生孝公葛嬴生昭公密姬生懿公宋華生雍桓公屬孝公於宋襄以為嗣而雍巫有寵衛共姬因寺人貂薦羞亦許之立武孟閨門本原之地潰亂若此而固欲以易樹子妾為妻為諸侯禁是猶木拔其本雖枝葉蔽虧人固知其不日以瘁矣至其寢疾求食不得蒙袂以死曰何面目見仲父殮葬且不如期兵戈交亂其國豈但不及東略與九國之叛而已乎冬十一月己巳朔宋公及楚人戰于泓宋師敗績胡安國曰泓之戰宋襄公不厄人于險不鼓不成列先儒以為至仁大義雖文王之戰不能過也而春秋不與何哉物有本末事有終始順事恕施者王政之本也不仁非義襄公敢為而獨愛重傷於二毛則亦何異盜跖以分均出後為仁義陳仲子以避兄離母居於陵為廉乎穀梁傳曰人之所以為人者言也人而不能言何以為人言之所以為言者信也言而不信何以為言信之所以為信者道也信而不道何以為信道之貴者時其行勢也臣良勝曰嘗考襄公之素其初讓國於目夷曰長且仁目夷曰能以國讓仁孰大焉其母既歸思之而弗敢迎作河廣之詩亦守母出廟絶之禮本原之地似亦可觀兹以假言仁義取兵敗身傷之辱穀梁子蓋矜其時勢之阻於道也不然襄於尊王攘裔之功一莫之建君子儕之桓文之列豈無謂哉公會晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土胡安國曰周室東遷所存者號與祭爾其實不及一小國之諸侯晉文之爵雖曰侯伯而號令天下幾於改物實行天子之事此春秋之名實也與其名存實亡猶愈於名實俱亡是故天王下勞晉侯于踐土則削而不書去其實以全名所謂君道也父道也晉侯以臣召君則書天王狩于河陽正其名以統實所謂臣道也子道也而天下之大倫尚存而不滅矣臣良勝曰晉文之業最盛於踐土之盟而禮文可述與齊桓葵丘之盟等方其獻楚之捷而王享之錫之䇿命詞曰重耳敢再拜稽首奉揚天子之丕顯休命出入三覲以成禮焉東遷之後王命不行於天下而桓文之霸又為最盛桓之賜級文之䇿命成君臣統體春秋以尊王為本故不得已而與桓文也至於襄王下勞之事臣竊疑焉按傳作王宫於踐土鄉役之三月四月有城濮之戰五月而有踐土之盟豈襄王逆知晉捷而預作王宫以待勞乎且晉侯初志曰欲求諸侯莫如勤王豈敢恃功而要王親勞以徼寵榮若是乎意者王宫既成而王在焉晉文有楚捷即王宫以獻王享之錫之䇿命名實固存焉爾然則襄王實無下勞之嫌非春秋削之也秦誓曰昧昧我思之如有一個臣斷斷猗無他技其心休休焉其如有容焉人之有技若已有之人之彥聖其心好之不啻若自其口出是能容之以保我子孫黎民亦職有利哉蔡沈曰杞子自鄭使告于秦曰鄭人使我掌其北門之管若潛師以來國可得也穆公訪諸蹇叔曰不可公辭焉使孟明西乞白乙伐鄭晉襄公率師敗秦師于殽囚其三帥穆公悔過誓告羣臣史録為篇昧昧而思者深潛而靜思休休易直好善之意容有所受也黃鳥詩曰交交黃鳥止于棘誰從穆公子車奄息惟此奄息百夫之特臨其穴惴惴其栗彼蒼者天殱我良人如可贖兮人百其身朱熹曰秦穆公卒以子車氏之三子為殉皆秦之良也國人哀之為之賦黃鳥君子曰秦穆公之不為盟主也宜哉死而棄民先王違世猶貽之法而況奪之善人乎今縱無法以貽後嗣而又收其良以死難以在上矣君子是以知秦之不復東征也按史記秦武公卒初以人從死從者六十六人至穆公遂用百七十七人而三良與焉蓋其初特出於夷狄之俗而無明王賢伯以討其罪於是習以為常雖以秦穆公之賢而不免論其事者亦徒閔其三良之不幸而嘆秦之衰至於王政不綱諸侯擅命殺人不忌至於如此則莫知其為非也嗚呼俗之弊也久矣其後始皇之葬後宫皆令從死工匠生閉墓中尚何怪哉臣良勝曰秦穆於桓文之功一無見於中國然得稱為伯者止以秦誓之作能悔過改圖而思得休休容善之大臣也孔子遂書與帝王述作並傳不特名列霸統而已至讀黃鳥之詩則其收三良以殉罪通天矣當時從者百七十七人使非三良在數則黃鳥之詩無作穆之罪隱與武公等爾嗚呼善人天地之紀也一思容之則進之不已一或虐之則罪之不貸聖賢之意微矣惟聖明有以察之楚子入陳胡安國曰按左氏傳楚子為夏氏亂故謂陳人無動將討于少西氏遂入陳殺徴舒轅諸栗門而經先書殺後書人者豫楚子之能討賊故先之也討其賊為義取其國為貪舜跖之相去逺矣其分乃在善與利爾楚莊以義討賊勇於為善舜之徒也以貪取國急於為利跖之徒矣為善與惡特在一念須臾之間而書法若此春秋傳心之要典不可不察也臣良勝曰楚莊之伯在此舉爾而義之不終已不足貴雖名為伯而會盟征伐之權一歸之晉而不少假之者春秋之微意也桓文之霸有所從事皆假尊周為名楚莊則假威以蓄窺周之志爾先是數年嘗伐陸渾之戎遂觀兵周疆問鼎之大小輕重焉王孫滿對曰在德不在鼎昔夏之方有德也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦故民入山林川澤不逢不若魑魅魍魎莫能逢之用能協于上下以承天休桀有昏德鼎遷于商載祀六百商紂暴虐鼎遷于周德之休明雖小重也其姦回昏亂雖大輕也天祚明德有所底止成王定鼎于郟鄏卜世三十卜年七百天所命也周德雖衰天命未改鼎之輕重未可問也夫以莊之桀黠伐隨之後既僣稱王其問鼎之言隱然冦周之志矣春秋不得已而與伯以其猶知尊王也若莊無王之甚而與之以霸權可乎哉董仲舒曰夫仁者正其誼不謀其利明其道不計其功是以仲尼之門五尺童子羞稱五伯為其先詐力而後仁義也真德秀曰孟子之後能深闢五伯者惟仲舒為然漢宣帝太子仁柔好儒嘗侍燕從容言曰陛下持刑太深宜用儒生帝作色曰漢家自有制度本以霸王道雜之奈何純任德教用周政乎司馬光曰王霸無異道皆本仁祖義任賢使能賞善罰惡禁暴誅亂顧名位有尊卑德澤有深淺功業有巨細耳非若黑白甘苦之相反也張栻曰王道如精金美玉豈容雜也雜之則是亦霸而已矣程皓曰得天理之正極人倫之至者堯舜之道用其私心倣仁義之偏者伯者之事也王道如砥本乎人情出於禮義若履大路而行無復回曲伯者﨑嶇反側於曲徑之中而卒不可以入堯舜之道真德秀曰皓之言與孟子仲舒之言相表裏聖祖御白虎殿閲漢書侍臣宋濂孔克仁在側上顧謂濂等曰漢之治道不能純乎三代者其故何也克仁對曰王霸之道雜故也上曰髙祖創業之君遭秦滅學之後干戈爭戰之餘斯民憔悴甫就蘇息禮樂之事固所未講獨念孝文為漢令主當制禮作樂以復三代之舊乃逡巡未遑使漢家之業終於如是夫賢如漢文而猶不為將誰為之乎帝王制作貴於及時三代之主蓋有其時而能為之若漢文之有其時而不為也可不惜哉臣良勝曰伏讀聖諭云漢之治道不能純乎三代則不滿於雜霸之治可以仰見純之一字提出王道之綱如指諸掌即荀況所謂粹而王雜而伯之别也是以創業垂統凡所制作已足繼三代之隆無遺慮者聖子神孫恪遵成憲足保熙洽之治而輕議變法者不容於清明之朝矣若夫宅心廣淵待時以舉而未克盡臻于隆古者固亦有望於孝文之足漢治也孔子稱武王周公為達孝而曰善繼人之志善述人之事者也聖祖之心即孔子之言也故曰禮樂積德百年而後興又聖祖不言之懿訓也哉右術雜道之辨中庸衍義卷二
