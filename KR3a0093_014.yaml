body:
  text: 中庸衍義卷十四明夏良勝撰三重之義因革之禮朝廷之禮郊祀之禮正樂之禮宗廟之禮履象曰上天下澤履君子以辨上下定民志程頥曰君子觀履之象以辨别上下之分以定其民志夫上下之分明然後民志有定民志定然後可以言治民志不定天下不可得而治也古之時公卿大夫而下位各稱其德終身居之得其分也位未稱德則君舉而進之士修其學學至而君求之皆非有預於已也農工商賈各勤其事而所享有限故皆有定志而天下之心可一後世自庶士至于公卿日志于尊榮農工商賈日志於富侈億兆之心交騖於利天下紛然如之何其可一也欲其不亂難矣此由上下無定志也君子觀履之象而分别上下使各當其分以定民之心志也豫象曰雷出地奮豫先生以作樂崇德殷薦之上帝以配祖考臣良勝曰禮樂一道也言禮必及樂言樂必及禮禮以其序也非和則乖樂以其和也非序則亂臣故於議禮而以樂類記之且豫之作樂以薦上帝配祖考則郊祀之禮也夫樂與天地同和也天地之和無所於見惟當雷出地奮之時而萬物發生悅豫以從和之徴也故先王作樂有象於此是同天地之和矣然而樂之為用若朝聘祭享之用各有所專惟用於郊以薦上帝而配祖考者為最盛周禮曰圜丘之奏樂極九變是也舉其盛者其他可知也然皆所以崇德而已故周公郊祀后稷以配天宗祀文王以配上帝禮樂之盛也和豫之極也崇德之至也豈特曰子孫之禮哉成王六年周公朝諸侯于明堂制禮作樂頒度量而天下大服樂曰勺言能勺先祖之道也又作樂曰武以象武王伐紂之功臣良勝曰明堂者孝經以為宗祀之所孟軻以為王政之堂月令又天子逐月居之胡寅以為天子之外朝也其制之詳已不可考大略則青陽列左總章環右𤣥堂在後太室居中上下象天地之儀四方凖時叙之則周旋備辟雍之制經畫有井田之規是非周公為之也夏曰世室商曰重屋周曰明堂周公禮樂既成於是而頒之也其所謂禮者即今所謂曰禮者是也周禮在孟子時已不得聞其詳而班爵祿又政之大者論既不同典籍又經秦火而今所存猶完書也是以後世多疑非周公之舊也漢時已失傳至符堅時韋逞之母獨能通之年已八十餘命博士受講設絳帷時號宣文君意者今所存本即韋母所傳者也勺武之歌周頌備矣而孔子謂賔牟賈曰總干而山立武王之事也發揚蹈厲太公之志也武亂皆坐周召之治也又舞之象功者與漢高帝悉去秦苛儀法為簡易羣臣飲酒爭功醉或妄呼拔劍擊柱帝厭之叔孫通說上曰儒者難與進取可與守成臣願徴魯諸生與臣弟子共起朝儀帝曰得無難乎通曰五帝異樂三王不同禮二者因時世人情為之節文也臣願采古禮與秦儀雜就之上曰可試為之令易知度吾所能行為之魯有兩生不肻行曰今天下初定死者未葬傷者未起又欲起禮樂禮樂所由起積德百年而後可興也吾不忍為公所為公往矣通笑曰鄙儒不知時變遂與所徴三十人西及上左右為學者與其子弟百餘人為綿蕞野外習之初秦有天下采內六國禮儀采其尊君抑臣者存之及通制禮大抵皆習秦故司馬光曰禮之為物大矣用之於身則動靜有法而百行備焉用之於家則內外有别而九族睦焉用之於鄊則長幼有倫而俗化美焉用之於國則君臣有叙而政治成焉用之於天下則諸侯順服而紀綱正焉豈特几席之上户庭之間得之而不亂哉夫以高祖之明達聞陸賈之言而稱善覩叔孫之儀而嘆息然所以不能並肩於三代之王者病於不學而已當是之時得大儒而佐之與之以禮為天下其功烈豈若是而止哉惜夫叔孫生之為器小也徒竊禮之糠粃以依世諧俗取寵而已遂使先王之禮淪沒而不振以迄于今豈不痛甚哉漢章帝時博士魯國曹褒上疏以為宜定文制著成漢禮太常巢堪以為一世大典非褒所定不可許帝知儒生拘攣難與圖始朝廷禮憲宜以時立乃拜褒侍中𤣥武司馬班固以為宜廣集諸儒共議得失帝曰諺言作舍道傍三年不成㑹禮之家名為聚訟互生疑異筆不得下昔堯作大章一夔足矣帝召褒授以叔孫通漢儀十二篇曰此制散略多不合經今宜依經條正使可施行晉武帝更定元㑹儀考夏后殷周之典采秦漢以來舊儀雜用之至於郊廟明堂禮樂權用魏儀蓋遵周室肇稱殷禮之義唐太宗命房𤣥齡魏徴與禮官學士等因隋之禮增以天子上陵朝廟養老大射講武讀時令納皇后皇太子入學太常行陵今朔陳兵太社等為吉禮六十一篇賔禮四篇軍禮二十篇嘉禮四十二篇凶禮十一篇是為貞觀禮唐𤣥宗命李鋭與諸學士刋定五禮鋭薨蕭嵩繼之及起居舍人王仲立請依顯慶祈榖大雩明堂皆祀昊天上帝嵩又請依上元敕父在為母齊衰三年皆從之新禮成上之號曰開元禮宋太祖時太常博士聶崇義上三禮圖詔太子詹事尹拙集儒學之士參議於是翰林學士竇儼詳閲定為十五卷詔頒行且圖于國子監講堂之壁神宗命太常寺置禮局以樞密直學士陳襄等為詳定官太常博士楊完等為檢討官又命龍圖直學士宋敏求同御史臺閣門禮院詳定朝㑹儀注洪武六年禮官上考定禮儀聖祖謂尚書牛諒曰禮者國之防範人道之紀綱朝廷所當先務不可一日無也自元氏廢棄禮教因循有年而中國之禮變易幾盡朕即位以來夙夜不忘思有以振舉之以洗汚染之習故嘗命爾禮部定著禮儀今雖成宜更與諸儒參詳考議斟酌先王之典以復中國之舊務令人情永為定式庶幾愜朕心也聖祖諭廷臣曰古昔帝王之治天下必定禮制以辨貴賤明等威是以漢高初興即有衣錦繡綺教操兵乘馬之禁厯代皆然近世風俗相承流於奢侈閭里之民服食居處與公卿無異貴賤無等僭禮敗度此元之失政也中書其以房舍服色等第明立禁條頒布中外俾各有所守以正名分臣良勝曰孔子嘗曰殷因於夏禮所損益可知也周因於殷禮所損益可知也世代相承因革興禮救其弊而舉其偏皆英君誼辟之所欲為也若漢祖雜於秦儀遂久亡於周禮曹褒獨學羣議多遺晉武雖欲包舉並行而權用魏儀魏儀本文帝朝㑹洛陽宫從漢儀也傅𤣥諸人又何以當制作之責貞觀禮定於房魏固皆河汾舊學但王通嘗謂𤣥齡與徴曰先輩雖聰明特達然非董薛程仇之比雖逢明主必愧禮樂是其師門已有定論而議者亦責房魏不能揚師之道使通之教鬱而不行所謂愧於禮樂者也開元又其下焉宋神宗禮局所定皆建隆中竇儼詳閲之制但其即位之四年用安石議特廢儀禮春秋貢舉不以取士庠序不以設官經筵不以進讀則當時所設詳定檢討官不可以言復古制矣胡安國謂其效使風俗日下莫之能遏則元之放棄禮教有由然者我聖祖一舉而振之悉以復古雅之常所謂禮樂待人而後行也信哉右衍因革之禮祭法有虞氏禘黃帝而郊嚳祖顓頊而宗堯夏后氏亦禘黃帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王石梁王氏曰此四代禘郊祖宗諸經無所見多有可疑雜以緯書愈紛錯矣蘇轍曰禮之所行義之所許也故禮雖先王未之有可以義起也舜禹之有天下則先王之未有也故堯雖非父而其德載於後世不可以不宗瞽雖其親而無功於人不可以私享二者皆義也至夏后氏郊鯀而宗禹此禹之子孫之禮也臣良勝曰記禮者於此假所關甚大蓋古今帝王祀天享帝尊祖嚴父之禮也而國語所載於此略異者有虞氏郊堯而宗舜也按記則舜之宗堯而不及瞽瞍至禹郊鯀堯舜並廢祀矣蘇轍遂謂鯀以治水死應勤事之法故為子孫之禮以舜不宗瞽而禹郊鯀皆義也然由舜之道非所以為父子也由禹之道非所以為君臣也書載舜之受禪則曰受命文祖文祖堯祖也禹之受禪則曰受命神宗神宗堯廟也以堯為神宗則舜之宗堯可知禹受舜之天下而遽改其度并廢堯舜之祀而尊其父使禹而非聖人也猶或為之己非天下萬世之公義孰謂禹之聖而有是哉然則何居臣謂郊禘古禮也配天嚴父周制也書曰肆類于上帝曰至于岱宗柴曰格于文祖曰歸格于藝祖皆别祀也至周公而後有郊祀后稷以配天宗祀文王於明堂以配上帝故有冬至之郊又有孟春祈榖之郊故謂之兩郊而禮文又異於古思文之詩則后稷配天之樂也我將之詩則文王配帝之樂也若虞夏固有宗舜郊鯀之制周公沿襲而行之孝經不以為周公之專美矣况宗祀之說亦惟以其功德之盛足配上帝而然若止於尊父之禮則當世一易之在成王之世則宗武王康王之世則宗成王為是何終周之世而未聞有易文王者哉是嚴父配天之說亦就周公初制此禮而言非通世之通禮也唯此義不明而後有圜丘方澤雩祀地祗明堂各以其祖父而分配之如開元禮者犯義為孝獻佞為忠大失周公之心矣然則何以有是記也國語因周制而沿及於上世文勝之史也達禮之家不祖於詩書典要而或泥於傳記之誣則違於天下萬世之公義者衆矣漢文帝增祀無祈詔曰朕獲執犧牲圭幣以事上帝宗廟十四年于今厯日彌長以不敏不明而久撫臨天下朕甚自愧其廣增諸祀壇場圭幣昔先王遠施不求其報望祀不祈其福右賢左戚先民後己至明之極也今吾聞祠官祀釐皆歸福于朕躬不為百姓朕甚愧之夫以朕之不德而躬享獨美其福百姓不與焉是重吾不德也其令祠官致敬無有所祈宣帝親奉祀詔曰蓋聞天子尊祀天地修祀山川古今通禮也間者上帝之祀闕而不親十有餘年朕甚懼焉朕親飭躬齊戒親奉祀為百姓蒙嘉氣獲豐年焉魏明帝營委粟山為圜丘詔曰曹氏世系出自有虞今祀圜丘以始祖帝舜配號圜丘曰皇皇帝乙方丘所祭曰皇皇后地以帝妃伊氏配天郊所祭曰皇天之神以太祖武皇帝配地郊所祭曰皇地之祗以武宣皇后配臣良勝曰杞之郊也禹也宋之郊也契也以天子之後存祀有郊也以諸侯之郊配祀無祖也是以援及之也後世沿此遂欲重其所出如曹魏以篡統而上援於帝舜李唐無所稱顯乃祖於老子聃不經甚矣至以帝妃父母分配天地瀆僭無章是之謂亂國僞制也豈禮也哉唐睿宗將有事于南郊諌議大夫賈魯奏曰郊之與廟皆有禘也禘於廟則祖宗合食于大祖禘于郊則地祗羣望合食于圜丘以始祖配享若有事之大祭非常祀也三輔故事祭于圜丘上帝后土位皆南向則漢嘗合祭矣時以魯言為然唐太宗貞觀十七年有事于南郊帝升壇皇太子從奠于時纍日陰雪是旦猶雲霧晦冥及升壇煙氛四散風景清朗文物昭應禮畢禮官讀謝天瑞文宋仁宗嘗謂輔臣曰前代禮神有祭玉今獨燔玉無乃闕禮朕奉祀天地祖宗豈於寶玉有惜哉其令有司議典禮敕內府尋閲美玉適回紇貢玉璞數十剖之皆美制為琮璧九器各二祭玉之備始復於此宋光宗紹熙二年合祭天地于圜丘風雨大作黃壇燭盡滅不能成禮而罷國朝丘濬曰聖祖初得天下築壇為南北郊冬至祀天于圜丘夏至祀地于方澤一如周禮之制行之數年風雨不時天多變異乃斷自宸衷復為合祭之禮而以正月行禮凡所謂六宗山川羣臣皆各為壇以從祀蓋復有虞之典於四千餘載之後每正歲之吉天子躬祀天地而以祖宗配享分命羣臣各獻二十四壇行之百年神祗饗答休徴屢應其克享天地之心而遍致明靈之格者非一日矣臣良勝曰濬之言蓋有以博求古今之要典聖祖之制蓋所以斟酌萬世所常行者也祀天之禮始於虞書舜之受終而類則及于山川巡狩而柴則遂行方望是地因天而祭也魯僭天子之郊卜而不從乃行望祭傳者曰有虞氏受終而望因於類巡狩而望因於柴不郊而望是以為譏也魯之用郊孟春乘大輅載弧䪅以祀帝于郊周正之孟春乃夏正之建子然云卜日則又非以冬至日為定期矣王制曰祭天地之牛角繭栗郊特牲曰器用陶匏象天地之性也周頌曰昊天有成命詩序曰祀天地也湯之伐夏用𤣥牡告于上帝神后武王伐殷告于皇天后土易曰作樂崇德殷薦之上帝以配祖考周禮曰大宗伯以禋祀祀昊天上帝不言祀地何名也祭法曰禘黃帝而郊嚳禘黃帝而郊鯀孝經曰郊祀后稷以配天宗祀文王以配上帝不言祀地何配也周禮曰王祀昊天上帝則服大裘不言祀地何服也而裘亦非夏至所宜服也意者天統乎地舉重而言也蘇軾於元祐間議合祀之禮曰祀上帝則地祗在焉朱熹曰社祭地又國中之大社宜于冡土者也故君子曰言郊則兼后土言社則兼稷是也惟周禮太師樂有曰樂六變而天神降八變而地祗出非謂兩祭而樂變之異正一舉樂而天地之感格有先後爾胡宏謂類祝巫造怪之詞吳徴謂之不經自相戾背至於蒼璧禮天黃琮祀地祀天於泰壇祀地於泰圻或亦相因之祀而分壇用器有不同爾至於隆冬露祀則有宋室皇壇燭滅之慮盛夏駿奔侍衛勞頓强力之容肅敬之心或有叔弓蒞事之變聖祖於歲首合祀而崇以殿屋作者之謂聖或有深意存焉愚臣淺陋何足窺淵微於萬一也聖祖作觀心亭召學士宋濓謂曰人心虛靈秉氣機出入操而存之為難朕罔敢自暇自逸譬魚之在井未免乎跳躑終不能度越範圍况有事於天地廟祀尤用祗惕致齊之日必端居亭中返視却聽上契冲漠體道凝神誠一弗二庶幾將事之際對越在天洋洋乎如臨其上卿為朕記之傳示來裔咸知朕志俾弗懈愈䖍宋濓拜手稽首揚言曰此心若存動靜合道建中建極之源清而弗擾庶績咸熙否則天飛淵淪惟欲之從而罔克攸濟治忽之機其始甚微不可不慎也東閣大學士吳沉進精誠録先是上將享太廟致齊于武英殿召沉等謂之曰朕閲古昔聖賢書其垂訓立教大要有三曰敬天曰忠君曰孝親若君能敬天臣能忠君子能孝親則人道立矣然其言散在經傳未易㑹其要領爾等其以聖賢所言三事以類編輯庶便觀覽至是書成上覽而善之賜名精誠録命沉序之文皇御武英殿覽存心録顧翰林侍臣曰適覽慕容超郊有異獸出壇側隋煬帝祀圜丘暴風未成禮而退後二人皆不旋踵而亡古人言惟德動天善則降祥不善則降殃但各以類應之又曰祭祀時固當誠敬亦必平素積纍善行乃可獲福若平日所行反道背德而於臨祭一時致其䖍恭豈有獲福之理臣良勝曰寶謨大訓未獲遍觀而載籍所稽僅得其槩然啖一臠者已足沾九鼎全牢之味仰窺祖宗於郊祀典禮惟在於仁孝誠敬之至以正其本至於儀文度數之末稽古宜今有不泥焉者爾右衍郊祀之禮萃亨王假有廟程頥曰王者萃聚天下之道至于有廟極也羣生至衆也而可一其歸仰人心莫知其鄉也而能致其誠敬鬼神之不可度也而能致其來格天子萃合人心總攝衆志之道非一其至大莫過於宗廟則萃道之至也祭祀之報本於人心聖人制禮以成其德爾臣良勝曰天下之物有萃有散皆有形之可見有聲之可聞凡散而可萃者皆謂之萃也惟祖宗既沒魂升魄散視無可見聽無可聞惟立廟設主若有馮依而萃之故當祭之時精誠感通焄蒿悽愴若有見乎其容聞乎其聲洋洋乎於上於左右矣夫既無形聲可見聞者猶有可萃之道况天下人心可無道以萃之也哉咸有一德曰嗚呼七世之廟可以觀德蔡沉曰天子七廟三昭三穆與太祖之廟七七廟親盡則遷必有德之主則不祧毁故曰七世之廟可以觀德臣良勝曰天子七廟古制也至周而有文武世室百世不祧後世遂沿此而有天子九廟之制德厚流光固其所也至漢而有同堂異室之制其實一廟而祀者九世至宋而太祖太宗以兄弟同為一世蔡襄上九廟十一世之制朱熹猶曰甚或無地以容鼎爼而陰損其數矣臣思伊尹陳此於太甲時謂七世之祖始祖也始祖百世不遷者若商之契也太祖則湯也其後太甲為太宗太戊為中宗武丁為高宗三宗并二祖皆不遷則五廟無祧主矣止遺二廟商王之立兄弟相及者衆沃丁之與太庚祖辛之與沃甲祖丁之與南庚則二人也小甲之與雍已太戊仲丁之與外壬河亶甲則三人也陽甲之與盤庚小辛小乙又四人也若以兄弟同為一世則一廟當列數主若各為一世則五廟不毁兄弟相及者祀不及曾祖三及四及者又何以為廟數也哉此皆古禮之不可考者臣故列之以俟正焉大傳曰禮不王不禘王者禘其祖之所自出以其祖配之方氏曰此禘也以其非四時之常祀故謂之間祀以其及祖之所自出故謂之追享以其比常祭為特文故謂之大祭以其猶事生之有享焉故謂之四獻祼名雖不同故通謂之禘也大事于大廟躋僖公左氏曰逆祀也於是夏父弗忌為宗伯尊僖公且明見曰吾見新鬼大故鬼小先大後小順也躋聖賢明也明順禮也君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食久矣故禹不先鯀湯不先契文武不先不窋宋祖帝乙鄭祖厲王猶上祖也是以魯頌曰春秋匪懈享祀不忒皇皇后帝皇祖后稷君子曰禮謂其后稷親而先帝也詩曰問我諸姑遂及伯姊君子曰禮謂其姊親而先姑也仲尼曰臧文仲其不仁者三不知者三下展禽廢六關妾織蒲三不仁也作虛器縱逆祀祀爰居三不知也胡安國曰大事祫也合羣廟之主食於太廟升僖於閔之上也閔僖二公親則兄弟分則君臣以為逆祀者兄弟之不先君臣禮也君子不以親親害尊尊故左氏則曰祀國之大事而逆之可乎子雖齊聖不先父食久矣公羊則曰其逆祀則先禰而後祖也榖梁則曰逆祀則是無昭穆也無昭穆則是無祖也閔僖非祖禰而謂之祖禰者何臣子一例也臣良勝曰君臣尊之至也父子親之至也權時措之宜定是非之公若石碏之於其子棄疾之於其父將有屈父子以伸君臣者兄弟云乎哉故漢宣帝為昭帝後唐宣宗以叔繼姪李景讓持不拜之議為當世所薄至元順帝祭告太廟至寧宗室問曰朕寧宗兄也當拜否劉聞對曰寧宗雖弟其為帝時陛下為之臣春秋時魯閔公弟也僖公兄也閔公先為君宗廟之祭未聞僖公不拜陛下當拜乃下拜噫以元君臣猶知審度以成禮在中國又當何如深省也漢元帝罷郡國廟詔曰蓋聞明王之御世也遭時為法因事制宜往者天下初定遠方未賔嘗因所親以立宗廟蓋建威銷萌一民之至權也今賴天地之靈宗廟之福四方同軌外藩貢職久遵而不定令疏遠卑賤共承尊祀殆非皇天祖宗之意朕甚懼焉傳不云乎吾不與祭如不祭其與將軍列侯中二千石諸大夫博士議郎議議廟禮詔曰蓋聞王者祖有功而宗有德尊尊之大義也存親廟四親親之至恩也高皇帝為天下誅暴除亂受命而帝功莫大焉孝文皇帝國為代王諸吕作亂海內搖動然羣臣黎庶靡不一意北面歸心猶謙詞固讓而後即位削亂秦之迹興三代之風是以百姓晏然咸獲嘉福德莫盛焉高皇帝為漢太祖孝文皇帝為太宗世世承祀傳之無窮朕甚樂之宋太祖建隆元年張昭等請依隋唐以來立四親廟從之復詔議追尊四代號諡於是判太常寺竇儼上議尊高祖眺為僖祖文獻皇帝曽祖珽為顯祖惠元皇帝祖敬為翼祖簡恭皇帝妣皆為皇后考宏殷為宣祖昭武皇帝太祖御崇元殿備禮册命因奉安神主于廟定制歲以四孟月及季冬凡五享朔望薦食薦新三年一祫以孟冬五年一禘以孟夏朱熹曰臣以為太祖受命之初未遑他事首尊四祖之廟後以太祖受命立極當為始祖而祫享東向其僖祖初無功德親盡當祧而已臣深考其說而以人心之所安者揆之則僖祖者太祖之高祖考雖厯世久遠功德無傳然四世之後篤生神孫應天順人以寧兆庶其功德蓋不必親自為之然後為盛也神宗議尊僖祖為始祖少府監孫固議曰漢高以得天下與商周異故太上皇不得為始祖光武中興不敢祖舂陵而祖高帝宋有天下傳之萬世太祖功也不當替其祀請以為始祖而為僖祖别立廟禘祫之日奉其祧主東向以伸其尊合所謂祖以孫尊孫以祖屈之意韓琦見而嘆曰孫公此議足以不朽矣寧宗時趙汝愚請祧僖宣二祖正太祖東嚮之位詔從之先是英宗祔廟已祧順祖欽宗祔廟又祧翼祖高宗升祔遂為九世十二室至是孝宗將升祔欲祧僖宣汝愚力主此議朱熹爭曰宋以僖祖為始祖如周后稷太祖如文王太宗如武王皆百世不祧但以太祖追帝僖祖之心推之則知太祖今日在天之靈必有不忍而不敢當者且致書汝愚曰丞相以宗支入輔王室無故毁撤祖廟以快其私其不祥亦甚矣漢劉歆毁廟議曰天子三昭三穆與太祖之廟而七諸侯二昭二穆與太祖之廟而五故德厚者流光德薄者流卑春秋左氏傳曰名位不同禮數亦異自上以下降殺以兩禮也七者其政法數可常數者也宗不在此數中宗變也茍有功德則宗之不可預為設數故於殷太甲為太宗太戊為中宗武丁為高宗周公為無逸之戒舉殷三宗以勸成王由是言之宗無數也然則所以勸帝者之功德博矣唐韓愈禘祫議曰臣博采前聞求其折衷以為殷祖𤣥王周祖后稷太祖之上皆自為帝又其代數已遠不復祭之故太祖得正東向之位子孫從昭穆之列禮所稱者蓋以紀一時之宜非傳於後代之法也傳曰子雖齊聖不先父食蓋言子為父屈也景皇帝雖太祖也其於獻懿則子孫也當禘祫之時獻祖宜居東向之尊景皇帝宜從昭穆之列祖以孫尊孫以祖屈求之神道豈遠人情又常祭甚衆合祭甚寡則是太祖所屈之祭至少所伸之祭至多比於伸孫之尊廢祖之祭不亦順乎漢哀帝時立共皇廟師丹議曰今定陶共皇太后共皇后以定陶共為號者母從子妻從夫之義也今欲立官置吏車服與太皇太后並非所以明尊無二上之義也定陶共皇號諡已前定義不得復改禮父為士子為天子祭以天子其尸服以士服子無爵父之義尊父母也為人後者為之子故為所後服斬衰三年而降其父母期明尊本祖而重正統也孝成皇帝聖恩深遠故為共王立後奉承祭祀今共皇長為一國太祖萬世不毁恩義已備陛下繼體先帝特重大宗承天地宗廟社稷之祀義不得復奉定陶共皇祭入其廟今欲立廟於京師而使臣下祭之是無主也又親盡當毁空去一國太祖不墮之祀而就無主當毁不正之禮非所以善厚共皇也宋仁宗時有上言請立劉氏七廟者太后以問輔臣衆不敢對魯宗道獨進曰若立劉氏七廟如嗣君何乃止臣良勝曰禮文繁漫所執各殊然本之古典參之人心固自有折其中而歸之正者天子七廟常也親盡而祧常也太祖東向亦常也若劉歆之議宗不可為常數是始祖不祧之外又有功德稱宗如商三宗者是七廟之外别有宗功德之廟如文武世室是也然西漢以高祖為太祖文帝為太宗武帝為世宗不若商周推及於契稷者矣唐以景皇帝為太祖則高祖父也韓愈禘夾之議欲以獻祖正東向之位則唐以高祖之父為始祖而景皇帝之祖父已在祧位常祭止矣宋孫固欲尊僖祖於禘祫如韓愈之議但别立廟則亦就祧而常祭尊於太祖即汝愚之意朱熹欲存九廟十二室之制即劉歆之議而始祖以僖祖百世不祧上比商周稷契斯盡之矣夫世之為薄議者曰功德無傳殊不思士人有一命之榮賈人有數金之積農家有百畝之産皆推本以為先世之澤曰積善之家之餘慶也况以萬乘之尊萬世之業而謂非其先世積纍以致然哉但封建既廢命官不擇于德而稱之故隱德無傳非若稷契其初命官封國史傳世有所紀爾且聞宗廟之制有德厚之道也有親厚之道也凡議廟祀臣欲從其厚者如熹之說然後為厚之至也若師丹宗道之議又當其變之變者而賴有是也故併録之國朝仁祖忌日聖祖詣廟祭畢退御便殿泣下不止已而謂起居注詹同曰往者吾父以是月六日亡兄以九日亡母以二十二日亡一月之間三喪相繼其何以堪終天之痛念之罔極嗚咽不勝左右皆泣不能仰視中書禮部定奏天子親祀圜丘方澤宗廟社稷若京師三皇孔子風雲雷雨聖帝明王忠臣烈士先賢等祀則遣官致祭郡縣立社稷有司春秋致祭庶人祭里社土榖之神及祖父母父母並得祀竈載諸祀典餘不當祀者並禁止聖祖諭之曰凡祭享之禮載致帛交於神明費出已帑神必歆之如庶人陌紙瓣香皆可格神不以菲薄而弗享者何也所得之物皆已力所致也若國家倉廩府庫所積乃生民脂膏以此為尊醪爼饌充實神庭徼求福祉以私于身神可欺乎惟為國為民祈禱如水旱疾疫師旅之類可也臣良勝曰古者天子七廟各自為堂自漢明帝以後始有同堂異室之制議者每欲復古然嘗聞季氏大夫之祀以日不足而繼之以燭他日子路與祭略其繁文質明行事晏朝而退夫子許以為禮若天子以尊安之體具冕服躬祼獻盡日行九獻以厯七廟斯在强力之夫猶以為難也將至於時遣祀而並廢之故漢高謂叔孫通曰度吾所能行者為之創業之主為後世慮也深矣臣嘗建議謂别廟之制卒難修復而異室之制尚須密邃世祀不止於創業當如劉歆之說宗無常數凡有功德則宗於世室足以勸守成之君從祀不止於武功當如景靈之制世有輔佐凡樹勳業則列於兩廡足以勵中興之臣獨愧精誠不足以上格天心疏淺不足以下諧時論寢格未行臣不勝惓惓望於今日文皇謂侍臣曰聞近俗之弊嚴於事佛簡於事其先果有之乎對曰間有之文皇嘆曰此蓋化不明之過朕於奉先殿旦夕祗謁未嘗敢慢或有微恙亦力疾行禮世人於佛老竭力崇奉而於奉先之禮簡略者蓋溺於禍福之說而昧其本也率而正之當自朕始爾臣良勝曰天子七廟建於外朝之東禮也祖宗復建奉先殿于宫中為朝夕䖍謁之所以義制禮者也蓋天子日必詣廟其禮為煩煩則瀆人子事死如生日不告面其禮為略略則簡是以朝夕則致䖍于宫中祭祀則對越于廟中禮之至義之盡也故文皇謂雖有微恙亦力疾以行所以率正天下之道實係乎此或者乃以為過禮而建節勞從省之議者臣則聞之程皓曰人子於親無過分之事凡力之能為者皆所當然也又曰人主一日接賢士大夫之時多親宦官宮妾之時少則所謂節勞尚有先於是者臣不勝犬馬惓惓之至右衍宗廟之禮玉藻曰朝辨色始入君日出而視之退適路寢聽政使人視大夫大夫退然後適小寢釋服陳澔曰臣入常先君出常後尊卑之禮然也視朝而見羣臣所以通上下之情聽政而適路寢所以决可否之計釋服釋朝服也舜典曰五載一巡守羣后四朝敷奏以言明試以功車服以庸蔡沉曰五載之內天子巡守者一諸侯來朝者四天子諸侯雖有尊卑而一往一來禮無不答是以上下交通而遠近和洽也程子曰敷奏以言者使各陳其為治之說言之善者則從而明考其功有功則賜車服以旌異之其言不善則亦有以告飭之也周官曰六年五服一朝又六年王乃時巡考制度于四嶽諸侯各朝于方嶽大明黜陟蔡沉曰五服侯甸男采衛也六年一朝㑹京師十二年王一巡守時巡者猶舜之四仲巡守也考制度者猶舜之協時月正日同律度量衡等事也諸侯各朝方嶽者猶舜之肆覲東后也大明黜陟者猶舜之黜陟幽明也疏數異時煩簡異制帝王之治因時損益者可見矣鹿鳴詩曰呦呦鹿鳴食野之芩我有嘉賔鼓瑟鼓琴鼓瑟鼓琴和樂且湛我有㫖酒以燕樂嘉賔之心范氏曰食之以禮樂之以樂將之以實求之以誠此所以得其心也賢者豈以飲食幣帛為悅哉夫婚姻不備則貞女不行禮樂不備則賢者不處也賢者不處則豈得樂而盡其心乎采菽詩曰采菽采菽筐之筥之君子來朝何錫豫之雖無豫之路車乘馬又何豫之𤣥衮及黼朱熹曰采菽采菽則必有筐筥盛之君子來朝則必有以錫豫之又言今雖無以豫之然已有路車乘馬𤣥衮及黼之賜矣其言如此者好之無已意猶以為薄也臣良勝曰朝廷之禮固亦多端而早朝巡守述職宴錫其大者也漢文帝時鄧通方愛幸申屠嘉入朝而通居上旁有怠慢之禮嘉奏事畢因言曰陛下愛幸羣臣則富貴之至於朝廷之禮不可以不肅罷朝嘉坐府中為檄召通詣丞相府不來且斬通恐言上上曰汝第往通詣丞相府免冠徒跣頓首謝嘉坐自如弗為禮責曰夫朝廷者高帝之朝廷也通小臣戲殿上大不敬當斬吏合行斬之通頓首出血不解上度丞相已困通使使持節召通而謝丞相曰此吾弄臣君釋之通既至為上泣曰丞相幾殺臣宋太宗崩皇后使王繼恩召宰相吕端議所立端知有變紿繼恩入書閣遂鎖之使人守之亟入宫后問端曰宫車已晏駕立嗣以長順也今將如何端曰先帝立太子正為今日今始棄天下豈可遽違命有異議邪后默然乃奉太子至福寧殿即位太子既立垂簾引見羣臣端平立殿下不拜請捲簾升殿審視然後降階率羣臣拜焉臣良勝曰嘉遇賢主端定嗣君而朝議慎肅乃如此者且議斬幸臣鎖奸竪皆為相權相業之難事文帝素容臣下守法而太宗謂吕端大事不糊塗此見之矣漢光武東巡羣臣上言即位三十年宜封禪泰山詔曰即位三十年百姓怨氣滿腹吾誰欺欺天乎曽謂泰山不如林放乎何事汚七十二代之編録羣臣不復言後上讀河圖㑹昌符曰赤劉之九㑹命岱宗上感此文乃詔梁松等按索河洛䜟文言九世當封禪者三十六事於是張純等復奏請封禪上許焉登山以璽親封玉牒檢胡寅曰登封之事原本於燔柴而失之者也詩書紀巡守而柴者記所謂祭天也至于岱宗陟其高山云者記所謂因名山也有山則因以為高無則于郊而壇其義類一也又有大事而告于上帝者武王克商始有天下此柴望而告也舍此則瀆矣記以饗帝于郊與升中於天為二事則傳者之失也然則七十二君之編録詩書禮典略不經見審有是事乃天下國家之盛舉堯舜禹湯文武成康之昭宣皆身致太平安得闕而弗講故前世論登封者莫善於許懋惜乎世祖之臣智不及此陷其君於過舉而不得聞也唐太宗時文武官請封禪上曰卿輩皆以封禪為帝王盛事朕意不然若天下乂安家給人足雖不封禪庸何傷乎昔秦始皇封禪而漢文帝不封禪後世豈以文帝之賢不及始皇邪且事天掃地而祭何必登泰山之巔封數尺之土然後可以展其誠敬乎羣臣猶請之不已上亦欲從之魏徴獨以為不可上曰公不欲朕封禪者以功未高耶曰高矣德未厚邪曰厚矣中國未安邪曰安矣四裔未服邪曰服矣年榖未豐耶曰豐矣符瑞未至邪曰至矣然則何為不可封禪對曰陛下有此六者然承隋末大亂之後户口未復倉廩尚虛而車駕東巡供頓勞費未易任也且陛下封禪則萬國咸集遠裔君長皆當扈從自今伊洛以東至于海岱煙火尚希灌莽極目此乃引逺裔入腹中示之以虛弱也况賞賚不資未厭遠人之望給復連年不償百姓之勞崇虛名而受實害陛下將焉用之范祖禹曰古者天子巡守于方嶽必告祭柴望所以尊天而懷柔百神也後世學禮者失其傳而諸儒之諂諛者為說以希世主謂之封禪實自秦始古無有也人主不法三代而法秦亦已謬矣太宗方明朝多賢臣而佞者猶倡其議獨魏徴以為時未可而亦不以其事為非也後議其禮徴亦預焉高宗明皇遂踵而行之終唐之世惟柳宗元以封禪為非嗚呼禮之失也久矣世俗之惑可勝救哉臣良勝曰鄙儒佞士破經壞禮亦至此哉天子諸侯孰有大於巡守述職之禮者乃因以導諛行佞侈德矜功視之考度同禮以慶以讓之典固不侔矣况儀衛供帳踰古萬倍縱非以封禪行而日踣道路歲無寧時長吏以倉卒不辦被誅民庶以煩勞不給生厭如秦隋之速亡者衆矣叔恬問於王通曰舜一歲巡五嶽而國不費民不勞何也通曰無他道也兵衛少而徴求寡也計後之勞費有能復於舜之舊者乎則省方之政息而述職之典行君處逸臣處勞其分然也三歲之期而百里之邑千里之郡數千里之方嶽陳職修禮其勞費能幾何哉此萬世常行之道也臣以光武太宗明智有餘未免終惑魏徴已出廷臣之右終不敢斥言其非無亦以巡守登望為故典與故特載之以戒夫後世假禮導君以濟其諂者漢高帝長樂宫成諸侯羣臣皆朝賀諸侯王以下吏六百石莫不震恐肅敬禮畢復置法酒諸侍坐殿上皆伏抑首以尊卑次起上壽無敢歡譁失禮者於是帝曰吾乃今日知皇帝之貴也宋太宗召宰相近臣賞花于後苑謂之曰春氣暄和萬物暢茂四方無事朕以天下之樂為樂令侍從詞臣賦詩賞花曲宴賦詩自此始章聖朝春月多召兩府兩制三館於後苑賞花釣魚賦詩自趙元昊叛西陲用兵廢缺甚久嘉祐末仁宗修故事羣臣和御製詩是日微寒韓琦首相卒章云曽參二十年前㑹今備台司得再陪時內侍都知任守忠常以滑稽侍上從容曰韓琦譏陛下仁宗愕然問其故守忠曰譏陛下游宴太頻仁宗為之笑時仁宗賜詩有云鶯留深樹久徘徊諸臣進和皆押徘徊字教坊進雜劇為數人尋稅第者詣一宅每至一處所觀玩不已問之則曰徘徊也一人笑曰可則可矣但未免徘徊太多耳臣良勝曰宋朝忠厚立國待士有禮故君臣宴㑹獨為盛傳但古今快意事美惡常相半君臣契合君子之幸小人之不幸也以仁宗韓琦君相濟美猶有忌譖若守忠者譖之不行而俳優亦敢以侮言進可不懼哉可不懼哉昔吳王孫休喜讀書與祭酒韋昭博士盛冲講論左將軍張布丞相濮陽興方貴寵用事恐昭冲切直陰言已過諌止之吳主曰孤之淺學羣書略遍但欲與昭等講論舊聞亦何所損君特恐昭等道臣下奸慝故不欲令入如此之事孤已自備不須昭等乃解也論者謂仇士良教其徒曰毋使人主近儒生其術乃自布始然則人臣幸際宋主之盛亦必有望於吳主之明而後免於張布任守忠之譖也漢王嘉論董賢封事曰陛下在國之時好詩書上儉節徴來所過道上稱頌德美此天下所以回心也初即位易帷帳去錦繡乘輿席緣綈繒而已共皇寢廟比比當作憂閔元元惟用度不足以義制恩輒且止息今始作治而駙馬都尉董賢亦起官寺上林中又為賢治大第開門向北闕引玉渠灌園池使者護作賞賜吏卒甚於治宗廟為賢治器器成奏御乃行或物好特賜其工自貢獻宗廟三宫猶不至此賢家有賔婚及見親諸官並共賜及蒼頭奴婢人十萬錢詔書罷苑而以賜賢二千餘頃均田之制從此墮壞奢僭放縱變亂陰陽災異衆多百姓訛言持籌相驚被髮徒跣而走乘馬而馳天惑其意不能自止或以為籌者䇿失之戒也臣良勝曰昔韓昭侯有弊袴而藏之曰明主愛一嚬一笑吾必待有功者錫豫之其慎也如此而哀帝之於董賢其濫也如此蓋帝以定陶親藩繼統視左右前後皆若非素與之人獨私於賢而腹心耳目有所寄焉爾但人主之於天下若天無私覆地無私載日月無私照奉三無私視天下民物皆吾公使之役况於左右臣工也哉且上有好者下必甚焉上而一於公也下皆公奉之而使其下者皆公矣上而有所私也下皆私媚之而使其下者皆私矣又不特賜豫之濫而已故曰明則公公則溥明通公溥其庶矣乎洪武初禮部奏定百官常朝班次及奏事等禮儀聖祖謂中書省臣曰朝廷之禮所以辨上下正名分不以賤加貴不以卑踰尊百官在列班序有倫奏對雍容不失其度非惟朝廷之尊抑亦天下四方瞻仰所在也今文武百官朝參奏事有未間禮儀者是禮法不嚴於殿陛何以肅朝廷乎凡今新任官及諸武臣以禮儀有不間習者令侍儀司官日於午門外演習之且命御史二人監視有不如儀者紏舉之百官入朝失儀者亦紏舉如律聖祖躬耕藉田遣官享先農禮成宴羣臣於壇所諭之曰耕藉田古禮也一以供粢盛一以勸農本也朕即位以來恆舉行之惟欲斯民知勸盡力於田畝以遂其養非事虛文也今禮成與爾等享胙于此非徒為宴飲之樂正欲羣臣知重農之意宋濓致仕歲一來朝是年九月入朝聖祖佇想已久廷問纍矣及至大喜加勞再三皇太子諸王皆歡動顔色翌日降敕符遣儀曹奉醪膳諸物抵寓館以賜自是日侍遊厯觀闕盤旋禁籞詢咨備至便殿侍食日晏始退上喟然嘆曰純臣哉方今四裔皆知卿名卿其自愛濓避謝不敢當歲暮辭還復遣中貴人賜上尊既行數日上問濓子璲曰朕疇昔之後夢見爾父笑談如曩時爾父雖去其容儀儼然在吾目中也臣良勝曰明良相遇千載為難若濓者真奇遇也聖祖優禮始終宴賜特厚所謂康侯庶馬晝日三接者矣精誠感通形諸夢寐惟高宗於傅說幾先未遇聖祖於濓情感既歸故古今殊絶事也若漢文帝於鄧通竟以幸佞有傷令德君子譏之曰不夢商岩夢鄧郎是也唐太宗亦夢遂良而飛雉入宫之對不知雉為吕后之名正協武才人之兆而謬舉陳倉之故曰得雄者王得雌者伯君子謂舍鼎耳而取陳寶非忠臣是也遂良非濓匹也而文帝太宗豈足為聖祖之倫哉文皇御右順門晚朝百官奏事畢召六部尚書近臣諭曰早朝四方所奏事多君臣之間不得盡所言午後事簡卿等有所欲言者亦可從容陳論毋以將晡朕倦於聽納蓋朕所欲言者亦欲及此時與卿等計議臣良勝曰晚朝議政祖宗之盛制也如是而接賢士大夫之時多矣如是而親宦官宫妾之時少矣且諸司面陳政事其心術之邪正謀猷之慎疏政務之舉廢不能自掩而人才之賢否高下得之疇咨聽覽之真賢者得以自盡不肖者亦無以自容凡黜陟進退自持權度左右權寵莫為之先奸雄無所庸術官無失人人無失職天下之治端在是矣是道也漢宣帝一行之丞相以下奉職而進以考功能然即於聽政之時急遽茍且辨訥失常容亦未盡所藴至如唐太宗置宏文館引內學士番宿更休宋朝邇英崇政延論從容夜直禁中不時召對第所選有限所聽或偏皆未若晚朝接對雍容公平正大一以養主德一以厲臣修一以别羣才一以防壅蔽一以絶讒諂一以遠幸佞一事而衆事集焉孝廟初年儒臣楊守陳嘗請復午朝之制亦未及於議政臣知有待今日也故備陳之永樂十四年周王楚王來朝謁孝陵上命東宫皇太孫及諸皇孫陪謁問侍臣拜位當何如楊士竒對曰二王尊屬當分列在前東宫稍後居中皇太孫又後亦居中諸皇孫與太孫同班而分别兩旁上出片紙書位次與士奇言合然下有六字未書授筆命足之遣依禮行遂以宸翰付士竒臣良勝曰禮者正名定分别嫌明微杜陵僭之階奪覬覦之志必於其微而謹之也齊僖公寵愛同母之弟仲年衣服禮秩如嫡遂貽姑棼之禍漢文帝以淮南王長而最親入朝從獵即與同輦終啓斗粟尺帛之謠吳孫權之愛魯王霸唐太宗之愛魏王恭而和與承乾之隙遂成大變文皇於弟於子於孫相序禮儀毫縷曲折皆入睿思其所鑒者遠矣所慮者深矣以此垂法而漢府暨諸王侍皇太子太孫謁壽陵尚有前人失腳後人把滑之喻所賴皇孫正言把滑在後逆折奸萌卒成竒䜟然則帝王埀法後嗣慮患於始禮數嫌疑之際亦謹於微也哉寧夏都指揮僉事韓誠來朝初誠言韃靼别部同居寧夏者有懷二心文皇未忍發既而果叛焉鎮兵所擒斬獲相半至是文皇曰朕於遠人來歸者皆推誠待之不疑早從爾言發兵擒叛何至多損物命然初不欲發兵者猶欲懷之以恩不謂野心終不可馴今悉就擒戮皆其自取也然爾忠議明於幾先朕嘉念不忘自今更加勉之命禮部賜誠鈔三百錠羊一腔酒五十瓶宴於㑹同館臣良勝曰文皇禮御韓誠謂其先事而燭擕二之奸當事而除腹心之變然止於宴賞未嘗進一官資乃知爵賞之典其重如此臣因思文皇神武足以鎮壓仁恩足以懷綏誠意足以威孚而歸附之人亦有背叛先儒云非我族類其心必異凡叛亂之階其禍不可長也昔晉武帝以逺裔降者建五郡而卒有劉淵石勒之亡晉唐太宗以突厥降者列兩鎮而因有回紇吐番之禍唐魏晉之際郭欽江統著徙戎論時不見用而有五戎之亂皆明鑒也聖祖平定中原而色目人亦有散居中州者然其先本中州人而染於元久處民間漸復本性有矣文皇以後一切降人羣處畿甸以其驍雄時亦調遣先臣丘濬嘗有深憂謂正統己巳之變亦有乘時易服為彼嚮導者欲預為散處之䇿而未得其便也臣謂宋太祖時嘗擇衛卒之驍勇者散在各州軍謂之軍樣若昉此意以此類驍雄出衆散之天下每衛所無過五人處以居室優以廩餼名以教師彼心無所疑勢必樂就而潛移陰制之機亦有行乎中者矣臣昔嘗聞此類舊亦處于南荒英廟時兵部尚書陳汝言阿順權臣將發去雲南兩廣達官取回大學士李賢言曰達人非我族類自古為中國患昔幸遷之江南遠方今復取來甚是不便英廟曰吾亦悔之嗚呼賢名臣也濬老儒也其為言為慮若此臣何人斯敢有謬議然犬馬一得之愚蓋掇取賢之所嘗言以補濬之所未備者爾伏惟聖明裁察右衍朝廷之禮子謂韶盡美矣又盡善也謂武盡美矣未盡善也朱熹曰韶舜樂武武王樂美者聲容之盛善者美之實也舜紹堯致治武王伐紂救民其功一也故其樂皆盡美然舜之德性之也又以揖遜而得天下武王之德反之也又以征誅而得天下故其實有不同者漢高祖時叔孫通用秦樂人制宗廟樂大祀迎神於廟門外奏嘉玉猶古降神之樂也皇帝入廟門奏永安猶古采齊肆夏也乾豆上奏登歌猶清廟之樂也登歌再終奏休成美神明既享之也皇帝就酒東廂奏來安美禮已成也又有房中祠樂高祖唐山夫人所作也劉安世嘗曰西漢樂章可齊三代舊見禮樂志房中樂十七章觀其格韻高嚴規模簡古駸駸乎商周之頌噫異哉此高帝一時佐命功臣下至叔孫通輩皆不能為此歌尋推其源乃唐山夫人所作服䖍曰高帝姬也韋昭云唐山姓也而漢初乃有此人縱使竹竿載馳方之陋矣然后妃傳中乃獨不載何也光武時益州傳送公孫述瞽師郊廟樂器葆車輿輦於是法物始備乃廣郊祀禮樂青陽朱明西皓𤣥冥及雲翹育命舞明帝時博士曹充上言漢再受命宜興禮樂引尚書璇璣鈴曰有帝漢出德治作樂名豫詔改大樂官曰大豫樂樂凡四品一曰大豫樂郊廟上陵諸食舉之二曰周頌雅樂辟雍六宗社稷用之三曰黃門鼓吹天子宴樂羣臣用之四曰短簫鐃歌軍中用之又采百官詩頌以為登歌唐太宗時太常少卿祖孝孫作唐雅樂上曰禮樂者蓋聖人緣物以設教爾治之隆替豈由於此御史大夫杜淹曰齊之將亡作伴侶曲陳之將亡作玉樹後庭花其聲哀思行路聞之皆悲泣何得言治之隆替不在樂也上曰不然夫樂能感人故樂者聞之則喜憂者聞之則悲悲喜在人心非由樂也將亡之政民必愁苦故聞樂而悲爾今二曲具存朕為公奏之公豈悲乎右丞魏徴曰古人稱禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉樂誠在人和不在聲音也司馬光曰禮者聖人之所履也樂者聖人之所樂也聖人履中正而樂和平又思與四海共之百世傳之於是乎作禮樂焉夫禮樂者有本有文中和者本也聲音者文也二者不可偏廢先王守禮樂之本未嘗須臾去於心行禮樂之文未嘗須臾遠於身興於閨門著於朝廷被於鄉遂比鄰達於諸侯流於四海自祭祀軍旅至於飲食起居未嘗不在禮樂之中如此數十百年然後治化周洽鳳凰來儀也太宗遽云治之隆替不由於樂何發言之易而果於非聖人也夫禮非威儀之謂也無威儀則禮不可得而行矣樂非聲音之謂也然無聲音樂不可得而見矣故曰無本不立無文不行奈何以齊陳之音不驗於今世謂樂無益於治亂何異睹拳石而輕泰山乎臣良勝曰樂之作難言也唐樂之作尤難言也西漢之樂失於長安光武平隴蜀而法物瞽師始備東漢之樂失於南陽曹操平荆州獲杜夔嘗為漢雅樂郎乃悉樂事至隋氏所傳本南北之樂梁陳吳楚之聲周齊二氏之音大唐繼之以反于正斯不亦尤難乎哉時祖孝孫正宫調呂才習音張文收考律呂古鍾十二近代自黃鐘一均變極七音餘並廢謂之啞鍾文收吹律調之乃響徹孝孫又為旋宫之法曰大樂與天地同和造十二和以法天下之成數亦可謂難能矣太宗禮樂之本一無足稱併聲音之文亦欲廢之豈足言樂其後命孝孫教宫人音樂不稱責之溫彥博王圭諌曰孝孫雅士乃使之教宫人又從而譴之臣竊以為不可嗚呼以太宗為之君以孝孫為之臣而云禮樂之治亦事虛文而已何足道哉宋神宗將有事于明堂大臣言祕書監致仕劉幾知音樂詔詣太常定雅樂幾言律主于人聲不以足度求合古今異時聲亦隨變猶以冠服加於今人安得而稱儒者泥古致詳於形名度數間而不知清濁輕重之用故求器雖合考於聲則不諧且古樂備清聲五季亂雜而廢請增之帝許焉樂成遂用于明堂臣良勝曰宋樂至是已五變矣太祖初竇儼奏改周樂章十二順為十二安而雅樂聲高近於哀思和蜆凖王林律較司天影尺製律呂樂始暢仁宗時詔胡瑗阮逸較鍾律韓琦謂四方多事雖樂韶濩無益也乃已後享明堂復詔瑗定之黃鍾律短而所奏音高又鍾弇直聲鬱不發劉義叟曰是謂害金將感心腹之疾乎是非義叟之言周樂師之言也周鑄無射伶州鳩曰王其心疾乎天子省風以作樂器以鍾之小者不窕大者不槬則和於物故和聲入於耳而藏於心窕則不咸槬則不容心是以感感實生疾今鍾槬矣王心弗堪若是言者真知樂也而世罕其人義叟亦習聞其說焉爾其後范鎮亦上樂書自謂得古法而司馬光竟議不合至以壺奕决之其勝者則曰大樂還魂矣夫以胡瑗韓琦范鎮司馬光諸賢卒無定論而劉幾以人聲驗之不必求合於古度雖為一時意見然於樂記之論則幾也記曰凡音者生於人心者也情動於中故形於聲聲成文謂之音樂之本也舍此而言樂皆泥於器數之末者洪武四年吏部尚書詹同禮部尚書陶凱製燕享九奏樂章成其曲一曰本太初二曰仰大明三曰民初生四曰品物享五曰御六龍六曰泰階平七曰君德成八曰聖道成九曰樂清寧先是聖祖厭前代樂章率用諛詞以為容悅甚者鄙陋不稱乃命凱等更製其詞至是上之命協音律者歌之謂侍臣曰禮以道敬樂以宣和不敬不和何以為治元時古樂俱廢惟淫詞艷曲更唱迭和又使異域之聲與正音相雜甚者以古先帝王祀典神祗飾為舞隊諧戲殿廷殊非所以導中和崇治體也今所製樂章頗協音律有和平廣大之意自今一切流僞喧譊淫䙝之樂悉屏去之洪武十七年聖祖諭禮部曰近命製大成樂器將以頒天下學校俾諸生習之以祀孔子朕思古人之樂所以防民欲後世之樂所以縱民欲其故何也古樂之詩章和而正後世之歌詞淫以奢古之律吕協天地自然之氣後世之律呂出人為知巧之私天時與地氣不審人聲與樂聲不比故雖以古之詩章用古之器數亦乖戾而不合凌犯而不倫矣手擊之而不得於心口歌之而非出於志人與樂判然為二而欲以動天地感鬼神豈不難哉其流已久救之甚難卿等宜究心於此庶幾可以復古人之意臣良勝曰大哉聖言禮樂之道備矣審如是追美於韶自武以下未足方也右衍正樂之禮中庸衍義卷十四
