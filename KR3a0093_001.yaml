body:
  text: 中庸衍義卷一明夏良勝撰天命之性之義正性之原論性之弊易乾彖傳曰乾道變化各正性命保合太和朱熹曰物所受為性天所賦為命太和隂陽㑹合沖和之氣也各正者得於有生之初保合者全於已生之後此言乾道變化無所不利而萬物各得其性命以自全也臣良勝曰世之有人人之有性皆本乎天也天之生人使之各得其性人君治人使之各遂其性君猶天也此臣託始於乾道之微意也孔子釋文王利貞彖詞而推原性命之藴子思謂天命之性葢本于此天以隂陽理氣渾融凝合神妙變化是生人物而各有所賦為性者故木之性仁火之性禮金之性義水之性智土之性信人得其全而兼備於萬善物得其偏而各舉於一端然而天地沖和之氣各隨所得而有所合此乾道所以遂于用而㑹于成故曰利貞而元亨之徳於是有終矣易繫辭上傳曰一隂一陽之謂道繼之者善也成之者性也真徳秀曰隂陽二氣流行於天地之閒來往循環終古不息是孰使之然哉理也理之與氣未嘗相離繼繼而出莫非至善在人則曰性焉理無不善性豈有不善哉臣良勝曰道者虚位也性者定名也性不可易道可名而上下者也故子思謂率性方名之道此言道則在受性之先矣何者隂陽氣也二氣交感繼以生育人物無有不善而以成全於人物者謂之性也是隂陽初氣猶有清濁不齊至於繼善成性則㑹于理合理與氣謂之性此隂陽所以為道也湯誥曰惟皇上帝降衷于下民若有恒性蔡沈曰天之降命而具仁義禮智之理無所偏倚所謂衷也人之禀受而得仁義禮智之理所謂性也臣良勝曰帝王言性自成湯始且當伐夏歸亳之時誕告天下與之更始即及于此此成湯所以作民君師之首務臣所以託始之微意也曰降衷言其中也曰若有言其順也惟其本然之中是以自然而順也使其有所偏倚必待矯揉造作求合於中則非性矣然不特曰性而曰恒性上帝降于下民者一而已不以聖豐不以愚嗇不以古有不以今無惟聖人為民物之主而盡君師之職則下民各遂其性矣所謂代天而理物也故曰克綏厥猷惟后烝民之詩曰天生烝民有物有則民之秉彛好是懿徳朱熹曰天生衆民有是物必有是則自百骸九竅而達之君臣父子夫婦長幼朋友無非物也而莫不有法焉如視之明聴之聰貌之恭言之順君臣有義父子有親之類是也是乃民所執之常性故其性無不好此美徳者真徳秀曰則者凖則之謂一定而不可易者也古人謂䂓矩凖繩衡為五則以其方員平直輕重皆天然一定之法故也臣良勝曰理存乎内而為性欲感乎外而為情情之善者性之善也今夫執途之人而譽之曰君子雖其所怨怒有喜色焉由其性中有君子之則也執途之人而毁之曰小人雖其所親愛有怒色焉由其性中無小人之則也以烝民之性無不好徳若此則聖人在天子之位秉性至善大有異乎凡民者其好徳之情當何如哉蕩之詩曰蕩蕩上帝下民之辟疾威上帝其命多辟天生烝民其命匪諶靡不有初鮮克有終朱熹曰蕩蕩之上帝其命乃多辟何哉葢天生衆民其命多不可信者葢其禀命之初無有不善而少能以善道自終是以致此大亂使天命亦罔克終疾威而多僻也臣良勝曰天之生人其初未嘗有僻命人之初生其性未嘗有僻民故天之於天下未嘗不欲大治而無亂也惟人不克終而失其受性之本遂使天不克終亦失其生人之本故世有辟民天有辟命而大亂極矣夫以烝民而好徳者由天之降衷也其鮮終者亦天之辟命也雖然豈上帝真有辟命哉罹亂之人疾呼而訴歸咎於天爾此詩本以憂厲王而作則致西周之亂者君也委罪於民而訴於天忠厚之意如此春秋傳劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則能者養之以福不能者敗以取禍臣良勝曰天下之至善者中而已矣以民生而受天地之中此性之所以善也中之所以善者無偏倚也一有偏倚若賢智之過愚不肖之不及皆非中也亦非能也故凡取禍在愚不肖固其所也在賢智亦多有之屈原之忠賈誼之達嬰禍非淺言足飾非知足拒諫者亦豈享天下之福哉必若堯舜禹湯文武之為君臯䕫稷契伊傅周召之為臣動罔弗中是謂能者養之以福劉子謂動作威儀為能者就成子受脤不敬出言非其至也樂記曰人生而静天之性也感物而動性之欲也物至知之然後好惡形焉好惡無節於内知誘於外不能反躬天理滅矣夫物之感人無窮而人之好惡無節則是物至而人化物也劉敞曰人生而静喜怒哀樂未發之中天命之性也感於物而動則性發而為情也人心虚靈知覺事至物來則必知之而好惡形焉好善而惡惡則道心之知覺原於義理者也好惡無節於内而知誘於外則是道心昩而不能為主宰人心危而物交物則引之矣不能反躬以思其理之是非則人欲熾而天理滅矣況以無窮之好惡而接乎無窮之物則心為物役違禽獸不逺矣孔子曰性相近也習相逺也朱熹曰此所謂性兼氣質而言者也氣質之性固有善惡之不同矣然以其初而言則皆不甚相逺也但習於善則善習於惡則惡於是始相逺爾程顥曰此言氣質之性非言性之本也若言其本則性即是理理無不善孟子之言性善是也何相近之有臣良勝曰從古言性皆自其至善者言善則一而已矣至孔子迺言相近之性近則猶有間也葢世有治亂人有聖狂賦理雖善而受氣之清濁厚薄萬有不齊不相同而相近至習而有善惡之分乃相逺爾是非性之逺也習之逺也葢天之生人理氣渾融故氣以成形理以寓形二者不能相離固不可言性純於理而善亦不可言氣質之性有善惡也故臣謂孔子言性妙於近之一字朱熹釋註妙於兼之一字子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也朱熹曰文章徳之見乎外者威儀文詞皆是也性者人所受之天理天道者天理自然之本體其實一理也臣良勝曰聖人教人無非欲其入於善也所謂善者即性與天道之理也而子貢乃謂不可得而聞者性命之原精微之藴非惟學者之所難悟亦教者之所難言故夫子罕言仁而顔子亞聖止於問仁仁雖統乎萬善猶性之一體然則性豈可以易言哉其後佛氏以即心見性為教始有易言之者末學下流往往便談性命道徳以為飾澤之資殊失孔門授受難言之意孟子道性善言必稱堯舜朱熹曰性者人所禀於天之理也渾然至善未嘗有惡人與堯舜初無少異但衆人汩於私欲而失之堯舜則無私欲之蔽而能充其性爾程頥曰性即理也天下之理原其所自未有不善喜怒哀樂未發何嘗不善發而中節即無往而不善發不中節然後為不善故凡言善惡皆先善而後惡言吉凶皆先吉而後凶言是非皆先是而後非臣良勝曰孔子言性則兼氣質故曰相近孟子學孔子者也而言性一本於理故曰性善孟子豈異於孔子者哉葢有所矯而言也戰國之時邪説横流為我害仁兼愛害義若告子杞柳湍水之喻公都子有性善性不善之問皆將鑿性分而壊心術矣故孟子推本言之必曰性善且曰人皆可以為堯舜以見聖人可學而至此聖賢救世之心也若其論性孔子之言無遺藴矣夫人之生也氣嘗先理如人有心是氣也心之虛靈知覺乃其理也理無不善遇氣之清而厚者斯善矣若濁而薄者理亦為之少損故生人億兆而卒為聖者不一二為賢者不十百也若果盡歸於習則顔曽所習豈有不善欲至夫子之聖亦且甚難湯武反之視之堯舜性之終為有閒要之氣質所拘自有分限至於善惡相去之逺則由於習而理大異矣譬之泉水是理若出自石竇流於石澗到底清徹若出自泥沙流經汙潦雖云是泉而渣滓穢濁并其本性而失之故曰合理與氣有性之名也然謂人皆可為堯舜則必然者堯舜者聖之至也聖有全體之聖有具體之聖有一節之聖如夷之清惠之和也可以聖言有人於此或篤一行或善一事已到至處便使聖如堯舜不過如己所能是即所以為堯舜也故雖圉厮僕養之役若百里奚之飯牛而牛肥推之為孔子之畜蕃息者只是一理孟子豈大言欺世者哉孟子曰盡其心者知其性也知其性則知天矣存其心養其性所以事天也殀夀不貳脩身以俟之所以立命也張載曰由太虚有天之名由氣化有道之名合理與氣有性之名合性與知覺有心之名臣良勝曰孟子嘗言人可為堯舜是人性與聖為一此則言人性與天為一顧人之自盡其心何如爾天者理而已矣人心具而為性者即此天之理也是吾性中自有天也何他求哉故盡吾心以知性之理不至於差繆所以知天也存吾心以養性之理不至於䘮亡所以事天也持之終身一息尚存此志未懈則與天之悠久無疆者脗合無間將有以裁成天地之道輔相天地之宜天之命自我而立矣故曰聖人之心與天為一人君所以法天而立道求之性分有餘師矣孟子曰天下之言性也則故而已矣故者以利為本臣良勝曰孟子善言性者此則教天下之人言性也性藴於心非有形迹可指而言但因其發見已然之迹而推原其流行自然之運則言性而指掌矣若言性中有仁也則自見孺子入井而形惻隠之端言之推之而立愛惟親又推之而親親而仁民而愛物皆自然及之而無所矯拂則性之仁無餘言矣言義禮智信之性放此周敦頥曰或問曰曷為天下善曰師曰何謂也曰性者剛柔善惡中而已矣朱熹曰此性便是言氣質之性四者之中去却剛惡柔惡却於剛柔二善中擇中而主焉又曰性只是理然無那天氣地質則此理没安頓處但得氣之清則不蔽錮此理順發出來蔽錮少者發出來天理勝蔽錮多者則私欲勝便見得本原之性無有不善只被氣質來昏濁則隔了學以反之則天地之性存矣故説性須兼氣質方備程顥定性書曰所謂定者動亦定静亦定無將迎無内外茍以外物為外牽已而從之是以己性為有内外也夫天地之常以其心普萬物而無心聖人之常以其情順萬事而無情故君子之學莫若廓然而大公物來而順應朱熹曰定性者存養之功至而得性之本然也性定則動静如一而内外無閒矣天地之所以為天地聖人之所以為聖人不以其定乎君子之學亦以求定而已矣臣良勝曰由周子之言則有契於孔子相近之㫖由程子之言則有發於孟子性善之藴右衍正性之原荀況曰人性惡其善者偽也孟子曰人之不學而能者其性善也曰是不然是不及知人之性而察乎偽之情也蘇軾曰昔者嘗怪李斯事荀卿既而焚滅其書大變古先聖王之法於其師之道不啻若冦讐及今觀荀卿之書然後知李斯之所以事秦者皆出於荀卿而不足怪也荀卿者喜為異説而不譲敢為髙論而不顧者也子思孟軻世之所謂賢人君子也荀卿獨曰亂天下者子思孟軻也天下之人如此其衆也仁人義士如此其多也荀卿獨曰人性惡桀紂性也堯舜偽也其父殺人報讐其子必且行刼荀卿明王道述禮樂而李斯以其學亂天下髙談異論有以激之也臣良勝曰君子之立言也發於先而有光示諸後而無弊是以不朽善之不朽惡亦宜然孟子之言性善善之不朽者也荀子之言性惡惡之不朽者也由荀之惡廢孟之善積禍至李斯而發於秦焚書坑儒割裂封建破壊井田舉萬古聖賢成法而盡變之視桀紂之暴政為甚此其背於孔子孰大於是韓愈氏乃曰考其詞時若不粹要其歸與孔子異者鮮矣至蘇軾之論出而後學者之議始定嗚呼立言難矣知言豈易乎哉揚雄曰人之性也善惡混脩其善則為善人脩其惡則為惡人韓愈曰孟子之言性曰人之性善荀子之言性曰人之性惡揚子之言性曰善惡混夫始善而進惡與始惡而進善與始也混而今也善惡皆舉其中而遺其上下者也得其一而失其二者也叔魚之生也其母視之知其必以賄死羊食我之生也叔向之母聞其號也知必滅其家越椒之生也子文以為大戚知若敖氏之鬼不食也人之性果善乎后稷之生也其母無灾其始匍匐也則岐岐然嶷嶷然文王之在母也母不憂既生也傅不勤既學也師不煩人之性果惡乎堯之朱舜之均習非不善者也而卒為奸瞽瞍之舜鯀之禹習非不惡者也而卒為聖人之性果善惡混乎故曰三子之言性也舉其中而遺其上下者也得其一而失其二者也蘇軾曰善惡者性之所能知而非性之所能有者也且夫言性者安以其善惡為哉雖然揚雄之論則固已近之其所以為異者雄其不知性之不能有夫善惡而以為善惡皆出乎性也臣良勝曰從古聖賢為教為學只是理㑹此性至於文字又其末也於其末者致力而惑焉足以害性不足謂之文矣而何以為學為教云哉自荀況言性惡以壊孟子性善之説至揚雄而少變之曰善惡混葢將處荀孟之閒而自附於孔子相近之意殊不知理本一致但涉於氣則畧有差等而皆善也若以為一善一惡則固相逺矣昔人謂著書之誤甚於方書殺人況之誤逺故禍及於一世雄誤少減禍亦及於一身且人之有身是以有性既不知性何以有身故身有出處之大節而雄不知也身有死生之大數而雄不知也失身事莽著論美新一聞收捕之命遂投閣以死是以出處死生之際庸人俗士之所不為又何言性以累聖賢之教之學哉或者曰雄亦因已之迹而疑其性將謂天下之人猶已也司馬光謂其潜心於道之極致故其所得為多欲推尊於孟子之上至朱熹正史則直書曰莽大夫揚雄死噫雄之性果善惡混者哉韓愈曰性之品有上中下三上焉者善焉而已矣中焉者可導而上下者也下焉者惡焉而已矣蘇軾曰孔子之所謂中人可以上下而上智與下愚不移者是論其才也而至於言性未嘗斷其善惡曰性相近也習相逺也而已韓愈之説則又有甚者雜性以為情而合才以為性是故其論終莫能通又欲以書傳之所聞一人之事迹而折夫三子之論區區乎以后稷之岐嶷文王之不勤瞽鯀朱均之迹而明之聖人之論性也將以盡萬物之理與衆人之共知者以析天下之疑而愈欲以一人之才定天下之性且其言曰今日言性者皆雜乎佛老愈之説以為性之無與乎情而喜怒哀樂皆非性者是愈流入於佛老而不自知也蘇軾曰性之於人也可得而知之不可得而言也遇物而後形應物而後動方其無物也性也及其有物則物之報也惟其與物相遇而物不能奪則行其所安而廢其所不安則謂之善與物相遇而物奪之則置其所可而從其所不可則謂之惡皆非性也性之所有事也臣良勝曰甚哉文人之相忌也忌則將申其説以相勝夫既有勝人之心已失其性矣其所謂言心之聲也又安足以明性哉自孟子發性善之論程子謂其大有功於世擴前聖所未發者荀況則反而言之曰惡揚雄則合而言之曰混韓愈則包舉而專之曰三品其上則孟之善也其下則荀之惡也其中之可上下者則揚之善惡混也善惡之别至韓已悉而無以加蘇軾則欲一舉而棄之曰性中無善惡遇物所感而應之為善惡爾若果性中無物遇物所感能應而不能奪者果何物也以堯之性所遇不能無惡物以桀之性所遇不能無善物然而善惡之相違者豈中無物以主之哉以是言性亦老氏之無也佛氏之空也軾謂韓愈流入佛老而不自知臣謂蘇軾譏愈而適自狀也右衍論性之弊中庸衍義卷一
