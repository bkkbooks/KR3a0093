body:
  text: 中庸衍義卷四明夏良勝撰致中和之義中和之極修和之誠協和之徵戾和之咎文言曰夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎朱熹曰人與天地鬼神本無二理特蔽於有我之私是以牿於形體而不能相通大人無私以道為體曾何彼此先後之可言哉胡安國曰河出圖洛出書而八卦畫簫韶作春秋成而鳯麟至舜孔子先天者也先天而天弗違志一之動氣也伏羲氏後天者也後天而奉天時氣一之動志也臣良勝曰大人之所以合于天地日月四時鬼神者非有他也亦在體仁長人嘉㑹合禮利物和義貞固幹事吾之四德有以配乎乾之四德則吾性情即天也所謂性情即中和也天地之位萬物之育皆中和之應有求之而不得有避之而不能者矣豫彖曰天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉臣良勝曰豫者和也所以和者中也天地之順動天地之中和也聖人之順動聖人之中和也日月不過四時不忒刑清民服皆中和自然之應也無妄象曰天下雷行物與無妄先王以茂對時育萬物程頤曰天道生萬物各正其性命而不妄王者體天之道養育人民以至昆蟲草木使各得其宜乃對時育物之道也鼎上九鼎玉鉉大吉無不利程頤曰井與鼎以上出為用處終鼎功之成也在上鉉之象剛而溫者玉也九雖剛陽而居隂履柔不極剛而能溫者也居成功之道惟善處而已剛柔適宜動靜不過則為大吉無所不利矣臣良勝曰易以制器尚象器重而象備莫若鼎又以玉鉉當上之用而鼎之功成非鉉不足為全鼎矣玉之剛溫中和之德也君而體此則必善始令終而無矜高怠廢之慮矣臣而體此則必履滿知止而無持祿固寵之辱矣是皆所謂剛而能溫中和之道也是故君子於鼎之鉉有異觀焉益稷䕫曰戞擊鳴球摶拊琴瑟以詠祖考來格虞賔在位羣后德讓下管鼗鼓合止柷敔笙鏞以間鳥獸蹌蹌簫韶九成鳯凰來儀蔡沉曰按季札觀周樂見舞韶簫者曰德至矣盡矣如天之無不覆如地之無不載雖甚盛德蔑以加矣夫韶樂之奏幽而感神則祖考來格明而感人則羣后德讓徵而感物則鳯儀獸舞其所以能感召如此者皆由舜之德如天之無不覆幬也其樂之傳歷千餘載孔子聞之於齊尚且三月不知肉味曰不圖為樂之至於斯則當時感召從可知矣洪範曰八庶徵曰雨曰𤾉曰燠曰寒曰風曰時五者來備各以其敘庶草蕃廡蔡沉曰所驗者非一故謂之庶徵雨𤾉燠寒風各以時至故曰時也備者無闕少也敘者應節候也五者備而不失其序庶草且蕃廡矣則其他可知也雨屬水𤾉屬火燠屬木寒屬金風屬土臣良勝曰天地間道理不出五行故庶徵之目亦只是五行順布而萬物乃阜成也然其本原則在人君皇極之建所謂極者中和之極也故貌必恭恭乃作肅言必從從乃作乂視必明明乃作哲聽必聰聰乃作謀思必睿睿乃作聖五事既修五行自順而雨時以應肅𤾉時以應乂燠時以應哲寒時以應謀風時以應聖五福之來亦有類至者故五事之修天子中和之極也五行之順天地中和之極也五福之來天地以應天子之極也皆自然㑹通之理也若漢儒劉向則曰某事修則某休徵應而某福臻某事失則某咎徵應而某極從君子或病其固而不足以盡造化之妙故有欲并五行傳而廢之者矣騶虞詩曰彼茁者葭一發五豝吁嗟乎騶虞彼茁者蓬一發五豵吁嗟乎騶虞朱熹曰南國諸侯承文王之化修身齊家以治其國而其仁民之餘恩又有以及於庶類故其春田之際草木之茂禽獸之多至於如此而詩人述其事以美之曰此其仁心自然不由勉强是即真所謂騶虞矣胡安國曰周南關雎之化王者之風而麟之趾關雎之應也召南鵲巢之德先公之教而騶虞鵲巢之應也臣良勝曰文王仁厚所以刑寡妻御家邦推之以仁民愛物者皆致其中和之德也其感應之見於麟趾騶虞之詠者亦先天而天弗之違也大有年胡安國曰大有年紀異也旱乾水溢饑饉荐臻者災也山崩地震彗孛飛流者異也景星甘露醴泉芝草百穀順成者祥也大有年上瑞矣何以為紀異乎凡災異慶祥皆人為所感而天以類應之者也人事順於下則天氣和於上宣公弒立逆理亂倫水旱螽蝝饑饉之變相繼而作史不絶書宜也獨於是冬乃大有年所以為異乎夫有年大有年一也古史書之則為祥仲尼筆之則為異此言外微㫖非聖人莫能修之者也臣良勝曰天人一理也萬物一氣也則天之災祥物之瑞怪無不自人致之者然而天道亦有反常如宣公之獲大有年者非反常也享國十有八年僅一有年此所以為異非以有年為異也故凡天有咎徵則將省於己曰是否德以致乎雖無所致而修德以彌咎者不敢息也此堯湯水旱所以不為災也如有休徵亦將省於己曰是何德以堪乎若無所應而否德蒙休者益可懼也此桓宣有年所以為異也是以盛世治朝恆不言瑞而喪君敗國亦屢報祥楚莊王以國無災而曰天其亡豫元順帝時河清三日泫然涕曰代豫者至矣此又不可以祥異論者也西狩獲麟范寧曰先王之道既𢎞麟感化而來應因事備而終篇故絶筆於斯年王通曰春秋其以天道終乎故止於獲麟胡安國曰商王恭默思道帝賚良弼得於傅巖周公欲以身代其兄植璧秉圭而武王疾愈啓金縢之册天乃反風出罪己之言熒惑退舍至於勇夫志士精誠所格上致日星之應召物産之祥蓋有之矣况聖人之心感物而動見諸行事以遺天下與來世哉簫韶九奏鳯儀于廷魯史成經麟出于野亦常理爾禮運曰何謂四靈麟鳯龜龍謂之四靈故龍以為畜故魚鮪不淰鳯以為畜故鳥不獝麟以為畜故獸不狘龜以為畜故人情不失陳澔曰三靈物既馴擾如畜則其類皆隨從之雖見人亦不為之驚而飛走矣龜能前知人有所決以知可否故不失其情之正也又曰天不愛其道地不愛其寶人不愛其情故天降膏露地出醴泉山出器車河出馬圖鳯凰麒麟皆在郊棷龜龍在宫沼其餘鳥獸之卵胎可俯而窺也朱熹曰信是實理順是和氣體信是致中達順是致和實體此道於身則自然發而中節推之天下而無所不通也董仲舒曰為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正逺近莫不一於正而無有邪氣奸其間者是以隂陽調而風雨時羣生和而萬民殖諸福之物可致之祥莫不畢至而王道終矣臣良勝曰孔孟之後言王道者無如董子而董子之本於正心心者中和之極也其所以平治天下感召和氣王道之大成也孰謂董子但有儒者氣象已哉使其得究於用漢治豈終於雜伯乎嘗考漢廷言治莫若賈山獨明於利害也又若賈誼何急於制度也惟董子正心之論為賢卒為公孫𢎞所忌出相驕主竟尼不行及其既老而歸乃命公卿大政必往咨決而後從事武帝獨何心哉亦天未欲平治天下也公孫𢎞曰人主和德於上百姓和洽於下故心和則氣和氣和則形和形和則聲和聲和則天地之和應矣故隂陽和風雨時五穀熟六畜蕃嘉禾興朱草生山不童澤不涸此和之至也臣良勝曰公孫子曲學阿世其人無足取也然其和德之言漢廷公卿所不能道者是不可以人廢也或者謂其嘉禾朱草之說亦起武帝喜致祥瑞之心與倪寬以中和建極成封禪之詔杜鎬以神道設教遂天書之誣均一託經術以阿世云爾噫君子所以惡居下流也周惇頤曰古者聖王制禮法修教化三綱立九疇敘百姓太和萬物咸若程頤曰君子修己以敬篤恭而天下平惟上下一於恭敬則天地自位萬物自育而四靈畢至此體信達順之道也右衍中和之極伏羲氏帝德合於上下天應以鳥獸文章地應以河圖洛書於是始畫八卦造書契以代結繩之政黃帝順天地之紀幽明之占死生之說存亡之難時播百穀草木淳化鳥獸蟲蛾旁羅日月星辰水波土石金玉勤勞心力耳目節用水火財物由是民不習僞官不懷私市不預價城郭不閉見利不爭風雨時若人無夭札物無疵癘虎豹不妄噬鷙鳥不妄摶裔夷之人罔不來享有草生於庭佞人入則指之名曰屈軼鳯凰巢于阿閣麒麟遊于苑囿焉顓頊靜淵以有謀疏通而知事養材以任地裁時以象天依鬼神以制義治氣以教化潔誠以祭祀正月朔旦立春五星㑹于天歷營室鳥獸萬物莫不應和命飛龍氏㑹八風之音為圭水之曲以召氣而生物浮金效瑤於是鑄為之鐘作五基六英之樂以調隂陽享上帝朝羣后名曰承聖之樂帝堯其仁如天其知如神就之如日望之如雲有蓂莢生于階每月朔日生一莢至望生十五莢望後日落一莢月大盡月小一莢厭而不落因之作歷置閏焉舜曰樂天下之精得失之節䕫能和之以平天下一而足矣是時土地方五千里至于荒服南撫交址北發西戎析支渠搜氐羌北山戎發息慎東長島夷四海之內咸戴帝舜之功乃興九韶之樂致異物鳯凰來翔天下明德皆自帝始大禹南巡狩㑹諸侯于塗山承唐虞之盛執玉帛者萬國濟江黃龍負舟舟中人懼禹仰天而歎曰吾受命于天竭力以勞萬民生寄也死歸也余何憂於龍焉視龍猶蝘蜒禹顔色不變須臾龍俯首低尾而逝文王生時有赤爵銜丹書入于酆山其書云以仁得之以仁守之其量百世以不仁得之以仁守之其量十世以不仁得之以不仁守之不及其世其後文王之治岐也耕者九一仕者世祿罪人不孥發政施仁先于鰥寡孤獨有鳳凰鳴于岐山成王時有三苗貫桑而生同為一秀其大如車民得而上之成王問之周公曰此何也周公曰三苗同秀為一意天下其和而為一乎後三年越裳氏重譯而朝獻白雉周公曰德澤不加君子不饗其質政令不施君子不臣其人譯曰吾受命吾國之黃耉曰天無烈風淫雨海不揚波三年矣意者中國有聖人乎盍往朝之周公歸之於玉稱先王靈神致薦於宫廟臣良勝曰史册所載五帝三王恆有上瑞其至德充滿熏為太和固有是理然當時聖人以是徵德天下以是徵治未嘗以為符瑞誇當時而耀後世也漢光武時京師醴泉涌出又有赤草生於水涯郡國頻上甘露羣臣奏言靈物仍降宜令太史撰集以傳來世帝不納自謙無德郡國所上輒抑而不當故史官罕得記焉唐太宗曰比見羣臣屢上表賀祥瑞夫家給人足而無瑞不害為堯舜百姓愁怨而多瑞不害為桀紂後魏之世吏焚連理木煮白雉而食之豈足為至治乎嘗有白鵲構巢於寢殿之上合歡如腰鼓左右稱賀上曰我嘗歎隋帝好祥瑞瑞在得賢此何足賀命毁其巢縱鵲於野外唐德宗立澤州刺史李鷃上慶雲圖詔曰朕以時和年豐為嘉祥以進賢顯忠為良瑞如慶雲芝草奇禽奇獸怪異草木何益於人自今有此無得上獻宋仁宗時知無為軍茹孝標獻芝草三百五十本帝曰朕以豐年為瑞賢臣為寶至於草木蟲魚之瑞焉足尚哉免孝標罪戒天下自今無得獻瑞物臣良勝曰是四君者亦創業中興守成之賢主也時有盛瑞未敢便謂至德感和然其謙而不當抑而不尚皆盛德事也而當時之臣希恩獻諂其辱永不磨矣但光武不喜瑞矣乃以㑹昌符䜟而登封玉牒於向郤羣臣之請曰百姓怨氣滿腹之言棄之如遺德宗初政清切如此淄青軍士投兵而喜曰明主出矣卒有奉天之幸於術士桑道茂天子氣之言契之若符漢廷無名臣任三公者恆以吏事責之故請撰瑞記與請封禪者皆諂子蚩也崔祐甫不用而盧杞進陸贄既貶而裴延齡相安得有終唐太宗宋仁宗得免於咎時議登封而魏徵力諫以止時議日食不盡分而司馬光以為天下必有見者卒不賀然則人君有以保全令名亦貴於有臣乎哉洪武二年淮安寧國鎮江楊州台州府并澤州各獻瑞麥羣臣稱賀聖祖曰朕為生民主惟思修德致和以契天地之心使三光平寒暑時五穀熟人民育為國家之瑞蓋不以物為瑞也昔堯舜之世不見祥瑞曾何損於聖德漢武帝獲一角獸産九莖芝當時皆以為瑞乃不能謙抑自損撫穆民庶以安區宇好功生事卒使國內空虛民力困竭後雖追悔已無及矣其後神雀甘露之侈致山崩地震而漢德於是乎衰由此觀之嘉祥無徵而災異有驗可不戒哉洪武五年句容縣民獻嘉瓜二同蒂而生中書省臣率百官以進禮部尚書陶凱奏曰陛下臨御同蒂之瓜産於句容句容陛下祖鄉也實為禎祥蓋由聖德和同國家協慶故雙瓜連蒂之瑞獨見於此以彰陛下保民愛物之仁非偶然者聖祖曰草木之瑞如嘉禾並蓮合歡連理兩岐之麥同蒂之瓜皆是也卿等以此歸德於朕朕否德不敢當之縱使朕有德天必不示以一物之祥茍有過必垂象以遣告使我克謹其身以保其民不致於禍殃且草木之祥生於其土亦惟其土之人應之於朕何與若盡天地間時和歲豐乃王者之禎也洪武十八年四月五色雲再見禮部請率百官賀聖祖諭之曰天下康寧人無災害祥瑞之應固和氣所召昔帝舜有卿雲之歌在當時有元凱嶽牧之賢相與共致雍熙之治朕德不逮治化未臻豈可遽以是受賀前代帝王喜言祥瑞臣下從而和之往往不知省懼以致災異之來不復能弭蓋誇侈之心生則戒懼之志怠故鮮克有終可以為戒聖祖謂丞相汪廣洋曰朕觀前代人君多喜佞諛以飾虛名甚至臣下詐為瑞應以恣矯枉至於天災垂戒厭聞於耳如宋真宗亦號賢君初相李沆日聞災異其心猶存警惕厥後澶淵既盟大臣首啓天書以侈其心羣下曲意迎合茍圖媚悅致使言祥瑞者相繼於途獻芝草者三萬餘本朕思凡事惟在於誠况為天下國家而可以僞乎爾中書自今凡祥瑞不必奏如災異及蝗旱之事即時報聞廣洋叩首曰陛下敬天勤民孰大於此非惟四海蒼生䝉福誠為聖子神孫萬世之謨訓也永樂二年周王橚來朝且獻騶虞百僚稱賀文皇既罷朝謂侍臣曰適聞羣臣言不覺惕然天下之大如匹夫有怨豈得謂仁一念不誠豈能格天朕方夙夜思懼何可便謂騶虞是天降祥於朕侍臣曰聖志如此可以上格天心文皇曰祥瑞之來易令人驕是以古之人主皆遇祥自驚未嘗因祥自怠國之安危繫焉騶虞若果為祥在朕猶當加懼永樂十三年禮部尚書吕震奏麻林國進麒麟將至請於至日率羣臣表賀文皇曰往者翰林言修五經四書及性理大全書成欲上表進朕則許之蓋帝王修齊治平之道具於此有益世教可以表進麒麟有無何所損益遂已臣良勝曰仰惟祖宗建中和之極召天地之祥自古所未見也而立言垂世有謙讓之德焉有警戒之道焉有愛民之仁焉有尚賢之義焉有馭臣之權焉有柔逺之意焉自古所未聞也欲繪天地何以為容謹備録以為萬世之法右衍協和之徵震象曰洊雷震君子以恐懼修省臣良勝曰動萬物者莫疾乎雷天降災異所以警乎人君若洊雷之震其來無端其去無迹天之所以示警人君者仁愛之意猶存人之所以能回天意者修省之誠可格天人感應之理微矣堯典帝曰咨四嶽湯湯洪水方割蕩蕩懷山襄陵浩浩滔天下民其咨有能俾乂僉曰於鯀哉帝曰吁咈哉方命圯族嶽曰异哉試可乃已帝曰欽哉九載績用弗成蘇轍曰四嶽薦鯀於堯堯知鯀之不可用而屈於四嶽民被其害者九年後世疑之知其不可而用之不仁屈於四嶽而不能信不知豫嘗論之水之為害不可一日不治而人之知治水者雖聖賢有不能也是以堯舜皆不自治得禹而後濟方禹之未見也天下言治水者莫如鯀棄鯀而不試有不仁焉斯堯之所以用鯀也與臣良勝曰史傳相承謂堯有九年之水以書言觀之祇議鯀之九載弗績而言非天以隂沴之災警於堯也自洪荒以來天一生水雖經列聖未之修治至堯時猶未得所歸而懷山襄陵以為民害者未息故咨四嶽以鯀治之而愛民之心若天降災於己故舜之命禹亦曰洚水警豫此所以為聖人之仁也後王安石偏邪誤主遂云水旱常數堯湯不免蓋亦未審乎此矣成湯時大旱七年太史占之曰當以人禱湯曰吾所為請雨者民也若必以人禱吾請自當遂齊戒剪爪斷髮素車白馬身嬰白茅以身為犧牲禱於桑林之野以六事自責曰政不節與民失職與宫室崇與女謁盛與苞苴行與讒夫昌與何不雨之極也言未已大雨方數千里臣良勝曰成湯為民而不愛其身固格天之誠也然而太史之占以人禱恐非聖世之所宜有亦非聖人之所盡信也魯僖公時大旱欲焚巫尫臧文仲以為不可而止遂放佞臣理寃獄而雨其後穆公亦欲暴尫焚巫縣子以為不可則但徙市而已豈以魯公之所不為而成湯肯信而從之乎史氏之言亦足以見聖人愛民之心耳太戊元年亳有祥桑榖共生于朝七日大拱太戊問於伊陟伊陟曰妖不勝德君之政其有闕與太戊於是修先王之政明養老之禮早朝晏退問疾弔喪三日而祥桑枯死臣良勝曰祥桑生朝物異之甚七日而拱三日而枯足表格天之誠太戊固賢君也伊陟伊尹子也象賢若此信賢子哉文王寢疾而地動東西南北不出國有司曰地之動為人主也羣臣皆恐請興事動衆增國城以移之文王曰天之見殃以罰有罪我必有罪天以罰我請改行其可免乎於是謹其禮秩皮羊以交諸侯飾其辭令幣帛以禮俊士頒其爵列等級以賞有功無幾疾止臣良勝曰按伯陽父曰天地之氣不失其序若過其序民之亂也陽伏而不能出隂遁而不能蒸於是乎有地震然則地動之變亦隂陽愆伏之候而有司以為為人主也文王亦曰我必有罪天以罰我盛世君臣盡言不諱而交修以道如此高宗肜日越有雊雉祖己曰惟先格王正厥事蔡沉曰高宗祀豐于昵昵者禰廟也豐于昵失禮之正故有雊雉之異祖己自言當先格王之非心然後正其所失之事雲漢詩曰倬彼雲漢昭回于天王曰於乎何辜今之人天降喪亂饑饉薦臻靡神不舉靡愛斯牲圭璧既卒寧莫我聽朱熹曰舊說以為宣王承厲王之烈內有撥亂之志遇災而懼側身修行欲銷去之天下喜於王化復行百姓見愛故仍叔作詩以美之言雲漢者夜晴則天河明故述王仰訴於天之詞如此也胡安國曰昔高宗肜日雉升鼎耳異亦甚矣聽於祖己克正厥事故能嘉靖殷邦享國長久宣王之時旱魃蘊隆災亦甚矣側身修行遇災而懼故能興衰撥亂王化復行此皆以人勝天以德消變之驗也桓詩曰綏萬邦屢豐年天命匪解桓桓武王保有厥士于以四方克定厥家於昭于天皇以間之朱熹曰大軍之後必有凶年而武王克商則除害以安天下故屢豐年之祥傳所謂周饑克商而年豐是也然天命之於周久而不厭也故桓桓之武王保有其士而用之於四方以定其家其德上昭于天也衛人伐邢左氏曰衛大旱卜有事于山川不吉寧莊子曰昔周饑克殷而年豐今邢方無道諸侯無伯天其或者欲衛討邢乎從之師興而雨臣良勝曰衛文公克亂之君也大布之衣大帛之冠通工惠商敬教勸學武公之後斯最賢者其背德忘義莫甚於伐齊喪而滅同姓之邢也今師興而雨偶應克殷而豐之邪說然則天道亦有僭乎嗚呼天道亦微矣固有順之而絶逆之而愛者若衛者天益其疾而降之罰也秦皇欲渡海有神驅石而鞭之武瞾欲遊上苑萬花應時而發此豈天道真相淫人耶故衛文大師方還即已捐館天之盈罰亦似甚明寧子矯誣上天其後寧殖出君䝉惡無以保其宗天道冥冥詎可測哉若夫武王之師真時雨也周之饑也紂之虐也伐紂之虐救民於水火是為仁也焉得無豐臣憂寧子之邪言幸中將有奸回逆探其君之志假寧子以濟其慢天毒民之說者故辨之焉冬十月不雨春王正月不雨夏四月不雨六月雨榖梁傳曰不雨者勤雨也每時而一書閔雨也閔雨者有志乎民者也按詩稱僖公儉以足用寬以愛民務農重穀則誠賢君也其有志乎民審矣故冬不雨而書春不雨而書夏不雨而書以著其勤也胡安國曰雨云者喜雨也閔雨與民同其憂喜雨與民同其樂此君國子民之道也宋景公時熒惑在心懼召子韋問曰熒惑在心何也子韋曰熒惑天罰也心宋分野也禍當君身雖然可移於宰相公曰宰相所使治國也而移死焉不祥寡人請自當也子韋曰可移於民公曰民死將誰君乎寧獨死爾子韋曰可移於歲公曰歲饑民餓必死為人君欲殺其民以自活其誰與我為君乎是寡人之命固盡矣子無復言矣是夜熒惑徙舍臣良勝曰孰謂天道逺乎景公一言而熒惑徙舍則其不逺而邇也甚矣夫天之與人一道也人道之邇天道斯不逺矣楚昭王有疾有雲如衆赤鳥夾日以飛三日王使問周史史曰其當王身乎若禜之可移於令尹司馬王曰除腹心之疾而置諸股肱何益不穀不有大過天其夭諸有罪受罰又焉移之亦弗禜孔子聞之曰楚昭王知大道矣由是推之則景公之言多孚道其足以格天也宜哉但景公言道足以易天之度而昭王不足以免身之災事固有適然之符而命繫於自然之數君子不以成敗論也一歸于道而已故毋以景公自幸亦無以昭王自阻斯善之尤也漢文帝日食詔曰人主不德布政不均則天示之災以戒不治朕下不能育羣生上以纍三光之明不德大矣其悉思朕之過失知見之所不及以啓告朕及舉賢良方正能直言極諫者臣良勝曰臣嘗考之文帝三年十月晦食十一月晦又食此所以為大變而文帝之自咎深切如此故能變災為祥而成富庶之治也夫日之食起於交也有雖交而不食者度不同也故春秋二百四十年之間而食者才三十六至於頻交頻食者惟魯襄公時連月而食者再漢髙帝二年與文帝此年再食古今厯家推算之術以一百七十三日一交去交逺則日食漸少無頻食之理天道至逺不可得而知故執推步之法按交㑹之度而求頻食之故亦甚難矣是故人君不以為常度而忽之春秋每食必書或妾婦乘其夫或臣子背君父或政權在臣下或四夷侵中國亦多隂盛侵陽之徵故若文帝之恐懼修省之詔其可法者光武明帝踵而行之唐𤣥宗宋神宗理宗修避殿減膳之文則其他世主忽為常度而不之省憂者衆矣豈人君遇災而懼之意乎唐太宗貞觀八年星孛虛危歷氐餘百日訪羣臣虞世南對曰昔齊景公時彗見公問晏嬰對曰公穿池沼畏不深起臺榭畏不髙刑罰畏不重是以天見彗為戒景公懼而修德願陛下勿以功髙而自矜勿以太平久而自驕彗雖見未足憂帝曰然吾年十八舉義兵二十四平天下未三十即大位故負而矜之輕天下士上天見變其為是乎吾何得不戒耶宋太宗端拱二年夏四月不雨五月戊戌遣使决獄於諸州是夕雨彗出東井帝避正殿減常膳八月丙辰大赦是夕彗滅詔曰朕以身為犧牲焚於烈火亦未足以答謝天譴與卿等審刑政之闕失知稼穡之艱難恤物安人以祈天祐宋史斷曰孰謂天意不可回乎人事修於下則天道應於上矣天人相感勢若轉九初未有毫髮之僭爽也史書是夕雨是夕彗滅豈無意與或曰古之人君亦有增修德政以禳天變者矣然而天亦不為之悔禍者何哉蓋太宗有畏天之敬恤民之心而功多於過故能禱而即應也若夫慢神虐民慆心縱欲一日之善不足以彌千日之災禍既稔矣天何與焉惜乎太宗執德不𢎞信道不篤曽不踰月復致星旱之變而出田錫於陳州于以見太宗之政鮮克有終矣宋真宗時蝗飛翳空帝問翰林學士李迪曰旱蝗薦臻將何以濟迪請發內藏庫以佐國用則賦斂寬民不勞矣帝悅又言土木之役過甚蝗旱之災殆天意以警陛下也帝深然之停京城工役禁舉樂罷秋宴督諸路捕蝗罷諸營造禁天下貢物甲寅得雨蝗散戊辰青州飛蝗赴海死積海岸百餘里吕中曰災異非所以愛君也而董仲舒以為天心之仁愛蓋君之所以自愛災異警之之力也當羣臣爭獻符瑞之時而徐兖之水江淮之旱內城之火京師之蝗間見層出非人臣不知愛君而天愛君乎觀罷諸營建而飛蝗盡死真可見矣宋仁宗慶歷二年五月旱丁亥夜雨宰相章得象等入賀上曰昨夜朕忽聞微雷即起露立于庭仰天百拜以禱須臾雨至朕及嬪御衣皆沾濕不敢避去移刻雨霽再拜而謝方敢升階得象對曰非陛下至誠何以感動天地上曰比欲下詔罪己避殿減膳又恐近於崇飾虛名不若夙夜精心密禱為善爾臣良勝曰應天以實不以文也格天以心不以言也其仁宗之謂乎仁宗事多務內無意近名若忍饑不索燒羊非近臣言之何以得聞服御簡儉非宰臣問疾入禁中亦無由見其黃絁被漆唾壺也是以宫中密禱天應之人頌之史書之天下後世信之以其素行之孚也久矣不然則聞雷而禱既雨而言人將以崇飾矯枉議其後也宋神宗時久旱歲饑東北流民每風沙霾曀扶攜塞道羸疾愁苦身無完衣並城民賣麻籸麥麩合米為糜或茹木實草根至身被鎖械而負瓦揭木賣以償官纍纍不絶鄭俠監安上門乃繪所見為圖奏疏曰謹按安上門逐日所見繪成一圖百不及一但經聖眼亦可流涕况於千萬里之外哉觀臣之圖行臣之言十日不雨乞斬臣以正欺君之罪疏奏帝反覆觀圖長吁數四袖以入內是夕寢不能寐翼日命開封體放免行錢三司察市易司農發常平倉三衛具熙河所用兵諸路上民物流散之故青苗免役權息追呼方田保甲並罷凡十有八事民聞之歡呼相賀是日果大雨逺近沾洽輔臣入賀帝示以俠所進圖狀且責之皆再拜安石上章求去臣良勝曰觀貞宗納李迪之言而罷符瑞則蝗盡死神宗得鄭俠之言而罷新法則雨沾足天人感應之理捷於影響而安石猶以天變不足畏人言不足恤祖宗不足法以欺惑主聽真誤萬世之罪也若夫神宗則自誤之者夫既知鄭俠之圖可以回天矣後以羣奸搆禍付御史獄既知安石之法足以致災矣尋以羣奸環立一切如故安石既去復聽其薦韓絳吕惠卿以自代傳法沙門護法善神左右維持未幾且見召矣昔齊桓公問父老曰郭何如亡曰善善而惡惡也善善而不能用無貴於知其善惡惡而不能去無貴於知其惡郭是以亡神宗好惡近於郭公不亡者為之先則太祖肇之太宗培之仁宗四十二年深仁厚澤結於人心者固矣為之後則宣仁元祐之治是以蘇息之也然而民心失矣民財竭矣士氣喪矣又醞釀以成紹聖之禍卒遺靖康之憂皆自用安石以變法始則謂神宗之亡北宋也亦宜吳元年六月久旱聖祖曰減膳素食宫中皆然既而大雨羣臣請復膳曰亢旱為災實吾不德所致今雖得雨然禾稼焦損必多縱曰食奚能甘味得乎民心則得乎天心今欲彌天災但當謹於修己誠以愛民庶可答天之眷乃詔免民今年田租洪武元年八月聖祖謂中書省臣曰近京師火四方水旱相仍朕夙夜不遑寧處豈刑罰失中武事未息徭役屢興賦斂不時以致隂陽乖戾而然邪卿等同國休戚宜輔朕修省以消天譴參政傅瓛等對曰古人有言天心仁愛人君則出災異以譴告之使知變自省人君遇災而能警懼則天變可弭今陛下修德省愆憂形於色居髙聽卑天實鑒之顧臣等待罪宰輔有乖調燮貽憂聖衷咎在臣等聖祖曰君臣一體茍知謹懼天心方回卿等其盡心力以匡不逮洪武三年夏久不雨聖祖謂中書省臣曰今仲夏不雨實為農憂禱祠之事禮所不廢朕已擇明日詣山川壇躬為禱之爾中書各官其代告諸祠且命皇后與諸妃執爨為昔日農家之食皇太子諸王供饋于齊所至是日四鼓聖祖素衣草履徒步出詣山川壇設藁席露坐晝曝於日頃刻不移夜卧於地衣不解帶皇太子捧榼進蔬食雜麻麥菽粟凡三日既而大雨四郊沾足洪武四年十月聖祖謂中書臣曰祥瑞災異上天垂象然人之常情聞禎祥則有驕心聞災異則有懼心朕常命天下勿奏祥瑞若災異即時報聞尚慮臣庶罔體朕心遇災異或匿而不舉或舉不以實使朕失致謹天戒之意中書其行天下遇有災變即以實上聞洪武七年五月聖祖以天久不雨躬祀太歲風雲雷雨嶽鎮海瀆鍾山之神及天下山川京都各府城隍之神文曰朕受命上帝即位七載民遭兵亂未獲蘇息加以轉輸戍守之供其苦為甚方今仲夏當民渴雨之期豫心皇皇莫知所措故祈諸神特降雨澤神不我棄為逹上帝茍有罪責宜降朕躬毋為民災神其聽之既而大雨臣良勝曰旱而禱雨始于成湯三代以後惟宋仁宗之密禱與我聖祖之躬祀最為昭應蓋其積誠修德有在於禱祀之先者仁宗嘗與講臣王洙論洪範則曰五事得則有休徵五事失則有咎徵是以聖人克謹天戒以修其身聖祖與博士許存仁講洪範則曰君能修德則七政順度雨暘應期災害不生不能修德則三辰失行旱潦不時災異迭見其應如響王洙以是告其君聖祖以是語其臣則上下交修已非一日用以禱祀取之既溢之餘發之持滿之末固宜感應若持券取物無有違者故曰是集義所生者非義襲而取之也永樂十一年春正月朔日有食之先是禮部以正旦朝賀宴㑹文皇曰古者日食天子素服修政用謹天戒朕既乖於治理上纍三光而衆陽之宗薄食於元旦咎孰甚焉爾文武羣臣尚思勉輔朕躬調燮隂陽消弭災變新正朝賀宴食之禮悉罷之陸九淵曰日之食與食之淺深皆歷家所能知是蓋有數疑若不為變也然天人之際實相感通雖有其數亦有其道昔之聖人未嘗不因天變以自治洊雷震君子以恐懼修省此君所以無失德而藎事天之道也况日月之眚見於上乎遇災而懼側身修行欲銷去之此宣王之所以中興也知天災有可銷去之理則無疑於天人之際而知所以自求多福矣臣按陸氏之言似先有得於文皇心之所同然者故附録之臣良勝曰臣又嘗聞初議朝賀之時尚書吕震以日食與朝賀先後之時不相妨侍郎儀智曰終是同日免賀為當文皇顧問翰林諸臣楊士奇曰宋仁宗時元旦日食富弼請罷宴徹樂宰相吕夷簡不從弼曰萬一契丹行之為中國羞後有自契丹回者言其是日罷宴仁宗深悔今免賀誠當文皇曰君子愛人以德不以姑息嗚呼有是君貴有是臣信哉永樂十九年四月萬壽聖節先是禮部奏行慶賀禮敕文武羣臣曰比者上天垂戒奉天等三殿災朕心兢惕寢食不寧方反躬省愆皇皇夙夜而禮部謂朕初度請行賀禮此豈所以相朕恭承天意臣良勝曰嘗聞唐太宗不以生日為樂以為父母劬勞之日也至明皇時始創千秋節名又移社日以就之宴百官於花蕚樓布於天下咸令宴樂後世循習遂為故典而臣子所以致禮於君上最所重焉文皇方以殿災致戒率罷常禮此其修省之誠發乎中而應乎外也昔宋國災而晉侯曰於是知有天道士弱曰古之火正或食於心或食於咮以出納火是故咮為鶉火心為大火陶唐氏之火正閼伯居商邱祀大火相土因之故商主大火閲禍敗之釁必始於火是以知有天道也然則火之為災或亦有數而文皇歸咎於己不一委於數焉此所以為聖人之心非臣下所能識也右衍修和之誠𦙍征曰乃季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走羲和尸厥官若罔聞知昏迷于天象以干先王之誅蔡沉曰日食之變天子恐懼于上嗇夫庶人奔走于下以助救日如此其急羲和為厯象之官尸居其位若無聞知則其昏迷天象以干先王之誅豈特不恭之刑而已哉又曰羲和之罪當不止於廢時亂日是必不逞之人崇斂私邑以為亂黨助羿為惡者也夏后徂征隱其叛逆而不言者蓋名其罪則必鋤根除源而仲康之勢有未足以制后羿者故止責其曠職之罪而實誅其不臣之心也春王正月大雨雹左氏傳曰季武子問於申豐曰雹可禦乎對曰聖人在上無雹雖有不為災也夫氷以風壯而以風出其藏之也周其用之也遍則冬無愆陽夏無伏隂春無淒風秋無苦雨雷出不震無災霜雹癘疾不降民不夭札今藏川池之氷棄而不用風不越而殺雷不發而震雹之為災誰能禦之胡安國曰雹戾氣也隂脅陽臣侵君之象當是時季孫宿襲位世卿將毁中軍專執兵權以弱公室故數月之間再有大變申豐者季氏之孚也不肯端言其事故暴揚于朝歸咎藏氷之失也臣良勝曰災異之變雖庸君所不欲聞而象涉權臣尤有所不敢聞也羿之專國制君則日食之變乃政權在臣下之徵也而羲和素黨於羿夫豈敢聞仲康之刑雖加羲和而主威克振足以奪羿之心繼世之後猶不免有篡弒之禍季氏脅君之象已見而申豐移咎於藏氷當時無有能正其罪者故昭公見逐而申豐為之貨齊求以不納卒死乾侯故君子謂誅亂臣討賊子必先治其黨而後為惡者孤也十月之交詩曰燁燁震電不寧不令百川沸騰山冢崒崩高岸為谷深谷為陵哀今之人胡憯莫懲朱熹曰言非但日食而已十月而雷電山崩水溢亦災異之甚者是宜恐懼修省改紀其政而幽王曾莫之懲也國語曰幽王三年西周三川皆震伯陽曰周將亡矣夫天地之氣不失其序若失其序民亂之也陽伏而不能出隂迫而不能蒸於是有地震今三川實震是陽失其所而鎮隂也陽失而在隂源必塞源塞國必亡夫水土濵而民用也水土無濵民乏財用不亡何待昔伊洛竭而夏亡河竭而商亡今周德若二代之季矣其川源又塞塞必竭夫國必依山川山崩川竭亡之徵也川竭山必崩若國亡不過十年數之紀也夫天之所棄不過其紀是歲也三川竭岐山崩十一年幽王乃滅周乃東遷梁山崩穀梁傳曰不日何也髙者有崩道也有崩道則何以書也曰梁山崩垂遏河三日不流晉君召伯宗而問焉伯宗來遇輦者輦者不避使車右下而鞭之輦者曰所以難者其取道也逺矣伯宗下車而問曰子有聞乎對曰梁山崩垂遏河三日不流伯宗曰君為此召我也為之奈何輦者曰天有山天崩之天有河天壅之雖有伯宗如之何伯宗由衷問焉輦者曰君親素縞帥羣臣而哭之既而祠焉斯流矣胡安國曰降服棄幔撤樂出次祝幣史詞六者禮之文也古之遭變異而外為此文者必有恐懼之心主於內若成湯以六事檢身髙宗克正厥事宣王側身修行欲銷去之是也徒舉其文而無實以先之何足以弭災變乎晏子春秋曰齊有彗齊侯將禳之晏子曰無益也祗取誣焉天道不諂不二其命若之何禳之且天有彗也以除穢也君無穢德又何禳焉若德之穢禳之何益詩曰維此文王小心翼翼昭事上帝聿求多福厥德不回以受方國君無違德方國將至何患於彗詩曰我無所監夏后及商用亂之故民求流亡若德回亂民將流亡祝史之為無能補也大饑穀梁傳曰五穀不升謂之大饑一穀不升謂之嗛二穀不升謂之饑三穀不升謂之饉四穀不升謂之康五穀不升謂之大侵大侵之禮君食不兼味臺榭不塗弛廷道不除百官布而不制鬼神禱而不祀此大侵之禮也胡安國曰古者若國凶荒或發廩以賑乏或移粟以通用或徙民以就食或為粥溢以救餓殍或興工作以聚失業之人緩刑舍禁弛力薄征索鬼神除盜賊弛射儀而不燕置廷道而不修殺禮物而不備雖有旱乾水溢民無菜色所以備之者如此其至是年秋有隂沴之災而冬大饑所以振䇿之者有不備矣臣良勝曰自幽王弗謹天戒以亡國西周之後惟梁山之崩尤為天下之異當時伯宗猶能聽於輦者以舉修省之文晏子雖以史祝禳彗為無補而君之所以無回亂其德者未之聞也魯襄大侵之禮蔑有舉矣夏四月辛卯夜恆星不見夜中星隕如雨胡安國曰恆星列星也如雨者言衆也人事感於下則天變動於上前此者五國連衡旅拒王命後此者齊桓晉文更伯中國政歸盟主而王室遂虛其為法度廢絶威信陵遲之象著矣漢成帝永始中亦有星隕之異而五侯擅權賊莽居攝漢之宗支掃蕩幾盡天之示人顯矣春秋謹於天象至矣有星孛于大辰左氏傳曰有星孛于大辰及漢申須曰彗所以除舊布新也天事恆象今除於火火出必布焉諸侯其有大火乎梓慎曰火出於夏為三月於商為四月於周為五月夏數得天若火作其四國當之在宋衛陳鄭乎胡安國曰大辰心也心為明堂天子之象其前星為太子後星為庶子孛星加心象天子嫡庶相分爭也後五年景王崩王室亂劉子單子立王猛尹氏召伯立子朝歷數載而後定臣良勝曰此天象之變之大者隕星之變或應於前或應於後孛星之變列國之火主乎野王室之憂主乎位而當時省災之說無聞焉正月詩曰正月繁霜我心憂傷民之訛言亦孔之將念我獨兮憂心京京哀我小心癙憂以癢朱熹曰言霜降失節不以其時既使我心憂傷矣而造為奸僞之言以惑衆聽者又方甚大然衆人莫以為憂故我獨憂之以至於病也有鸜鵒來巢左氏傳曰書所無也師已曰異哉吾聞文武之世童謠有之曰鸜之鵒之公出辱之鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯徵褰與襦鸜鵒之巢逺哉遙遙稠父喪勞宋父以驕鸜鵒鸜鵒往歌來哭童謠有是今鸜鵒來巢其將及乎胡安國曰鸜鵒不踰濟濟水東北㑹于汶魯在汶南其所無也故書曰有巢者去穴而巢隂居陽位臣逐君象也臣良勝曰繁霜之降天象之至微者而詩人憂之鸜鵒之巢物象之至微者而史官紀之且民訛興于幽厲之世而西周以亡童謠協于文武之初而東魯以衰是故人君不可以微而忽也每謹於微而天人之理合矣漢武帝元狩五年得寶鼎后土旁秋馬生渥窪水中作寶鼎天馬之歌元封元年甘泉宫內産芝九莖連葉作芝房之歌太始三年獲赤雁作朱雁之歌臣良勝曰春秋之末雖未聞修德以弭災者然未嘗以異為諱而喜祥也祥瑞之盛自武帝始嘗得神馬於渥窪水中而次以為歌曲曰太乙貢兮天馬下霑赤汗兮沫流赭騁容與兮紲萬里今安匹兮龍與友時令司馬相如作詩賦越二年而寶鼎天馬靈芝赤雁疊疊見矣諸祥之中惟鼎為重器故以改元曰元鼎以神所鑄物也商得之夏周得之商而遷于郟鄏將以為受命之符者春秋時楚莊王問大小輕重而王孫滿折之戰國之際齊秦楚皆欲得之而周莫知所與顯王四十二年宋平社亡而鼎淪沒於泗水蓋周人毁鼎以緩禍也故蘇軾有曰漢武省方以出鼎此與兒童之見無異其時吾邱壽王亦曰汾隂之鼎漢鼎也非周鼎也至明帝時復有寶鼎出于雒山則其僞為可知潁川太守黃霸在郡鳯凰神雀數集詔賜爵關內侯數月徵拜太子太傅臣邱濬曰鳯凰之名載於詩書論語禮記世之人卒莫有真識其形狀何如者自宣帝即位至此凡五見矣於是以之紀元焉嗚呼鳯兮鳯兮覽德輝而下之何獨宣帝之多哉其所謂鳯者豈真鳯乎抑鶡雀之類乎臣良勝曰宣帝中興之主也自以神雀集長樂宫而改元其後乃有鳯凰頻見而致五鳯霸固賢者當以無僞但北郡太守嚴延年素輕霸為人而褒賞先己心內不服時府丞行蝗延年曰此蝗豈鳯凰食邪則在當時固有疑之者及在丞相府欲上神爵以從張敞舍來而止則其失態亦畢見矣其後甘露黃龍又見紀年宣帝尋亦晏駕瑞應無徵嗚呼上有好者下必甚焉霸以賢者亦復為之斯其流禍為不淺矣隋煬帝大業間有二孔雀自西苑集寶成朝堂前親衛校尉髙德儒見之奏以為鸞時孔雀已飛去無可得驗於是百官稱賀詔以德儒誠心冥㑹肇見嘉祥拜朝散大夫臣良勝曰德儒之奏亦霸之故智也唐太宗曰吾嘗笑隋主好祥瑞所可笑者其此類邪唐𤣥宗時太廟室壞時上將幸東都以問宋璟蘇頲對曰災異為戒願且停車駕又問姚崇對曰太廟屋材皆苻堅時物歲久朽腐而壞適與行期相合何足異也上大喜從之臣良勝曰姚崇在唐亦稱賢相史謂其善於應變此類是也臣曰此非應變乃逢惡也且其言曰今關中無軍餽餉勞弊出幸東都所以為人非為己也然則天子將以凶年出幸為就食計邪此壯夫所不言也而以順主心以從主欲由此復相李林甫從而效尤矣帝在東都欲遷長安裴耀卿等曰農人場圃未畢須冬可還李林甫曰二都本東西宫耳車駕往來何用待時假令妨農獨赦所過租賦可也帝大悅即駕而西崇東幸之議與林甫西還之議蓋一道也君子謂開元之治雖出於崇而天寶之亂亦由於崇信哉宋真宗謂羣臣曰朕去年十一月二十七日夜將半方就寢忽室中光耀見神人星冠絳衣告曰當降天書大中祥符三篇適覩皇城司奏右承天門屋之南角有黃帛曳鴟尾上蓋所降之書也王旦等皆稱賀帝即步至承天門瞻望再拜二內臣升屋奉之以下王旦跪奉而進帝再拜受之欽若之計既行陳堯叟等益以經義附和而天下爭言祥瑞矣獨龍圖閣待制孫奭言於帝曰以愚臣所聞天何言哉豈有書也帝默然吕中曰至是李文靖之言驗矣封禪之議決于丁謂定計有餘之一言天書之降成於欽若神道設教之一語雖以王文正之碩德重望不敢有異議其後寇準之再相亦以朱能之天書入當時極言其非者惟孫奭一人而已天何言哉此足以破人主之惑臣良勝曰真宗初嗣大統未及改元即禁州郡上祥瑞矣卒未免為矯誣上天之主欽若之罪不必言矣澶淵之盟其積懟於寇準既久所以中真宗欲激真宗之怒以泄於準者無不為也但其始謀作僞之時真宗曰王旦得無不可乎茍持正議則事已矣乃以欽若諭意黽勉從之乃受美珠之賜則物梗喉嗌若喑啞人及其捐館謂子曰我别無過惟不諫天書一事之失令削髮披緇以斂蓋亦悔之晚矣冦準非特不諫又自僞為之以圖進故其赴召而門生曰若至河陽堅求補外此為上䇿倘入見即發乾佑天書詐妄之事次也準於是時蓋愧死矣君子責備賢者於欽若何尤焉宋神宗嘗以災異避正殿減膳撤樂王安石言於帝曰災異皆天數非關人事得失所致富弼在道聞之歎曰人君所畏者天耳若不畏天何事不可為者此必奸人進邪說以搖上心使輔弼諫諍之臣無所施其力是治亂之機不可以不速救即上書數千言雜引春秋洪範及古今傳記人情物理以明其决不然者劉安世語録曰金陵有三不足之說聞之乎馬永卿曰未聞先生曰金陵用事同朝起而攻之金陵闢衆言於上曰天變不足懼祖宗不足法人言不足恤此三句非獨為趙氏禍乃為萬世禍也永卿曰此言萬世禍或有術可以絶此言使不傳於後世乎先生曰安可絶也此言一出天下皆聞之不若著論明辨之曰此乃禍天下後世之言雖聞之不可從也譬如毒藥不可絶而神農與歷代名醫言之曰此乃毒藥如何形色食之必殺人故後人見而識之必不食也臣良勝曰從古人君未有不畏天者至於遇災修省有實有文而未嘗不以為懼也其巧說逢君如姚崇者已甚矣若許敬宗於髙宗則曰星雖孛而光芒小吕端於真宗則曰彗出之應在齊魯分如是止矣至安石則直曰災異天數又曰水旱堯湯不免啓人君不畏天法祖而輕人言自安石始胡安國曰謂馴致崇觀之間奸臣用事一卉一木之異指為嘉祥天地災變隱而不言吕中又謂紹聖誤國之論皆出安石天變不足畏之說甚者臘月之雷指為瑞雷三月之雪指為瑞雪視天變若童稚之可侮則安石謂三言為萬世禍然哉然哉王莽風益州令塞外蠻夷獻白雉莽白太后以白雉薦宗廟羣臣因奏莽功德致成周白雉之瑞宜賜號安漢公莽上書讓不聽林氏曰陳勝將起以丹書帛置之魚腹使吳廣效狐鳴於叢祠王莽將篡風益州塞外蠻夷自稱越裳氏以白雉獻然勝之謀僅足以誑戍卒而漢朝諸公卿乃為莽之所誑其不知之耶抑知之而相率為僞耶臣良勝曰春秋以前多懼災也春秋以後乃喜瑞也漢之瑞猶有是物至宋天書皆僞為之矣然諂佞之臣附㑹希寵已無足責賢如黃霸姚崇王旦冦準亦自不免安石欲以經術輔世而罪尤甚焉至如羿宿之權使官失其守而為之黨者曲說以掩之莽之奸能風蠻夷以成其逆志皆古今之大變也臣故以之終始焉右衍戾和之咎中庸衍義卷四
