body:
  text: 中庸衍義卷七明夏良勝撰達道之義夫婦之法夫婦之戒咸亨利貞取女吉朱熹曰咸交感也兌柔在上艮剛在下而交相感應又艮止則感之專兌說則應之至又艮以少男下於兑之少女男先於女得男女之正婚姻之時故其卦為咸其占亨而利貞取女則吉蓋感有必通之理然不以貞則失其亨而所為皆凶矣家人利女貞程頥曰家人之道利在女正女正則家道正矣夫夫婦婦而家道正獨云利女貞夫正者身正也女正者家正也女正則男正可知矣漸女歸吉利貞程頥曰天下之事進必以漸者莫如女歸臣之進於朝人之進於事固當有序不以其序則陵節犯義凶咎隨之然以義之輕重亷耻之道女之從人最為大也故以女歸為義且男女萬事之先也臣良勝曰天地理數只是一漸其所謂漸只是一序若其初元一太極生天地而兩儀陰陽太少而生四象四象生八卦八卦生三百八十四爻以盡萬物之情皆是序以漸也至于生物春而生夏而長秋而實冬而歸藏皆漸也人亦天地間一生物女進非漸决非貞女士進非漸必非端士臣或以逼其君子至於脅其父皆起於無序也可不戒哉歸妹九二眇能視利幽人之貞朱熹曰九二陽剛得中女之賢也上有正應而反陰柔不正乃賢女而配不良不能大成內助之功故為眇能視之象而其占則利幽人之貞也幽人亦抱道守正而不偶者也歸妹六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉程頥曰六五居尊位妹之髙貴者也下應於二為下嫁之象貴女之歸惟謙降以從禮乃尊髙之德也不事容飾以悅于人也娣媵者以容飾為事者也衣袂所以為容飾也六五尊貴之女尚禮而不尚飾故其袂不及其娣之袂良也良美好也月望陰之盈也盈則敵陽矣幾望未至於盈也女之髙貴常不至于盈極則不亢其夫乃為吉也女之處尊貴之道也鼎初六鼎顛趾利出否得妾以其子無咎朱熹曰居鼎之下鼎趾之象也上應九四則顛矣然當卦初鼎未有實而舊有否惡之積焉因其顛而出之則為利矣得妾而因得其子亦猶是也此爻之象如此而其占無咎蓋因敗以為功因賤以致貴也恆六五恆其德貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也程頥曰夫以順從為恆也婦人之道在婦人則為貞故吉若丈夫而以順從於人為恆則失其陽剛之正乃凶也堯典曰帝曰我其試哉女于時觀厥刑于二女釐降二女于媯汭嬪于虞帝曰欽哉蔡沉曰此堯言其將試舜之意也莊子所謂二女事之以觀其內是也蓋夫婦之間隱微之際正始之道所繫尤重故觀人者於此為尤切也欽哉者堯戒二女之詞即禮所謂往之爾家必敬必戒者况以天子之女下嫁於匹夫尤不可以不深戒也周惇頥曰家人離必起於婦人故暌次家人以二女同居而志不同行也堯所以釐降二女于媯汭舜可禪乎吾兹試矣是治天下觀于家治家觀于身而已矣身端心誠之謂也誠心復其不善之動而已矣臣良勝曰舜之刑二女齊家之有道也二女之執婦道受教亦有素也是兩善以相承故曰敬而足也至周惇頥則曰誠心以復其不善之動有變而從善者關雎詩曰關關睢鳩在河之洲窈窕淑女君子好逑匡衡曰窈窕淑女君子好逑言能致其貞淑不二其操情欲之感無介乎容儀宴私之意不形乎動靜夫然後可以配至尊而為宗廟主此綱紀之首王化之端也思齊詩曰惠于宗公神罔時怨神罔時恫刑于寡妻至于兄弟以御于家邦朱熹曰言文王順于先公而鬼神歆之無怨恫者其儀法內施於閨門而至于兄弟以御于家邦也孔子曰家齊而國治孟子曰言舉斯心加諸彼而已臣良勝曰文王之所以御家邦者有刑于寡妻之化也其所以刑之者有純一不已之德也蓋其不顯亦臨無斁亦保而和敬之功益密不聞亦式不諌亦入天性之合益完是以內而太姒上嗣徽音下百斯男克宜于家外而髦士成人有德小子有造克永其譽始則儀刑于一家終而儀刑于萬邦矣是則后妃素賢而其成德皆儀刑于文王者故臣以為關睢之詩乃在成化之後而追言其始至之賢已若此也若云后妃自有聖德初至之時已為宫中所樂則南國之化乃一婦人能為之恐非周公孔子表列文王端本治化之意故曰地道無成而代有終也雞鳴詩曰雞既鳴矣朝既盈矣匪雞則鳴蒼蠅之聲朱熹曰言古之賢妃御於君所至於將旦之時必告君曰雞既鳴矣㑹朝之臣既已盈矣欲令君早起而視朝也然其實非雞之鳴也乃蒼蠅之聲也蓋賢妃當夙興之時心常恐晚故聞其似者而以為真非其心存警畏而不流於逸欲何以能此故詩人序其事而美之也小星詩曰嘒彼小星三五在東肅肅宵征夙夜在公實命不同朱熹曰南國夫人承后妃之化能不妒忌以惠其下故衆妾美之如此蓋衆妾進御於君不敢當夕見星而往見星而還故因所見以起興其於義無所取特取在東在公兩字之相應耳遂言其所以如此者由其所賦之分不同於貴者是以深以得御於君為夫人之惠而不敢致怨於往來之勤也臣良勝曰讀小星之詩而後知文王后妃之化之遠也諸侯夫人化之能容其下蓋其尊貴之體禮義之教素有足間者其感之易也若夫妾媵惟欲之從乃能歸美其夫人而自安於命則尊卑貴賤各有儀等並后奪嫡之患决所無矣又安有飛燕太真遂基家國之禍者哉緑衣詩曰絺兮綌兮凄其以風我思古人實獲我心朱熹曰絺綌而遇寒風猶已之過時而見棄也故思古人之善處此者真能先得我心之所求也燕燕詩曰仲氏任只其心塞淵終溫且惠淑慎其身先君之思以朂寡人朱熹曰言戴媯之賢如此又以先君之思勉我使我常念之而不失其守也臣良勝曰處夫婦之變而不失其正者莊姜是也以莊公之狂暴而莊姜正靜自守寵嬖既多家國貽禍州吁之惡既稔桓公之祿不終然而不敢歸怨於夫但欲思古人以自免于訧戴媯大歸又以先君之思為朂視小星之妾媵猶多賢焉此亦先王遺澤之尚存而莊姜之化亦有行乎其下矣至後宣姜之醜而新臺鶉奔之賦卒起狄人滅國之禍君子遂厭衛風於不齒至歸罪於土薄而氣輕浮地肥而人怠惰故性淫而聲靡臣觀莊姜而下有六婦人焉其詩皆止乎禮義者亦安得委于地氣習俗然哉何彼穠矣詩曰何彼穠矣唐棣之華曷不肅雍王姬之車朱熹曰王姬下嫁于諸侯車服之盛如此而不敢挾貴以驕其夫家故見其車者知其能敬且和以執婦道於是作詩以美之曰何彼戎戎而盛乎乃唐棣之華也此何不肅肅而敬雍雍而和乎乃王姬之車也此乃武王以後之詩不可的知其何王之世然文王太姒之教久而不衰亦可見矣祭公來遂逆王后于紀紀季姜歸於京師胡安國曰往逆則稱王后既歸何以書季姜自逆者而言則當尊崇其匹內主六宫之政使妃妾不得以上僭故從天王所命而稱王后示天下之母儀也自歸者而言則當樛屈逮下使夫人嬪婦皆得進御於君而無嫉妒之心故從父母所子而稱季姜化天下以婦道也其詞之抑揚上下進退先後各有所當而不相悖皆正始之道王化之基春秋之所謹也晉人敗狄于箕左氏傳曰臼季使過冀見冀缺耨其妻饁之敬相待如賔與之歸言於文公曰敬德之聚也能敬必有德德以治民君請用之臣聞之出門如賔承事如祭仁之則也公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管敬仲桓之賊也實相以濟康誥曰父不慈子不祗兄不友弟不共不相及也詩曰采葑采菲無以下體君取節焉可也文公以為下軍大夫反自箕襄公以三命命先且居將中軍以再命命先茅之縣賞胥臣曰舉卻缺子之功也以一命命卻缺為卿復與之冀臣良勝曰春秋之世王化不行天子諸侯刑家之道無聞焉而夫婦賔敬有見於田間者是可以觀世矣夫綱不立婦善乃名不能廢焉晉文公妻趙衰生原同屏括樓嬰趙姬請逆趙盾與其母而納之衰辭姬曰得寵而忘舊何以使人必逆之固請許之來以盾為才固請于公以為嫡子而使其子下之以叔隗為內子而已下之臣良勝曰趙姬處嫡庶母子之間古人所難能也已以公女自下于狄女以已之子而下於狄女之子且知盾為賢而讓之載籍所未有也宋災宋伯姬卒穀梁傳曰取卒之日加之灾上者見以灾卒也伯姬之舍失火左右曰夫人少避火乎曰婦人之義傅姆不在宵不下堂遂逮于火而死易曰恆其德貞婦人吉夫子凶而或以為共姬女而不婦非也世衰道微暴行交作女德不貞婦道不明能全其節守死而不回見於春秋者宋伯姬爾聖人冠以夫諡書於春秋曰葬宋共姬以著賢行勸天下之婦道也紀叔姬歸于酅胡安國曰莊公四年紀侯去國叔姬至此始歸于酅者紀侯方卒故叔姬至此然後歸爾歸者順詞以宗廟在酅歸奉其祀也魯為宗國婦人有來歸之義紀既亡矣不歸于魯所謂全節守義不以亡故而虧婦道者也魯人髙其節義恩禮有加焉是故其歸于酅其卒其葬史策悉書夫子修經存而弗削使與衛之共姜同垂不朽為後世勸若夏侯令女曹爽之弟婦也寡居守志父母欲奪而嫁之誓而弗許曰曹氏全盛之時尚欲保終况今衰亡何忍棄之聞者為之感慟其聞叔姬之風而興起乎臣良勝曰春秋婦女以文詞紀于傳者類有可稱而賢行特書于經者宋伯姬紀叔姬爾蓋天下之善有勉乎理義斯為難矣安而止乎理義者尤難也伯姬年六十矣使避火而生亦不害乎貞也而必死以成禮叔姬妾媵也國亡君死使歸宗國亦自有道也必歸于酅以修祀是可歸弗歸可生弗生一安於理義之正也二姬皆魯女秉禮之遺風尚在故國人髙之皆詳其事而春秋得因以示勸然二百四十二年之間僅有此爾蓋亦難哉或者曰伯姬避嫌之甚者而叔姬歸酅則紀季之邑嫂叔之嫌無避已乎姬之歸也以宗廟在非以季也况貞潔之操自孚于人心而好惡之公終不能以昧夫天理若令女處逆亂之族又依于伯氏而志節炳然自見節義在婦女陰柔之質而秉陽剛之德尤人所賢樂道而成全之者故或遠或近或去或不去歸潔其志而已矣君子謂為魯男子則難為柳下惠則易有大節焉則小嫌在所略者王姬歸于齊胡安國曰按周制王姬歸于諸侯車服不繫其夫下王后一等禮亦隆矣春秋之義尊君抑臣其書王姬下嫁曷為與列國之女同辭而不異乎曰陽倡而陰和夫先而婦從天理也述天理訓後世則雖以王姬之貴其當執婦道與公侯大夫士庶人之女何以異哉故舜為匹夫娶帝二女其書曰嬪于虞西周王姬嫁于齊侯亦執婦道成肅雍之德其詩曰曷不肅雍王姬之車自秦而後尤欲尊君抑臣為治而不得其道至謂列侯尚公主使男事女夫屈於婦逆陰陽之位故王陽條奏世務指此為失而長樂王回亦以其弊至父母不敢畜其子舅姑不敢畜其婦原其意雖欲尊君抑臣為治而使人倫悖於上風俗壞于下又豈所以為治也其流至此然後知春秋書王姬侯女同辭而不異者垂訓之義大矣婚義曰天子聽男教后聽女順天子理陽道后治隂德天子聽外治后聽內職教順成俗外內和順國家理治此之謂盛德吕大臨曰男正位乎外女正位乎內男女正天下之大義也有家者夫聽家之外治妻聽家之內治天子與后有天下者也則不得不聽天下之內外治也外治者明章男教也司徒之所教皆是也內治者明章婦順也婦順之法德言容工皆是也陽道者男所以正其室也陰德者婦所以宜其家也刑于寡妻至于兄弟則正室之道天子所理也嘒彼小星三五在東肅肅宵征夙夜在公實命不同則宜家之道后所治也凡天子所聽皆外治后所聽皆內治至於教順成俗外內和順國家理治必周南召南盛德之化然後可致臣良勝曰君之道天道也后之道地道也乾坤雖並列而坤終不可以敵夫乾故地在天中猶一物也后之能聽內治者亦天子之外治有以刑之也非后與天子分內外為治理也若天子比昵于宫闈而后妃有干于政典則天地失官不可以言治矣哀公問孔子曰昔三代明王之政必敬其妻子也有道妻也者親之主也敢不敬與子也者親之後也敢不敬與君子無不敬也敬身為大身也者親之枝也敢不敬與不能敬其身是傷其親傷其親是傷其本傷其本枝從而亡方氏曰冕而親迎所以敬其妻也冠于阼階所以敬其子也為主于內者妻也故曰親之主傳後於下者子也故曰親之後內非有主則外不足以治其國家矣非有後則上不足以承其祖考矣此所以不敢不敬也君子雖無所不敬又以敬身為大焉以其為親之枝故也身之於親猶木之有枝親之於身猶木之有本相須而共體又非特為主為後而已此尤不敢不敬也臣良勝曰夫子因哀公問冕而親迎之禮上推而及於親下推而及於子然其本源則在吾身而已故身不行道不行於妻子道之行者敬之也夫妻以配吾身者也有吾妻乃有吾子有吾妻子以輔吾身乃所以敬事吾親也故曰夫婦人倫之始也昏禮廢而人道絶矣思齊詩曰思齊大任文王之母思媚周姜京室之婦大姒嗣徽音則百斯男朱熹曰此詩亦歌文王之德而推本言之曰此莊敬之大任乃文王之母實能媚於周姜而稱其為周室之婦至于太姒又能繼其美德之音而子孫衆多上有聖母所以承之者遠內有賢妃所以助之者深也臣良勝曰婦以無非無儀為善故無攸遂主中饋而已周室之興周公厯以大任太姒之賢有關于文王之德之化何也乾坤之道男女之謂也故乾父道也夫道也坤母道也妻道也謂乾可以兼坤可也謂乾可以無坤不可也故男正位乎外必曰女正位乎內然後夫夫婦婦父父子子而家道正矣懿彼哲婦為梟為鴟牝雞之司晨惟家之索謂婦無補于外政不可也謂婦無損于外政不可也惟文武所遇母妃世濟徽音從古罕儷于八百年仁厚之澤誠亦有所助也故文王于家人之彖曰利女貞以女貞為利于家也周公之詩蓋本乎此先聖後聖其揆一也大明詩曰有命自天命此文王于周于京纘女維莘長子維行篤生武王保右命爾燮伐大商朱熹曰言天既命文王于周之京矣而克纘大任之女事者惟此莘國以其長女來嫁于我也天又篤厚之使生武王保之助之命之而使之順天命以伐商也臣良勝曰靈芝無根醴泉無源聖人之生間世之瑞也固不必於有所本也然而文王之生則以王季大任為之父母武王之生則以文王太姒為之父母皆厚其本以克永世非偶然之故周公推原本始極於尊隆因以顯其世澤之深厚而欲成王知其所自蓋亦子孫之詞也若曰聖賢之生必係世類則瞽鯀何以有舜禹之聖子朱均之不肖何得為堯舜聖人之子乎周公作詩本意以文武之生於太任太姒有以異乎前代者自其所生而言則謂之母道自其所配而言則謂之婦道故凡母后之賢類以婦道載焉泰誓曰豫有亂臣十人同心同德蔡沉曰治亂曰亂十人周公旦召公奭太公望畢公榮公太顛閎夭散宜生南宫適其一文母孔子曰有婦人焉九人而已劉侍讀以為子無臣母之義蓋邑姜也九人治外邑姜治內言紂夷人之多不如周治臣之少而盡忠也周宣王嘗晏起姜后脫簪珥待罪於永巷使其傅母通言於王曰王樂色而忘德失禮而晏起亂之興自婢子始敢請罪王曰寡人不德實自生過非夫人之罪也自是勤於政事早朝晏罷卒成中興之名臣良勝曰文武盛時夫道克正而行乎閨門率以向化若宣王乃有藉於后言之規正是以其化行者淺矣其時有龍漦化為𤣥黿童妾遭之孕生而育棄之童謠曰檿弧箕服實亡周國即褒姒也子幽王納之而西周亡矣是閨門為王化之原所繫有如此者漢文帝以皇后弟竇廣國賢行欲相之曰恐天下以吾私廣國久念不可乃以申屠嘉為相臣良勝曰嘗聞程頥有云有典選者其子弟皆不入銓避嫌之過公亦私也雖然世衰道微易私難公若文帝者非避嫌之過也使廣國之賢果可相而未充其位失一廣國爾他日以為口實凡后家皆得據相位則王莽之代漢不待哀平之後矣以此言之文帝不失為公也且其事薄太后極其孝敬至其弟昭犯法雖不忍加誅而使羣臣哭之令自殺昭亦素稱長者以久典兵驕而犯上帝亦不能以恩貸之則所懲者深矣是又安得更相廣國哉况竇后不說儒術趙琯王臧獲罪而曰儒者文多質少使其弟居相位又當何如况帝衣弋綈所幸慎夫人衣不曳地帷帳無文繡以示敦朴為天下先袁盎引却其座不以為忤且賜之金則刑家之政文帝於三代之後所僅有者明德皇后漢明帝后也章帝即位欲封爵諸舅太后不許㑹大旱言事者以為不封外戚之故有司請依舊典太后詔曰凡言事者皆媚吾以要福爾昔王氏五侯同日俱封黃霧四塞不聞澍雨之應先帝防慎舅氏不令在樞機之位帝省詔悲歎復請太后報曰嘗觀富貴之家福祿重疊猶再植之木其根必傷今數遭變易榖價數倍而欲先營外家之封違慈母之惓惓乎又詔有司曰有司奈何欲以馬氏比隂氏乎吾豈可上負先帝之㫖下虧先人之德重襲西京敗亡之禍乎趙弼曰明德斯言誠萬世母后之龜鑑也方之吕氏封王諸吕孝元王后封諸弟為侯豈不大有懸絶乎良由伏波將軍忠義之德垂式于後觀其戒兄子嚴敦之書足以知其義方家教之善也明德為貴人時德冠後宫暨母儀天下愈崇儉素兄廖嘗慮美業難終上書勸成德政借喻之言足以匡扶治教忠賢萃於一門兩漢外戚無一可擬者猗與休哉和熹皇后和帝后也嘗有疾特令后母兄弟入侍醫藥不限日數后言於帝曰宫禁至重而使外人久在內省上令陛下有幸私之譏下使賤妾獲不知足之謗上下交損誠不願也帝曰人皆以數入為榮乃反以為憂深自抑損誠難及也趙弼曰太后鄧禹之孫鄧訓之女性孝友好讀書晝修婦業暮讀經史家人號曰諸生和帝納為貴人後正位中宫郡國貢獻悉令禁絶歲時但供紙筆而已和帝每欲封鄧氏后輒哀言遜讓故兄隲終和帝世不過虎賁中郎將和帝崩孝殤始生百餘日即位太后臨朝孝章子孫豈無年長聰慧者乃立飲乳之兒其意固有在也孝殤未逾年而崩太后迎立清河王慶之子祐是為安帝既立不明太后猶臨朝稱制不免有貪權固位之心乃為賢明之纍也臣良勝曰古有植遺腹朝委裘者殤帝為和帝子雖生一日猶當立也趙弼謂后意有所在則望之深矣舍殤帝而他立是召亂也晉襄公卒趙孟謀欲立長君襄夫人日抱太子哭于朝曰舍嫡嗣而外求君將焉置此此則后宜免矣但漢書云和帝皇子十數後生者輒隱祕養于民間羣臣無知者長子勝又以痼疾廢此則和帝之過而后不得謂不預知也抱殤帝以臨朝亦周公負成王意也安帝立時年已十三若大臣輔之自可立政朱熹修綱目特書太后猶臨朝以譏之得其情矣及後杜根上書請還政盛以縑囊撲殺于殿庭即此一短已掩其終身之長靡不有初鮮克有終慎之哉唐長孫皇后兄無忌於太宗本布衣交以佐命功出入卧內帝將引以輔政后固謂不可乘間曰妾託體紫宫尊貴已極不願私親更據權于朝漢之吕霍可以為鑒又密諭無忌牢讓不獲已帝乃聽后喜見顔色后喜圖傳視古善惡以自鑑帝與言及天下事辭曰牝雞之晨家之索也帝固要之迄不對帝嘗罷朝怒曰㑹須殺此田舍翁后問為誰上曰魏徴每廷辱我后退具朝服立于庭上驚問其故后曰妾聞主明臣直今魏徴直由陛下之明故也妾敢不賀帝悅既崩太宗悲慟謂近臣曰朕非不知天命而為無益之悲但入宫不復聞規諌之言失一良佐故不能忘懷爾臣良勝曰后之不預政不私其兄右賢規諌信足為法承乾其所生也武德九年既立為太子至貞觀七年承乾以虧禮法聞于志寧孔頴達數直諌賜之金一斤絹五百匹是必后有以贊助之也閲二年而后崩則承乾之過日稔而魏王奪嫡之謀益深至十七年而承乾廢使后尚存則承乾之過其少損矣太宗廢長立少之心其遂已矣魏王泰亦且有所懲創不敢萌覬覦之志矣觀承乾對太宗之言曰臣為太子夫復何求但為泰所圖時與朝臣謀自安之術若此言豈真大愚者太宗聞晉王言泰并欲圖已遂悔立泰之言而謂無忌等曰我三子一弟所為如是我心誠無聊賴自投于牀又抽佩刀欲自刺蓋其愧悔之心有不能自達者使當時有長孫后在寧有是耶噫后之賢上有繫于天道下有繫于子道其不輕而重也明矣唐穆宗疾大漸命太子監國宦官請郭太后臨朝稱制太后曰昔武氏稱制幾覆社稷我家世守忠義非武氏之比也太子雖少但得賢宰相輔之爾等勿預朝政何患國家不安自古豈有女子為天下主而能致唐虞之理乎取制書手裂之太后兄太常卿釗聞有是議密箋曰若果狥其請臣請先率諸子納官爵歸田里太后泣曰祖考之慶終于吾兄臣良勝曰漢之后德以馬氏為最唐之后德以郭后為最時有馬廖郭釗相成其美尤所難也蓋馬援素有義方之教戒嚴敦之書大近道理郭子儀再造唐室卒全令名其子尚主奉天之變不受僞官而直趨衛蹕皆其家教之素然也近丹之赤近墨之黑所習亦有然者豈必曰鷺白烏𤣥而出於性哉宋慈聖皇后仁宗后武穆惠王曹彬之孫也慶厯八年閏正月望夕後三日衛卒作亂夜越屋叩寢殿后方侍遽起帝欲出后閉閣擁持趣呼都知王守忠使引兵入賊傷害宫嬪聲徹帝所內宦以乳嫗毆小女子紿奏后叱之曰賊在近殺人敢妄言耶后度賊必縱火陰遣人挈水踵其後果舉炬焚簾水隨滅之是夕所遣宦侍后皆剪髮諭之曰明日行賞用是為驗故爭盡死力賊即擒滅閣內妾與卒亂當誅祈哀幸姬姬言之帝貸其死后具衣冠見請論如法曰不如是無以肅清禁掖帝命坐后不可立請移數刻卒誅之故事外家男子無得入謁神宗以后春秋髙數請召弟佾入見久之乃許少頃后謂佾曰此非爾所當得留趣遣出焉神宗嘗有意燕薊與大臣議定而白其事太后曰事體至大吉凶悔吝生乎動得之不過南面受賀而已萬一不諧生靈所繫未易以言茍可取之太祖太宗收復久矣何待今日帝曰敢不受教宣仁皇太后英宗后也不豫吕大防范純仁等問疾太后曰試言九年間曾施恩髙氏否只為至公一男一女死皆不得見言訖泣下又曰先帝追悔往事至于泣下此事官家宜深知又曰正欲對官家說破老身沒後必多有調戲官家者宜勿聽之公等亦宜早退令官家别用一番人乃呼左右問曾賜出社飯否因曰公各去喫社飯一匙明年社飯時思量老身也史臣曰太皇召用故老名臣罷廢新法苛政舉邊寨之地以賜西夏于是宇內復安遼主戒其臣下令勿生事於疆場曰南朝盡行仁宗之政矣有臣請循天聖故事帝后皆御殿又請冊寶于文德殿太皇曰母后當陽非國家美事况天子正衙豈所當御崇政足矣臨朝九年朝廷清明夷夏綏定力行故事抑絶外家私恩人以為女中堯舜國朝孝慈髙皇后從聖祖在軍時歲大歉常自忍饑懷糗餌脯修供給未嘗乏絶造次顛沛恪遵婦道每有䜟記書札輒命善藏之倉卒取視后即於囊中出而進之未嘗脫誤聖祖嘗焚香祝天願天命早有所付毋苦天下生民后曰方今豪傑並爭雖未知天命所歸以妾觀之惟以不殺人為本顛者扶之危者救之收集人心人心所歸即天命所在彼縱殺掠以失人心天命之所惡其身亦難保也聖祖曰爾言深合我意明日冒雨歸語曰昨聞爾言往來方寸間不能忘有一卒違令忽與婦人俱詰之不能隱吐實云掠得之我告之曰今日用兵所以禁亂若寡人之妻孤人之子適以生亂不即捨之吾必戮爾此卒感悟遂即捨之由爾言也后曰用心如此何憂人心之不歸乎聖祖帥師渡江后亦率諸將士妻妾繼至太平及居建康時吳漢接境戰無虛日親率妾媵完緝衣鞋助給將士夜分不寐時時左右規畫動合事機聖祖即帝位冊立為皇后因謂侍臣曰昔漢光武勞馮異倉卒蕪蔞亭豆粥滹沱河麥飯厚意久不報君臣之間始終保全朕念皇后起布衣同甘苦嘗從朕在軍倉卒自忍饑餓懷糗餌食朕比之豆粥麥飯過之尤甚昔唐太宗長孫皇后當隱太子搆隙之際內能盡孝謹承諸妃消釋嫌猜朕為郭氏所疑徑情不恤將士有所獻后先獻郭氏慰悅其意及欲危朕輒為彌縫卒免於患又難於長孫皇后者朕或服御諸怒小過輒謂朕曰忘昔日之貧賤邪朕復為之惕然家之良妻猶國之良相豈忍忘之罷朝因以語后后曰妾聞夫婦相保易君臣相保難妾安敢比長孫皇后賢但願陛下以堯舜為法爾后自少貞靜端一孝敬慈惠聰明出人意表尤好詩書恆以不逮事舅姑為恨見聖祖追慕悲傷亦為之流涕晨夕禕翟從拜謁奉先殿每當祭躬治膳修務盡誠敬后一日聞得元府庫輸其寶貨至京師問聖祖曰得元府庫何物曰寶貨爾后曰元氏有此寶何以不能保而失之蓋貨財非可寶帝王自有寶也聖祖曰皇后之意朕知之矣但謂以得賢為寶爾后即拜謝曰誠如聖言妾每見人家産業厚則驕至時命至則逸生家國不同其理無二人之常情所當深戒妾與陛下同處窮約今富貴至此恆恐驕縱生于奢侈危亡起于忽微故世傳技巧為喪國斧斤珠玉為蕩心鴆毒誠哉是言但得賢才朝夕啓沃共保天下即大寶也顯名萬世即大寶也而豈在于物乎聖祖曰善嘗侍坐乾清宫語及窮約時事聖祖曰吾與爾跋涉艱難備嘗辛苦今日化家為國無心所得上感天地之德祖宗之恩然亦爾內助之功也后曰陛下一念救民之心格于皇天天命眷之祖宗祐之妾何力之有但願陛下不忘窮約之時而警戒于治安之日妾亦不忘相從于患難而謹飭于朝夕天地祖宗非惟庇佑于今日將為子孫無窮之福后自正位中宫益自勤勵嘗講求古訓諭告六宫孜孜不倦一日集女史清江范孺人等問曰自漢唐以來何后最賢家法何代最正對曰惟趙宋諸后多賢家法最正后于是命女史録其家法賢行每令誦而聽之曰不徒為吾今日法子孫帝王后妃皆當省覽此可為萬世法也嘗聞元世祖后煮故弓絃事亦命取練之織為衾裯以惠孤老每製衣裳餘帛緝為中褥織工治絲有荒纇棄遺者亦俾緝而織以賜諸王妃公主謂曰生長富貴當知蠶桑之不易此雖荒纇棄遺民間猶為難得故織以示爾不可不知也又嘗語諸王妃公主曰無功受福造化所惡吾與若屬被錦繡美飲食終日無所為當勤女工以報造化太子諸王雖愛之甚篤勉令務學諄切懇至嘗曰爾父尊臨萬國身致太平亦由學以聚之爾小子當思繼繼繩繩以不辱所生又曰吾聞女史言鄧禹為將不妄殺人故其女為后吾家世忠厚至吾父雖無禹之功然平生急於義今日為后非偶然也爾輩異日有人民社稷之寄尤必積纍忠厚乃可長世切不可自恃而不務德謂事有偶然也諸王或以服用相尚者后曰唐堯虞舜茅茨土階夏禹文王惡衣卑服爾父儉約尤惡奢麗日夜憂勤以治天下爾輩無功錦衣玉食猶欲以服御相加何志氣不同如是乎惟當親師取友講論聖賢之學開明心志自無此氣習也嘗令女史誦小學書注意聽之既而奏曰小學書言易曉事易行於人道無所不備真聖人之教法盍表章之聖祖曰然吾已令親王駙馬太學生咸講讀之矣嘗遇水旱歲凶進食必間設麥飯野蔬聖祖因告以賑恤之事曰妾聞水旱無時賑恤之有方不如蓄積之先備卒不幸有九年之水七年之旱將何法以賑之聖祖深以為然又言施恩欲溥遍然亦有等差衆庶日給固有艱難百官家在京者其鄉里遠近不同家貧富亦異而俸入有限慮或不給艱難必甚遇暑雨祁寒輒形于嗟嘆聖祖感其意每遣存問周給之近臣及奏事官朝罷㑹食廷中后命中官取其飲食親嘗之滋味淡薄奏聖祖曰朝廷用天祿以養天下之賢故自奉欲其薄養賢欲其厚今之典大烹者不能輯其下人惟奉上者甘㫖羣臣飲食皆不得其味豈養賢之道乎聖祖曰飲食之事朕不經心將謂羣臣皆得甘㫖豈意所司自分厚薄想羣臣欲言又難于啓齒事雖甚微所繫亦大皇后今日不言朕豈知其如此亟召光祿卿徐興祖等切責之聖祖嘗臨太學祀先師孔子還后問曰太學生幾何答曰數千又問悉有家乎曰亦多有之后曰善理天下者以賢才為本今人才衆多深足為喜但生員廩食於太學而妻子無所仰給寧無所纍於心乎聖祖即命月賜糧給其家以為常聖祖御膳后必躬自省視宫人請曰宫中人衆無煩聖體后曰吾固知宫中有人但婦人事夫不可不謹膳羞上進不可不蠲潔脫有不至爾輩受責吾心豈安吾所以為此者一以敬上而不敢忽一以保爾輩免於責也豈為無人耶宫人有過聖祖怒亦怒之命左右執付宫正司議罪怒解問曰爾不自責罰付之宫正司何也對曰妾聞賞罰惟公足以服人故不以喜而加賞不以怒而加刑喜怒之際而行賞罰必有偏重人議其私付之宫正司則當斟酌其輕重矣治天下者亦豈能人人自賞罰之哉有司者論之耳聖祖曰爾亦怒之何也對曰當陛下怒時遽自罰之非惟宫人得重罰亦損中和之氣妾之怒所以解陛下之怒也后慈以接下親戚勳舊之家無不得其歡心命婦入朝不以尊貴臨之延接如家人禮后有疾聖祖問曰爾有身後之囑乎對曰惟陛下當求賢人教育諸子使進德修業子孫皆賢臣民得所妾雖死如生也仁孝皇后中山武寧王徐達之長女自幼貞靜純明孝敬仁厚王與夫人言此女天禀非常宜以經史充其知識故書一覽成誦不忘博通載籍聖祖一日召王問曰知卿有賢女朕第四子氣質不凡能以配焉王拜稽首謝洪武九年正月冊為燕王妃恭勤婦道孝慈高皇后深所愛重嘗曰燕王妃所行足以儀範宫闈又曰此吾孝婦也髙皇后崩哀毁慟左右執喪三年蔬食如禮免喪或語及未嘗不流涕云文皇入正大統后正位中宫愈益祗勤數言南北戰鬬纍年兵民俱敝宜與休息又言帝堯施仁自親族始又言人才難得昔湯武之佐伊尹太公皆先代之人况今日賢才皆太祖皇帝所成望陛下不以新舊為間悉皆嘉納一日退朝晏請其故文皇曰吏部選人每循資格朕今日親拔二十餘人為方嶽郡守不覺晏爾后曰國之理亂係於民之安否民之安否係於守牧之賢不肖奈何悉用資格任牧守哉往古令制有出衆之才必有不次之擢積年勞之多亦有叙升之典二者並行則士無枉才官得實用而治效可致文皇然之初冊立仁宗為皇太子言曰太子國家之本願擇老成端正之士輔養德器文皇曰斯言正合朕意既而又曰皇考之制東宫官屬悉以廷臣兼之任使一則疑隙不生今凡宫臣之重者悉擇廷臣賢者兼之后曰此先朝鑒戒往古之法誠良法也雖萬世當守而行之又曰長子仁厚足為令器不忝祖宗矣后作內訓有曰君子為宗廟之主奉神靈之統宜蕃衍嗣續傳序無窮故夫婦之道世祀為大古之哲后賢妃皆推德逮下薦達貞淑不獨任已是以茂衍來裔長流慶澤周之太姒有逮下之德故樛木形福履之詠螽斯揚振振之美終能昌大本支綿固宗社三王之隆莫此為盛矣故婦人之行貴於寬惠惡於妒忌月星並麗豈掩於末光松蘭同畝不嫌於俱秀自后妃以下至於士庶人之妻誠能貞靜寬和明大孝之端廣至仁之意不專一已之欲不蔽衆下之美務廣君子之澤斯上安下順和氣蒸融善慶源源實肇於此矣嘗從容問文皇曰陛下日與共圖政理者誰與曰六卿治政務翰林職論思典詞命皆朝夕左右者乃請悉賜其命婦冠服鈔幣且諭之曰妻之於夫豈止於衣服饋食必有德行之助焉今皇上所與共圖理道者六卿翰林之臣數輩諸命婦可不有以翼贊於內乎百姓安則國家安國家安則君臣同享富貴澤被子孫矣后有疾遺令皇太子曰吾祗事皇上於今三十有二年上不能繼承先皇后懿德吾甚愧之今至此命也奚悲爾吾之長子仁孝淳厚當夙夜恪勤敬事君父勿以吾故過哀毁以傷君父之心吾素菲薄無德及人身沒之後喪葬務從簡省無妨臣民往者皇上遭罹內難躬率將士在外吾子母留北京敵兵圍城將校士民之妻皆擐甲胄挾矢石登城列陳協力一心以死固守及內難平吾正位中宫富貴已極而將校士民之妻至今報賚未稱吾寢疾未嘗忘近聞皇上將巡狩北京意願從行將請恩澤及之而吾今不逮矣爾能體吾心九原無憾嗚呼主器之任在爾匪輕敬以事上仁以撫下肅以正家恩以睦親爾念之臣良勝曰我朝后德萬善咸備令典寶訓蔚有表揚臣今編次萃于婦道一目蓋以昭我祖宗正身齊家之化所謂有關雎麟趾之意而行周官之法度也周公列詩以周南為首而關雎葛覃樛木諸詠並列雖不及文王而刑于寡妻之治乃風化之原也况聖祖豐功盛德門分類紀班班並見而不敢以宫闈言行一雜于其間者創業垂統內言無預于外政臣故恪遵之也漢馮昭儀元帝時自美人為婕妤帝幸虎圈鬬獸後宫皆從熊出圈攀檻欲上殿左右驚走婕妤當熊而立左右格殺熊帝問婕妤人情皆驚懼何故當熊對曰妾聞猛獸得人而止妾恐至御座故以身當之帝嗟嘆以此敬重焉班婕妤賢才通敏入後宫成帝嘗欲與同輦辭曰觀古圖畫聖賢之君皆有名臣在側三代末主乃有女嬖今欲同輦得無似之乎帝善其言而止鴻嘉以後見帝稍隆於女寵乃進侍者李平平得幸亦立為婕妤君子謂班婕妤進李平於同列即古樊姬之德也徐惠妃唐太宗妃也以上東征高麗西討龜茲翠微玉華營繕相繼又服玩頗單靡上疏曰東戍遼海西討崑丘士馬罷耗漕餉漂沒捐有盡之農填無窮之壑圖未獲之衆喪已成之軍昔秦皇并吞六國反速危亡之基晉武奄有三方翻成敗覆之業又曰作法於儉猶懼其奢作法於奢何以制後上善其言甚禮重之國朝成穆貴妃孫和卿女也聖祖聞其有容德納宫中言行有禮法如昔古賢冊為貴妃小心恭謹於聖祖有警戒相成之助佐髙皇后以理治於內宫壼雅肅臣良勝曰天子一娶十二女諸侯一娶九女妾媵與嫡偕行詩美戴媯而春秋于叔姬全節亟與之勸善之道廣矣臣故拔其尤者類附焉右衍夫婦之法小畜九三輿說輻夫妻反目象曰夫妻反目不能正室也程頥曰三以陽爻居不得中而密比於四陰陽之情相求也又昵比而不中為陰畜制者也故不能前進猶車輿說去輪輻言不能行也夫妻反目陰受制於陽者也今反制陽如夫妻之反目也反目謂怒目相視不順其夫而反制之未有夫不失道而妻能制之者也三自處不以道故四得以制之不使進猶夫不能正其室家故致反目也姤女壯勿用取女朱熹曰非所望而卒然值之如不期而遇者故為遇遇已非正又以一陰而遇五陽則女德不貞而壯之甚也取以自配必害乎陽故其象占如此臣良勝曰夫婦之道謹於始遇也遇失於初欲善其後難矣叔向欲娶申公巫臣氏其母曰子靈之妻殺三夫一君一子而亡一國兩卿可無懲乎吾聞之甚美必有甚惡昔有仍氏女光可以鑑后夔娶之生伯封實有豕心后羿滅之夔以不祀三代之亡共子之廢皆是物也夫有尤物足以移人茍非德義則必有禍叔向卒娶之生伯石母視之聞其聲曰是豺狼之聲非是莫喪羊舌氏矣夫以叔向賢者猶昧女壯之戒卒喪其宗若成帝之於飛燕𤣥宗之於太真其殞身喪國之禍能免乎哉瞻卬詩曰哲夫成城哲婦傾城懿彼哲婦為梟為鴟婦有長舌惟厲之階亂匪降自天生自婦人匪教匪誨時惟婦寺朱熹曰男子正位乎外為國家之主故有知則能立國婦人以無非無儀為善無所事哲哲則適以覆國而已故以此懿美之哲婦而反為梟鴟蓋以其多言能為禍亂之梯也若是則亂豈真自天降哉時由此婦人而已蓋其言雖多而非有教誨之益者是惟婦人與奄人爾豈可近哉上文恆言婦人之禍末句兼以奄人為言蓋二者常相倚而為奸不可不并以為戒也歐陽公嘗言宦者之禍甚於女寵其言尤為深切有國家者可不戒哉夏桀伐有施氏有施氏以妹喜女焉喜有寵所言皆從為瓊宫瑶臺殫百姓之財肉山脯林酒池可以運船糟堤可以望十里一鼓而牛飲者三千人妹喜笑以為樂湯伐之放于南巢而死商紂無道有蘇氏以妲己女焉妲己有寵其言是從使師延作朝歌北鄙之音北里之舞靡靡之樂造鹿臺為瓊室玉門廣沙丘苑臺以酒為池懸肉為林男女祼相逐於其間宫中九市為長夜之飲諸侯有叛者妲己以為罰輕於是為尉斗以火燒然使人舉之手爛更為銅柱以膏塗之加炭火之上使有罪緣之紂與妲己以為大樂武王伐之乃衣寶玉自焚而死夏之衰也褒人之神化為二龍以伺王庭而言曰余褒之二君也夏后卜殺之莫吉卜請其漦而藏之吉乃布幣而策告之龍亡漦在櫝而藏之傳及殷周莫之發也厲王之末發而觀之漦流于庭不可除也化為𤣥黿入于王府童妾未既齓而遭之笄而孕當宣王時生棄之有夫婦哀其夜號而取之逸於褒褒人有獄入是女於幽王王嬖愛之褒姒不好笑王說之萬方故不笑乃無故舉火諸侯至至而無寇褒姒大笑好聞裂繒聲王發繒裂之適其意犬戎殺王於驪山下虜褒姒潘榮曰唐虞三代之治純用禮樂教化大行不言而信不怒而威無為而治如斯而已及其衰也夏以妹喜商以妲己周以褒姒是佚欲之亡人而百令不從矣晉賈后初為太子妃嘗以妬手殺數人又以㦸擲孕妾子隨刃墮及太子即位是為惠帝每欲干預政事而為太傅楊駿所抑遂搆駿以謀反殺之廢太后送永寧宫后無子詐為有娠內藳物産具取妹夫韓壽子養之詐稱帝不豫召太子入朝既至不見置于别室遣婢以帝命賜酒三升使盡飲之遂大醉后使黃門郎潘嶽作書草稱詔使書之其字半不成后補成之以呈帝召公卿入示之廢太子為庶人幽金墉城殺其母謝淑妃趙王倫孫秀等收后廢為庶人幽之于建始殿捕賈氏親黨斬之齎金屑酒賜后死宋光宗一日浣手宫中覩宫人手白悅之他日李后遣人送食于帝啓之則宫人兩手也后又以黃貴妃有寵因帝祭太廟宿于齊宫后殺貴妃以暴疾聞翌日合祭天地風雨大作黃壇燭滅盡不能成禮而罷帝既聞貴妃卒又值此變震懼增疾不視朝政事多决于后后益驕恣壽皇聞帝疾亟往南內視之且責后后怨愈深臣良勝曰人君合二姓之好以為天地宗廟社稷之主可不慎所選乎賈后賈充女也初議立時宫中人語曰不立真皇后乃立假皇后邪李后則李道之女道聞道士皇甫坦善相出女拜之坦驚不受拜曰此女當母天下坦言於髙宗而聘之為恭王妃妒悍訴左右于髙宗髙宗不懌曰此將種吾為皇甫坦所誤古稱后德若馬鄧則馬援鄧禹之後曹髙則曹彬髙瓊之後皆世德而有家教者是以能賢賈以奸邪之産而李后乃借道士之譽宜其誤矣吕后鴆殺趙王遂斷戚夫人手足去眼輝耳飲瘖藥使居厠中號曰人彘召惠帝觀之帝問知為戚夫人乃大哭因病歲餘不能起使人請太后曰此非人所為臣不能為太后子後帝崩吕后臨朝稱制趙弼曰厯代婦人竊弄國柄自吕后始牝雞晨鳴為萬世戒惠帝慈祥仁厚之主被其虧損聖德使納甥女為后亂夫婦之大倫召觀人彘駭而成疾竟至不起絶母子之恩義僭竊天位擅王諸吕誅殺劉氏子孫寵幸審食其而弗耻穢德真漢室之罪人也髙帝創業垂統使立其典章貽戒後世母后不得臨朝婦人不得預政則吕氏必不敢啓覬覦之心而執政大臣得以力爭矣失此不為流弊後世至孝平初立孝元太后王氏臨朝致王莽篡位漢祚中衰東漢之世章帝之竇后和帝之鄧后安帝之閻后順帝之梁后桓帝之竇后靈帝之何后相繼臨朝專政實自吕后發端故後世效尤也武后能屈身忍辱奉順上意故髙宗排羣議而立之及得志專作威福上欲有所為動為所制自是上每視事則后垂簾於後政無大小皆預聞之黜陟生殺决於其口天子拱手而已中外謂之二聖髙宗崩中宗立政事咸取决焉後廢中宗為廬陵王立豫王旦為皇帝居於别殿政事不得有所預侍御史𫝊游藝帥關中百姓上表請改國號曰周太后可之乃御則天樓赦天下以唐為周改元上尊號曰聖神皇帝以豫王旦為皇嗣賜姓武氏立武氏七廟於神都胡安國曰君子有言臣居尊位羿莽是也猶可言也婦居尊位武后是也非常之變不可言也蓋興廢常理也陰居尊位非常之變故也吕氏為而未成武氏遂革唐命然傳記以來三千年間才一人耳亦不及終其身而覆後世或有欲為是者豈無其漸仁人義士監於髙宗必逆有以處之矣臣良勝曰婦人內夫家既行則遠於兄弟父母在歲一歸寧而已世變風移而婦之內母家者十人而九故莒女有為鄫夫人者欲立其所出鄫子狥於其婦而取莒公子為後君子釋鄫罪莒謂與黃歇進李園之妹於楚王吕不韋獻邯鄲姬於秦公子者其罪一也彼鄫夫人者以已之無子也而黃吕之易秦楚隂奪之也武曌有親子廢之而自為帝又改元易國號并子亦改為武姓其後三思又圖為嗣是欲內母家并生子而棄之此豈人之心也哉丘濬有云此開闢以來未有之大變故并吕氏為婦道之永戒焉右衍夫婦之戒中庸衍義卷七
